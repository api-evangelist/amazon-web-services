id: amazon-web-services-vocabulary
name: Amazon Web Services Vocabulary
description: Vocabulary and taxonomy for Amazon Web Services concepts, operations, and resources.
version: '1.0'
provider: Amazon Web Services
tags:
  - AWS
terms:
  - term: API
    definition: Application Programming Interface for interacting with the service.
    category: Core Concept
  - term: Resource
    definition: An entity managed by the service (e.g., instance, task, parameter).
    category: Core Concept
  - term: Operation
    definition: An API action that creates, reads, updates, or deletes a resource.
    category: Core Concept
  - term: Region
    definition: An AWS geographic location where the service is deployed.
    category: Infrastructure
  - term: ARN
    definition: Amazon Resource Name, a unique identifier for AWS resources.
    category: Identifier
