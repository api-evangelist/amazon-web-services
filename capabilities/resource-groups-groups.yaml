naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services resource-groups — Groups
  description: 'Amazon Web Services resource-groups — Groups. 1 operations. Lead operation: Amazon Web Services Creategroup.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: resource-groups-groups
    baseUri: ''
    description: Amazon Web Services resource-groups — Groups business capability. Self-contained, no shared references.
    resources:
    - name: groups
      path: /groups
      operations:
      - name: amazonwebservicescreategroup
        method: POST
        description: Amazon Web Services Creategroup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: resource-groups-groups-rest
    port: 8080
    description: REST adapter for Amazon Web Services resource-groups — Groups. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/groups
      name: groups
      description: REST surface for groups.
      operations:
      - method: POST
        name: amazonwebservicescreategroup
        description: Amazon Web Services Creategroup
        call: resource-groups-groups.amazonwebservicescreategroup
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: resource-groups-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services resource-groups — Groups. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-creategroup
      description: Amazon Web Services Creategroup
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: resource-groups-groups.amazonwebservicescreategroup
      outputParameters:
      - type: object
        mapping: $.
