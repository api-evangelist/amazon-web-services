naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iot — Streams
  description: 'Amazon Web Services iot — Streams. 2 operations. Lead operation: Amazon Web Services Liststreams. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Streams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iot-streams
    baseUri: ''
    description: Amazon Web Services iot — Streams business capability. Self-contained, no shared references.
    resources:
    - name: streams
      path: /streams
      operations:
      - name: amazonwebservicesliststreams
        method: GET
        description: Amazon Web Services Liststreams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: streams-streamId
      path: /streams/{streamId}
      operations:
      - name: amazonwebservicesupdatestream
        method: PUT
        description: Amazon Web Services Updatestream
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iot-streams-rest
    port: 8080
    description: REST adapter for Amazon Web Services iot — Streams. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/streams
      name: streams
      description: REST surface for streams.
      operations:
      - method: GET
        name: amazonwebservicesliststreams
        description: Amazon Web Services Liststreams
        call: iot-streams.amazonwebservicesliststreams
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/streams/{streamid}
      name: streams-streamid
      description: REST surface for streams-streamId.
      operations:
      - method: PUT
        name: amazonwebservicesupdatestream
        description: Amazon Web Services Updatestream
        call: iot-streams.amazonwebservicesupdatestream
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iot-streams-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iot — Streams. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-liststreams
      description: Amazon Web Services Liststreams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iot-streams.amazonwebservicesliststreams
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updatestream
      description: Amazon Web Services Updatestream
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: iot-streams.amazonwebservicesupdatestream
      outputParameters:
      - type: object
        mapping: $.
