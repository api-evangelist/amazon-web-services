naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services datapipeline
  description: 'Amazon Web Services datapipeline. 1 operations. Lead operation: Amazon Web Services Validatepipelinedefinition.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services datapipeline
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: datapipeline
    baseUri: ''
    description: Amazon Web Services datapipeline business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesvalidatepipelinedefinition
        method: POST
        description: Amazon Web Services Validatepipelinedefinition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: datapipeline-rest
    port: 8080
    description: REST adapter for Amazon Web Services datapipeline. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesvalidatepipelinedefinition
        description: Amazon Web Services Validatepipelinedefinition
        call: datapipeline.amazonwebservicesvalidatepipelinedefinition
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datapipeline-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services datapipeline. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-validatepipelinedefinition
      description: Amazon Web Services Validatepipelinedefinition
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: datapipeline.amazonwebservicesvalidatepipelinedefinition
      outputParameters:
      - type: object
        mapping: $.
