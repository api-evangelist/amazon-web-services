naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services braket — Devices
  description: 'Amazon Web Services braket — Devices. 1 operations. Lead operation: Amazon Web Services Searchdevices. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Devices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: braket-devices
    baseUri: ''
    description: Amazon Web Services braket — Devices business capability. Self-contained, no shared references.
    resources:
    - name: devices
      path: /devices
      operations:
      - name: amazonwebservicessearchdevices
        method: POST
        description: Amazon Web Services Searchdevices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: braket-devices-rest
    port: 8080
    description: REST adapter for Amazon Web Services braket — Devices. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/devices
      name: devices
      description: REST surface for devices.
      operations:
      - method: POST
        name: amazonwebservicessearchdevices
        description: Amazon Web Services Searchdevices
        call: braket-devices.amazonwebservicessearchdevices
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: braket-devices-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services braket — Devices. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-searchdevices
      description: Amazon Web Services Searchdevices
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: braket-devices.amazonwebservicessearchdevices
      outputParameters:
      - type: object
        mapping: $.
