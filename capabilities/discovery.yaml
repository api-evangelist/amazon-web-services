naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services discovery
  description: 'Amazon Web Services discovery. 1 operations. Lead operation: Amazon Web Services Updateapplication. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services discovery
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: discovery
    baseUri: ''
    description: Amazon Web Services discovery business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateapplication
        method: POST
        description: Amazon Web Services Updateapplication
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: discovery-rest
    port: 8080
    description: REST adapter for Amazon Web Services discovery. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateapplication
        description: Amazon Web Services Updateapplication
        call: discovery.amazonwebservicesupdateapplication
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: discovery-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services discovery. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updateapplication
      description: Amazon Web Services Updateapplication
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: discovery.amazonwebservicesupdateapplication
      outputParameters:
      - type: object
        mapping: $.
