naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services rum — Rummetrics
  description: 'Amazon Web Services rum — Rummetrics. 2 operations. Lead operation: Amazon Web Services Updaterummetricdefinition.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Rummetrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: rum-rummetrics
    baseUri: ''
    description: Amazon Web Services rum — Rummetrics business capability. Self-contained, no shared references.
    resources:
    - name: rummetrics-AppMonitorName-metrics
      path: /rummetrics/{AppMonitorName}/metrics
      operations:
      - name: amazonwebservicesupdaterummetricdefinition
        method: PATCH
        description: Amazon Web Services Updaterummetricdefinition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rummetrics-AppMonitorName-metricsdestination
      path: /rummetrics/{AppMonitorName}/metricsdestination
      operations:
      - name: amazonwebservicesputrummetricsdestination
        method: POST
        description: Amazon Web Services Putrummetricsdestination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: rum-rummetrics-rest
    port: 8080
    description: REST adapter for Amazon Web Services rum — Rummetrics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/rummetrics/{appmonitorname}/metrics
      name: rummetrics-appmonitorname-metrics
      description: REST surface for rummetrics-AppMonitorName-metrics.
      operations:
      - method: PATCH
        name: amazonwebservicesupdaterummetricdefinition
        description: Amazon Web Services Updaterummetricdefinition
        call: rum-rummetrics.amazonwebservicesupdaterummetricdefinition
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rummetrics/{appmonitorname}/metricsdestination
      name: rummetrics-appmonitorname-metricsdestination
      description: REST surface for rummetrics-AppMonitorName-metricsdestination.
      operations:
      - method: POST
        name: amazonwebservicesputrummetricsdestination
        description: Amazon Web Services Putrummetricsdestination
        call: rum-rummetrics.amazonwebservicesputrummetricsdestination
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rum-rummetrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services rum — Rummetrics. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updaterummetricdefinition
      description: Amazon Web Services Updaterummetricdefinition
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rum-rummetrics.amazonwebservicesupdaterummetricdefinition
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-putrummetricsdestination
      description: Amazon Web Services Putrummetricsdestination
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rum-rummetrics.amazonwebservicesputrummetricsdestination
      outputParameters:
      - type: object
        mapping: $.
