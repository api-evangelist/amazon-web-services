naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services worklink — describeDevice
  description: 'Amazon Web Services worklink — describeDevice. 1 operations. Lead operation: Amazon Web Services Describedevice.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - describeDevice
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: worklink-describedevice
    baseUri: ''
    description: Amazon Web Services worklink — describeDevice business capability. Self-contained, no shared references.
    resources:
    - name: describeDevice
      path: /describeDevice
      operations:
      - name: amazonwebservicesdescribedevice
        method: POST
        description: Amazon Web Services Describedevice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: worklink-describedevice-rest
    port: 8080
    description: REST adapter for Amazon Web Services worklink — describeDevice. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/describedevice
      name: describedevice
      description: REST surface for describeDevice.
      operations:
      - method: POST
        name: amazonwebservicesdescribedevice
        description: Amazon Web Services Describedevice
        call: worklink-describedevice.amazonwebservicesdescribedevice
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: worklink-describedevice-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services worklink — describeDevice. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-describedevice
      description: Amazon Web Services Describedevice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: worklink-describedevice.amazonwebservicesdescribedevice
      outputParameters:
      - type: object
        mapping: $.
