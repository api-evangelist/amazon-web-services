naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services fsx
  description: 'Amazon Web Services fsx. 1 operations. Lead operation: Amazon Web Services Updatevolume. Self-contained Naftiko
    capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services fsx
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: fsx
    baseUri: ''
    description: Amazon Web Services fsx business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatevolume
        method: POST
        description: Amazon Web Services Updatevolume
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: fsx-rest
    port: 8080
    description: REST adapter for Amazon Web Services fsx. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatevolume
        description: Amazon Web Services Updatevolume
        call: fsx.amazonwebservicesupdatevolume
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fsx-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services fsx. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updatevolume
      description: Amazon Web Services Updatevolume
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fsx.amazonwebservicesupdatevolume
      outputParameters:
      - type: object
        mapping: $.
