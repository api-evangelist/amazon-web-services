naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services glue
  description: 'Amazon Web Services glue. 1 operations. Lead operation: Amazon Web Services Updateworkflow. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services glue
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: glue
    baseUri: ''
    description: Amazon Web Services glue business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateworkflow
        method: POST
        description: Amazon Web Services Updateworkflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: glue-rest
    port: 8080
    description: REST adapter for Amazon Web Services glue. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateworkflow
        description: Amazon Web Services Updateworkflow
        call: glue.amazonwebservicesupdateworkflow
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: glue-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services glue. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updateworkflow
      description: Amazon Web Services Updateworkflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: glue.amazonwebservicesupdateworkflow
      outputParameters:
      - type: object
        mapping: $.
