naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services mobile — Bundles
  description: 'Amazon Web Services mobile — Bundles. 2 operations. Lead operation: Amazon Web Services Listbundles. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Bundles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: mobile-bundles
    baseUri: ''
    description: Amazon Web Services mobile — Bundles business capability. Self-contained, no shared references.
    resources:
    - name: bundles
      path: /bundles
      operations:
      - name: amazonwebserviceslistbundles
        method: GET
        description: Amazon Web Services Listbundles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: bundles-bundleId
      path: /bundles/{bundleId}
      operations:
      - name: amazonwebservicesexportbundle
        method: POST
        description: Amazon Web Services Exportbundle
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mobile-bundles-rest
    port: 8080
    description: REST adapter for Amazon Web Services mobile — Bundles. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/bundles
      name: bundles
      description: REST surface for bundles.
      operations:
      - method: GET
        name: amazonwebserviceslistbundles
        description: Amazon Web Services Listbundles
        call: mobile-bundles.amazonwebserviceslistbundles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/bundles/{bundleid}
      name: bundles-bundleid
      description: REST surface for bundles-bundleId.
      operations:
      - method: POST
        name: amazonwebservicesexportbundle
        description: Amazon Web Services Exportbundle
        call: mobile-bundles.amazonwebservicesexportbundle
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mobile-bundles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services mobile — Bundles. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listbundles
      description: Amazon Web Services Listbundles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mobile-bundles.amazonwebserviceslistbundles
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-exportbundle
      description: Amazon Web Services Exportbundle
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mobile-bundles.amazonwebservicesexportbundle
      outputParameters:
      - type: object
        mapping: $.
