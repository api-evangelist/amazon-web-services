naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iot — Endpoint
  description: 'Amazon Web Services iot — Endpoint. 1 operations. Lead operation: Amazon Web Services Describeendpoint. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Endpoint
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iot-endpoint
    baseUri: ''
    description: Amazon Web Services iot — Endpoint business capability. Self-contained, no shared references.
    resources:
    - name: endpoint
      path: /endpoint
      operations:
      - name: amazonwebservicesdescribeendpoint
        method: GET
        description: Amazon Web Services Describeendpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iot-endpoint-rest
    port: 8080
    description: REST adapter for Amazon Web Services iot — Endpoint. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/endpoint
      name: endpoint
      description: REST surface for endpoint.
      operations:
      - method: GET
        name: amazonwebservicesdescribeendpoint
        description: Amazon Web Services Describeendpoint
        call: iot-endpoint.amazonwebservicesdescribeendpoint
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iot-endpoint-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iot — Endpoint. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-describeendpoint
      description: Amazon Web Services Describeendpoint
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iot-endpoint.amazonwebservicesdescribeendpoint
      outputParameters:
      - type: object
        mapping: $.
