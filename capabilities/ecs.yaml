naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services ecs
  description: 'Amazon Web Services ecs. 1 operations. Lead operation: Amazon Web Services Updatetaskset. Self-contained Naftiko
    capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services ecs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: ecs
    baseUri: ''
    description: Amazon Web Services ecs business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatetaskset
        method: POST
        description: Amazon Web Services Updatetaskset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: ecs-rest
    port: 8080
    description: REST adapter for Amazon Web Services ecs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatetaskset
        description: Amazon Web Services Updatetaskset
        call: ecs.amazonwebservicesupdatetaskset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ecs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services ecs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updatetaskset
      description: Amazon Web Services Updatetaskset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ecs.amazonwebservicesupdatetaskset
      outputParameters:
      - type: object
        mapping: $.
