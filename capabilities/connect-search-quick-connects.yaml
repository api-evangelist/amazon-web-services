      name: search-quick-connects
      description: REST surface for search-quick-connects.
      operations:
      - method: POST
        name: amazonwebservicessearchquickconnects
        description: Amazon Web Services Searchquickconnects
        call: connect-search-quick-connects.amazonwebservicessearchquickconnects
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
