      description: Amazon Web Services Searchquickconnects
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: connect-search-quick-connects.amazonwebservicessearchquickconnects
      outputParameters:
      - type: object
        mapping: $.
