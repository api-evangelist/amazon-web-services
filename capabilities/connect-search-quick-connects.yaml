    namespace: connect-search-quick-connects
    baseUri: ''
    description: Amazon Web Services connect — Search Quick Connects business capability. Self-contained, no shared references.
    resources:
    - name: search-quick-connects
      path: /search-quick-connects
      operations:
      - name: amazonwebservicessearchquickconnects
        method: POST
        description: Amazon Web Services Searchquickconnects
