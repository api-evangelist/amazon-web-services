naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Bucket Logging
  description: 'Amazon Web Services AWS S3 — Bucket Logging. 1 operations. Lead operation: Amazon Web Services Put Bucket
    Logging. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Bucket Logging
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-bucket-logging
    baseUri: ''
    description: Amazon Web Services AWS S3 — Bucket Logging business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?logging
      path: /{Bucket}?logging
      operations:
      - name: putbucketlogging
        method: PUT
        description: Amazon Web Services Put Bucket Logging
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-bucket-logging-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Bucket Logging. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/bucket-logging
      name: bucket-logging
      description: REST surface for Bucket}?logging.
      operations:
      - method: PUT
        name: putbucketlogging
        description: Amazon Web Services Put Bucket Logging
        call: s3-bucket-logging.putbucketlogging
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-bucket-logging-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Bucket Logging. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-put-bucket
      description: Amazon Web Services Put Bucket Logging
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: s3-bucket-logging.putbucketlogging
      outputParameters:
      - type: object
        mapping: $.
