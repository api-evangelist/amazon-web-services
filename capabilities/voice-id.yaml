naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services voice-id
  description: 'Amazon Web Services voice-id. 1 operations. Lead operation: Amazon Web Services Updatewatchlist. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services voice-id
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: voice-id
    baseUri: ''
    description: Amazon Web Services voice-id business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatewatchlist
        method: POST
        description: Amazon Web Services Updatewatchlist
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: voice-id-rest
    port: 8080
    description: REST adapter for Amazon Web Services voice-id. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatewatchlist
        description: Amazon Web Services Updatewatchlist
        call: voice-id.amazonwebservicesupdatewatchlist
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: voice-id-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services voice-id. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatewatchlist
      description: Amazon Web Services Updatewatchlist
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: voice-id.amazonwebservicesupdatewatchlist
      outputParameters:
      - type: object
        mapping: $.
