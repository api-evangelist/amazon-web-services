      name: telemetryrecords
      description: REST surface for TelemetryRecords.
      operations:
      - method: POST
        name: amazonwebservicesputtelemetryrecords
        description: Amazon Web Services Puttelemetryrecords
        call: xray-telemetryrecords.amazonwebservicesputtelemetryrecords
