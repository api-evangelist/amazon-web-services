  description: 'Amazon Web Services xray — TelemetryRecords. 1 operations. Lead operation: Amazon Web Services Puttelemetryrecords.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - TelemetryRecords
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
