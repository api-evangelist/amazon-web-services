    namespace: xray-telemetryrecords
    baseUri: ''
    description: Amazon Web Services xray — TelemetryRecords business capability. Self-contained, no shared references.
    resources:
    - name: TelemetryRecords
      path: /TelemetryRecords
      operations:
      - name: amazonwebservicesputtelemetryrecords
        method: POST
        description: Amazon Web Services Puttelemetryrecords
        outputRawFormat: json
        outputParameters:
        - name: result
