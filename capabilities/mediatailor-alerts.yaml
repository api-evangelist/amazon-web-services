naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services mediatailor — Alerts
  description: 'Amazon Web Services mediatailor — Alerts. 1 operations. Lead operation: Amazon Web Services Listalerts. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Alerts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: mediatailor-alerts
    baseUri: ''
    description: Amazon Web Services mediatailor — Alerts business capability. Self-contained, no shared references.
    resources:
    - name: alerts
      path: /alerts
      operations:
      - name: amazonwebserviceslistalerts
        method: GET
        description: Amazon Web Services Listalerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mediatailor-alerts-rest
    port: 8080
    description: REST adapter for Amazon Web Services mediatailor — Alerts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/alerts
      name: alerts
      description: REST surface for alerts.
      operations:
      - method: GET
        name: amazonwebserviceslistalerts
        description: Amazon Web Services Listalerts
        call: mediatailor-alerts.amazonwebserviceslistalerts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mediatailor-alerts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services mediatailor — Alerts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-listalerts
      description: Amazon Web Services Listalerts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mediatailor-alerts.amazonwebserviceslistalerts
      outputParameters:
      - type: object
        mapping: $.
