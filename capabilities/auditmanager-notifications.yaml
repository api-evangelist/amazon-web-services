  - type: rest
    namespace: auditmanager-notifications-rest
    port: 8080
    description: REST adapter for Amazon Web Services auditmanager — Notifications. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/notifications
      name: notifications
      description: REST surface for notifications.
      operations:
      - method: GET
        name: amazonwebserviceslistnotifications
        description: Amazon Web Services Listnotifications
        call: auditmanager-notifications.amazonwebserviceslistnotifications
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
