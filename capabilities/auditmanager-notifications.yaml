naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services auditmanager — Notifications
  description: 'Amazon Web Services auditmanager — Notifications. 1 operations. Lead operation: Amazon Web Services Listnotifications.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Notifications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: auditmanager-notifications
    baseUri: ''
    description: Amazon Web Services auditmanager — Notifications business capability. Self-contained, no shared references.
    resources:
    - name: notifications
      path: /notifications
      operations:
      - name: amazonwebserviceslistnotifications
        method: GET
        description: Amazon Web Services Listnotifications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
