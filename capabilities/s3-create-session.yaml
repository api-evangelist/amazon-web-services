naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Create Session
  description: 'Amazon Web Services AWS S3 — Create Session. 1 operations. Lead operation: Amazon Web Services Create Session.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Create Session
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-create-session
    baseUri: ''
    description: Amazon Web Services AWS S3 — Create Session business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?session
      path: /{Bucket}?session
      operations:
      - name: createsession
        method: GET
        description: Amazon Web Services Create Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-create-session-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Create Session. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/bucket-session
      name: bucket-session
      description: REST surface for Bucket}?session.
      operations:
      - method: GET
        name: createsession
        description: Amazon Web Services Create Session
        call: s3-create-session.createsession
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-create-session-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Create Session. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-create-session
      description: Amazon Web Services Create Session
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: s3-create-session.createsession
      outputParameters:
      - type: object
        mapping: $.
