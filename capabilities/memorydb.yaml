naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services memorydb
  description: 'Amazon Web Services memorydb. 1 operations. Lead operation: Amazon Web Services Updateuser. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services memorydb
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: memorydb
    baseUri: ''
    description: Amazon Web Services memorydb business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateuser
        method: POST
        description: Amazon Web Services Updateuser
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: memorydb-rest
    port: 8080
    description: REST adapter for Amazon Web Services memorydb. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateuser
        description: Amazon Web Services Updateuser
        call: memorydb.amazonwebservicesupdateuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: memorydb-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services memorydb. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updateuser
      description: Amazon Web Services Updateuser
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: memorydb.amazonwebservicesupdateuser
      outputParameters:
      - type: object
        mapping: $.
