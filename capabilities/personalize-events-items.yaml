naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services personalize-events — Items
  description: 'Amazon Web Services personalize-events — Items. 1 operations. Lead operation: Amazon Web Services Putitems.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Items
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: personalize-events-items
    baseUri: ''
    description: Amazon Web Services personalize-events — Items business capability. Self-contained, no shared references.
    resources:
    - name: items
      path: /items
      operations:
      - name: amazonwebservicesputitems
        method: POST
        description: Amazon Web Services Putitems
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: personalize-events-items-rest
    port: 8080
    description: REST adapter for Amazon Web Services personalize-events — Items. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/items
      name: items
      description: REST surface for items.
      operations:
      - method: POST
        name: amazonwebservicesputitems
        description: Amazon Web Services Putitems
        call: personalize-events-items.amazonwebservicesputitems
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: personalize-events-items-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services personalize-events — Items. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-putitems
      description: Amazon Web Services Putitems
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: personalize-events-items.amazonwebservicesputitems
      outputParameters:
      - type: object
        mapping: $.
