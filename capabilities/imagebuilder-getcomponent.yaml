naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services imagebuilder — GetComponent
  description: 'Amazon Web Services imagebuilder — GetComponent. 1 operations. Lead operation: Amazon Web Services Getcomponent.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - GetComponent
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: imagebuilder-getcomponent
    baseUri: ''
    description: Amazon Web Services imagebuilder — GetComponent business capability. Self-contained, no shared references.
    resources:
    - name: GetComponent
      path: /GetComponent
      operations:
      - name: amazonwebservicesgetcomponent
        method: GET
        description: Amazon Web Services Getcomponent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: imagebuilder-getcomponent-rest
    port: 8080
    description: REST adapter for Amazon Web Services imagebuilder — GetComponent. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/getcomponent
      name: getcomponent
      description: REST surface for GetComponent.
      operations:
      - method: GET
        name: amazonwebservicesgetcomponent
        description: Amazon Web Services Getcomponent
        call: imagebuilder-getcomponent.amazonwebservicesgetcomponent
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: imagebuilder-getcomponent-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services imagebuilder — GetComponent. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-getcomponent
      description: Amazon Web Services Getcomponent
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: imagebuilder-getcomponent.amazonwebservicesgetcomponent
      outputParameters:
      - type: object
        mapping: $.
