naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services shield
  description: 'Amazon Web Services shield. 1 operations. Lead operation: Amazon Web Services Updatesubscription. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services shield
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: shield
    baseUri: ''
    description: Amazon Web Services shield business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatesubscription
        method: POST
        description: Amazon Web Services Updatesubscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: shield-rest
    port: 8080
    description: REST adapter for Amazon Web Services shield. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatesubscription
        description: Amazon Web Services Updatesubscription
        call: shield.amazonwebservicesupdatesubscription
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: shield-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services shield. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updatesubscription
      description: Amazon Web Services Updatesubscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: shield.amazonwebservicesupdatesubscription
      outputParameters:
      - type: object
        mapping: $.
