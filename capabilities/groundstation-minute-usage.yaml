naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services groundstation — Minute Usage
  description: 'Amazon Web Services groundstation — Minute Usage. 1 operations. Lead operation: Amazon Web Services Getminuteusage.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Minute Usage
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: groundstation-minute-usage
    baseUri: ''
    description: Amazon Web Services groundstation — Minute Usage business capability. Self-contained, no shared references.
    resources:
    - name: minute-usage
      path: /minute-usage
      operations:
      - name: amazonwebservicesgetminuteusage
        method: POST
        description: Amazon Web Services Getminuteusage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: groundstation-minute-usage-rest
    port: 8080
    description: REST adapter for Amazon Web Services groundstation — Minute Usage. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/minute-usage
      name: minute-usage
      description: REST surface for minute-usage.
      operations:
      - method: POST
        name: amazonwebservicesgetminuteusage
        description: Amazon Web Services Getminuteusage
        call: groundstation-minute-usage.amazonwebservicesgetminuteusage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: groundstation-minute-usage-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services groundstation — Minute Usage. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-getminuteusage
      description: Amazon Web Services Getminuteusage
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: groundstation-minute-usage.amazonwebservicesgetminuteusage
      outputParameters:
      - type: object
        mapping: $.
