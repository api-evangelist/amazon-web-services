naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services ds
  description: 'Amazon Web Services ds. 1 operations. Lead operation: Amazon Web Services Verifytrust. Self-contained Naftiko
    capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services ds
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: ds
    baseUri: ''
    description: Amazon Web Services ds business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesverifytrust
        method: POST
        description: Amazon Web Services Verifytrust
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: ds-rest
    port: 8080
    description: REST adapter for Amazon Web Services ds. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesverifytrust
        description: Amazon Web Services Verifytrust
        call: ds.amazonwebservicesverifytrust
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ds-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services ds. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-verifytrust
      description: Amazon Web Services Verifytrust
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ds.amazonwebservicesverifytrust
      outputParameters:
      - type: object
        mapping: $.
