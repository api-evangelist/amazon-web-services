naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services kendra
  description: 'Amazon Web Services kendra. 1 operations. Lead operation: Amazon Web Services Updatethesaurus. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services kendra
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: kendra
    baseUri: ''
    description: Amazon Web Services kendra business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatethesaurus
        method: POST
        description: Amazon Web Services Updatethesaurus
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: kendra-rest
    port: 8080
    description: REST adapter for Amazon Web Services kendra. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatethesaurus
        description: Amazon Web Services Updatethesaurus
        call: kendra.amazonwebservicesupdatethesaurus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kendra-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services kendra. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updatethesaurus
      description: Amazon Web Services Updatethesaurus
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: kendra.amazonwebservicesupdatethesaurus
      outputParameters:
      - type: object
        mapping: $.
