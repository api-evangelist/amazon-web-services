naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services ec2
  description: 'Amazon Web Services ec2. 1 operations. Lead operation: Amazon Web Services Withdrawbyoipcidr. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services ec2
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: ec2
    baseUri: ''
    description: Amazon Web Services ec2 business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebserviceswithdrawbyoipcidr
        method: POST
        description: Amazon Web Services Withdrawbyoipcidr
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: ec2-rest
    port: 8080
    description: REST adapter for Amazon Web Services ec2. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebserviceswithdrawbyoipcidr
        description: Amazon Web Services Withdrawbyoipcidr
        call: ec2.amazonwebserviceswithdrawbyoipcidr
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ec2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services ec2. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-withdrawbyoipcidr
      description: Amazon Web Services Withdrawbyoipcidr
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ec2.amazonwebserviceswithdrawbyoipcidr
      outputParameters:
      - type: object
        mapping: $.
