naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services oam — GetLink
  description: 'Amazon Web Services oam — GetLink. 1 operations. Lead operation: Amazon Web Services Getlink. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - GetLink
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: oam-getlink
    baseUri: ''
    description: Amazon Web Services oam — GetLink business capability. Self-contained, no shared references.
    resources:
    - name: GetLink
      path: /GetLink
      operations:
      - name: amazonwebservicesgetlink
        method: POST
        description: Amazon Web Services Getlink
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: oam-getlink-rest
    port: 8080
    description: REST adapter for Amazon Web Services oam — GetLink. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/getlink
      name: getlink
      description: REST surface for GetLink.
      operations:
      - method: POST
        name: amazonwebservicesgetlink
        description: Amazon Web Services Getlink
        call: oam-getlink.amazonwebservicesgetlink
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oam-getlink-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services oam — GetLink. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-getlink
      description: Amazon Web Services Getlink
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: oam-getlink.amazonwebservicesgetlink
      outputParameters:
      - type: object
        mapping: $.
