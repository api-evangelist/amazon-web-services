naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services groundstation — Contacts
  description: 'Amazon Web Services groundstation — Contacts. 1 operations. Lead operation: Amazon Web Services Listcontacts.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: groundstation-contacts
    baseUri: ''
    description: Amazon Web Services groundstation — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: contacts
      path: /contacts
      operations:
      - name: amazonwebserviceslistcontacts
        method: POST
        description: Amazon Web Services Listcontacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: groundstation-contacts-rest
    port: 8080
    description: REST adapter for Amazon Web Services groundstation — Contacts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/contacts
      name: contacts
      description: REST surface for contacts.
      operations:
      - method: POST
        name: amazonwebserviceslistcontacts
        description: Amazon Web Services Listcontacts
        call: groundstation-contacts.amazonwebserviceslistcontacts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: groundstation-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services groundstation — Contacts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-listcontacts
      description: Amazon Web Services Listcontacts
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: groundstation-contacts.amazonwebserviceslistcontacts
      outputParameters:
      - type: object
        mapping: $.
