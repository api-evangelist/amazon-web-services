    baseUri: ''
    description: Amazon Web Services inspector2 — Coverage business capability. Self-contained, no shared references.
    resources:
    - name: coverage-list
      path: /coverage/list
      operations:
      - name: amazonwebserviceslistcoverage
        method: POST
        description: Amazon Web Services Listcoverage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: coverage-statistics-list
      path: /coverage/statistics/list
