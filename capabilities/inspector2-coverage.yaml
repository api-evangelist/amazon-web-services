    description: REST adapter for Amazon Web Services inspector2 — Coverage. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/coverage/list
      name: coverage-list
      description: REST surface for coverage-list.
      operations:
      - method: POST
        name: amazonwebserviceslistcoverage
        description: Amazon Web Services Listcoverage
        call: inspector2-coverage.amazonwebserviceslistcoverage
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/coverage/statistics/list
      name: coverage-statistics-list
      description: REST surface for coverage-statistics-list.
      operations:
      - method: POST
        name: amazonwebserviceslistcoveragestatistics
        description: Amazon Web Services Listcoveragestatistics
