naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Flow Associations
  description: 'Amazon Web Services connect — Flow Associations. 2 operations. Lead operation: Amazon Web Services Associateflow.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Flow Associations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-flow-associations
    baseUri: ''
    description: Amazon Web Services connect — Flow Associations business capability. Self-contained, no shared references.
    resources:
    - name: flow-associations-InstanceId
      path: /flow-associations/{InstanceId}
      operations:
      - name: amazonwebservicesassociateflow
        method: PUT
        description: Amazon Web Services Associateflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: flow-associations-InstanceId-ResourceId-ResourceType
      path: /flow-associations/{InstanceId}/{ResourceId}/{ResourceType}
      operations:
      - name: amazonwebservicesgetflowassociation
        method: GET
        description: Amazon Web Services Getflowassociation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-flow-associations-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Flow Associations. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/flow-associations/{instanceid}
      name: flow-associations-instanceid
      description: REST surface for flow-associations-InstanceId.
      operations:
      - method: PUT
        name: amazonwebservicesassociateflow
        description: Amazon Web Services Associateflow
        call: connect-flow-associations.amazonwebservicesassociateflow
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/flow-associations/{instanceid}/{resourceid}/{resourcetype}
      name: flow-associations-instanceid-resourceid-resourcetype
      description: REST surface for flow-associations-InstanceId-ResourceId-ResourceType.
      operations:
      - method: GET
        name: amazonwebservicesgetflowassociation
        description: Amazon Web Services Getflowassociation
        call: connect-flow-associations.amazonwebservicesgetflowassociation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-flow-associations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Flow Associations. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-associateflow
      description: Amazon Web Services Associateflow
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: connect-flow-associations.amazonwebservicesassociateflow
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-getflowassociation
      description: Amazon Web Services Getflowassociation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-flow-associations.amazonwebservicesgetflowassociation
      outputParameters:
      - type: object
        mapping: $.
