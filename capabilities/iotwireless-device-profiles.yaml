      description: REST surface for device-profiles-Id.
      operations:
      - method: GET
        name: amazonwebservicesgetdeviceprofile
        description: Amazon Web Services Getdeviceprofile
        call: iotwireless-device-profiles.amazonwebservicesgetdeviceprofile
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
