naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services pricing
  description: 'Amazon Web Services pricing. 1 operations. Lead operation: Amazon Web Services Listpricelists. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services pricing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: pricing
    baseUri: ''
    description: Amazon Web Services pricing business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebserviceslistpricelists
        method: POST
        description: Amazon Web Services Listpricelists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pricing-rest
    port: 8080
    description: REST adapter for Amazon Web Services pricing. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebserviceslistpricelists
        description: Amazon Web Services Listpricelists
        call: pricing.amazonwebserviceslistpricelists
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pricing-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services pricing. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-listpricelists
      description: Amazon Web Services Listpricelists
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pricing.amazonwebserviceslistpricelists
      outputParameters:
      - type: object
        mapping: $.
