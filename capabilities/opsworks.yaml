naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services opsworks
  description: 'Amazon Web Services opsworks. 1 operations. Lead operation: Amazon Web Services Updatevolume. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services opsworks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: opsworks
    baseUri: ''
    description: Amazon Web Services opsworks business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatevolume
        method: POST
        description: Amazon Web Services Updatevolume
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: opsworks-rest
    port: 8080
    description: REST adapter for Amazon Web Services opsworks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatevolume
        description: Amazon Web Services Updatevolume
        call: opsworks.amazonwebservicesupdatevolume
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: opsworks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services opsworks. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatevolume
      description: Amazon Web Services Updatevolume
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: opsworks.amazonwebservicesupdatevolume
      outputParameters:
      - type: object
        mapping: $.
