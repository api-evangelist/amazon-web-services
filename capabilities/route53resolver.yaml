naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services route53resolver
  description: 'Amazon Web Services route53resolver. 1 operations. Lead operation: Amazon Web Services Updateresolverrule.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services route53resolver
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: route53resolver
    baseUri: ''
    description: Amazon Web Services route53resolver business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateresolverrule
        method: POST
        description: Amazon Web Services Updateresolverrule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: route53resolver-rest
    port: 8080
    description: REST adapter for Amazon Web Services route53resolver. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateresolverrule
        description: Amazon Web Services Updateresolverrule
        call: route53resolver.amazonwebservicesupdateresolverrule
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: route53resolver-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services route53resolver. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updateresolverrule
      description: Amazon Web Services Updateresolverrule
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: route53resolver.amazonwebservicesupdateresolverrule
      outputParameters:
      - type: object
        mapping: $.
