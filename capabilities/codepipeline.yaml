naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services codepipeline
  description: 'Amazon Web Services codepipeline. 1 operations. Lead operation: Amazon Web Services Updatepipeline. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services codepipeline
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: codepipeline
    baseUri: ''
    description: Amazon Web Services codepipeline business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatepipeline
        method: POST
        description: Amazon Web Services Updatepipeline
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: codepipeline-rest
    port: 8080
    description: REST adapter for Amazon Web Services codepipeline. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatepipeline
        description: Amazon Web Services Updatepipeline
        call: codepipeline.amazonwebservicesupdatepipeline
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: codepipeline-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services codepipeline. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updatepipeline
      description: Amazon Web Services Updatepipeline
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: codepipeline.amazonwebservicesupdatepipeline
      outputParameters:
      - type: object
        mapping: $.
