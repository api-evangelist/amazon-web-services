naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services dataexchange — Jobs
  description: 'Amazon Web Services dataexchange — Jobs. 2 operations. Lead operation: Amazon Web Services Listjobs. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: dataexchange-jobs
    baseUri: ''
    description: Amazon Web Services dataexchange — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: v1-jobs
      path: /v1/jobs
      operations:
      - name: amazonwebserviceslistjobs
        method: GET
        description: Amazon Web Services Listjobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-jobs-JobId
      path: /v1/jobs/{JobId}
      operations:
      - name: amazonwebservicesstartjob
        method: PATCH
        description: Amazon Web Services Startjob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: dataexchange-jobs-rest
    port: 8080
    description: REST adapter for Amazon Web Services dataexchange — Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/jobs
      name: v1-jobs
      description: REST surface for v1-jobs.
      operations:
      - method: GET
        name: amazonwebserviceslistjobs
        description: Amazon Web Services Listjobs
        call: dataexchange-jobs.amazonwebserviceslistjobs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/jobs/{jobid}
      name: v1-jobs-jobid
      description: REST surface for v1-jobs-JobId.
      operations:
      - method: PATCH
        name: amazonwebservicesstartjob
        description: Amazon Web Services Startjob
        call: dataexchange-jobs.amazonwebservicesstartjob
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dataexchange-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services dataexchange — Jobs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listjobs
      description: Amazon Web Services Listjobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dataexchange-jobs.amazonwebserviceslistjobs
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-startjob
      description: Amazon Web Services Startjob
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: dataexchange-jobs.amazonwebservicesstartjob
      outputParameters:
      - type: object
        mapping: $.
