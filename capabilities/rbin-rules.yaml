naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services rbin — Rules
  description: 'Amazon Web Services rbin — Rules. 4 operations. Lead operation: Amazon Web Services Createrule. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Rules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: rbin-rules
    baseUri: ''
    description: Amazon Web Services rbin — Rules business capability. Self-contained, no shared references.
    resources:
    - name: rules
      path: /rules
      operations:
      - name: amazonwebservicescreaterule
        method: POST
        description: Amazon Web Services Createrule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rules-identifier
      path: /rules/{identifier}
      operations:
      - name: amazonwebservicesupdaterule
        method: PATCH
        description: Amazon Web Services Updaterule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rules-identifier-lock
      path: /rules/{identifier}/lock
      operations:
      - name: amazonwebserviceslockrule
        method: PATCH
        description: Amazon Web Services Lockrule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rules-identifier-unlock
      path: /rules/{identifier}/unlock
      operations:
      - name: amazonwebservicesunlockrule
        method: PATCH
        description: Amazon Web Services Unlockrule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: rbin-rules-rest
    port: 8080
    description: REST adapter for Amazon Web Services rbin — Rules. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/rules
      name: rules
      description: REST surface for rules.
      operations:
      - method: POST
        name: amazonwebservicescreaterule
        description: Amazon Web Services Createrule
        call: rbin-rules.amazonwebservicescreaterule
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rules/{identifier}
      name: rules-identifier
      description: REST surface for rules-identifier.
      operations:
      - method: PATCH
        name: amazonwebservicesupdaterule
        description: Amazon Web Services Updaterule
        call: rbin-rules.amazonwebservicesupdaterule
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rules/{identifier}/lock
      name: rules-identifier-lock
      description: REST surface for rules-identifier-lock.
      operations:
      - method: PATCH
        name: amazonwebserviceslockrule
        description: Amazon Web Services Lockrule
        call: rbin-rules.amazonwebserviceslockrule
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rules/{identifier}/unlock
      name: rules-identifier-unlock
      description: REST surface for rules-identifier-unlock.
      operations:
      - method: PATCH
        name: amazonwebservicesunlockrule
        description: Amazon Web Services Unlockrule
        call: rbin-rules.amazonwebservicesunlockrule
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rbin-rules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services rbin — Rules. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-createrule
      description: Amazon Web Services Createrule
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rbin-rules.amazonwebservicescreaterule
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updaterule
      description: Amazon Web Services Updaterule
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rbin-rules.amazonwebservicesupdaterule
