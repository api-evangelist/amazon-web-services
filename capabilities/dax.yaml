naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services dax
  description: 'Amazon Web Services dax. 1 operations. Lead operation: Amazon Web Services Updatesubnetgroup. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services dax
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: dax
    baseUri: ''
    description: Amazon Web Services dax business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatesubnetgroup
        method: POST
        description: Amazon Web Services Updatesubnetgroup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: dax-rest
    port: 8080
    description: REST adapter for Amazon Web Services dax. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatesubnetgroup
        description: Amazon Web Services Updatesubnetgroup
        call: dax.amazonwebservicesupdatesubnetgroup
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dax-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services dax. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updatesubnetgroup
      description: Amazon Web Services Updatesubnetgroup
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dax.amazonwebservicesupdatesubnetgroup
      outputParameters:
      - type: object
        mapping: $.
