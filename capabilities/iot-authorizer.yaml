naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iot — Authorizer
  description: 'Amazon Web Services iot — Authorizer. 2 operations. Lead operation: Amazon Web Services Updateauthorizer.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Authorizer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iot-authorizer
    baseUri: ''
    description: Amazon Web Services iot — Authorizer business capability. Self-contained, no shared references.
    resources:
    - name: authorizer-authorizerName
      path: /authorizer/{authorizerName}
      operations:
      - name: amazonwebservicesupdateauthorizer
        method: PUT
        description: Amazon Web Services Updateauthorizer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: authorizer-authorizerName-test
      path: /authorizer/{authorizerName}/test
      operations:
      - name: amazonwebservicestestinvokeauthorizer
        method: POST
        description: Amazon Web Services Testinvokeauthorizer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iot-authorizer-rest
    port: 8080
    description: REST adapter for Amazon Web Services iot — Authorizer. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/authorizer/{authorizername}
      name: authorizer-authorizername
      description: REST surface for authorizer-authorizerName.
      operations:
      - method: PUT
        name: amazonwebservicesupdateauthorizer
        description: Amazon Web Services Updateauthorizer
        call: iot-authorizer.amazonwebservicesupdateauthorizer
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/authorizer/{authorizername}/test
      name: authorizer-authorizername-test
      description: REST surface for authorizer-authorizerName-test.
      operations:
      - method: POST
        name: amazonwebservicestestinvokeauthorizer
        description: Amazon Web Services Testinvokeauthorizer
        call: iot-authorizer.amazonwebservicestestinvokeauthorizer
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iot-authorizer-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iot — Authorizer. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updateauthorizer
      description: Amazon Web Services Updateauthorizer
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: iot-authorizer.amazonwebservicesupdateauthorizer
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-testinvokeauthorizer
      description: Amazon Web Services Testinvokeauthorizer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iot-authorizer.amazonwebservicestestinvokeauthorizer
      outputParameters:
      - type: object
        mapping: $.
