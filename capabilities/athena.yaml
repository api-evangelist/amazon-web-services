naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services athena
  description: 'Amazon Web Services athena. 1 operations. Lead operation: Amazon Web Services Updateworkgroup. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services athena
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: athena
    baseUri: ''
    description: Amazon Web Services athena business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateworkgroup
        method: POST
        description: Amazon Web Services Updateworkgroup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: athena-rest
    port: 8080
    description: REST adapter for Amazon Web Services athena. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateworkgroup
        description: Amazon Web Services Updateworkgroup
        call: athena.amazonwebservicesupdateworkgroup
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: athena-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services athena. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updateworkgroup
      description: Amazon Web Services Updateworkgroup
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: athena.amazonwebservicesupdateworkgroup
      outputParameters:
      - type: object
        mapping: $.
