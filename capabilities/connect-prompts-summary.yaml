naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Prompts Summary
  description: 'Amazon Web Services connect — Prompts Summary. 1 operations. Lead operation: Amazon Web Services Listprompts.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Prompts Summary
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-prompts-summary
    baseUri: ''
    description: Amazon Web Services connect — Prompts Summary business capability. Self-contained, no shared references.
    resources:
    - name: prompts-summary-InstanceId
      path: /prompts-summary/{InstanceId}
      operations:
      - name: amazonwebserviceslistprompts
        method: GET
        description: Amazon Web Services Listprompts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-prompts-summary-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Prompts Summary. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/prompts-summary/{instanceid}
      name: prompts-summary-instanceid
      description: REST surface for prompts-summary-InstanceId.
      operations:
      - method: GET
        name: amazonwebserviceslistprompts
        description: Amazon Web Services Listprompts
        call: connect-prompts-summary.amazonwebserviceslistprompts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-prompts-summary-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Prompts Summary. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-listprompts
      description: Amazon Web Services Listprompts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-prompts-summary.amazonwebserviceslistprompts
      outputParameters:
      - type: object
        mapping: $.
