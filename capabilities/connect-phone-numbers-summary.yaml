  description: 'Amazon Web Services connect — Phone Numbers Summary. 1 operations. Lead operation: Amazon Web Services Listphonenumbers.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Phone Numbers Summary
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
