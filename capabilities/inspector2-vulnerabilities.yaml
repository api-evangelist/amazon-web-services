naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services inspector2 — Vulnerabilities
  description: 'Amazon Web Services inspector2 — Vulnerabilities. 1 operations. Lead operation: Amazon Web Services Searchvulnerabilities.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Vulnerabilities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: inspector2-vulnerabilities
    baseUri: ''
    description: Amazon Web Services inspector2 — Vulnerabilities business capability. Self-contained, no shared references.
    resources:
    - name: vulnerabilities-search
      path: /vulnerabilities/search
      operations:
      - name: amazonwebservicessearchvulnerabilities
        method: POST
        description: Amazon Web Services Searchvulnerabilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: inspector2-vulnerabilities-rest
    port: 8080
    description: REST adapter for Amazon Web Services inspector2 — Vulnerabilities. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/vulnerabilities/search
      name: vulnerabilities-search
      description: REST surface for vulnerabilities-search.
      operations:
      - method: POST
        name: amazonwebservicessearchvulnerabilities
        description: Amazon Web Services Searchvulnerabilities
        call: inspector2-vulnerabilities.amazonwebservicessearchvulnerabilities
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: inspector2-vulnerabilities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services inspector2 — Vulnerabilities. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-searchvulnerabilities
      description: Amazon Web Services Searchvulnerabilities
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: inspector2-vulnerabilities.amazonwebservicessearchvulnerabilities
      outputParameters:
      - type: object
        mapping: $.
