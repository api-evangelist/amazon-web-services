naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services transfer
  description: 'Amazon Web Services transfer. 1 operations. Lead operation: Amazon Web Services Updateuser. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services transfer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: transfer
    baseUri: ''
    description: Amazon Web Services transfer business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateuser
        method: POST
        description: Amazon Web Services Updateuser
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: transfer-rest
    port: 8080
    description: REST adapter for Amazon Web Services transfer. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateuser
        description: Amazon Web Services Updateuser
        call: transfer.amazonwebservicesupdateuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transfer-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services transfer. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updateuser
      description: Amazon Web Services Updateuser
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: transfer.amazonwebservicesupdateuser
      outputParameters:
      - type: object
        mapping: $.
