naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services eks — Cluster Registrations
  description: 'Amazon Web Services eks — Cluster Registrations. 2 operations. Lead operation: Amazon Web Services Registercluster.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Cluster Registrations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: eks-cluster-registrations
    baseUri: ''
    description: Amazon Web Services eks — Cluster Registrations business capability. Self-contained, no shared references.
    resources:
    - name: cluster-registrations
      path: /cluster-registrations
      operations:
      - name: amazonwebservicesregistercluster
        method: POST
        description: Amazon Web Services Registercluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cluster-registrations-name
      path: /cluster-registrations/{name}
      operations:
      - name: amazonwebservicesderegistercluster
        method: DELETE
        description: Amazon Web Services Deregistercluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: eks-cluster-registrations-rest
    port: 8080
    description: REST adapter for Amazon Web Services eks — Cluster Registrations. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/cluster-registrations
      name: cluster-registrations
      description: REST surface for cluster-registrations.
      operations:
      - method: POST
        name: amazonwebservicesregistercluster
        description: Amazon Web Services Registercluster
        call: eks-cluster-registrations.amazonwebservicesregistercluster
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cluster-registrations/{name}
      name: cluster-registrations-name
      description: REST surface for cluster-registrations-name.
      operations:
      - method: DELETE
        name: amazonwebservicesderegistercluster
        description: Amazon Web Services Deregistercluster
        call: eks-cluster-registrations.amazonwebservicesderegistercluster
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: eks-cluster-registrations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services eks — Cluster Registrations. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-registercluster
      description: Amazon Web Services Registercluster
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: eks-cluster-registrations.amazonwebservicesregistercluster
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-deregistercluster
      description: Amazon Web Services Deregistercluster
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: eks-cluster-registrations.amazonwebservicesderegistercluster
      outputParameters:
      - type: object
        mapping: $.
