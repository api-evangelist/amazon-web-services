naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services oam — DeleteLink
  description: 'Amazon Web Services oam — DeleteLink. 1 operations. Lead operation: Amazon Web Services Deletelink. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - DeleteLink
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: oam-deletelink
    baseUri: ''
    description: Amazon Web Services oam — DeleteLink business capability. Self-contained, no shared references.
    resources:
    - name: DeleteLink
      path: /DeleteLink
      operations:
      - name: amazonwebservicesdeletelink
        method: POST
        description: Amazon Web Services Deletelink
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: oam-deletelink-rest
    port: 8080
    description: REST adapter for Amazon Web Services oam — DeleteLink. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/deletelink
      name: deletelink
      description: REST surface for DeleteLink.
      operations:
      - method: POST
        name: amazonwebservicesdeletelink
        description: Amazon Web Services Deletelink
        call: oam-deletelink.amazonwebservicesdeletelink
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oam-deletelink-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services oam — DeleteLink. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-deletelink
      description: Amazon Web Services Deletelink
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: oam-deletelink.amazonwebservicesdeletelink
      outputParameters:
      - type: object
        mapping: $.
