naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services redshift-data
  description: 'Amazon Web Services redshift-data. 1 operations. Lead operation: Amazon Web Services Listtables. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services redshift-data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: redshift-data
    baseUri: ''
    description: Amazon Web Services redshift-data business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebserviceslisttables
        method: POST
        description: Amazon Web Services Listtables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: redshift-data-rest
    port: 8080
    description: REST adapter for Amazon Web Services redshift-data. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebserviceslisttables
        description: Amazon Web Services Listtables
        call: redshift-data.amazonwebserviceslisttables
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: redshift-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services redshift-data. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listtables
      description: Amazon Web Services Listtables
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: redshift-data.amazonwebserviceslisttables
      outputParameters:
      - type: object
        mapping: $.
