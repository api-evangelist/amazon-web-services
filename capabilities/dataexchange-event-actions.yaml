    resources:
    - name: v1-event-actions
      path: /v1/event-actions
      operations:
      - name: amazonwebserviceslisteventactions
        method: GET
        description: Amazon Web Services Listeventactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
