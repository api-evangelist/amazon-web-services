      name: account-deregisteraccount
      description: REST surface for account-deregisterAccount.
      operations:
      - method: POST
        name: amazonwebservicesderegisteraccount
        description: Amazon Web Services Deregisteraccount
        call: auditmanager-account.amazonwebservicesderegisteraccount
