naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services inspector
  description: 'Amazon Web Services inspector. 1 operations. Lead operation: Amazon Web Services Updateassessmenttarget. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services inspector
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: inspector
    baseUri: ''
    description: Amazon Web Services inspector business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateassessmenttarget
        method: POST
        description: Amazon Web Services Updateassessmenttarget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: inspector-rest
    port: 8080
    description: REST adapter for Amazon Web Services inspector. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateassessmenttarget
        description: Amazon Web Services Updateassessmenttarget
        call: inspector.amazonwebservicesupdateassessmenttarget
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: inspector-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services inspector. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updateassessmenttarget
      description: Amazon Web Services Updateassessmenttarget
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: inspector.amazonwebservicesupdateassessmenttarget
      outputParameters:
      - type: object
        mapping: $.
