    namespace: xray-tracegraph
    baseUri: ''
    description: Amazon Web Services xray — TraceGraph business capability. Self-contained, no shared references.
    resources:
    - name: TraceGraph
      path: /TraceGraph
      operations:
      - name: amazonwebservicesgettracegraph
        method: POST
        description: Amazon Web Services Gettracegraph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
