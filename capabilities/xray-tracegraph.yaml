      name: tracegraph
      description: REST surface for TraceGraph.
      operations:
      - method: POST
        name: amazonwebservicesgettracegraph
        description: Amazon Web Services Gettracegraph
        call: xray-tracegraph.amazonwebservicesgettracegraph
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
