naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Search Prompts
  description: 'Amazon Web Services connect — Search Prompts. 1 operations. Lead operation: Amazon Web Services Searchprompts.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Search Prompts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-search-prompts
    baseUri: ''
    description: Amazon Web Services connect — Search Prompts business capability. Self-contained, no shared references.
    resources:
    - name: search-prompts
      path: /search-prompts
      operations:
      - name: amazonwebservicessearchprompts
        method: POST
        description: Amazon Web Services Searchprompts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-search-prompts-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Search Prompts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/search-prompts
      name: search-prompts
      description: REST surface for search-prompts.
      operations:
      - method: POST
        name: amazonwebservicessearchprompts
        description: Amazon Web Services Searchprompts
        call: connect-search-prompts.amazonwebservicessearchprompts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-search-prompts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Search Prompts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-searchprompts
      description: Amazon Web Services Searchprompts
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: connect-search-prompts.amazonwebservicessearchprompts
      outputParameters:
      - type: object
        mapping: $.
