naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services auditmanager — Delegations
  description: 'Amazon Web Services auditmanager — Delegations. 1 operations. Lead operation: Amazon Web Services Getdelegations.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Delegations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: auditmanager-delegations
    baseUri: ''
    description: Amazon Web Services auditmanager — Delegations business capability. Self-contained, no shared references.
    resources:
    - name: delegations
      path: /delegations
      operations:
      - name: amazonwebservicesgetdelegations
        method: GET
        description: Amazon Web Services Getdelegations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: auditmanager-delegations-rest
    port: 8080
    description: REST adapter for Amazon Web Services auditmanager — Delegations. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/delegations
      name: delegations
      description: REST surface for delegations.
      operations:
      - method: GET
        name: amazonwebservicesgetdelegations
        description: Amazon Web Services Getdelegations
        call: auditmanager-delegations.amazonwebservicesgetdelegations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: auditmanager-delegations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services auditmanager — Delegations. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-getdelegations
      description: Amazon Web Services Getdelegations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: auditmanager-delegations.amazonwebservicesgetdelegations
      outputParameters:
      - type: object
        mapping: $.
