naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services oam — CreateLink
  description: 'Amazon Web Services oam — CreateLink. 1 operations. Lead operation: Amazon Web Services Createlink. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - CreateLink
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: oam-createlink
    baseUri: ''
    description: Amazon Web Services oam — CreateLink business capability. Self-contained, no shared references.
    resources:
    - name: CreateLink
      path: /CreateLink
      operations:
      - name: amazonwebservicescreatelink
        method: POST
        description: Amazon Web Services Createlink
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: oam-createlink-rest
    port: 8080
    description: REST adapter for Amazon Web Services oam — CreateLink. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/createlink
      name: createlink
      description: REST surface for CreateLink.
      operations:
      - method: POST
        name: amazonwebservicescreatelink
        description: Amazon Web Services Createlink
        call: oam-createlink.amazonwebservicescreatelink
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oam-createlink-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services oam — CreateLink. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-createlink
      description: Amazon Web Services Createlink
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: oam-createlink.amazonwebservicescreatelink
      outputParameters:
      - type: object
        mapping: $.
