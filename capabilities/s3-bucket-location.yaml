naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Bucket Location
  description: 'Amazon Web Services AWS S3 — Bucket Location. 1 operations. Lead operation: Amazon Web Services Get Bucket
    Location. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Bucket Location
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-bucket-location
    baseUri: ''
    description: Amazon Web Services AWS S3 — Bucket Location business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?location
      path: /{Bucket}?location
      operations:
      - name: getbucketlocation
        method: GET
        description: Amazon Web Services Get Bucket Location
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-bucket-location-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Bucket Location. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/bucket-location
      name: bucket-location
      description: REST surface for Bucket}?location.
      operations:
      - method: GET
        name: getbucketlocation
        description: Amazon Web Services Get Bucket Location
        call: s3-bucket-location.getbucketlocation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-bucket-location-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Bucket Location. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-get-bucket
      description: Amazon Web Services Get Bucket Location
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: s3-bucket-location.getbucketlocation
      outputParameters:
      - type: object
        mapping: $.
