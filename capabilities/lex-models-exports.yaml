naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services lex-models — Exports
  description: 'Amazon Web Services lex-models — Exports. 1 operations. Lead operation: Amazon Web Services Getexport. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Exports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: lex-models-exports
    baseUri: ''
    description: Amazon Web Services lex-models — Exports business capability. Self-contained, no shared references.
    resources:
    - name: exports
      path: /exports/
      operations:
      - name: amazonwebservicesgetexport
        method: GET
        description: Amazon Web Services Getexport
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: lex-models-exports-rest
    port: 8080
    description: REST adapter for Amazon Web Services lex-models — Exports. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/exports
      name: exports
      description: REST surface for exports.
      operations:
      - method: GET
        name: amazonwebservicesgetexport
        description: Amazon Web Services Getexport
        call: lex-models-exports.amazonwebservicesgetexport
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lex-models-exports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services lex-models — Exports. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-getexport
      description: Amazon Web Services Getexport
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lex-models-exports.amazonwebservicesgetexport
      outputParameters:
      - type: object
        mapping: $.
