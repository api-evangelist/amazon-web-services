naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services textract
  description: 'Amazon Web Services textract. 1 operations. Lead operation: Amazon Web Services Updateadapter. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services textract
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: textract
    baseUri: ''
    description: Amazon Web Services textract business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateadapter
        method: POST
        description: Amazon Web Services Updateadapter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: textract-rest
    port: 8080
    description: REST adapter for Amazon Web Services textract. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateadapter
        description: Amazon Web Services Updateadapter
        call: textract.amazonwebservicesupdateadapter
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: textract-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services textract. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updateadapter
      description: Amazon Web Services Updateadapter
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: textract.amazonwebservicesupdateadapter
      outputParameters:
      - type: object
        mapping: $.
