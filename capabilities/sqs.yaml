naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services sqs
  description: 'Amazon Web Services sqs. 1 operations. Lead operation: Amazon Web Services Untagqueue. Self-contained Naftiko
    capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services sqs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: sqs
    baseUri: ''
    description: Amazon Web Services sqs business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesuntagqueue
        method: POST
        description: Amazon Web Services Untagqueue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: sqs-rest
    port: 8080
    description: REST adapter for Amazon Web Services sqs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesuntagqueue
        description: Amazon Web Services Untagqueue
        call: sqs.amazonwebservicesuntagqueue
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sqs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services sqs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-untagqueue
      description: Amazon Web Services Untagqueue
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sqs.amazonwebservicesuntagqueue
      outputParameters:
      - type: object
        mapping: $.
