    description: REST adapter for Amazon Web Services securityhub — Accounts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/accounts
      name: accounts
      description: REST surface for accounts.
      operations:
      - method: PATCH
        name: amazonwebservicesupdatesecurityhubconfiguration
        description: Amazon Web Services Updatesecurityhubconfiguration
        call: securityhub-accounts.amazonwebservicesupdatesecurityhubconfiguration
        outputParameters:
        - type: object
          mapping: $.
