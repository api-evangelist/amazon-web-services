  - type: http
    namespace: securityhub-accounts
    baseUri: ''
    description: Amazon Web Services securityhub — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: accounts
      path: /accounts
      operations:
      - name: amazonwebservicesupdatesecurityhubconfiguration
        method: PATCH
        description: Amazon Web Services Updatesecurityhubconfiguration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
