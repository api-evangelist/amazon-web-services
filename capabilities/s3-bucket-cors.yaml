naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Bucket CORS
  description: 'Amazon Web Services AWS S3 — Bucket CORS. 1 operations. Lead operation: Amazon Web Services Put Bucket Cors.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Bucket CORS
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-bucket-cors
    baseUri: ''
    description: Amazon Web Services AWS S3 — Bucket CORS business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?cors
      path: /{Bucket}?cors
      operations:
      - name: putbucketcors
        method: PUT
        description: Amazon Web Services Put Bucket Cors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-bucket-cors-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Bucket CORS. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/bucket-cors
      name: bucket-cors
      description: REST surface for Bucket}?cors.
      operations:
      - method: PUT
        name: putbucketcors
        description: Amazon Web Services Put Bucket Cors
        call: s3-bucket-cors.putbucketcors
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-bucket-cors-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Bucket CORS. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-put-bucket
      description: Amazon Web Services Put Bucket Cors
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: s3-bucket-cors.putbucketcors
      outputParameters:
      - type: object
        mapping: $.
