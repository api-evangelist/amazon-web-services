naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services cognito-idp
  description: 'Amazon Web Services cognito-idp. 1 operations. Lead operation: Amazon Web Services Verifyuserattribute. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services cognito-idp
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: cognito-idp
    baseUri: ''
    description: Amazon Web Services cognito-idp business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesverifyuserattribute
        method: POST
        description: Amazon Web Services Verifyuserattribute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: cognito-idp-rest
    port: 8080
    description: REST adapter for Amazon Web Services cognito-idp. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesverifyuserattribute
        description: Amazon Web Services Verifyuserattribute
        call: cognito-idp.amazonwebservicesverifyuserattribute
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cognito-idp-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services cognito-idp. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-verifyuserattribute
      description: Amazon Web Services Verifyuserattribute
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cognito-idp.amazonwebservicesverifyuserattribute
      outputParameters:
      - type: object
        mapping: $.
