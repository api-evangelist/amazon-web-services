    namespace: kafka-operations
    baseUri: ''
    description: Amazon Web Services kafka — Operations business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-operations-clusterOperationArn
      path: /api/v2/operations/{clusterOperationArn}
      operations:
      - name: amazonwebservicesdescribeclusteroperationv2
        method: GET
        description: Amazon Web Services Describeclusteroperationv2
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-operations-clusterOperationArn
      path: /v1/operations/{clusterOperationArn}
      operations:
      - name: amazonwebservicesdescribeclusteroperation
        method: GET
        description: Amazon Web Services Describeclusteroperation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: kafka-operations-rest
    port: 8080
    description: REST adapter for Amazon Web Services kafka — Operations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/operations/{clusteroperationarn}
      name: api-v2-operations-clusteroperationarn
      description: REST surface for api-v2-operations-clusterOperationArn.
      operations:
      - method: GET
        name: amazonwebservicesdescribeclusteroperationv2
        description: Amazon Web Services Describeclusteroperationv2
        call: kafka-operations.amazonwebservicesdescribeclusteroperationv2
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/operations/{clusteroperationarn}
      name: v1-operations-clusteroperationarn
      description: REST surface for v1-operations-clusterOperationArn.
      operations:
      - method: GET
        name: amazonwebservicesdescribeclusteroperation
        description: Amazon Web Services Describeclusteroperation
        call: kafka-operations.amazonwebservicesdescribeclusteroperation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kafka-operations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services kafka — Operations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-describeclusteroperationv2
      description: Amazon Web Services Describeclusteroperationv2
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kafka-operations.amazonwebservicesdescribeclusteroperationv2
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-describeclusteroperation
      description: Amazon Web Services Describeclusteroperation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kafka-operations.amazonwebservicesdescribeclusteroperation
      outputParameters:
      - type: object
        mapping: $.
