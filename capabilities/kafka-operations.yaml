naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services kafka — Operations
  description: 'Amazon Web Services kafka — Operations. 2 operations. Lead operation: Amazon Web Services Describeclusteroperationv2.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Operations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
