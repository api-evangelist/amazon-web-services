naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services oam — UpdateLink
  description: 'Amazon Web Services oam — UpdateLink. 1 operations. Lead operation: Amazon Web Services Updatelink. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - UpdateLink
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: oam-updatelink
    baseUri: ''
    description: Amazon Web Services oam — UpdateLink business capability. Self-contained, no shared references.
    resources:
    - name: UpdateLink
      path: /UpdateLink
      operations:
      - name: amazonwebservicesupdatelink
        method: POST
        description: Amazon Web Services Updatelink
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: oam-updatelink-rest
    port: 8080
    description: REST adapter for Amazon Web Services oam — UpdateLink. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/updatelink
      name: updatelink
      description: REST surface for UpdateLink.
      operations:
      - method: POST
        name: amazonwebservicesupdatelink
        description: Amazon Web Services Updatelink
        call: oam-updatelink.amazonwebservicesupdatelink
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oam-updatelink-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services oam — UpdateLink. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updatelink
      description: Amazon Web Services Updatelink
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: oam-updatelink.amazonwebservicesupdatelink
      outputParameters:
      - type: object
        mapping: $.
