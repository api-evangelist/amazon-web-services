naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Hours of Operations
  description: 'Amazon Web Services connect — Hours of Operations. 2 operations. Lead operation: Amazon Web Services Createhoursofoperation.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Hours of Operations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-hours-of-operations
    baseUri: ''
    description: Amazon Web Services connect — Hours of Operations business capability. Self-contained, no shared references.
    resources:
    - name: hours-of-operations-InstanceId
      path: /hours-of-operations/{InstanceId}
      operations:
      - name: amazonwebservicescreatehoursofoperation
        method: PUT
        description: Amazon Web Services Createhoursofoperation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: hours-of-operations-InstanceId-HoursOfOperationId
      path: /hours-of-operations/{InstanceId}/{HoursOfOperationId}
      operations:
      - name: amazonwebservicesupdatehoursofoperation
        method: POST
        description: Amazon Web Services Updatehoursofoperation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-hours-of-operations-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Hours of Operations. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/hours-of-operations/{instanceid}
      name: hours-of-operations-instanceid
      description: REST surface for hours-of-operations-InstanceId.
      operations:
      - method: PUT
        name: amazonwebservicescreatehoursofoperation
        description: Amazon Web Services Createhoursofoperation
        call: connect-hours-of-operations.amazonwebservicescreatehoursofoperation
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hours-of-operations/{instanceid}/{hoursofoperationid}
      name: hours-of-operations-instanceid-hoursofoperationid
      description: REST surface for hours-of-operations-InstanceId-HoursOfOperationId.
      operations:
      - method: POST
        name: amazonwebservicesupdatehoursofoperation
        description: Amazon Web Services Updatehoursofoperation
        call: connect-hours-of-operations.amazonwebservicesupdatehoursofoperation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-hours-of-operations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Hours of Operations. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-createhoursofoperation
      description: Amazon Web Services Createhoursofoperation
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: connect-hours-of-operations.amazonwebservicescreatehoursofoperation
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updatehoursofoperation
      description: Amazon Web Services Updatehoursofoperation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connect-hours-of-operations.amazonwebservicesupdatehoursofoperation
      outputParameters:
      - type: object
        mapping: $.
