naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services codestar
  description: 'Amazon Web Services codestar. 1 operations. Lead operation: Amazon Web Services Updateuserprofile. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services codestar
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: codestar
    baseUri: ''
    description: Amazon Web Services codestar business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateuserprofile
        method: POST
        description: Amazon Web Services Updateuserprofile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: codestar-rest
    port: 8080
    description: REST adapter for Amazon Web Services codestar. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateuserprofile
        description: Amazon Web Services Updateuserprofile
        call: codestar.amazonwebservicesupdateuserprofile
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: codestar-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services codestar. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updateuserprofile
      description: Amazon Web Services Updateuserprofile
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: codestar.amazonwebservicesupdateuserprofile
      outputParameters:
      - type: object
        mapping: $.
