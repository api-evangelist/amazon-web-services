naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services backup — Global Settings
  description: 'Amazon Web Services backup — Global Settings. 1 operations. Lead operation: Amazon Web Services Updateglobalsettings.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Global Settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: backup-global-settings
    baseUri: ''
    description: Amazon Web Services backup — Global Settings business capability. Self-contained, no shared references.
    resources:
    - name: global-settings
      path: /global-settings
      operations:
      - name: amazonwebservicesupdateglobalsettings
        method: PUT
        description: Amazon Web Services Updateglobalsettings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: backup-global-settings-rest
    port: 8080
    description: REST adapter for Amazon Web Services backup — Global Settings. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/global-settings
      name: global-settings
      description: REST surface for global-settings.
      operations:
      - method: PUT
        name: amazonwebservicesupdateglobalsettings
        description: Amazon Web Services Updateglobalsettings
        call: backup-global-settings.amazonwebservicesupdateglobalsettings
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: backup-global-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services backup — Global Settings. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-updateglobalsettings
      description: Amazon Web Services Updateglobalsettings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: backup-global-settings.amazonwebservicesupdateglobalsettings
      outputParameters:
      - type: object
        mapping: $.
