naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services braket — Device
  description: 'Amazon Web Services braket — Device. 1 operations. Lead operation: Amazon Web Services Getdevice. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Device
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: braket-device
    baseUri: ''
    description: Amazon Web Services braket — Device business capability. Self-contained, no shared references.
    resources:
    - name: device-deviceArn
      path: /device/{deviceArn}
      operations:
      - name: amazonwebservicesgetdevice
        method: GET
        description: Amazon Web Services Getdevice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: braket-device-rest
    port: 8080
    description: REST adapter for Amazon Web Services braket — Device. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/device/{devicearn}
      name: device-devicearn
      description: REST surface for device-deviceArn.
      operations:
      - method: GET
        name: amazonwebservicesgetdevice
        description: Amazon Web Services Getdevice
        call: braket-device.amazonwebservicesgetdevice
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: braket-device-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services braket — Device. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-getdevice
      description: Amazon Web Services Getdevice
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: braket-device.amazonwebservicesgetdevice
      outputParameters:
      - type: object
        mapping: $.
