naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services imagebuilder — ImportComponent
  description: 'Amazon Web Services imagebuilder — ImportComponent. 1 operations. Lead operation: Amazon Web Services Importcomponent.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - ImportComponent
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: imagebuilder-importcomponent
    baseUri: ''
    description: Amazon Web Services imagebuilder — ImportComponent business capability. Self-contained, no shared references.
    resources:
    - name: ImportComponent
      path: /ImportComponent
      operations:
      - name: amazonwebservicesimportcomponent
        method: PUT
        description: Amazon Web Services Importcomponent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: imagebuilder-importcomponent-rest
    port: 8080
    description: REST adapter for Amazon Web Services imagebuilder — ImportComponent. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/importcomponent
      name: importcomponent
      description: REST surface for ImportComponent.
      operations:
      - method: PUT
        name: amazonwebservicesimportcomponent
        description: Amazon Web Services Importcomponent
        call: imagebuilder-importcomponent.amazonwebservicesimportcomponent
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: imagebuilder-importcomponent-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services imagebuilder — ImportComponent. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-importcomponent
      description: Amazon Web Services Importcomponent
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: imagebuilder-importcomponent.amazonwebservicesimportcomponent
      outputParameters:
      - type: object
        mapping: $.
