  - type: rest
    namespace: resiliencehub-create-app-rest
    port: 8080
    description: REST adapter for Amazon Web Services resiliencehub — Create App. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/create-app
      name: create-app
      description: REST surface for create-app.
      operations:
      - method: POST
        name: amazonwebservicescreateapp
        description: Amazon Web Services Createapp
        call: resiliencehub-create-app.amazonwebservicescreateapp
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: resiliencehub-create-app-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services resiliencehub — Create App. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
