naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services resiliencehub — Create App
  description: 'Amazon Web Services resiliencehub — Create App. 1 operations. Lead operation: Amazon Web Services Createapp.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Create App
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: resiliencehub-create-app
    baseUri: ''
    description: Amazon Web Services resiliencehub — Create App business capability. Self-contained, no shared references.
    resources:
    - name: create-app
      path: /create-app
      operations:
      - name: amazonwebservicescreateapp
        method: POST
        description: Amazon Web Services Createapp
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
