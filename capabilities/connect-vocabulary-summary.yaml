naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Vocabulary Summary
  description: 'Amazon Web Services connect — Vocabulary Summary. 1 operations. Lead operation: Amazon Web Services Searchvocabularies.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Vocabulary Summary
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-vocabulary-summary
    baseUri: ''
    description: Amazon Web Services connect — Vocabulary Summary business capability. Self-contained, no shared references.
    resources:
    - name: vocabulary-summary-InstanceId
      path: /vocabulary-summary/{InstanceId}
      operations:
      - name: amazonwebservicessearchvocabularies
        method: POST
        description: Amazon Web Services Searchvocabularies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-vocabulary-summary-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Vocabulary Summary. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/vocabulary-summary/{instanceid}
      name: vocabulary-summary-instanceid
      description: REST surface for vocabulary-summary-InstanceId.
      operations:
      - method: POST
        name: amazonwebservicessearchvocabularies
        description: Amazon Web Services Searchvocabularies
        call: connect-vocabulary-summary.amazonwebservicessearchvocabularies
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-vocabulary-summary-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Vocabulary Summary. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-searchvocabularies
      description: Amazon Web Services Searchvocabularies
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: connect-vocabulary-summary.amazonwebservicessearchvocabularies
      outputParameters:
      - type: object
        mapping: $.
