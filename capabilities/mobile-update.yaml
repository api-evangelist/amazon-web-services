naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services mobile — Update
  description: 'Amazon Web Services mobile — Update. 1 operations. Lead operation: Amazon Web Services Updateproject. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Update
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: mobile-update
    baseUri: ''
    description: Amazon Web Services mobile — Update business capability. Self-contained, no shared references.
    resources:
    - name: update
      path: /update
      operations:
      - name: amazonwebservicesupdateproject
        method: POST
        description: Amazon Web Services Updateproject
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mobile-update-rest
    port: 8080
    description: REST adapter for Amazon Web Services mobile — Update. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/update
      name: update
      description: REST surface for update.
      operations:
      - method: POST
        name: amazonwebservicesupdateproject
        description: Amazon Web Services Updateproject
        call: mobile-update.amazonwebservicesupdateproject
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mobile-update-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services mobile — Update. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updateproject
      description: Amazon Web Services Updateproject
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mobile-update.amazonwebservicesupdateproject
      outputParameters:
      - type: object
        mapping: $.
