naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services grafana — Versions
  description: 'Amazon Web Services grafana — Versions. 1 operations. Lead operation: Amazon Web Services Listversions. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Versions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: grafana-versions
    baseUri: ''
    description: Amazon Web Services grafana — Versions business capability. Self-contained, no shared references.
    resources:
    - name: versions
      path: /versions
      operations:
      - name: amazonwebserviceslistversions
        method: GET
        description: Amazon Web Services Listversions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: grafana-versions-rest
    port: 8080
    description: REST adapter for Amazon Web Services grafana — Versions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/versions
      name: versions
      description: REST surface for versions.
      operations:
      - method: GET
        name: amazonwebserviceslistversions
        description: Amazon Web Services Listversions
        call: grafana-versions.amazonwebserviceslistversions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: grafana-versions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services grafana — Versions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listversions
      description: Amazon Web Services Listversions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grafana-versions.amazonwebserviceslistversions
      outputParameters:
      - type: object
        mapping: $.
