naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services proton
  description: 'Amazon Web Services proton. 1 operations. Lead operation: Amazon Web Services Updatetemplatesyncconfig. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services proton
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: proton
    baseUri: ''
    description: Amazon Web Services proton business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatetemplatesyncconfig
        method: POST
        description: Amazon Web Services Updatetemplatesyncconfig
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: proton-rest
    port: 8080
    description: REST adapter for Amazon Web Services proton. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatetemplatesyncconfig
        description: Amazon Web Services Updatetemplatesyncconfig
        call: proton.amazonwebservicesupdatetemplatesyncconfig
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: proton-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services proton. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updatetemplatesyncconfig
      description: Amazon Web Services Updatetemplatesyncconfig
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: proton.amazonwebservicesupdatetemplatesyncconfig
      outputParameters:
      - type: object
        mapping: $.
