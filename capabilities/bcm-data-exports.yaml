naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services bcm-data-exports
  description: 'Amazon Web Services bcm-data-exports. 1 operations. Lead operation: Amazon Web Services Updateexport. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services bcm-data-exports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: bcm-data-exports
    baseUri: ''
    description: Amazon Web Services bcm-data-exports business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateexport
        method: POST
        description: Amazon Web Services Updateexport
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bcm-data-exports-rest
    port: 8080
    description: REST adapter for Amazon Web Services bcm-data-exports. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateexport
        description: Amazon Web Services Updateexport
        call: bcm-data-exports.amazonwebservicesupdateexport
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bcm-data-exports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services bcm-data-exports. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updateexport
      description: Amazon Web Services Updateexport
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bcm-data-exports.amazonwebservicesupdateexport
      outputParameters:
      - type: object
        mapping: $.
