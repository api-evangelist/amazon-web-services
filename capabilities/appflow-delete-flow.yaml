naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services appflow — Delete Flow
  description: 'Amazon Web Services appflow — Delete Flow. 1 operations. Lead operation: Amazon Web Services Deleteflow. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Delete Flow
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: appflow-delete-flow
    baseUri: ''
    description: Amazon Web Services appflow — Delete Flow business capability. Self-contained, no shared references.
    resources:
    - name: delete-flow
      path: /delete-flow
      operations:
      - name: amazonwebservicesdeleteflow
        method: POST
        description: Amazon Web Services Deleteflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: appflow-delete-flow-rest
    port: 8080
    description: REST adapter for Amazon Web Services appflow — Delete Flow. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/delete-flow
      name: delete-flow
      description: REST surface for delete-flow.
      operations:
      - method: POST
        name: amazonwebservicesdeleteflow
        description: Amazon Web Services Deleteflow
        call: appflow-delete-flow.amazonwebservicesdeleteflow
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appflow-delete-flow-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services appflow — Delete Flow. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-deleteflow
      description: Amazon Web Services Deleteflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: appflow-delete-flow.amazonwebservicesdeleteflow
      outputParameters:
      - type: object
        mapping: $.
