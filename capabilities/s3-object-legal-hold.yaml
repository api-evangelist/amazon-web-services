  description: 'Amazon Web Services AWS S3 — Object Legal Hold. 1 operations. Lead operation: Amazon Web Services Put Object
    Legal Hold. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Object Legal Hold
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
