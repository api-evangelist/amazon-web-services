    namespace: s3-object-legal-hold
    baseUri: ''
    description: Amazon Web Services AWS S3 — Object Legal Hold business capability. Self-contained, no shared references.
    resources:
    - name: Bucket-Key+}?legal-hold
      path: /{Bucket}/{Key+}?legal-hold
      operations:
      - name: putobjectlegalhold
        method: PUT
        description: Amazon Web Services Put Object Legal Hold
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-object-legal-hold-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Object Legal Hold. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/{bucket}/key-legal-hold
      name: bucket-key-legal-hold
      description: REST surface for Bucket-Key+}?legal-hold.
      operations:
      - method: PUT
        name: putobjectlegalhold
        description: Amazon Web Services Put Object Legal Hold
        call: s3-object-legal-hold.putobjectlegalhold
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
