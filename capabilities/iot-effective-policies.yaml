naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iot — Effective Policies
  description: 'Amazon Web Services iot — Effective Policies. 1 operations. Lead operation: Amazon Web Services Geteffectivepolicies.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Effective Policies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iot-effective-policies
    baseUri: ''
    description: Amazon Web Services iot — Effective Policies business capability. Self-contained, no shared references.
    resources:
    - name: effective-policies
      path: /effective-policies
      operations:
      - name: amazonwebservicesgeteffectivepolicies
        method: POST
        description: Amazon Web Services Geteffectivepolicies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iot-effective-policies-rest
    port: 8080
    description: REST adapter for Amazon Web Services iot — Effective Policies. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/effective-policies
      name: effective-policies
      description: REST surface for effective-policies.
      operations:
      - method: POST
        name: amazonwebservicesgeteffectivepolicies
        description: Amazon Web Services Geteffectivepolicies
        call: iot-effective-policies.amazonwebservicesgeteffectivepolicies
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iot-effective-policies-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iot — Effective Policies. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-geteffectivepolicies
      description: Amazon Web Services Geteffectivepolicies
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iot-effective-policies.amazonwebservicesgeteffectivepolicies
      outputParameters:
      - type: object
        mapping: $.
