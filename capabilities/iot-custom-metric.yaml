naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iot — Custom Metric
  description: 'Amazon Web Services iot — Custom Metric. 1 operations. Lead operation: Amazon Web Services Updatecustommetric.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Custom Metric
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iot-custom-metric
    baseUri: ''
    description: Amazon Web Services iot — Custom Metric business capability. Self-contained, no shared references.
    resources:
    - name: custom-metric-metricName
      path: /custom-metric/{metricName}
      operations:
      - name: amazonwebservicesupdatecustommetric
        method: PATCH
        description: Amazon Web Services Updatecustommetric
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iot-custom-metric-rest
    port: 8080
    description: REST adapter for Amazon Web Services iot — Custom Metric. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/custom-metric/{metricname}
      name: custom-metric-metricname
      description: REST surface for custom-metric-metricName.
      operations:
      - method: PATCH
        name: amazonwebservicesupdatecustommetric
        description: Amazon Web Services Updatecustommetric
        call: iot-custom-metric.amazonwebservicesupdatecustommetric
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iot-custom-metric-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iot — Custom Metric. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updatecustommetric
      description: Amazon Web Services Updatecustommetric
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: iot-custom-metric.amazonwebservicesupdatecustommetric
      outputParameters:
      - type: object
        mapping: $.
