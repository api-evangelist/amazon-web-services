naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services redshift
  description: 'Amazon Web Services redshift. 1 operations. Lead operation: Amazon Web Services Updatepartnerstatus. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services redshift
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: redshift
    baseUri: ''
    description: Amazon Web Services redshift business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatepartnerstatus
        method: POST
        description: Amazon Web Services Updatepartnerstatus
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: redshift-rest
    port: 8080
    description: REST adapter for Amazon Web Services redshift. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatepartnerstatus
        description: Amazon Web Services Updatepartnerstatus
        call: redshift.amazonwebservicesupdatepartnerstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: redshift-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services redshift. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatepartnerstatus
      description: Amazon Web Services Updatepartnerstatus
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: redshift.amazonwebservicesupdatepartnerstatus
      outputParameters:
      - type: object
        mapping: $.
