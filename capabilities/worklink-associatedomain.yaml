    namespace: worklink-associatedomain
    baseUri: ''
    description: Amazon Web Services worklink — associateDomain business capability. Self-contained, no shared references.
    resources:
    - name: associateDomain
      path: /associateDomain
      operations:
      - name: amazonwebservicesassociatedomain
