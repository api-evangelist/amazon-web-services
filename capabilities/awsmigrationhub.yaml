naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWSMigrationHub
  description: 'Amazon Web Services AWSMigrationHub. 1 operations. Lead operation: Amazon Web Services Putresourceattributes.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services AWSMigrationHub
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: awsmigrationhub
    baseUri: ''
    description: Amazon Web Services AWSMigrationHub business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesputresourceattributes
        method: POST
        description: Amazon Web Services Putresourceattributes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: awsmigrationhub-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWSMigrationHub. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesputresourceattributes
        description: Amazon Web Services Putresourceattributes
        call: awsmigrationhub.amazonwebservicesputresourceattributes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: awsmigrationhub-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWSMigrationHub. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-putresourceattributes
      description: Amazon Web Services Putresourceattributes
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: awsmigrationhub.amazonwebservicesputresourceattributes
      outputParameters:
      - type: object
        mapping: $.
