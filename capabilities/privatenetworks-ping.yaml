naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services privatenetworks — Ping
  description: 'Amazon Web Services privatenetworks — Ping. 1 operations. Lead operation: Amazon Web Services Ping. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Ping
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: privatenetworks-ping
    baseUri: ''
    description: Amazon Web Services privatenetworks — Ping business capability. Self-contained, no shared references.
    resources:
    - name: ping
      path: /ping
      operations:
      - name: amazonwebservicesping
        method: GET
        description: Amazon Web Services Ping
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: privatenetworks-ping-rest
    port: 8080
    description: REST adapter for Amazon Web Services privatenetworks — Ping. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/ping
      name: ping
      description: REST surface for ping.
      operations:
      - method: GET
        name: amazonwebservicesping
        description: Amazon Web Services Ping
        call: privatenetworks-ping.amazonwebservicesping
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: privatenetworks-ping-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services privatenetworks — Ping. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-ping
      description: Amazon Web Services Ping
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: privatenetworks-ping.amazonwebservicesping
      outputParameters:
      - type: object
        mapping: $.
