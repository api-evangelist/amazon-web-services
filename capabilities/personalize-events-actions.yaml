naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services personalize-events — Actions
  description: 'Amazon Web Services personalize-events — Actions. 1 operations. Lead operation: Amazon Web Services Putactions.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Actions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: personalize-events-actions
    baseUri: ''
    description: Amazon Web Services personalize-events — Actions business capability. Self-contained, no shared references.
    resources:
    - name: actions
      path: /actions
      operations:
      - name: amazonwebservicesputactions
        method: POST
        description: Amazon Web Services Putactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: personalize-events-actions-rest
    port: 8080
    description: REST adapter for Amazon Web Services personalize-events — Actions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/actions
      name: actions
      description: REST surface for actions.
      operations:
      - method: POST
        name: amazonwebservicesputactions
        description: Amazon Web Services Putactions
        call: personalize-events-actions.amazonwebservicesputactions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: personalize-events-actions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services personalize-events — Actions. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-putactions
      description: Amazon Web Services Putactions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: personalize-events-actions.amazonwebservicesputactions
      outputParameters:
      - type: object
        mapping: $.
