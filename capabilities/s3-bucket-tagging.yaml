naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Bucket Tagging
  description: 'Amazon Web Services AWS S3 — Bucket Tagging. 1 operations. Lead operation: Amazon Web Services Put Bucket
    Tagging. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Bucket Tagging
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-bucket-tagging
    baseUri: ''
    description: Amazon Web Services AWS S3 — Bucket Tagging business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?tagging
      path: /{Bucket}?tagging
      operations:
      - name: putbuckettagging
        method: PUT
        description: Amazon Web Services Put Bucket Tagging
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-bucket-tagging-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Bucket Tagging. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/bucket-tagging
      name: bucket-tagging
      description: REST surface for Bucket}?tagging.
      operations:
      - method: PUT
        name: putbuckettagging
        description: Amazon Web Services Put Bucket Tagging
        call: s3-bucket-tagging.putbuckettagging
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-bucket-tagging-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Bucket Tagging. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-put-bucket
      description: Amazon Web Services Put Bucket Tagging
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: s3-bucket-tagging.putbuckettagging
      outputParameters:
      - type: object
        mapping: $.
