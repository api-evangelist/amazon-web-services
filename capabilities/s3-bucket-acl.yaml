naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Bucket ACL
  description: 'Amazon Web Services AWS S3 — Bucket ACL. 1 operations. Lead operation: Amazon Web Services Put Bucket ACL.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Bucket ACL
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-bucket-acl
    baseUri: ''
    description: Amazon Web Services AWS S3 — Bucket ACL business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?acl
      path: /{Bucket}?acl
      operations:
      - name: putbucketacl
        method: PUT
        description: Amazon Web Services Put Bucket ACL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-bucket-acl-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Bucket ACL. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/bucket-acl
      name: bucket-acl
      description: REST surface for Bucket}?acl.
      operations:
      - method: PUT
        name: putbucketacl
        description: Amazon Web Services Put Bucket ACL
        call: s3-bucket-acl.putbucketacl
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-bucket-acl-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Bucket ACL. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-put-bucket
      description: Amazon Web Services Put Bucket ACL
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: s3-bucket-acl.putbucketacl
      outputParameters:
      - type: object
        mapping: $.
