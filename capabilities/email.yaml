naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services email
  description: 'Amazon Web Services email. 1 operations. Lead operation: Amazon Web Services Verifyemailidentity. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services email
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: email
    baseUri: ''
    description: Amazon Web Services email business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesverifyemailidentity
        method: POST
        description: Amazon Web Services Verifyemailidentity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: email-rest
    port: 8080
    description: REST adapter for Amazon Web Services email. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesverifyemailidentity
        description: Amazon Web Services Verifyemailidentity
        call: email.amazonwebservicesverifyemailidentity
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: email-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services email. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-verifyemailidentity
      description: Amazon Web Services Verifyemailidentity
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: email.amazonwebservicesverifyemailidentity
      outputParameters:
      - type: object
        mapping: $.
