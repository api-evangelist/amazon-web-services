naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services panorama — Nodes
  description: 'Amazon Web Services panorama — Nodes. 2 operations. Lead operation: Amazon Web Services Listnodes. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Nodes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: panorama-nodes
    baseUri: ''
    description: Amazon Web Services panorama — Nodes business capability. Self-contained, no shared references.
    resources:
    - name: nodes
      path: /nodes
      operations:
      - name: amazonwebserviceslistnodes
        method: GET
        description: Amazon Web Services Listnodes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: nodes-NodeId
      path: /nodes/{NodeId}
      operations:
      - name: amazonwebservicesdescribenode
        method: GET
        description: Amazon Web Services Describenode
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: panorama-nodes-rest
    port: 8080
    description: REST adapter for Amazon Web Services panorama — Nodes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/nodes
      name: nodes
      description: REST surface for nodes.
      operations:
      - method: GET
        name: amazonwebserviceslistnodes
        description: Amazon Web Services Listnodes
        call: panorama-nodes.amazonwebserviceslistnodes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nodes/{nodeid}
      name: nodes-nodeid
      description: REST surface for nodes-NodeId.
      operations:
      - method: GET
        name: amazonwebservicesdescribenode
        description: Amazon Web Services Describenode
        call: panorama-nodes.amazonwebservicesdescribenode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: panorama-nodes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services panorama — Nodes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listnodes
      description: Amazon Web Services Listnodes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: panorama-nodes.amazonwebserviceslistnodes
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-describenode
      description: Amazon Web Services Describenode
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: panorama-nodes.amazonwebservicesdescribenode
      outputParameters:
      - type: object
        mapping: $.
