naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services schemas — Policy
  description: 'Amazon Web Services schemas — Policy. 1 operations. Lead operation: Amazon Web Services Putresourcepolicy.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Policy
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: schemas-policy
    baseUri: ''
    description: Amazon Web Services schemas — Policy business capability. Self-contained, no shared references.
    resources:
    - name: v1-policy
      path: /v1/policy
      operations:
      - name: amazonwebservicesputresourcepolicy
        method: PUT
        description: Amazon Web Services Putresourcepolicy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: schemas-policy-rest
    port: 8080
    description: REST adapter for Amazon Web Services schemas — Policy. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/policy
      name: v1-policy
      description: REST surface for v1-policy.
      operations:
      - method: PUT
        name: amazonwebservicesputresourcepolicy
        description: Amazon Web Services Putresourcepolicy
        call: schemas-policy.amazonwebservicesputresourcepolicy
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: schemas-policy-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services schemas — Policy. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-putresourcepolicy
      description: Amazon Web Services Putresourcepolicy
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: schemas-policy.amazonwebservicesputresourcepolicy
      outputParameters:
      - type: object
        mapping: $.
