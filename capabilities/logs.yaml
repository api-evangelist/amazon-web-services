naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services logs
  description: 'Amazon Web Services logs. 1 operations. Lead operation: Amazon Web Services Updateloganomalydetector. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: logs
    baseUri: ''
    description: Amazon Web Services logs business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateloganomalydetector
        method: POST
        description: Amazon Web Services Updateloganomalydetector
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: logs-rest
    port: 8080
    description: REST adapter for Amazon Web Services logs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateloganomalydetector
        description: Amazon Web Services Updateloganomalydetector
        call: logs.amazonwebservicesupdateloganomalydetector
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services logs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updateloganomalydetector
      description: Amazon Web Services Updateloganomalydetector
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: logs.amazonwebservicesupdateloganomalydetector
      outputParameters:
      - type: object
        mapping: $.
