naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services quicksight — Resources
  description: 'Amazon Web Services quicksight — Resources. 1 operations. Lead operation: Amazon Web Services Untagresource.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Resources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: quicksight-resources
    baseUri: ''
    description: Amazon Web Services quicksight — Resources business capability. Self-contained, no shared references.
    resources:
    - name: resources-ResourceArn-tags
      path: /resources/{ResourceArn}/tags
      operations:
      - name: amazonwebservicesuntagresource
        method: DELETE
        description: Amazon Web Services Untagresource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: quicksight-resources-rest
    port: 8080
    description: REST adapter for Amazon Web Services quicksight — Resources. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/resources/{resourcearn}/tags
      name: resources-resourcearn-tags
      description: REST surface for resources-ResourceArn-tags.
      operations:
      - method: DELETE
        name: amazonwebservicesuntagresource
        description: Amazon Web Services Untagresource
        call: quicksight-resources.amazonwebservicesuntagresource
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: quicksight-resources-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services quicksight — Resources. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-untagresource
      description: Amazon Web Services Untagresource
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: quicksight-resources.amazonwebservicesuntagresource
      outputParameters:
      - type: object
        mapping: $.
