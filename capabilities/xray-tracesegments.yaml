  description: 'Amazon Web Services xray — TraceSegments. 1 operations. Lead operation: Amazon Web Services Puttracesegments.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - TraceSegments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: xray-tracesegments
    baseUri: ''
    description: Amazon Web Services xray — TraceSegments business capability. Self-contained, no shared references.
    resources:
    - name: TraceSegments
      path: /TraceSegments
      operations:
      - name: amazonwebservicesputtracesegments
        method: POST
        description: Amazon Web Services Puttracesegments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
