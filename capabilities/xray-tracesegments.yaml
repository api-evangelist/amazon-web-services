    - path: /v1/tracesegments
      name: tracesegments
      description: REST surface for TraceSegments.
      operations:
      - method: POST
        name: amazonwebservicesputtracesegments
        description: Amazon Web Services Puttracesegments
        call: xray-tracesegments.amazonwebservicesputtracesegments
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
