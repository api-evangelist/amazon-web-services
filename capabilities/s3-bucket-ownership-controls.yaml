naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Bucket Ownership Controls
  description: 'Amazon Web Services AWS S3 — Bucket Ownership Controls. 1 operations. Lead operation: Amazon Web Services
    Put Bucket Ownership Controls. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Bucket Ownership Controls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-bucket-ownership-controls
    baseUri: ''
    description: Amazon Web Services AWS S3 — Bucket Ownership Controls business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?ownershipControls
      path: /{Bucket}?ownershipControls
      operations:
      - name: putbucketownershipcontrols
        method: PUT
        description: Amazon Web Services Put Bucket Ownership Controls
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-bucket-ownership-controls-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Bucket Ownership Controls. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/bucket-ownershipcontrols
      name: bucket-ownershipcontrols
      description: REST surface for Bucket}?ownershipControls.
      operations:
      - method: PUT
        name: putbucketownershipcontrols
        description: Amazon Web Services Put Bucket Ownership Controls
        call: s3-bucket-ownership-controls.putbucketownershipcontrols
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-bucket-ownership-controls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Bucket Ownership Controls. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-put-bucket
      description: Amazon Web Services Put Bucket Ownership Controls
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: s3-bucket-ownership-controls.putbucketownershipcontrols
      outputParameters:
      - type: object
        mapping: $.
