naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Vocabulary
  description: 'Amazon Web Services connect — Vocabulary. 2 operations. Lead operation: Amazon Web Services Createvocabulary.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Vocabulary
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-vocabulary
    baseUri: ''
    description: Amazon Web Services connect — Vocabulary business capability. Self-contained, no shared references.
    resources:
    - name: vocabulary-InstanceId
      path: /vocabulary/{InstanceId}
      operations:
      - name: amazonwebservicescreatevocabulary
        method: POST
        description: Amazon Web Services Createvocabulary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: vocabulary-InstanceId-VocabularyId
      path: /vocabulary/{InstanceId}/{VocabularyId}
      operations:
      - name: amazonwebservicesdescribevocabulary
        method: GET
        description: Amazon Web Services Describevocabulary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-vocabulary-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Vocabulary. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/vocabulary/{instanceid}
      name: vocabulary-instanceid
      description: REST surface for vocabulary-InstanceId.
      operations:
      - method: POST
        name: amazonwebservicescreatevocabulary
        description: Amazon Web Services Createvocabulary
        call: connect-vocabulary.amazonwebservicescreatevocabulary
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vocabulary/{instanceid}/{vocabularyid}
      name: vocabulary-instanceid-vocabularyid
      description: REST surface for vocabulary-InstanceId-VocabularyId.
      operations:
      - method: GET
        name: amazonwebservicesdescribevocabulary
        description: Amazon Web Services Describevocabulary
        call: connect-vocabulary.amazonwebservicesdescribevocabulary
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-vocabulary-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Vocabulary. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-createvocabulary
      description: Amazon Web Services Createvocabulary
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connect-vocabulary.amazonwebservicescreatevocabulary
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-describevocabulary
      description: Amazon Web Services Describevocabulary
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-vocabulary.amazonwebservicesdescribevocabulary
      outputParameters:
      - type: object
        mapping: $.
