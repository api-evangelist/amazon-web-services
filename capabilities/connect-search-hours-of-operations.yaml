      name: search-hours-of-operations
      description: REST surface for search-hours-of-operations.
      operations:
      - method: POST
        name: amazonwebservicessearchhoursofoperations
        description: Amazon Web Services Searchhoursofoperations
        call: connect-search-hours-of-operations.amazonwebservicessearchhoursofoperations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
