    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Search Hours of Operations. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-searchhoursofoperations
      description: Amazon Web Services Searchhoursofoperations
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: connect-search-hours-of-operations.amazonwebservicessearchhoursofoperations
      outputParameters:
      - type: object
        mapping: $.
