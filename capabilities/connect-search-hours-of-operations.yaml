  description: 'Amazon Web Services connect — Search Hours of Operations. 1 operations. Lead operation: Amazon Web Services
    Searchhoursofoperations. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Search Hours of Operations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
