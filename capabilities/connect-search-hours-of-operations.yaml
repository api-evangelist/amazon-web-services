  - type: http
    namespace: connect-search-hours-of-operations
    baseUri: ''
    description: Amazon Web Services connect — Search Hours of Operations business capability. Self-contained, no shared references.
    resources:
    - name: search-hours-of-operations
      path: /search-hours-of-operations
      operations:
      - name: amazonwebservicessearchhoursofoperations
        method: POST
        description: Amazon Web Services Searchhoursofoperations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
