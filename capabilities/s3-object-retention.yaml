naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Object Retention
  description: 'Amazon Web Services AWS S3 — Object Retention. 1 operations. Lead operation: Amazon Web Services Put Object
    Retention. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Object Retention
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-object-retention
    baseUri: ''
    description: Amazon Web Services AWS S3 — Object Retention business capability. Self-contained, no shared references.
    resources:
    - name: Bucket-Key+}?retention
      path: /{Bucket}/{Key+}?retention
      operations:
      - name: putobjectretention
        method: PUT
        description: Amazon Web Services Put Object Retention
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-object-retention-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Object Retention. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/{bucket}/key-retention
      name: bucket-key-retention
      description: REST surface for Bucket-Key+}?retention.
      operations:
      - method: PUT
        name: putobjectretention
        description: Amazon Web Services Put Object Retention
        call: s3-object-retention.putobjectretention
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-object-retention-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Object Retention. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-put-object
      description: Amazon Web Services Put Object Retention
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: s3-object-retention.putobjectretention
      outputParameters:
      - type: object
        mapping: $.
