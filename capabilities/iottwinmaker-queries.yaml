naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iottwinmaker — Queries
  description: 'Amazon Web Services iottwinmaker — Queries. 1 operations. Lead operation: Amazon Web Services Executequery.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Queries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iottwinmaker-queries
    baseUri: ''
    description: Amazon Web Services iottwinmaker — Queries business capability. Self-contained, no shared references.
    resources:
    - name: queries-execution
      path: /queries/execution
      operations:
      - name: amazonwebservicesexecutequery
        method: POST
        description: Amazon Web Services Executequery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iottwinmaker-queries-rest
    port: 8080
    description: REST adapter for Amazon Web Services iottwinmaker — Queries. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/queries/execution
      name: queries-execution
      description: REST surface for queries-execution.
      operations:
      - method: POST
        name: amazonwebservicesexecutequery
        description: Amazon Web Services Executequery
        call: iottwinmaker-queries.amazonwebservicesexecutequery
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iottwinmaker-queries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iottwinmaker — Queries. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-executequery
      description: Amazon Web Services Executequery
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: iottwinmaker-queries.amazonwebservicesexecutequery
      outputParameters:
      - type: object
        mapping: $.
