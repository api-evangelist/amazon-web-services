naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services finspace — Environment
  description: 'Amazon Web Services finspace — Environment. 2 operations. Lead operation: Amazon Web Services Listenvironments.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Environment
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: finspace-environment
    baseUri: ''
    description: Amazon Web Services finspace — Environment business capability. Self-contained, no shared references.
    resources:
    - name: environment
      path: /environment
      operations:
      - name: amazonwebserviceslistenvironments
        method: GET
        description: Amazon Web Services Listenvironments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: environment-environmentId
      path: /environment/{environmentId}
      operations:
      - name: amazonwebservicesupdateenvironment
        method: PUT
        description: Amazon Web Services Updateenvironment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: finspace-environment-rest
    port: 8080
    description: REST adapter for Amazon Web Services finspace — Environment. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/environment
      name: environment
      description: REST surface for environment.
      operations:
      - method: GET
        name: amazonwebserviceslistenvironments
        description: Amazon Web Services Listenvironments
        call: finspace-environment.amazonwebserviceslistenvironments
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/environment/{environmentid}
      name: environment-environmentid
      description: REST surface for environment-environmentId.
      operations:
      - method: PUT
        name: amazonwebservicesupdateenvironment
        description: Amazon Web Services Updateenvironment
        call: finspace-environment.amazonwebservicesupdateenvironment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: finspace-environment-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services finspace — Environment. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-listenvironments
      description: Amazon Web Services Listenvironments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: finspace-environment.amazonwebserviceslistenvironments
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updateenvironment
      description: Amazon Web Services Updateenvironment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: finspace-environment.amazonwebservicesupdateenvironment
      outputParameters:
      - type: object
        mapping: $.
