  - type: http
    namespace: worklink-listdevices
    baseUri: ''
    description: Amazon Web Services worklink — listDevices business capability. Self-contained, no shared references.
    resources:
    - name: listDevices
      path: /listDevices
      operations:
      - name: amazonwebserviceslistdevices
        method: POST
        description: Amazon Web Services Listdevices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
