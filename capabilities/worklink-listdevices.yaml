    resources:
    - path: /v1/listdevices
      name: listdevices
      description: REST surface for listDevices.
      operations:
      - method: POST
        name: amazonwebserviceslistdevices
        description: Amazon Web Services Listdevices
        call: worklink-listdevices.amazonwebserviceslistdevices
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
