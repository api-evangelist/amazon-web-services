naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services worklink — listDevices
  description: 'Amazon Web Services worklink — listDevices. 1 operations. Lead operation: Amazon Web Services Listdevices.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - listDevices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
