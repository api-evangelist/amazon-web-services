    namespace: securityhub-standards
    baseUri: ''
    description: Amazon Web Services securityhub — Standards business capability. Self-contained, no shared references.
    resources:
    - name: standards
      path: /standards
      operations:
      - name: amazonwebservicesdescribestandards
        method: GET
        description: Amazon Web Services Describestandards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: standards-control-StandardsControlArn+
      path: /standards/control/{StandardsControlArn+}
      operations:
      - name: amazonwebservicesupdatestandardscontrol
        method: PATCH
        description: Amazon Web Services Updatestandardscontrol
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: standards-controls-StandardsSubscriptionArn+
      path: /standards/controls/{StandardsSubscriptionArn+}
      operations:
      - name: amazonwebservicesdescribestandardscontrols
        method: GET
        description: Amazon Web Services Describestandardscontrols
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
