        method: POST
        description: Amazon Web Services Getenabledstandards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: standards-register
      path: /standards/register
      operations:
      - name: amazonwebservicesbatchenablestandards
        method: POST
        description: Amazon Web Services Batchenablestandards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
