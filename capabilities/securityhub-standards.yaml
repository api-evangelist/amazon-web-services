    namespace: securityhub-standards-rest
    port: 8080
    description: REST adapter for Amazon Web Services securityhub — Standards. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/standards
      name: standards
      description: REST surface for standards.
      operations:
      - method: GET
        name: amazonwebservicesdescribestandards
        description: Amazon Web Services Describestandards
        call: securityhub-standards.amazonwebservicesdescribestandards
