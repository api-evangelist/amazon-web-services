        mapping: $.
    - name: amazon-web-services-getagentconfiguration
      description: Amazon Web Services Getagentconfiguration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: groundstation-agent.amazonwebservicesgetagentconfiguration
      outputParameters:
      - type: object
        mapping: $.
