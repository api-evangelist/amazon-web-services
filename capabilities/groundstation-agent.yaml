  - type: http
    namespace: groundstation-agent
    baseUri: ''
    description: Amazon Web Services groundstation — Agent business capability. Self-contained, no shared references.
    resources:
    - name: agent
      path: /agent
      operations:
      - name: amazonwebservicesregisteragent
        method: POST
        description: Amazon Web Services Registeragent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: agent-agentId
      path: /agent/{agentId}
      operations:
      - name: amazonwebservicesupdateagentstatus
        method: PUT
        description: Amazon Web Services Updateagentstatus
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: agent-agentId-configuration
      path: /agent/{agentId}/configuration
      operations:
      - name: amazonwebservicesgetagentconfiguration
        method: GET
        description: Amazon Web Services Getagentconfiguration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
