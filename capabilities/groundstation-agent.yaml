    namespace: groundstation-agent-rest
    port: 8080
    description: REST adapter for Amazon Web Services groundstation — Agent. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/agent
      name: agent
      description: REST surface for agent.
      operations:
      - method: POST
        name: amazonwebservicesregisteragent
        description: Amazon Web Services Registeragent
        call: groundstation-agent.amazonwebservicesregisteragent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/agent/{agentid}
      name: agent-agentid
      description: REST surface for agent-agentId.
      operations:
      - method: PUT
        name: amazonwebservicesupdateagentstatus
        description: Amazon Web Services Updateagentstatus
        call: groundstation-agent.amazonwebservicesupdateagentstatus
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/agent/{agentid}/configuration
      name: agent-agentid-configuration
      description: REST surface for agent-agentId-configuration.
      operations:
      - method: GET
        name: amazonwebservicesgetagentconfiguration
        description: Amazon Web Services Getagentconfiguration
        call: groundstation-agent.amazonwebservicesgetagentconfiguration
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: groundstation-agent-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services groundstation — Agent. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-registeragent
      description: Amazon Web Services Registeragent
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: groundstation-agent.amazonwebservicesregisteragent
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updateagentstatus
