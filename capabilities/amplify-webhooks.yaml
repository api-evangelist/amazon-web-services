naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services amplify — Webhooks
  description: 'Amazon Web Services amplify — Webhooks. 1 operations. Lead operation: Amazon Web Services Updatewebhook. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: amplify-webhooks
    baseUri: ''
    description: Amazon Web Services amplify — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: webhooks-webhookId
      path: /webhooks/{webhookId}
      operations:
      - name: amazonwebservicesupdatewebhook
        method: POST
        description: Amazon Web Services Updatewebhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: amplify-webhooks-rest
    port: 8080
    description: REST adapter for Amazon Web Services amplify — Webhooks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/webhooks/{webhookid}
      name: webhooks-webhookid
      description: REST surface for webhooks-webhookId.
      operations:
      - method: POST
        name: amazonwebservicesupdatewebhook
        description: Amazon Web Services Updatewebhook
        call: amplify-webhooks.amazonwebservicesupdatewebhook
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amplify-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services amplify — Webhooks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updatewebhook
      description: Amazon Web Services Updatewebhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amplify-webhooks.amazonwebservicesupdatewebhook
      outputParameters:
      - type: object
        mapping: $.
