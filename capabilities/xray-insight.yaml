naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services xray — Insight
  description: 'Amazon Web Services xray — Insight. 1 operations. Lead operation: Amazon Web Services Getinsight. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Insight
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: xray-insight
    baseUri: ''
    description: Amazon Web Services xray — Insight business capability. Self-contained, no shared references.
    resources:
    - name: Insight
      path: /Insight
      operations:
      - name: amazonwebservicesgetinsight
        method: POST
        description: Amazon Web Services Getinsight
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: xray-insight-rest
    port: 8080
    description: REST adapter for Amazon Web Services xray — Insight. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/insight
      name: insight
      description: REST surface for Insight.
      operations:
      - method: POST
        name: amazonwebservicesgetinsight
        description: Amazon Web Services Getinsight
        call: xray-insight.amazonwebservicesgetinsight
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: xray-insight-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services xray — Insight. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-getinsight
      description: Amazon Web Services Getinsight
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: xray-insight.amazonwebservicesgetinsight
      outputParameters:
      - type: object
        mapping: $.
