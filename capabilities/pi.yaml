naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services pi
  description: 'Amazon Web Services pi. 1 operations. Lead operation: Amazon Web Services Untagresource. Self-contained Naftiko
    capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services pi
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: pi
    baseUri: ''
    description: Amazon Web Services pi business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesuntagresource
        method: POST
        description: Amazon Web Services Untagresource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pi-rest
    port: 8080
    description: REST adapter for Amazon Web Services pi. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesuntagresource
        description: Amazon Web Services Untagresource
        call: pi.amazonwebservicesuntagresource
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pi-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services pi. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-untagresource
      description: Amazon Web Services Untagresource
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pi.amazonwebservicesuntagresource
      outputParameters:
      - type: object
        mapping: $.
