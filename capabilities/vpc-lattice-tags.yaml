naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services vpc-lattice — Tags
  description: 'Amazon Web Services vpc-lattice — Tags. 1 operations. Lead operation: Amazon Web Services Untagresource. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Tags
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: vpc-lattice-tags
    baseUri: ''
    description: Amazon Web Services vpc-lattice — Tags business capability. Self-contained, no shared references.
    resources:
    - name: tags-resourceArn
      path: /tags/{resourceArn}
      operations:
      - name: amazonwebservicesuntagresource
        method: DELETE
        description: Amazon Web Services Untagresource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: vpc-lattice-tags-rest
    port: 8080
    description: REST adapter for Amazon Web Services vpc-lattice — Tags. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tags/{resourcearn}
      name: tags-resourcearn
      description: REST surface for tags-resourceArn.
      operations:
      - method: DELETE
        name: amazonwebservicesuntagresource
        description: Amazon Web Services Untagresource
        call: vpc-lattice-tags.amazonwebservicesuntagresource
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vpc-lattice-tags-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services vpc-lattice — Tags. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-untagresource
      description: Amazon Web Services Untagresource
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: vpc-lattice-tags.amazonwebservicesuntagresource
      outputParameters:
      - type: object
        mapping: $.
