naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iotwireless — Service Profiles
  description: 'Amazon Web Services iotwireless — Service Profiles. 2 operations. Lead operation: Amazon Web Services Listserviceprofiles.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Service Profiles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iotwireless-service-profiles
    baseUri: ''
    description: Amazon Web Services iotwireless — Service Profiles business capability. Self-contained, no shared references.
    resources:
    - name: service-profiles
      path: /service-profiles
      operations:
      - name: amazonwebserviceslistserviceprofiles
        method: GET
        description: Amazon Web Services Listserviceprofiles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: service-profiles-Id
      path: /service-profiles/{Id}
      operations:
      - name: amazonwebservicesgetserviceprofile
        method: GET
        description: Amazon Web Services Getserviceprofile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iotwireless-service-profiles-rest
    port: 8080
    description: REST adapter for Amazon Web Services iotwireless — Service Profiles. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/service-profiles
      name: service-profiles
      description: REST surface for service-profiles.
      operations:
      - method: GET
        name: amazonwebserviceslistserviceprofiles
        description: Amazon Web Services Listserviceprofiles
        call: iotwireless-service-profiles.amazonwebserviceslistserviceprofiles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/service-profiles/{id}
      name: service-profiles-id
      description: REST surface for service-profiles-Id.
      operations:
      - method: GET
        name: amazonwebservicesgetserviceprofile
        description: Amazon Web Services Getserviceprofile
        call: iotwireless-service-profiles.amazonwebservicesgetserviceprofile
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iotwireless-service-profiles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iotwireless — Service Profiles. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-listserviceprofiles
      description: Amazon Web Services Listserviceprofiles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iotwireless-service-profiles.amazonwebserviceslistserviceprofiles
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-getserviceprofile
      description: Amazon Web Services Getserviceprofile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iotwireless-service-profiles.amazonwebservicesgetserviceprofile
      outputParameters:
      - type: object
        mapping: $.
