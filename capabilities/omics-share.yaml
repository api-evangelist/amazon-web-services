naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services omics — Share
  description: 'Amazon Web Services omics — Share. 2 operations. Lead operation: Amazon Web Services Createshare. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Share
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: omics-share
    baseUri: ''
    description: Amazon Web Services omics — Share business capability. Self-contained, no shared references.
    resources:
    - name: share
      path: /share
      operations:
      - name: amazonwebservicescreateshare
        method: POST
        description: Amazon Web Services Createshare
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: share-shareId
      path: /share/{shareId}
      operations:
      - name: amazonwebservicesgetshare
        method: GET
        description: Amazon Web Services Getshare
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: omics-share-rest
    port: 8080
    description: REST adapter for Amazon Web Services omics — Share. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/share
      name: share
      description: REST surface for share.
      operations:
      - method: POST
        name: amazonwebservicescreateshare
        description: Amazon Web Services Createshare
        call: omics-share.amazonwebservicescreateshare
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/share/{shareid}
      name: share-shareid
      description: REST surface for share-shareId.
      operations:
      - method: GET
        name: amazonwebservicesgetshare
        description: Amazon Web Services Getshare
        call: omics-share.amazonwebservicesgetshare
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: omics-share-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services omics — Share. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-createshare
      description: Amazon Web Services Createshare
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: omics-share.amazonwebservicescreateshare
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-getshare
      description: Amazon Web Services Getshare
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: omics-share.amazonwebservicesgetshare
      outputParameters:
      - type: object
        mapping: $.
