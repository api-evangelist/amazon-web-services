naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iotevents — Logging
  description: 'Amazon Web Services iotevents — Logging. 1 operations. Lead operation: Amazon Web Services Putloggingoptions.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Logging
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iotevents-logging
    baseUri: ''
    description: Amazon Web Services iotevents — Logging business capability. Self-contained, no shared references.
    resources:
    - name: logging
      path: /logging
      operations:
      - name: amazonwebservicesputloggingoptions
        method: PUT
        description: Amazon Web Services Putloggingoptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iotevents-logging-rest
    port: 8080
    description: REST adapter for Amazon Web Services iotevents — Logging. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/logging
      name: logging
      description: REST surface for logging.
      operations:
      - method: PUT
        name: amazonwebservicesputloggingoptions
        description: Amazon Web Services Putloggingoptions
        call: iotevents-logging.amazonwebservicesputloggingoptions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iotevents-logging-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iotevents — Logging. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-putloggingoptions
      description: Amazon Web Services Putloggingoptions
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: iotevents-logging.amazonwebservicesputloggingoptions
      outputParameters:
      - type: object
        mapping: $.
