naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services sso-oidc — Token
  description: 'Amazon Web Services sso-oidc — Token. 1 operations. Lead operation: Amazon Web Services Createtoken. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Token
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: sso-oidc-token
    baseUri: ''
    description: Amazon Web Services sso-oidc — Token business capability. Self-contained, no shared references.
    resources:
    - name: token
      path: /token
      operations:
      - name: amazonwebservicescreatetoken
        method: POST
        description: Amazon Web Services Createtoken
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: sso-oidc-token-rest
    port: 8080
    description: REST adapter for Amazon Web Services sso-oidc — Token. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/token
      name: token
      description: REST surface for token.
      operations:
      - method: POST
        name: amazonwebservicescreatetoken
        description: Amazon Web Services Createtoken
        call: sso-oidc-token.amazonwebservicescreatetoken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sso-oidc-token-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services sso-oidc — Token. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-createtoken
      description: Amazon Web Services Createtoken
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sso-oidc-token.amazonwebservicescreatetoken
      outputParameters:
      - type: object
        mapping: $.
