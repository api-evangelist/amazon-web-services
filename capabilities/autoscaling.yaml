naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services autoscaling
  description: 'Amazon Web Services autoscaling. 1 operations. Lead operation: Amazon Web Services Updateautoscalinggroup.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services autoscaling
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: autoscaling
    baseUri: ''
    description: Amazon Web Services autoscaling business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateautoscalinggroup
        method: POST
        description: Amazon Web Services Updateautoscalinggroup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: autoscaling-rest
    port: 8080
    description: REST adapter for Amazon Web Services autoscaling. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateautoscalinggroup
        description: Amazon Web Services Updateautoscalinggroup
        call: autoscaling.amazonwebservicesupdateautoscalinggroup
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: autoscaling-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services autoscaling. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updateautoscalinggroup
      description: Amazon Web Services Updateautoscalinggroup
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: autoscaling.amazonwebservicesupdateautoscalinggroup
      outputParameters:
      - type: object
        mapping: $.
