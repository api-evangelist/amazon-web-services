naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services resiliencehub — Update App
  description: 'Amazon Web Services resiliencehub — Update App. 1 operations. Lead operation: Amazon Web Services Updateapp.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Update App
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: resiliencehub-update-app
    baseUri: ''
    description: Amazon Web Services resiliencehub — Update App business capability. Self-contained, no shared references.
    resources:
    - name: update-app
      path: /update-app
      operations:
      - name: amazonwebservicesupdateapp
        method: POST
        description: Amazon Web Services Updateapp
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: resiliencehub-update-app-rest
    port: 8080
    description: REST adapter for Amazon Web Services resiliencehub — Update App. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/update-app
      name: update-app
      description: REST surface for update-app.
      operations:
      - method: POST
        name: amazonwebservicesupdateapp
        description: Amazon Web Services Updateapp
        call: resiliencehub-update-app.amazonwebservicesupdateapp
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: resiliencehub-update-app-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services resiliencehub — Update App. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-updateapp
      description: Amazon Web Services Updateapp
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: resiliencehub-update-app.amazonwebservicesupdateapp
      outputParameters:
      - type: object
        mapping: $.
