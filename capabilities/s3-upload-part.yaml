naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Upload Part
  description: 'Amazon Web Services AWS S3 — Upload Part. 1 operations. Lead operation: Amazon Web Services Upload Part. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Upload Part
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-upload-part
    baseUri: ''
    description: Amazon Web Services AWS S3 — Upload Part business capability. Self-contained, no shared references.
    resources:
    - name: Bucket-Key+
      path: /{Bucket}/{Key+}
      operations:
      - name: uploadpart
        method: PUT
        description: Amazon Web Services Upload Part
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-upload-part-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Upload Part. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{bucket}/{key}
      name: bucket-key
      description: REST surface for Bucket-Key+.
      operations:
      - method: PUT
        name: uploadpart
        description: Amazon Web Services Upload Part
        call: s3-upload-part.uploadpart
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-upload-part-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Upload Part. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-upload-part
      description: Amazon Web Services Upload Part
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: s3-upload-part.uploadpart
      outputParameters:
      - type: object
        mapping: $.
