naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services braket — Jobs
  description: 'Amazon Web Services braket — Jobs. 1 operations. Lead operation: Amazon Web Services Searchjobs. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: braket-jobs
    baseUri: ''
    description: Amazon Web Services braket — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: amazonwebservicessearchjobs
        method: POST
        description: Amazon Web Services Searchjobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: braket-jobs-rest
    port: 8080
    description: REST adapter for Amazon Web Services braket — Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: POST
        name: amazonwebservicessearchjobs
        description: Amazon Web Services Searchjobs
        call: braket-jobs.amazonwebservicessearchjobs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: braket-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services braket — Jobs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-searchjobs
      description: Amazon Web Services Searchjobs
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: braket-jobs.amazonwebservicessearchjobs
      outputParameters:
      - type: object
        mapping: $.
