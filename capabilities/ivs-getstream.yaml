naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services ivs — GetStream
  description: 'Amazon Web Services ivs — GetStream. 1 operations. Lead operation: Amazon Web Services Getstream. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - GetStream
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: ivs-getstream
    baseUri: ''
    description: Amazon Web Services ivs — GetStream business capability. Self-contained, no shared references.
    resources:
    - name: GetStream
      path: /GetStream
      operations:
      - name: amazonwebservicesgetstream
        method: POST
        description: Amazon Web Services Getstream
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: ivs-getstream-rest
    port: 8080
    description: REST adapter for Amazon Web Services ivs — GetStream. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/getstream
      name: getstream
      description: REST surface for GetStream.
      operations:
      - method: POST
        name: amazonwebservicesgetstream
        description: Amazon Web Services Getstream
        call: ivs-getstream.amazonwebservicesgetstream
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ivs-getstream-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services ivs — GetStream. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-getstream
      description: Amazon Web Services Getstream
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ivs-getstream.amazonwebservicesgetstream
      outputParameters:
      - type: object
        mapping: $.
