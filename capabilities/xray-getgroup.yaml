naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services xray — GetGroup
  description: 'Amazon Web Services xray — GetGroup. 1 operations. Lead operation: Amazon Web Services Getgroup. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - GetGroup
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: xray-getgroup
    baseUri: ''
    description: Amazon Web Services xray — GetGroup business capability. Self-contained, no shared references.
    resources:
    - name: GetGroup
      path: /GetGroup
      operations:
      - name: amazonwebservicesgetgroup
        method: POST
        description: Amazon Web Services Getgroup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
