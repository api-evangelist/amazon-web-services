      name: getgroup
      description: REST surface for GetGroup.
      operations:
      - method: POST
        name: amazonwebservicesgetgroup
        description: Amazon Web Services Getgroup
        call: xray-getgroup.amazonwebservicesgetgroup
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
