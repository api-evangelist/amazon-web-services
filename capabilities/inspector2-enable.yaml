naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services inspector2 — Enable
  description: 'Amazon Web Services inspector2 — Enable. 1 operations. Lead operation: Amazon Web Services Enable. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Enable
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: inspector2-enable
    baseUri: ''
    description: Amazon Web Services inspector2 — Enable business capability. Self-contained, no shared references.
    resources:
    - name: enable
      path: /enable
      operations:
      - name: amazonwebservicesenable
        method: POST
        description: Amazon Web Services Enable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: inspector2-enable-rest
    port: 8080
    description: REST adapter for Amazon Web Services inspector2 — Enable. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/enable
      name: enable
      description: REST surface for enable.
      operations:
      - method: POST
        name: amazonwebservicesenable
        description: Amazon Web Services Enable
        call: inspector2-enable.amazonwebservicesenable
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: inspector2-enable-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services inspector2 — Enable. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-enable
      description: Amazon Web Services Enable
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: inspector2-enable.amazonwebservicesenable
      outputParameters:
      - type: object
        mapping: $.
