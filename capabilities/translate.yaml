naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services translate
  description: 'Amazon Web Services translate. 1 operations. Lead operation: Amazon Web Services Updateparalleldata. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services translate
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: translate
    baseUri: ''
    description: Amazon Web Services translate business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateparalleldata
        method: POST
        description: Amazon Web Services Updateparalleldata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: translate-rest
    port: 8080
    description: REST adapter for Amazon Web Services translate. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateparalleldata
        description: Amazon Web Services Updateparalleldata
        call: translate.amazonwebservicesupdateparalleldata
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: translate-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services translate. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updateparalleldata
      description: Amazon Web Services Updateparalleldata
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: translate.amazonwebservicesupdateparalleldata
      outputParameters:
      - type: object
        mapping: $.
