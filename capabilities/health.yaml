naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services health
  description: 'Amazon Web Services health. 1 operations. Lead operation: Amazon Web Services Enablehealthserviceaccessfororganization.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services health
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: health
    baseUri: ''
    description: Amazon Web Services health business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesenablehealthserviceaccessfororganization
        method: POST
        description: Amazon Web Services Enablehealthserviceaccessfororganization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: health-rest
    port: 8080
    description: REST adapter for Amazon Web Services health. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesenablehealthserviceaccessfororganization
        description: Amazon Web Services Enablehealthserviceaccessfororganization
        call: health.amazonwebservicesenablehealthserviceaccessfororganization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: health-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services health. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-enablehealthserviceaccessfororganization
      description: Amazon Web Services Enablehealthserviceaccessfororganization
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: health.amazonwebservicesenablehealthserviceaccessfororganization
      outputParameters:
      - type: object
        mapping: $.
