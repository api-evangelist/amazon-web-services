naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services servicediscovery
  description: 'Amazon Web Services servicediscovery. 1 operations. Lead operation: Amazon Web Services Updateservice. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services servicediscovery
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: servicediscovery
    baseUri: ''
    description: Amazon Web Services servicediscovery business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateservice
        method: POST
        description: Amazon Web Services Updateservice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: servicediscovery-rest
    port: 8080
    description: REST adapter for Amazon Web Services servicediscovery. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateservice
        description: Amazon Web Services Updateservice
        call: servicediscovery.amazonwebservicesupdateservice
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: servicediscovery-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services servicediscovery. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updateservice
      description: Amazon Web Services Updateservice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: servicediscovery.amazonwebservicesupdateservice
      outputParameters:
      - type: object
        mapping: $.
