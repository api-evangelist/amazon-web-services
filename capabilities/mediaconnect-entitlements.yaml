    namespace: mediaconnect-entitlements
    baseUri: ''
    description: Amazon Web Services mediaconnect — Entitlements business capability. Self-contained, no shared references.
    resources:
    - name: v1-entitlements
      path: /v1/entitlements
      operations:
      - name: amazonwebserviceslistentitlements
        method: GET
        description: Amazon Web Services Listentitlements
