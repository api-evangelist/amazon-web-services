      name: v1-entitlements
      description: REST surface for v1-entitlements.
      operations:
      - method: GET
        name: amazonwebserviceslistentitlements
        description: Amazon Web Services Listentitlements
        call: mediaconnect-entitlements.amazonwebserviceslistentitlements
