  - type: http
    namespace: batch-submitjob
    baseUri: ''
    description: Amazon Web Services batch — Submitjob business capability. Self-contained, no shared references.
    resources:
    - name: v1-submitjob
      path: /v1/submitjob
      operations:
      - name: amazonwebservicessubmitjob
        method: POST
        description: Amazon Web Services Submitjob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
