    resources:
    - path: /v1/v1/submitjob
      name: v1-submitjob
      description: REST surface for v1-submitjob.
      operations:
      - method: POST
        name: amazonwebservicessubmitjob
        description: Amazon Web Services Submitjob
        call: batch-submitjob.amazonwebservicessubmitjob
