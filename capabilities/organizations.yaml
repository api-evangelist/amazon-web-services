naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services organizations
  description: 'Amazon Web Services organizations. 1 operations. Lead operation: Amazon Web Services Updatepolicy. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services organizations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: organizations
    baseUri: ''
    description: Amazon Web Services organizations business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatepolicy
        method: POST
        description: Amazon Web Services Updatepolicy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: organizations-rest
    port: 8080
    description: REST adapter for Amazon Web Services organizations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatepolicy
        description: Amazon Web Services Updatepolicy
        call: organizations.amazonwebservicesupdatepolicy
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: organizations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services organizations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updatepolicy
      description: Amazon Web Services Updatepolicy
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: organizations.amazonwebservicesupdatepolicy
      outputParameters:
      - type: object
        mapping: $.
