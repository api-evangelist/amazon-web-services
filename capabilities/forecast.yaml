naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services forecast
  description: 'Amazon Web Services forecast. 1 operations. Lead operation: Amazon Web Services Updatedatasetgroup. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services forecast
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: forecast
    baseUri: ''
    description: Amazon Web Services forecast business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatedatasetgroup
        method: POST
        description: Amazon Web Services Updatedatasetgroup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: forecast-rest
    port: 8080
    description: REST adapter for Amazon Web Services forecast. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatedatasetgroup
        description: Amazon Web Services Updatedatasetgroup
        call: forecast.amazonwebservicesupdatedatasetgroup
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: forecast-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services forecast. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatedatasetgroup
      description: Amazon Web Services Updatedatasetgroup
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: forecast.amazonwebservicesupdatedatasetgroup
      outputParameters:
      - type: object
        mapping: $.
