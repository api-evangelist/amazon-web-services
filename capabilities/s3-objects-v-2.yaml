naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Objects V 2
  description: 'Amazon Web Services AWS S3 — Objects V 2. 1 operations. Lead operation: Amazon Web Services List Objects V
    2. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Objects V 2
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-objects-v-2
    baseUri: ''
    description: Amazon Web Services AWS S3 — Objects V 2 business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?list-type=2
      path: /{Bucket}?list-type=2
      operations:
      - name: listobjectsv2
        method: GET
        description: Amazon Web Services List Objects V 2
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-objects-v-2-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Objects V 2. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/bucket-list-type-2
      name: bucket-list-type-2
      description: REST surface for Bucket}?list-type=2.
      operations:
      - method: GET
        name: listobjectsv2
        description: Amazon Web Services List Objects V 2
        call: s3-objects-v-2.listobjectsv2
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-objects-v-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Objects V 2. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-list-objects
      description: Amazon Web Services List Objects V 2
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: s3-objects-v-2.listobjectsv2
      outputParameters:
      - type: object
        mapping: $.
