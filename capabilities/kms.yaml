naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services kms
  description: 'Amazon Web Services kms. 1 operations. Lead operation: Amazon Web Services Verifymac. Self-contained Naftiko
    capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services kms
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: kms
    baseUri: ''
    description: Amazon Web Services kms business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesverifymac
        method: POST
        description: Amazon Web Services Verifymac
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: kms-rest
    port: 8080
    description: REST adapter for Amazon Web Services kms. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesverifymac
        description: Amazon Web Services Verifymac
        call: kms.amazonwebservicesverifymac
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services kms. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-verifymac
      description: Amazon Web Services Verifymac
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: kms.amazonwebservicesverifymac
      outputParameters:
      - type: object
        mapping: $.
