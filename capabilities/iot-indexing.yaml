naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iot — Indexing
  description: 'Amazon Web Services iot — Indexing. 1 operations. Lead operation: Amazon Web Services Updateindexingconfiguration.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Indexing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iot-indexing
    baseUri: ''
    description: Amazon Web Services iot — Indexing business capability. Self-contained, no shared references.
    resources:
    - name: indexing-config
      path: /indexing/config
      operations:
      - name: amazonwebservicesupdateindexingconfiguration
        method: POST
        description: Amazon Web Services Updateindexingconfiguration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iot-indexing-rest
    port: 8080
    description: REST adapter for Amazon Web Services iot — Indexing. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/indexing/config
      name: indexing-config
      description: REST surface for indexing-config.
      operations:
      - method: POST
        name: amazonwebservicesupdateindexingconfiguration
        description: Amazon Web Services Updateindexingconfiguration
        call: iot-indexing.amazonwebservicesupdateindexingconfiguration
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iot-indexing-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iot — Indexing. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updateindexingconfiguration
      description: Amazon Web Services Updateindexingconfiguration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iot-indexing.amazonwebservicesupdateindexingconfiguration
      outputParameters:
      - type: object
        mapping: $.
