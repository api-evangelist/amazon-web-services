    namespace: cloudsearchdomain-2013-01-01
    baseUri: ''
    description: Amazon Web Services cloudsearchdomain — 2013 01 01 business capability. Self-contained, no shared references.
    resources:
    - name: 2013-01-01-documents-batch?format=sdk
      path: /2013-01-01/documents/batch?format=sdk
      operations:
      - name: amazonwebservicesuploaddocuments
        method: POST
        description: Amazon Web Services Uploaddocuments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: 2013-01-01-search?format=sdk&pretty=true
      path: /2013-01-01/search?format=sdk&pretty=true
      operations:
      - name: amazonwebservicessearch
        method: GET
        description: Amazon Web Services Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: 2013-01-01-suggest?format=sdk&pretty=true
      path: /2013-01-01/suggest?format=sdk&pretty=true
