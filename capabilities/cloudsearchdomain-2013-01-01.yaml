    description: REST adapter for Amazon Web Services cloudsearchdomain — 2013 01 01. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/2013-01-01/documents/batch-format-sdk
      name: 2013-01-01-documents-batch-format-sdk
      description: REST surface for 2013-01-01-documents-batch?format=sdk.
      operations:
      - method: POST
        name: amazonwebservicesuploaddocuments
        description: Amazon Web Services Uploaddocuments
        call: cloudsearchdomain-2013-01-01.amazonwebservicesuploaddocuments
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/2013-01-01/search-format-sdk-pretty-true
      name: 2013-01-01-search-format-sdk-pretty-true
      description: REST surface for 2013-01-01-search?format=sdk&pretty=true.
      operations:
      - method: GET
        name: amazonwebservicessearch
        description: Amazon Web Services Search
        call: cloudsearchdomain-2013-01-01.amazonwebservicessearch
