naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services cloudsearchdomain — 2013 01 01
  description: 'Amazon Web Services cloudsearchdomain — 2013 01 01. 3 operations. Lead operation: Amazon Web Services Uploaddocuments.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
