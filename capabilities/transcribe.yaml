naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services transcribe
  description: 'Amazon Web Services transcribe. 1 operations. Lead operation: Amazon Web Services Updatevocabularyfilter.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services transcribe
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: transcribe
    baseUri: ''
    description: Amazon Web Services transcribe business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatevocabularyfilter
        method: POST
        description: Amazon Web Services Updatevocabularyfilter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: transcribe-rest
    port: 8080
    description: REST adapter for Amazon Web Services transcribe. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatevocabularyfilter
        description: Amazon Web Services Updatevocabularyfilter
        call: transcribe.amazonwebservicesupdatevocabularyfilter
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transcribe-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services transcribe. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatevocabularyfilter
      description: Amazon Web Services Updatevocabularyfilter
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: transcribe.amazonwebservicesupdatevocabularyfilter
      outputParameters:
      - type: object
        mapping: $.
