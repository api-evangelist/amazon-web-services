naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services chime — Settings
  description: 'Amazon Web Services chime — Settings. 2 operations. Lead operation: Amazon Web Services Updateglobalsettings.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: chime-settings
    baseUri: ''
    description: Amazon Web Services chime — Settings business capability. Self-contained, no shared references.
    resources:
    - name: settings
      path: /settings
      operations:
      - name: amazonwebservicesupdateglobalsettings
        method: PUT
        description: Amazon Web Services Updateglobalsettings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: settings-phone-number
      path: /settings/phone-number
      operations:
      - name: amazonwebservicesupdatephonenumbersettings
        method: PUT
        description: Amazon Web Services Updatephonenumbersettings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: chime-settings-rest
    port: 8080
    description: REST adapter for Amazon Web Services chime — Settings. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/settings
      name: settings
      description: REST surface for settings.
      operations:
      - method: PUT
        name: amazonwebservicesupdateglobalsettings
        description: Amazon Web Services Updateglobalsettings
        call: chime-settings.amazonwebservicesupdateglobalsettings
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/settings/phone-number
      name: settings-phone-number
      description: REST surface for settings-phone-number.
      operations:
      - method: PUT
        name: amazonwebservicesupdatephonenumbersettings
        description: Amazon Web Services Updatephonenumbersettings
        call: chime-settings.amazonwebservicesupdatephonenumbersettings
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chime-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services chime — Settings. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updateglobalsettings
      description: Amazon Web Services Updateglobalsettings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: chime-settings.amazonwebservicesupdateglobalsettings
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updatephonenumbersettings
      description: Amazon Web Services Updatephonenumbersettings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: chime-settings.amazonwebservicesupdatephonenumbersettings
      outputParameters:
      - type: object
        mapping: $.
