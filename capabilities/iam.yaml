naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iam
  description: 'Amazon Web Services iam. 1 operations. Lead operation: Amazon Web Services Uploadsigningcertificate. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services iam
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iam
    baseUri: ''
    description: Amazon Web Services iam business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesuploadsigningcertificate
        method: POST
        description: Amazon Web Services Uploadsigningcertificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iam-rest
    port: 8080
    description: REST adapter for Amazon Web Services iam. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesuploadsigningcertificate
        description: Amazon Web Services Uploadsigningcertificate
        call: iam.amazonwebservicesuploadsigningcertificate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iam-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iam. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-uploadsigningcertificate
      description: Amazon Web Services Uploadsigningcertificate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iam.amazonwebservicesuploadsigningcertificate
      outputParameters:
      - type: object
        mapping: $.
