naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services license-manager
  description: 'Amazon Web Services license-manager. 1 operations. Lead operation: Amazon Web Services Updateservicesettings.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services license-manager
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: license-manager
    baseUri: ''
    description: Amazon Web Services license-manager business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateservicesettings
        method: POST
        description: Amazon Web Services Updateservicesettings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: license-manager-rest
    port: 8080
    description: REST adapter for Amazon Web Services license-manager. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateservicesettings
        description: Amazon Web Services Updateservicesettings
        call: license-manager.amazonwebservicesupdateservicesettings
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: license-manager-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services license-manager. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updateservicesettings
      description: Amazon Web Services Updateservicesettings
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: license-manager.amazonwebservicesupdateservicesettings
      outputParameters:
      - type: object
        mapping: $.
