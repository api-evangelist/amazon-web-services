naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Search Users
  description: 'Amazon Web Services connect — Search Users. 1 operations. Lead operation: Amazon Web Services Searchusers.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Search Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-search-users
    baseUri: ''
    description: Amazon Web Services connect — Search Users business capability. Self-contained, no shared references.
    resources:
    - name: search-users
      path: /search-users
      operations:
      - name: amazonwebservicessearchusers
        method: POST
        description: Amazon Web Services Searchusers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-search-users-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Search Users. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/search-users
      name: search-users
      description: REST surface for search-users.
      operations:
      - method: POST
        name: amazonwebservicessearchusers
        description: Amazon Web Services Searchusers
        call: connect-search-users.amazonwebservicessearchusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-search-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Search Users. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-searchusers
      description: Amazon Web Services Searchusers
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: connect-search-users.amazonwebservicessearchusers
      outputParameters:
      - type: object
        mapping: $.
