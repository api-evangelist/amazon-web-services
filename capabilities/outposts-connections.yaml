naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services outposts — Connections
  description: 'Amazon Web Services outposts — Connections. 2 operations. Lead operation: Amazon Web Services Startconnection.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Connections
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: outposts-connections
    baseUri: ''
    description: Amazon Web Services outposts — Connections business capability. Self-contained, no shared references.
    resources:
    - name: connections
      path: /connections
      operations:
      - name: amazonwebservicesstartconnection
        method: POST
        description: Amazon Web Services Startconnection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: connections-ConnectionId
      path: /connections/{ConnectionId}
      operations:
      - name: amazonwebservicesgetconnection
        method: GET
        description: Amazon Web Services Getconnection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: outposts-connections-rest
    port: 8080
    description: REST adapter for Amazon Web Services outposts — Connections. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/connections
      name: connections
      description: REST surface for connections.
      operations:
      - method: POST
        name: amazonwebservicesstartconnection
        description: Amazon Web Services Startconnection
        call: outposts-connections.amazonwebservicesstartconnection
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/connections/{connectionid}
      name: connections-connectionid
      description: REST surface for connections-ConnectionId.
      operations:
      - method: GET
        name: amazonwebservicesgetconnection
        description: Amazon Web Services Getconnection
        call: outposts-connections.amazonwebservicesgetconnection
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: outposts-connections-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services outposts — Connections. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-startconnection
      description: Amazon Web Services Startconnection
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: outposts-connections.amazonwebservicesstartconnection
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-getconnection
      description: Amazon Web Services Getconnection
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: outposts-connections.amazonwebservicesgetconnection
      outputParameters:
      - type: object
        mapping: $.
