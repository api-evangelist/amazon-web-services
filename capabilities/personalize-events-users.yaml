      name: users
      description: REST surface for users.
      operations:
      - method: POST
        name: amazonwebservicesputusers
        description: Amazon Web Services Putusers
        call: personalize-events-users.amazonwebservicesputusers
        outputParameters:
        - type: object
          mapping: $.
