    namespace: personalize-events-users
    baseUri: ''
    description: Amazon Web Services personalize-events — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: amazonwebservicesputusers
        method: POST
        description: Amazon Web Services Putusers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
