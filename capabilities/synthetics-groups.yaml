naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services synthetics — Groups
  description: 'Amazon Web Services synthetics — Groups. 1 operations. Lead operation: Amazon Web Services Listgroups. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: synthetics-groups
    baseUri: ''
    description: Amazon Web Services synthetics — Groups business capability. Self-contained, no shared references.
    resources:
    - name: groups
      path: /groups
      operations:
      - name: amazonwebserviceslistgroups
        method: POST
        description: Amazon Web Services Listgroups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: synthetics-groups-rest
    port: 8080
    description: REST adapter for Amazon Web Services synthetics — Groups. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/groups
      name: groups
      description: REST surface for groups.
      operations:
      - method: POST
        name: amazonwebserviceslistgroups
        description: Amazon Web Services Listgroups
        call: synthetics-groups.amazonwebserviceslistgroups
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: synthetics-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services synthetics — Groups. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listgroups
      description: Amazon Web Services Listgroups
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: synthetics-groups.amazonwebserviceslistgroups
      outputParameters:
      - type: object
        mapping: $.
