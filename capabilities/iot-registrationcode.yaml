naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iot — Registrationcode
  description: 'Amazon Web Services iot — Registrationcode. 1 operations. Lead operation: Amazon Web Services Getregistrationcode.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Registrationcode
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iot-registrationcode
    baseUri: ''
    description: Amazon Web Services iot — Registrationcode business capability. Self-contained, no shared references.
    resources:
    - name: registrationcode
      path: /registrationcode
      operations:
      - name: amazonwebservicesgetregistrationcode
        method: GET
        description: Amazon Web Services Getregistrationcode
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iot-registrationcode-rest
    port: 8080
    description: REST adapter for Amazon Web Services iot — Registrationcode. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/registrationcode
      name: registrationcode
      description: REST surface for registrationcode.
      operations:
      - method: GET
        name: amazonwebservicesgetregistrationcode
        description: Amazon Web Services Getregistrationcode
        call: iot-registrationcode.amazonwebservicesgetregistrationcode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iot-registrationcode-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iot — Registrationcode. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-getregistrationcode
      description: Amazon Web Services Getregistrationcode
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iot-registrationcode.amazonwebservicesgetregistrationcode
      outputParameters:
      - type: object
        mapping: $.
