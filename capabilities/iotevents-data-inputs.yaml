      name: inputs-messages
      description: REST surface for inputs-messages.
      operations:
      - method: POST
        name: amazonwebservicesbatchputmessage
        description: Amazon Web Services Batchputmessage
        call: iotevents-data-inputs.amazonwebservicesbatchputmessage
