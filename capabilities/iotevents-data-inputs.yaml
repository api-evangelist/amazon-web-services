    namespace: iotevents-data-inputs
    baseUri: ''
    description: Amazon Web Services iotevents-data — Inputs business capability. Self-contained, no shared references.
    resources:
    - name: inputs-messages
      path: /inputs/messages
      operations:
      - name: amazonwebservicesbatchputmessage
        method: POST
        description: Amazon Web Services Batchputmessage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
