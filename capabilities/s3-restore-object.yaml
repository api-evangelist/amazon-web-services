naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Restore Object.
  description: 'Amazon Web Services AWS S3 — Restore Object.. 1 operations. Lead operation: Amazon Web Services Restore Object.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Restore Object.
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-restore-object
    baseUri: ''
    description: Amazon Web Services AWS S3 — Restore Object. business capability. Self-contained, no shared references.
    resources:
    - name: Bucket-Key+}?restore
      path: /{Bucket}/{Key+}?restore
      operations:
      - name: restoreobject
        method: POST
        description: Amazon Web Services Restore Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-restore-object-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Restore Object.. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/{bucket}/key-restore
      name: bucket-key-restore
      description: REST surface for Bucket-Key+}?restore.
      operations:
      - method: POST
        name: restoreobject
        description: Amazon Web Services Restore Object
        call: s3-restore-object.restoreobject
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-restore-object-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Restore Object.. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-restore-object
      description: Amazon Web Services Restore Object
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: s3-restore-object.restoreobject
      outputParameters:
      - type: object
        mapping: $.
