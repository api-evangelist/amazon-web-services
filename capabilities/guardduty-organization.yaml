naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services guardduty — Organization
  description: 'Amazon Web Services guardduty — Organization. 1 operations. Lead operation: Amazon Web Services Getorganizationstatistics.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Organization
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: guardduty-organization
    baseUri: ''
    description: Amazon Web Services guardduty — Organization business capability. Self-contained, no shared references.
    resources:
    - name: organization-statistics
      path: /organization/statistics
      operations:
      - name: amazonwebservicesgetorganizationstatistics
        method: GET
        description: Amazon Web Services Getorganizationstatistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: guardduty-organization-rest
    port: 8080
    description: REST adapter for Amazon Web Services guardduty — Organization. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/organization/statistics
      name: organization-statistics
      description: REST surface for organization-statistics.
      operations:
      - method: GET
        name: amazonwebservicesgetorganizationstatistics
        description: Amazon Web Services Getorganizationstatistics
        call: guardduty-organization.amazonwebservicesgetorganizationstatistics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: guardduty-organization-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services guardduty — Organization. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-getorganizationstatistics
      description: Amazon Web Services Getorganizationstatistics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: guardduty-organization.amazonwebservicesgetorganizationstatistics
      outputParameters:
      - type: object
        mapping: $.
