naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services sdb
  description: 'Amazon Web Services sdb. 1 operations. Lead operation: Amazon Web Services Select. Self-contained Naftiko
    capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services sdb
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: sdb
    baseUri: ''
    description: Amazon Web Services sdb business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesselect
        method: POST
        description: Amazon Web Services Select
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: sdb-rest
    port: 8080
    description: REST adapter for Amazon Web Services sdb. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesselect
        description: Amazon Web Services Select
        call: sdb.amazonwebservicesselect
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sdb-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services sdb. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-select
      description: Amazon Web Services Select
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sdb.amazonwebservicesselect
      outputParameters:
      - type: object
        mapping: $.
