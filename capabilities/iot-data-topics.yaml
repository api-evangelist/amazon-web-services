naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iot-data — Topics
  description: 'Amazon Web Services iot-data — Topics. 1 operations. Lead operation: Amazon Web Services Publish. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Topics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iot-data-topics
    baseUri: ''
    description: Amazon Web Services iot-data — Topics business capability. Self-contained, no shared references.
    resources:
    - name: topics-topic
      path: /topics/{topic}
      operations:
      - name: amazonwebservicespublish
        method: POST
        description: Amazon Web Services Publish
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iot-data-topics-rest
    port: 8080
    description: REST adapter for Amazon Web Services iot-data — Topics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/topics/{topic}
      name: topics-topic
      description: REST surface for topics-topic.
      operations:
      - method: POST
        name: amazonwebservicespublish
        description: Amazon Web Services Publish
        call: iot-data-topics.amazonwebservicespublish
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iot-data-topics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iot-data — Topics. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-publish
      description: Amazon Web Services Publish
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iot-data-topics.amazonwebservicespublish
      outputParameters:
      - type: object
        mapping: $.
