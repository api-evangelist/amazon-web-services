naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services securityhub — Products
  description: 'Amazon Web Services securityhub — Products. 1 operations. Lead operation: Amazon Web Services Describeproducts.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: securityhub-products
    baseUri: ''
    description: Amazon Web Services securityhub — Products business capability. Self-contained, no shared references.
    resources:
    - name: products
      path: /products
      operations:
      - name: amazonwebservicesdescribeproducts
        method: GET
        description: Amazon Web Services Describeproducts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: securityhub-products-rest
    port: 8080
    description: REST adapter for Amazon Web Services securityhub — Products. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/products
      name: products
      description: REST surface for products.
      operations:
      - method: GET
        name: amazonwebservicesdescribeproducts
        description: Amazon Web Services Describeproducts
        call: securityhub-products.amazonwebservicesdescribeproducts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: securityhub-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services securityhub — Products. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-describeproducts
      description: Amazon Web Services Describeproducts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: securityhub-products.amazonwebservicesdescribeproducts
      outputParameters:
      - type: object
        mapping: $.
