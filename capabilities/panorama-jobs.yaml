naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services panorama — Jobs
  description: 'Amazon Web Services panorama — Jobs. 2 operations. Lead operation: Amazon Web Services Listdevicesjobs. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: panorama-jobs
    baseUri: ''
    description: Amazon Web Services panorama — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: amazonwebserviceslistdevicesjobs
        method: GET
        description: Amazon Web Services Listdevicesjobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jobs-JobId
      path: /jobs/{JobId}
      operations:
      - name: amazonwebservicesdescribedevicejob
        method: GET
        description: Amazon Web Services Describedevicejob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: panorama-jobs-rest
    port: 8080
    description: REST adapter for Amazon Web Services panorama — Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: GET
        name: amazonwebserviceslistdevicesjobs
        description: Amazon Web Services Listdevicesjobs
        call: panorama-jobs.amazonwebserviceslistdevicesjobs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{jobid}
      name: jobs-jobid
      description: REST surface for jobs-JobId.
      operations:
      - method: GET
        name: amazonwebservicesdescribedevicejob
        description: Amazon Web Services Describedevicejob
        call: panorama-jobs.amazonwebservicesdescribedevicejob
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: panorama-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services panorama — Jobs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listdevicesjobs
      description: Amazon Web Services Listdevicesjobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: panorama-jobs.amazonwebserviceslistdevicesjobs
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-describedevicejob
      description: Amazon Web Services Describedevicejob
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: panorama-jobs.amazonwebservicesdescribedevicejob
      outputParameters:
      - type: object
        mapping: $.
