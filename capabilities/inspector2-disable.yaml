naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services inspector2 — Disable
  description: 'Amazon Web Services inspector2 — Disable. 1 operations. Lead operation: Amazon Web Services Disable. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Disable
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: inspector2-disable
    baseUri: ''
    description: Amazon Web Services inspector2 — Disable business capability. Self-contained, no shared references.
    resources:
    - name: disable
      path: /disable
      operations:
      - name: amazonwebservicesdisable
        method: POST
        description: Amazon Web Services Disable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
