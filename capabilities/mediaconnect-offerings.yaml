naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services mediaconnect — Offerings
  description: 'Amazon Web Services mediaconnect — Offerings. 2 operations. Lead operation: Amazon Web Services Listofferings.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Offerings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: mediaconnect-offerings
    baseUri: ''
    description: Amazon Web Services mediaconnect — Offerings business capability. Self-contained, no shared references.
    resources:
    - name: v1-offerings
      path: /v1/offerings
      operations:
      - name: amazonwebserviceslistofferings
        method: GET
        description: Amazon Web Services Listofferings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-offerings-offeringArn
      path: /v1/offerings/{offeringArn}
      operations:
      - name: amazonwebservicespurchaseoffering
        method: POST
        description: Amazon Web Services Purchaseoffering
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mediaconnect-offerings-rest
    port: 8080
    description: REST adapter for Amazon Web Services mediaconnect — Offerings. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/offerings
      name: v1-offerings
      description: REST surface for v1-offerings.
      operations:
      - method: GET
        name: amazonwebserviceslistofferings
        description: Amazon Web Services Listofferings
        call: mediaconnect-offerings.amazonwebserviceslistofferings
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/offerings/{offeringarn}
      name: v1-offerings-offeringarn
      description: REST surface for v1-offerings-offeringArn.
      operations:
      - method: POST
        name: amazonwebservicespurchaseoffering
        description: Amazon Web Services Purchaseoffering
        call: mediaconnect-offerings.amazonwebservicespurchaseoffering
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mediaconnect-offerings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services mediaconnect — Offerings. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-listofferings
      description: Amazon Web Services Listofferings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mediaconnect-offerings.amazonwebserviceslistofferings
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-purchaseoffering
      description: Amazon Web Services Purchaseoffering
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mediaconnect-offerings.amazonwebservicespurchaseoffering
      outputParameters:
      - type: object
        mapping: $.
