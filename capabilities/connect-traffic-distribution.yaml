naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Traffic Distribution
  description: 'Amazon Web Services connect — Traffic Distribution. 1 operations. Lead operation: Amazon Web Services Updatetrafficdistribution.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Traffic Distribution
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-traffic-distribution
    baseUri: ''
    description: Amazon Web Services connect — Traffic Distribution business capability. Self-contained, no shared references.
    resources:
    - name: traffic-distribution-Id
      path: /traffic-distribution/{Id}
      operations:
      - name: amazonwebservicesupdatetrafficdistribution
        method: PUT
        description: Amazon Web Services Updatetrafficdistribution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-traffic-distribution-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Traffic Distribution. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/traffic-distribution/{id}
      name: traffic-distribution-id
      description: REST surface for traffic-distribution-Id.
      operations:
      - method: PUT
        name: amazonwebservicesupdatetrafficdistribution
        description: Amazon Web Services Updatetrafficdistribution
        call: connect-traffic-distribution.amazonwebservicesupdatetrafficdistribution
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-traffic-distribution-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Traffic Distribution. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-updatetrafficdistribution
      description: Amazon Web Services Updatetrafficdistribution
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: connect-traffic-distribution.amazonwebservicesupdatetrafficdistribution
      outputParameters:
      - type: object
        mapping: $.
