naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iot — Tags
  description: 'Amazon Web Services iot — Tags. 1 operations. Lead operation: Amazon Web Services Tagresource. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Tags
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iot-tags
    baseUri: ''
    description: Amazon Web Services iot — Tags business capability. Self-contained, no shared references.
    resources:
    - name: tags
      path: /tags
      operations:
      - name: amazonwebservicestagresource
        method: POST
        description: Amazon Web Services Tagresource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iot-tags-rest
    port: 8080
    description: REST adapter for Amazon Web Services iot — Tags. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tags
      name: tags
      description: REST surface for tags.
      operations:
      - method: POST
        name: amazonwebservicestagresource
        description: Amazon Web Services Tagresource
        call: iot-tags.amazonwebservicestagresource
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iot-tags-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iot — Tags. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-tagresource
      description: Amazon Web Services Tagresource
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iot-tags.amazonwebservicestagresource
      outputParameters:
      - type: object
        mapping: $.
