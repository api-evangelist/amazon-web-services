naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services appstream
  description: 'Amazon Web Services appstream. 1 operations. Lead operation: Amazon Web Services Updatestack. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services appstream
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: appstream
    baseUri: ''
    description: Amazon Web Services appstream business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatestack
        method: POST
        description: Amazon Web Services Updatestack
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: appstream-rest
    port: 8080
    description: REST adapter for Amazon Web Services appstream. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatestack
        description: Amazon Web Services Updatestack
        call: appstream.amazonwebservicesupdatestack
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appstream-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services appstream. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatestack
      description: Amazon Web Services Updatestack
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: appstream.amazonwebservicesupdatestack
      outputParameters:
      - type: object
        mapping: $.
