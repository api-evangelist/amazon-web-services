naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Search Queues
  description: 'Amazon Web Services connect — Search Queues. 1 operations. Lead operation: Amazon Web Services Searchqueues.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Search Queues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-search-queues
    baseUri: ''
    description: Amazon Web Services connect — Search Queues business capability. Self-contained, no shared references.
    resources:
    - name: search-queues
      path: /search-queues
      operations:
      - name: amazonwebservicessearchqueues
        method: POST
        description: Amazon Web Services Searchqueues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-search-queues-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Search Queues. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/search-queues
      name: search-queues
      description: REST surface for search-queues.
      operations:
      - method: POST
        name: amazonwebservicessearchqueues
        description: Amazon Web Services Searchqueues
        call: connect-search-queues.amazonwebservicessearchqueues
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-search-queues-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Search Queues. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-searchqueues
      description: Amazon Web Services Searchqueues
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: connect-search-queues.amazonwebservicessearchqueues
      outputParameters:
      - type: object
        mapping: $.
