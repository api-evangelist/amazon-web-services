naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Bucket Versioning
  description: 'Amazon Web Services AWS S3 — Bucket Versioning. 1 operations. Lead operation: Amazon Web Services Put Bucket
    Versioning. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Bucket Versioning
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-bucket-versioning
    baseUri: ''
    description: Amazon Web Services AWS S3 — Bucket Versioning business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?versioning
      path: /{Bucket}?versioning
      operations:
      - name: putbucketversioning
        method: PUT
        description: Amazon Web Services Put Bucket Versioning
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-bucket-versioning-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Bucket Versioning. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/bucket-versioning
      name: bucket-versioning
      description: REST surface for Bucket}?versioning.
      operations:
      - method: PUT
        name: putbucketversioning
        description: Amazon Web Services Put Bucket Versioning
        call: s3-bucket-versioning.putbucketversioning
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-bucket-versioning-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Bucket Versioning. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-put-bucket
      description: Amazon Web Services Put Bucket Versioning
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: s3-bucket-versioning.putbucketversioning
      outputParameters:
      - type: object
        mapping: $.
