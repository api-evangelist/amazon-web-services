naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iotthingsgraph
  description: 'Amazon Web Services iotthingsgraph. 1 operations. Lead operation: Amazon Web Services Uploadentitydefinitions.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services iotthingsgraph
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iotthingsgraph
    baseUri: ''
    description: Amazon Web Services iotthingsgraph business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesuploadentitydefinitions
        method: POST
        description: Amazon Web Services Uploadentitydefinitions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iotthingsgraph-rest
    port: 8080
    description: REST adapter for Amazon Web Services iotthingsgraph. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesuploadentitydefinitions
        description: Amazon Web Services Uploadentitydefinitions
        call: iotthingsgraph.amazonwebservicesuploadentitydefinitions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iotthingsgraph-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iotthingsgraph. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-uploadentitydefinitions
      description: Amazon Web Services Uploadentitydefinitions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iotthingsgraph.amazonwebservicesuploadentitydefinitions
      outputParameters:
      - type: object
        mapping: $.
