    description: Amazon Web Services neptunedata — Loader business capability. Self-contained, no shared references.
    resources:
    - name: loader
      path: /loader
      operations:
      - name: amazonwebservicesstartloaderjob
        method: POST
        description: Amazon Web Services Startloaderjob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: loader-loadId
      path: /loader/{loadId}
      operations:
      - name: amazonwebservicesgetloaderjobstatus
