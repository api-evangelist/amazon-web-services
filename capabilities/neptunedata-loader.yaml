    resources:
    - path: /v1/loader
      name: loader
      description: REST surface for loader.
      operations:
      - method: POST
        name: amazonwebservicesstartloaderjob
        description: Amazon Web Services Startloaderjob
        call: neptunedata-loader.amazonwebservicesstartloaderjob
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/loader/{loadid}
      name: loader-loadid
      description: REST surface for loader-loadId.
      operations:
      - method: GET
        name: amazonwebservicesgetloaderjobstatus
        description: Amazon Web Services Getloaderjobstatus
        call: neptunedata-loader.amazonwebservicesgetloaderjobstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
