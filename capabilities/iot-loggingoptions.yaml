naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iot — loggingOptions
  description: 'Amazon Web Services iot — loggingOptions. 1 operations. Lead operation: Amazon Web Services Setloggingoptions.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - loggingOptions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iot-loggingoptions
    baseUri: ''
    description: Amazon Web Services iot — loggingOptions business capability. Self-contained, no shared references.
    resources:
    - name: loggingOptions
      path: /loggingOptions
      operations:
      - name: amazonwebservicessetloggingoptions
        method: POST
        description: Amazon Web Services Setloggingoptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iot-loggingoptions-rest
    port: 8080
    description: REST adapter for Amazon Web Services iot — loggingOptions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/loggingoptions
      name: loggingoptions
      description: REST surface for loggingOptions.
      operations:
      - method: POST
        name: amazonwebservicessetloggingoptions
        description: Amazon Web Services Setloggingoptions
        call: iot-loggingoptions.amazonwebservicessetloggingoptions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iot-loggingoptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iot — loggingOptions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-setloggingoptions
      description: Amazon Web Services Setloggingoptions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iot-loggingoptions.amazonwebservicessetloggingoptions
      outputParameters:
      - type: object
        mapping: $.
