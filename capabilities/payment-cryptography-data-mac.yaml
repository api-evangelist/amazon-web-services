naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services payment-cryptography-data — Mac
  description: 'Amazon Web Services payment-cryptography-data — Mac. 2 operations. Lead operation: Amazon Web Services Generatemac.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Mac
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: payment-cryptography-data-mac
    baseUri: ''
    description: Amazon Web Services payment-cryptography-data — Mac business capability. Self-contained, no shared references.
    resources:
    - name: mac-generate
      path: /mac/generate
      operations:
      - name: amazonwebservicesgeneratemac
        method: POST
        description: Amazon Web Services Generatemac
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mac-verify
      path: /mac/verify
      operations:
      - name: amazonwebservicesverifymac
        method: POST
        description: Amazon Web Services Verifymac
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: payment-cryptography-data-mac-rest
    port: 8080
    description: REST adapter for Amazon Web Services payment-cryptography-data — Mac. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/mac/generate
      name: mac-generate
      description: REST surface for mac-generate.
      operations:
      - method: POST
        name: amazonwebservicesgeneratemac
        description: Amazon Web Services Generatemac
        call: payment-cryptography-data-mac.amazonwebservicesgeneratemac
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mac/verify
      name: mac-verify
      description: REST surface for mac-verify.
      operations:
      - method: POST
        name: amazonwebservicesverifymac
        description: Amazon Web Services Verifymac
        call: payment-cryptography-data-mac.amazonwebservicesverifymac
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payment-cryptography-data-mac-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services payment-cryptography-data — Mac. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-generatemac
      description: Amazon Web Services Generatemac
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payment-cryptography-data-mac.amazonwebservicesgeneratemac
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-verifymac
      description: Amazon Web Services Verifymac
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payment-cryptography-data-mac.amazonwebservicesverifymac
      outputParameters:
      - type: object
        mapping: $.
