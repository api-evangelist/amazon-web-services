naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Object ACL
  description: 'Amazon Web Services AWS S3 — Object ACL. 1 operations. Lead operation: Amazon Web Services Put Object ACL.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Object ACL
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-object-acl
    baseUri: ''
    description: Amazon Web Services AWS S3 — Object ACL business capability. Self-contained, no shared references.
    resources:
    - name: Bucket-Key+}?acl
      path: /{Bucket}/{Key+}?acl
      operations:
      - name: putobjectacl
        method: PUT
        description: Amazon Web Services Put Object ACL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-object-acl-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Object ACL. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{bucket}/key-acl
      name: bucket-key-acl
      description: REST surface for Bucket-Key+}?acl.
      operations:
      - method: PUT
        name: putobjectacl
        description: Amazon Web Services Put Object ACL
        call: s3-object-acl.putobjectacl
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-object-acl-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Object ACL. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-put-object
      description: Amazon Web Services Put Object ACL
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: s3-object-acl.putobjectacl
      outputParameters:
      - type: object
        mapping: $.
