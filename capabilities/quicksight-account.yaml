naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services quicksight — Account
  description: 'Amazon Web Services quicksight — Account. 1 operations. Lead operation: Amazon Web Services Describeaccountsubscription.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: quicksight-account
    baseUri: ''
    description: Amazon Web Services quicksight — Account business capability. Self-contained, no shared references.
    resources:
    - name: account-AwsAccountId
      path: /account/{AwsAccountId}
      operations:
      - name: amazonwebservicesdescribeaccountsubscription
        method: GET
        description: Amazon Web Services Describeaccountsubscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: quicksight-account-rest
    port: 8080
    description: REST adapter for Amazon Web Services quicksight — Account. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/account/{awsaccountid}
      name: account-awsaccountid
      description: REST surface for account-AwsAccountId.
      operations:
      - method: GET
        name: amazonwebservicesdescribeaccountsubscription
        description: Amazon Web Services Describeaccountsubscription
        call: quicksight-account.amazonwebservicesdescribeaccountsubscription
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: quicksight-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services quicksight — Account. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-describeaccountsubscription
      description: Amazon Web Services Describeaccountsubscription
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: quicksight-account.amazonwebservicesdescribeaccountsubscription
      outputParameters:
      - type: object
        mapping: $.
