naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iotwireless — Positions
  description: 'Amazon Web Services iotwireless — Positions. 1 operations. Lead operation: Amazon Web Services Updateposition.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Positions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iotwireless-positions
    baseUri: ''
    description: Amazon Web Services iotwireless — Positions business capability. Self-contained, no shared references.
    resources:
    - name: positions-ResourceIdentifier
      path: /positions/{ResourceIdentifier}
      operations:
      - name: amazonwebservicesupdateposition
        method: PATCH
        description: Amazon Web Services Updateposition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iotwireless-positions-rest
    port: 8080
    description: REST adapter for Amazon Web Services iotwireless — Positions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/positions/{resourceidentifier}
      name: positions-resourceidentifier
      description: REST surface for positions-ResourceIdentifier.
      operations:
      - method: PATCH
        name: amazonwebservicesupdateposition
        description: Amazon Web Services Updateposition
        call: iotwireless-positions.amazonwebservicesupdateposition
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iotwireless-positions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iotwireless — Positions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-updateposition
      description: Amazon Web Services Updateposition
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: iotwireless-positions.amazonwebservicesupdateposition
      outputParameters:
      - type: object
        mapping: $.
