    namespace: signer-signing-platforms
    baseUri: ''
    description: Amazon Web Services signer — Signing Platforms business capability. Self-contained, no shared references.
    resources:
    - name: signing-platforms
      path: /signing-platforms
      operations:
      - name: amazonwebserviceslistsigningplatforms
        method: GET
        description: Amazon Web Services Listsigningplatforms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: signing-platforms-platformId
      path: /signing-platforms/{platformId}
      operations:
      - name: amazonwebservicesgetsigningplatform
        method: GET
        description: Amazon Web Services Getsigningplatform
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
