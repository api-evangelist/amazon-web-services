    namespace: signer-signing-platforms-rest
    port: 8080
    description: REST adapter for Amazon Web Services signer — Signing Platforms. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/signing-platforms
      name: signing-platforms
      description: REST surface for signing-platforms.
      operations:
      - method: GET
        name: amazonwebserviceslistsigningplatforms
        description: Amazon Web Services Listsigningplatforms
        call: signer-signing-platforms.amazonwebserviceslistsigningplatforms
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/signing-platforms/{platformid}
      name: signing-platforms-platformid
      description: REST surface for signing-platforms-platformId.
      operations:
      - method: GET
        name: amazonwebservicesgetsigningplatform
        description: Amazon Web Services Getsigningplatform
        call: signer-signing-platforms.amazonwebservicesgetsigningplatform
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: signer-signing-platforms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services signer — Signing Platforms. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-listsigningplatforms
      description: Amazon Web Services Listsigningplatforms
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: signer-signing-platforms.amazonwebserviceslistsigningplatforms
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-getsigningplatform
      description: Amazon Web Services Getsigningplatform
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: signer-signing-platforms.amazonwebservicesgetsigningplatform
      outputParameters:
      - type: object
        mapping: $.
