naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services signer — Signing Platforms
  description: 'Amazon Web Services signer — Signing Platforms. 2 operations. Lead operation: Amazon Web Services Listsigningplatforms.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
