naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services controltower — Disable Control
  description: 'Amazon Web Services controltower — Disable Control. 1 operations. Lead operation: Amazon Web Services Disablecontrol.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Disable Control
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: controltower-disable-control
    baseUri: ''
    description: Amazon Web Services controltower — Disable Control business capability. Self-contained, no shared references.
    resources:
    - name: disable-control
      path: /disable-control
      operations:
      - name: amazonwebservicesdisablecontrol
        method: POST
        description: Amazon Web Services Disablecontrol
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: controltower-disable-control-rest
    port: 8080
    description: REST adapter for Amazon Web Services controltower — Disable Control. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/disable-control
      name: disable-control
      description: REST surface for disable-control.
      operations:
      - method: POST
        name: amazonwebservicesdisablecontrol
        description: Amazon Web Services Disablecontrol
        call: controltower-disable-control.amazonwebservicesdisablecontrol
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: controltower-disable-control-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services controltower — Disable Control. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-disablecontrol
      description: Amazon Web Services Disablecontrol
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: controltower-disable-control.amazonwebservicesdisablecontrol
      outputParameters:
      - type: object
        mapping: $.
