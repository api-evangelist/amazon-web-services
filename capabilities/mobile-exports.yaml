naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services mobile — Exports
  description: 'Amazon Web Services mobile — Exports. 1 operations. Lead operation: Amazon Web Services Exportproject. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Exports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: mobile-exports
    baseUri: ''
    description: Amazon Web Services mobile — Exports business capability. Self-contained, no shared references.
    resources:
    - name: exports-projectId
      path: /exports/{projectId}
      operations:
      - name: amazonwebservicesexportproject
        method: POST
        description: Amazon Web Services Exportproject
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mobile-exports-rest
    port: 8080
    description: REST adapter for Amazon Web Services mobile — Exports. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/exports/{projectid}
      name: exports-projectid
      description: REST surface for exports-projectId.
      operations:
      - method: POST
        name: amazonwebservicesexportproject
        description: Amazon Web Services Exportproject
        call: mobile-exports.amazonwebservicesexportproject
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mobile-exports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services mobile — Exports. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-exportproject
      description: Amazon Web Services Exportproject
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mobile-exports.amazonwebservicesexportproject
      outputParameters:
      - type: object
        mapping: $.
