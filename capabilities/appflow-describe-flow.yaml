naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services appflow — Describe Flow
  description: 'Amazon Web Services appflow — Describe Flow. 1 operations. Lead operation: Amazon Web Services Describeflow.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Describe Flow
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: appflow-describe-flow
    baseUri: ''
    description: Amazon Web Services appflow — Describe Flow business capability. Self-contained, no shared references.
    resources:
    - name: describe-flow
      path: /describe-flow
      operations:
      - name: amazonwebservicesdescribeflow
        method: POST
        description: Amazon Web Services Describeflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: appflow-describe-flow-rest
    port: 8080
    description: REST adapter for Amazon Web Services appflow — Describe Flow. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/describe-flow
      name: describe-flow
      description: REST surface for describe-flow.
      operations:
      - method: POST
        name: amazonwebservicesdescribeflow
        description: Amazon Web Services Describeflow
        call: appflow-describe-flow.amazonwebservicesdescribeflow
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appflow-describe-flow-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services appflow — Describe Flow. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-describeflow
      description: Amazon Web Services Describeflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: appflow-describe-flow.amazonwebservicesdescribeflow
      outputParameters:
      - type: object
        mapping: $.
