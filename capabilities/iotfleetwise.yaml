naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iotfleetwise
  description: 'Amazon Web Services iotfleetwise. 1 operations. Lead operation: Amazon Web Services Updatevehicle. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services iotfleetwise
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iotfleetwise
    baseUri: ''
    description: Amazon Web Services iotfleetwise business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatevehicle
        method: POST
        description: Amazon Web Services Updatevehicle
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iotfleetwise-rest
    port: 8080
    description: REST adapter for Amazon Web Services iotfleetwise. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatevehicle
        description: Amazon Web Services Updatevehicle
        call: iotfleetwise.amazonwebservicesupdatevehicle
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iotfleetwise-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iotfleetwise. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updatevehicle
      description: Amazon Web Services Updatevehicle
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iotfleetwise.amazonwebservicesupdatevehicle
      outputParameters:
      - type: object
        mapping: $.
