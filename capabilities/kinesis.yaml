naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services kinesis
  description: 'Amazon Web Services kinesis. 1 operations. Lead operation: Amazon Web Services Updatestreammode. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services kinesis
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: kinesis
    baseUri: ''
    description: Amazon Web Services kinesis business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatestreammode
        method: POST
        description: Amazon Web Services Updatestreammode
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: kinesis-rest
    port: 8080
    description: REST adapter for Amazon Web Services kinesis. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatestreammode
        description: Amazon Web Services Updatestreammode
        call: kinesis.amazonwebservicesupdatestreammode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kinesis-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services kinesis. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatestreammode
      description: Amazon Web Services Updatestreammode
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: kinesis.amazonwebservicesupdatestreammode
      outputParameters:
      - type: object
        mapping: $.
