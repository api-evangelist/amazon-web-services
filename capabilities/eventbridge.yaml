naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services eventbridge
  description: 'Amazon Web Services eventbridge. 1 operations. Lead operation: Amazon Web Services Updateendpoint. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services eventbridge
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: eventbridge
    baseUri: ''
    description: Amazon Web Services eventbridge business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateendpoint
        method: POST
        description: Amazon Web Services Updateendpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: eventbridge-rest
    port: 8080
    description: REST adapter for Amazon Web Services eventbridge. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateendpoint
        description: Amazon Web Services Updateendpoint
        call: eventbridge.amazonwebservicesupdateendpoint
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: eventbridge-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services eventbridge. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updateendpoint
      description: Amazon Web Services Updateendpoint
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: eventbridge.amazonwebservicesupdateendpoint
      outputParameters:
      - type: object
        mapping: $.
