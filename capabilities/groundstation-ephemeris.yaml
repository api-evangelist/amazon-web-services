naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services groundstation — Ephemeris
  description: 'Amazon Web Services groundstation — Ephemeris. 2 operations. Lead operation: Amazon Web Services Createephemeris.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Ephemeris
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: groundstation-ephemeris
    baseUri: ''
    description: Amazon Web Services groundstation — Ephemeris business capability. Self-contained, no shared references.
    resources:
    - name: ephemeris
      path: /ephemeris
      operations:
      - name: amazonwebservicescreateephemeris
        method: POST
        description: Amazon Web Services Createephemeris
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ephemeris-ephemerisId
      path: /ephemeris/{ephemerisId}
      operations:
      - name: amazonwebservicesupdateephemeris
        method: PUT
        description: Amazon Web Services Updateephemeris
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: groundstation-ephemeris-rest
    port: 8080
    description: REST adapter for Amazon Web Services groundstation — Ephemeris. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/ephemeris
      name: ephemeris
      description: REST surface for ephemeris.
      operations:
      - method: POST
        name: amazonwebservicescreateephemeris
        description: Amazon Web Services Createephemeris
        call: groundstation-ephemeris.amazonwebservicescreateephemeris
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ephemeris/{ephemerisid}
      name: ephemeris-ephemerisid
      description: REST surface for ephemeris-ephemerisId.
      operations:
      - method: PUT
        name: amazonwebservicesupdateephemeris
        description: Amazon Web Services Updateephemeris
        call: groundstation-ephemeris.amazonwebservicesupdateephemeris
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: groundstation-ephemeris-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services groundstation — Ephemeris. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-createephemeris
      description: Amazon Web Services Createephemeris
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: groundstation-ephemeris.amazonwebservicescreateephemeris
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updateephemeris
      description: Amazon Web Services Updateephemeris
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: groundstation-ephemeris.amazonwebservicesupdateephemeris
      outputParameters:
      - type: object
        mapping: $.
