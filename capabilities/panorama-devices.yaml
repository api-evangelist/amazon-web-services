naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services panorama — Devices
  description: 'Amazon Web Services panorama — Devices. 2 operations. Lead operation: Amazon Web Services Provisiondevice.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Devices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: panorama-devices
    baseUri: ''
    description: Amazon Web Services panorama — Devices business capability. Self-contained, no shared references.
    resources:
    - name: devices
      path: /devices
      operations:
      - name: amazonwebservicesprovisiondevice
        method: POST
        description: Amazon Web Services Provisiondevice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: devices-DeviceId
      path: /devices/{DeviceId}
      operations:
      - name: amazonwebservicesupdatedevicemetadata
        method: PUT
        description: Amazon Web Services Updatedevicemetadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: panorama-devices-rest
    port: 8080
    description: REST adapter for Amazon Web Services panorama — Devices. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/devices
      name: devices
      description: REST surface for devices.
      operations:
      - method: POST
        name: amazonwebservicesprovisiondevice
        description: Amazon Web Services Provisiondevice
        call: panorama-devices.amazonwebservicesprovisiondevice
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/devices/{deviceid}
      name: devices-deviceid
      description: REST surface for devices-DeviceId.
      operations:
      - method: PUT
        name: amazonwebservicesupdatedevicemetadata
        description: Amazon Web Services Updatedevicemetadata
        call: panorama-devices.amazonwebservicesupdatedevicemetadata
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: panorama-devices-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services panorama — Devices. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-provisiondevice
      description: Amazon Web Services Provisiondevice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: panorama-devices.amazonwebservicesprovisiondevice
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updatedevicemetadata
      description: Amazon Web Services Updatedevicemetadata
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: panorama-devices.amazonwebservicesupdatedevicemetadata
      outputParameters:
      - type: object
        mapping: $.
