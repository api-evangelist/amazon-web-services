naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services mediastore-data
  description: 'Amazon Web Services mediastore-data. 2 operations. Lead operation: Amazon Web Services Listitems. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services mediastore-data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: mediastore-data
    baseUri: ''
    description: Amazon Web Services mediastore-data business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebserviceslistitems
        method: GET
        description: Amazon Web Services Listitems
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: Path+
      path: /{Path+}
      operations:
      - name: amazonwebservicesputobject
        method: PUT
        description: Amazon Web Services Putobject
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mediastore-data-rest
    port: 8080
    description: REST adapter for Amazon Web Services mediastore-data. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: GET
        name: amazonwebserviceslistitems
        description: Amazon Web Services Listitems
        call: mediastore-data.amazonwebserviceslistitems
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{path}
      name: path
      description: REST surface for Path+.
      operations:
      - method: PUT
        name: amazonwebservicesputobject
        description: Amazon Web Services Putobject
        call: mediastore-data.amazonwebservicesputobject
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mediastore-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services mediastore-data. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listitems
      description: Amazon Web Services Listitems
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mediastore-data.amazonwebserviceslistitems
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-putobject
      description: Amazon Web Services Putobject
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: mediastore-data.amazonwebservicesputobject
      outputParameters:
      - type: object
        mapping: $.
