naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services apigatewayv2
  description: 'Amazon Web Services apigatewayv2. 2 operations. Lead operation: Amazon Web Services Importapi. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: apigatewayv2-general
    baseUri: ''
    description: Amazon Web Services apigatewayv2 business capability. Self-contained, no shared references.
    resources:
    - name: v2-apis
      path: /v2/apis
      operations:
      - name: amazonwebservicesimportapi
        method: PUT
        description: Amazon Web Services Importapi
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-apis-apiId
      path: /v2/apis/{apiId}
      operations:
      - name: amazonwebservicesupdateapi
        method: PATCH
        description: Amazon Web Services Updateapi
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: apigatewayv2-general-rest
    port: 8080
    description: REST adapter for Amazon Web Services apigatewayv2. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/apis
      name: v2-apis
      description: REST surface for v2-apis.
      operations:
      - method: PUT
        name: amazonwebservicesimportapi
        description: Amazon Web Services Importapi
        call: apigatewayv2-general.amazonwebservicesimportapi
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/apis/{apiid}
      name: v2-apis-apiid
      description: REST surface for v2-apis-apiId.
      operations:
      - method: PATCH
        name: amazonwebservicesupdateapi
        description: Amazon Web Services Updateapi
        call: apigatewayv2-general.amazonwebservicesupdateapi
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apigatewayv2-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services apigatewayv2. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-importapi
      description: Amazon Web Services Importapi
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: apigatewayv2-general.amazonwebservicesimportapi
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updateapi
      description: Amazon Web Services Updateapi
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: apigatewayv2-general.amazonwebservicesupdateapi
      outputParameters:
      - type: object
        mapping: $.
