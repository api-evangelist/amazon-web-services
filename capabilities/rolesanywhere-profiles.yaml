naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services rolesanywhere — Profiles
  description: 'Amazon Web Services rolesanywhere — Profiles. 1 operations. Lead operation: Amazon Web Services Listprofiles.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Profiles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: rolesanywhere-profiles
    baseUri: ''
    description: Amazon Web Services rolesanywhere — Profiles business capability. Self-contained, no shared references.
    resources:
    - name: profiles
      path: /profiles
      operations:
      - name: amazonwebserviceslistprofiles
        method: GET
        description: Amazon Web Services Listprofiles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: rolesanywhere-profiles-rest
    port: 8080
    description: REST adapter for Amazon Web Services rolesanywhere — Profiles. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/profiles
      name: profiles
      description: REST surface for profiles.
      operations:
      - method: GET
        name: amazonwebserviceslistprofiles
        description: Amazon Web Services Listprofiles
        call: rolesanywhere-profiles.amazonwebserviceslistprofiles
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rolesanywhere-profiles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services rolesanywhere — Profiles. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-listprofiles
      description: Amazon Web Services Listprofiles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rolesanywhere-profiles.amazonwebserviceslistprofiles
      outputParameters:
      - type: object
        mapping: $.
