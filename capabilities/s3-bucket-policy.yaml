naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Bucket Policy
  description: 'Amazon Web Services AWS S3 — Bucket Policy. 1 operations. Lead operation: Amazon Web Services Put Bucket Policy.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Bucket Policy
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-bucket-policy
    baseUri: ''
    description: Amazon Web Services AWS S3 — Bucket Policy business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?policy
      path: /{Bucket}?policy
      operations:
      - name: putbucketpolicy
        method: PUT
        description: Amazon Web Services Put Bucket Policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-bucket-policy-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Bucket Policy. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/bucket-policy
      name: bucket-policy
      description: REST surface for Bucket}?policy.
      operations:
      - method: PUT
        name: putbucketpolicy
        description: Amazon Web Services Put Bucket Policy
        call: s3-bucket-policy.putbucketpolicy
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-bucket-policy-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Bucket Policy. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-put-bucket
      description: Amazon Web Services Put Bucket Policy
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: s3-bucket-policy.putbucketpolicy
      outputParameters:
      - type: object
        mapping: $.
