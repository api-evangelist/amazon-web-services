naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services wafv2
  description: 'Amazon Web Services wafv2. 1 operations. Lead operation: Amazon Web Services Updatewebacl. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services wafv2
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: wafv2
    baseUri: ''
    description: Amazon Web Services wafv2 business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatewebacl
        method: POST
        description: Amazon Web Services Updatewebacl
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: wafv2-rest
    port: 8080
    description: REST adapter for Amazon Web Services wafv2. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatewebacl
        description: Amazon Web Services Updatewebacl
        call: wafv2.amazonwebservicesupdatewebacl
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wafv2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services wafv2. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updatewebacl
      description: Amazon Web Services Updatewebacl
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wafv2.amazonwebservicesupdatewebacl
      outputParameters:
      - type: object
        mapping: $.
