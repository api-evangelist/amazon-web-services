naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services groundstation — Contact
  description: 'Amazon Web Services groundstation — Contact. 2 operations. Lead operation: Amazon Web Services Reservecontact.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Contact
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: groundstation-contact
    baseUri: ''
    description: Amazon Web Services groundstation — Contact business capability. Self-contained, no shared references.
    resources:
    - name: contact
      path: /contact
      operations:
      - name: amazonwebservicesreservecontact
        method: POST
        description: Amazon Web Services Reservecontact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: contact-contactId
      path: /contact/{contactId}
      operations:
      - name: amazonwebservicesdescribecontact
        method: GET
        description: Amazon Web Services Describecontact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: groundstation-contact-rest
    port: 8080
    description: REST adapter for Amazon Web Services groundstation — Contact. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/contact
      name: contact
      description: REST surface for contact.
      operations:
      - method: POST
        name: amazonwebservicesreservecontact
        description: Amazon Web Services Reservecontact
        call: groundstation-contact.amazonwebservicesreservecontact
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/contact/{contactid}
      name: contact-contactid
      description: REST surface for contact-contactId.
      operations:
      - method: GET
        name: amazonwebservicesdescribecontact
        description: Amazon Web Services Describecontact
        call: groundstation-contact.amazonwebservicesdescribecontact
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: groundstation-contact-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services groundstation — Contact. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-reservecontact
      description: Amazon Web Services Reservecontact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: groundstation-contact.amazonwebservicesreservecontact
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-describecontact
      description: Amazon Web Services Describecontact
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: groundstation-contact.amazonwebservicesdescribecontact
      outputParameters:
      - type: object
        mapping: $.
