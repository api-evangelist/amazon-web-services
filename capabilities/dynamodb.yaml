naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services dynamodb
  description: 'Amazon Web Services dynamodb. 1 operations. Lead operation: Amazon Web Services Updatetimetolive. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services dynamodb
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: dynamodb
    baseUri: ''
    description: Amazon Web Services dynamodb business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatetimetolive
        method: POST
        description: Amazon Web Services Updatetimetolive
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: dynamodb-rest
    port: 8080
    description: REST adapter for Amazon Web Services dynamodb. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatetimetolive
        description: Amazon Web Services Updatetimetolive
        call: dynamodb.amazonwebservicesupdatetimetolive
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dynamodb-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services dynamodb. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatetimetolive
      description: Amazon Web Services Updatetimetolive
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dynamodb.amazonwebservicesupdatetimetolive
      outputParameters:
      - type: object
        mapping: $.
