naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services cost-optimization-hub
  description: 'Amazon Web Services cost-optimization-hub. 1 operations. Lead operation: Amazon Web Services Updatepreferences.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services cost-optimization-hub
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: cost-optimization-hub
    baseUri: ''
    description: Amazon Web Services cost-optimization-hub business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatepreferences
        method: POST
        description: Amazon Web Services Updatepreferences
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: cost-optimization-hub-rest
    port: 8080
    description: REST adapter for Amazon Web Services cost-optimization-hub. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatepreferences
        description: Amazon Web Services Updatepreferences
        call: cost-optimization-hub.amazonwebservicesupdatepreferences
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cost-optimization-hub-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services cost-optimization-hub. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-updatepreferences
      description: Amazon Web Services Updatepreferences
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cost-optimization-hub.amazonwebservicesupdatepreferences
      outputParameters:
      - type: object
        mapping: $.
