naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services xray — Traces
  description: 'Amazon Web Services xray — Traces. 1 operations. Lead operation: Amazon Web Services Batchgettraces. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Traces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: xray-traces
    baseUri: ''
    description: Amazon Web Services xray — Traces business capability. Self-contained, no shared references.
    resources:
    - name: Traces
      path: /Traces
      operations:
      - name: amazonwebservicesbatchgettraces
        method: POST
        description: Amazon Web Services Batchgettraces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: xray-traces-rest
    port: 8080
    description: REST adapter for Amazon Web Services xray — Traces. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/traces
      name: traces
      description: REST surface for Traces.
      operations:
      - method: POST
        name: amazonwebservicesbatchgettraces
        description: Amazon Web Services Batchgettraces
        call: xray-traces.amazonwebservicesbatchgettraces
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: xray-traces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services xray — Traces. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-batchgettraces
      description: Amazon Web Services Batchgettraces
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: xray-traces.amazonwebservicesbatchgettraces
      outputParameters:
      - type: object
        mapping: $.
