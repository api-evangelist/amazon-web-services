naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services xray — Groups
  description: 'Amazon Web Services xray — Groups. 1 operations. Lead operation: Amazon Web Services Getgroups. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: xray-groups
    baseUri: ''
    description: Amazon Web Services xray — Groups business capability. Self-contained, no shared references.
    resources:
    - name: Groups
      path: /Groups
      operations:
      - name: amazonwebservicesgetgroups
        method: POST
        description: Amazon Web Services Getgroups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: xray-groups-rest
    port: 8080
    description: REST adapter for Amazon Web Services xray — Groups. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/groups
      name: groups
      description: REST surface for Groups.
      operations:
      - method: POST
        name: amazonwebservicesgetgroups
        description: Amazon Web Services Getgroups
        call: xray-groups.amazonwebservicesgetgroups
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: xray-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services xray — Groups. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-getgroups
      description: Amazon Web Services Getgroups
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: xray-groups.amazonwebservicesgetgroups
      outputParameters:
      - type: object
        mapping: $.
