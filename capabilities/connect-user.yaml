naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — User
  description: 'Amazon Web Services connect — User. 1 operations. Lead operation: Amazon Web Services Getfederationtoken.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - User
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-user
    baseUri: ''
    description: Amazon Web Services connect — User business capability. Self-contained, no shared references.
    resources:
    - name: user-federate-InstanceId
      path: /user/federate/{InstanceId}
      operations:
      - name: amazonwebservicesgetfederationtoken
        method: GET
        description: Amazon Web Services Getfederationtoken
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-user-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — User. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/user/federate/{instanceid}
      name: user-federate-instanceid
      description: REST surface for user-federate-InstanceId.
      operations:
      - method: GET
        name: amazonwebservicesgetfederationtoken
        description: Amazon Web Services Getfederationtoken
        call: connect-user.amazonwebservicesgetfederationtoken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-user-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — User. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-getfederationtoken
      description: Amazon Web Services Getfederationtoken
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-user.amazonwebservicesgetfederationtoken
      outputParameters:
      - type: object
        mapping: $.
