naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services auditmanager — Settings
  description: 'Amazon Web Services auditmanager — Settings. 2 operations. Lead operation: Amazon Web Services Updatesettings.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: auditmanager-settings
    baseUri: ''
    description: Amazon Web Services auditmanager — Settings business capability. Self-contained, no shared references.
    resources:
    - name: settings
      path: /settings
      operations:
      - name: amazonwebservicesupdatesettings
        method: PUT
        description: Amazon Web Services Updatesettings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: settings-attribute
      path: /settings/{attribute}
      operations:
      - name: amazonwebservicesgetsettings
        method: GET
        description: Amazon Web Services Getsettings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: auditmanager-settings-rest
    port: 8080
    description: REST adapter for Amazon Web Services auditmanager — Settings. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/settings
      name: settings
      description: REST surface for settings.
      operations:
      - method: PUT
        name: amazonwebservicesupdatesettings
        description: Amazon Web Services Updatesettings
        call: auditmanager-settings.amazonwebservicesupdatesettings
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/settings/{attribute}
      name: settings-attribute
      description: REST surface for settings-attribute.
      operations:
      - method: GET
        name: amazonwebservicesgetsettings
        description: Amazon Web Services Getsettings
        call: auditmanager-settings.amazonwebservicesgetsettings
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: auditmanager-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services auditmanager — Settings. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-updatesettings
      description: Amazon Web Services Updatesettings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: auditmanager-settings.amazonwebservicesupdatesettings
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-getsettings
      description: Amazon Web Services Getsettings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: auditmanager-settings.amazonwebservicesgetsettings
      outputParameters:
      - type: object
        mapping: $.
