naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services payment-cryptography
  description: 'Amazon Web Services payment-cryptography. 1 operations. Lead operation: Amazon Web Services Updatealias. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services payment-cryptography
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: payment-cryptography
    baseUri: ''
    description: Amazon Web Services payment-cryptography business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatealias
        method: POST
        description: Amazon Web Services Updatealias
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: payment-cryptography-rest
    port: 8080
    description: REST adapter for Amazon Web Services payment-cryptography. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatealias
        description: Amazon Web Services Updatealias
        call: payment-cryptography.amazonwebservicesupdatealias
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payment-cryptography-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services payment-cryptography. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-updatealias
      description: Amazon Web Services Updatealias
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payment-cryptography.amazonwebservicesupdatealias
      outputParameters:
      - type: object
        mapping: $.
