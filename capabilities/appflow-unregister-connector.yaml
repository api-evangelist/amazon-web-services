naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services appflow — Unregister Connector
  description: 'Amazon Web Services appflow — Unregister Connector. 1 operations. Lead operation: Amazon Web Services Unregisterconnector.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Unregister Connector
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: appflow-unregister-connector
    baseUri: ''
    description: Amazon Web Services appflow — Unregister Connector business capability. Self-contained, no shared references.
    resources:
    - name: unregister-connector
      path: /unregister-connector
      operations:
      - name: amazonwebservicesunregisterconnector
        method: POST
        description: Amazon Web Services Unregisterconnector
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: appflow-unregister-connector-rest
    port: 8080
    description: REST adapter for Amazon Web Services appflow — Unregister Connector. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/unregister-connector
      name: unregister-connector
      description: REST surface for unregister-connector.
      operations:
      - method: POST
        name: amazonwebservicesunregisterconnector
        description: Amazon Web Services Unregisterconnector
        call: appflow-unregister-connector.amazonwebservicesunregisterconnector
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appflow-unregister-connector-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services appflow — Unregister Connector. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-unregisterconnector
      description: Amazon Web Services Unregisterconnector
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: appflow-unregister-connector.amazonwebservicesunregisterconnector
      outputParameters:
      - type: object
        mapping: $.
