naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services detective — Invitation
  description: 'Amazon Web Services detective — Invitation. 2 operations. Lead operation: Amazon Web Services Acceptinvitation.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Invitation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: detective-invitation
    baseUri: ''
    description: Amazon Web Services detective — Invitation business capability. Self-contained, no shared references.
    resources:
    - name: invitation
      path: /invitation
      operations:
      - name: amazonwebservicesacceptinvitation
        method: PUT
        description: Amazon Web Services Acceptinvitation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invitation-removal
      path: /invitation/removal
      operations:
      - name: amazonwebservicesrejectinvitation
        method: POST
        description: Amazon Web Services Rejectinvitation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: detective-invitation-rest
    port: 8080
    description: REST adapter for Amazon Web Services detective — Invitation. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/invitation
      name: invitation
      description: REST surface for invitation.
      operations:
      - method: PUT
        name: amazonwebservicesacceptinvitation
        description: Amazon Web Services Acceptinvitation
        call: detective-invitation.amazonwebservicesacceptinvitation
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invitation/removal
      name: invitation-removal
      description: REST surface for invitation-removal.
      operations:
      - method: POST
        name: amazonwebservicesrejectinvitation
        description: Amazon Web Services Rejectinvitation
        call: detective-invitation.amazonwebservicesrejectinvitation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: detective-invitation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services detective — Invitation. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-acceptinvitation
      description: Amazon Web Services Acceptinvitation
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: detective-invitation.amazonwebservicesacceptinvitation
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-rejectinvitation
      description: Amazon Web Services Rejectinvitation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: detective-invitation.amazonwebservicesrejectinvitation
      outputParameters:
      - type: object
        mapping: $.
