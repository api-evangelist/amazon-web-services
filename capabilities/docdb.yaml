naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services docdb
  description: 'Amazon Web Services docdb. 1 operations. Lead operation: Amazon Web Services Stopdbcluster. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services docdb
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: docdb
    baseUri: ''
    description: Amazon Web Services docdb business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesstopdbcluster
        method: POST
        description: Amazon Web Services Stopdbcluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: docdb-rest
    port: 8080
    description: REST adapter for Amazon Web Services docdb. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesstopdbcluster
        description: Amazon Web Services Stopdbcluster
        call: docdb.amazonwebservicesstopdbcluster
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: docdb-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services docdb. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-stopdbcluster
      description: Amazon Web Services Stopdbcluster
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: docdb.amazonwebservicesstopdbcluster
      outputParameters:
      - type: object
        mapping: $.
