  - type: http
    namespace: outposts-orders
    baseUri: ''
    description: Amazon Web Services outposts — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: amazonwebservicescreateorder
        method: POST
        description: Amazon Web Services Createorder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders-OrderId
      path: /orders/{OrderId}
      operations:
      - name: amazonwebservicesgetorder
        method: GET
        description: Amazon Web Services Getorder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders-OrderId-cancel
      path: /orders/{OrderId}/cancel
      operations:
      - name: amazonwebservicescancelorder
        method: POST
        description: Amazon Web Services Cancelorder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: outposts-orders-rest
    port: 8080
    description: REST adapter for Amazon Web Services outposts — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: POST
        name: amazonwebservicescreateorder
        description: Amazon Web Services Createorder
        call: outposts-orders.amazonwebservicescreateorder
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for orders-OrderId.
      operations:
      - method: GET
        name: amazonwebservicesgetorder
        description: Amazon Web Services Getorder
        call: outposts-orders.amazonwebservicesgetorder
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}/cancel
      name: orders-orderid-cancel
      description: REST surface for orders-OrderId-cancel.
      operations:
      - method: POST
        name: amazonwebservicescancelorder
        description: Amazon Web Services Cancelorder
        call: outposts-orders.amazonwebservicescancelorder
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: outposts-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services outposts — Orders. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
