naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services support
  description: 'Amazon Web Services support. 1 operations. Lead operation: Amazon Web Services Resolvecase. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services support
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: support
    baseUri: ''
    description: Amazon Web Services support business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesresolvecase
        method: POST
        description: Amazon Web Services Resolvecase
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: support-rest
    port: 8080
    description: REST adapter for Amazon Web Services support. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesresolvecase
        description: Amazon Web Services Resolvecase
        call: support.amazonwebservicesresolvecase
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: support-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services support. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-resolvecase
      description: Amazon Web Services Resolvecase
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: support.amazonwebservicesresolvecase
      outputParameters:
      - type: object
        mapping: $.
