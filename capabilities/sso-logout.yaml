naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services sso — Logout
  description: 'Amazon Web Services sso — Logout. 1 operations. Lead operation: Amazon Web Services Logout. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Logout
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: sso-logout
    baseUri: ''
    description: Amazon Web Services sso — Logout business capability. Self-contained, no shared references.
    resources:
    - name: logout
      path: /logout
      operations:
      - name: amazonwebserviceslogout
        method: POST
        description: Amazon Web Services Logout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: sso-logout-rest
    port: 8080
    description: REST adapter for Amazon Web Services sso — Logout. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/logout
      name: logout
      description: REST surface for logout.
      operations:
      - method: POST
        name: amazonwebserviceslogout
        description: Amazon Web Services Logout
        call: sso-logout.amazonwebserviceslogout
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sso-logout-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services sso — Logout. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-logout
      description: Amazon Web Services Logout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sso-logout.amazonwebserviceslogout
      outputParameters:
      - type: object
        mapping: $.
