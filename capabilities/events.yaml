naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services events
  description: 'Amazon Web Services events. 1 operations. Lead operation: Amazon Web Services Updateconnection. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: events
    baseUri: ''
    description: Amazon Web Services events business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateconnection
        method: POST
        description: Amazon Web Services Updateconnection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: events-rest
    port: 8080
    description: REST adapter for Amazon Web Services events. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateconnection
        description: Amazon Web Services Updateconnection
        call: events.amazonwebservicesupdateconnection
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services events. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updateconnection
      description: Amazon Web Services Updateconnection
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: events.amazonwebservicesupdateconnection
      outputParameters:
      - type: object
        mapping: $.
