naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services sagemaker
  description: 'Amazon Web Services sagemaker. 1 operations. Lead operation: Amazon Web Services Updateworkteam. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services sagemaker
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: sagemaker
    baseUri: ''
    description: Amazon Web Services sagemaker business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateworkteam
        method: POST
        description: Amazon Web Services Updateworkteam
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: sagemaker-rest
    port: 8080
    description: REST adapter for Amazon Web Services sagemaker. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateworkteam
        description: Amazon Web Services Updateworkteam
        call: sagemaker.amazonwebservicesupdateworkteam
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sagemaker-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services sagemaker. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updateworkteam
      description: Amazon Web Services Updateworkteam
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sagemaker.amazonwebservicesupdateworkteam
      outputParameters:
      - type: object
        mapping: $.
