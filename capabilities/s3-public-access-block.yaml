naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Public Access Block
  description: 'Amazon Web Services AWS S3 — Public Access Block. 1 operations. Lead operation: Amazon Web Services Put Public
    Access Block. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Public Access Block
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-public-access-block
    baseUri: ''
    description: Amazon Web Services AWS S3 — Public Access Block business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?publicAccessBlock
      path: /{Bucket}?publicAccessBlock
      operations:
      - name: putpublicaccessblock
        method: PUT
        description: Amazon Web Services Put Public Access Block
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-public-access-block-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Public Access Block. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/bucket-publicaccessblock
      name: bucket-publicaccessblock
      description: REST surface for Bucket}?publicAccessBlock.
      operations:
      - method: PUT
        name: putpublicaccessblock
        description: Amazon Web Services Put Public Access Block
        call: s3-public-access-block.putpublicaccessblock
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-public-access-block-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Public Access Block. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-put-public
      description: Amazon Web Services Put Public Access Block
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: s3-public-access-block.putpublicaccessblock
      outputParameters:
      - type: object
        mapping: $.
