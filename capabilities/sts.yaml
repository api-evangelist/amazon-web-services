naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services sts
  description: 'Amazon Web Services sts. 1 operations. Lead operation: Amazon Web Services Getsessiontoken. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services sts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: sts
    baseUri: ''
    description: Amazon Web Services sts business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesgetsessiontoken
        method: POST
        description: Amazon Web Services Getsessiontoken
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: sts-rest
    port: 8080
    description: REST adapter for Amazon Web Services sts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesgetsessiontoken
        description: Amazon Web Services Getsessiontoken
        call: sts.amazonwebservicesgetsessiontoken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services sts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-getsessiontoken
      description: Amazon Web Services Getsessiontoken
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sts.amazonwebservicesgetsessiontoken
      outputParameters:
      - type: object
        mapping: $.
