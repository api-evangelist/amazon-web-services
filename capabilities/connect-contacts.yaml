naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Contacts
  description: 'Amazon Web Services connect — Contacts. 2 operations. Lead operation: Amazon Web Services Updatecontact. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-contacts
    baseUri: ''
    description: Amazon Web Services connect — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: contacts-InstanceId-ContactId
      path: /contacts/{InstanceId}/{ContactId}
      operations:
      - name: amazonwebservicesupdatecontact
        method: POST
        description: Amazon Web Services Updatecontact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: contacts-InstanceId-ContactId-routing-data
      path: /contacts/{InstanceId}/{ContactId}/routing-data
      operations:
      - name: amazonwebservicesupdatecontactroutingdata
        method: POST
        description: Amazon Web Services Updatecontactroutingdata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-contacts-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Contacts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/contacts/{instanceid}/{contactid}
      name: contacts-instanceid-contactid
      description: REST surface for contacts-InstanceId-ContactId.
      operations:
      - method: POST
        name: amazonwebservicesupdatecontact
        description: Amazon Web Services Updatecontact
        call: connect-contacts.amazonwebservicesupdatecontact
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/contacts/{instanceid}/{contactid}/routing-data
      name: contacts-instanceid-contactid-routing-data
      description: REST surface for contacts-InstanceId-ContactId-routing-data.
      operations:
      - method: POST
        name: amazonwebservicesupdatecontactroutingdata
        description: Amazon Web Services Updatecontactroutingdata
        call: connect-contacts.amazonwebservicesupdatecontactroutingdata
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Contacts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updatecontact
      description: Amazon Web Services Updatecontact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connect-contacts.amazonwebservicesupdatecontact
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updatecontactroutingdata
      description: Amazon Web Services Updatecontactroutingdata
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connect-contacts.amazonwebservicesupdatecontactroutingdata
      outputParameters:
      - type: object
        mapping: $.
