naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services groundstation — Groundstation
  description: 'Amazon Web Services groundstation — Groundstation. 1 operations. Lead operation: Amazon Web Services Listgroundstations.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Groundstation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: groundstation-groundstation
    baseUri: ''
    description: Amazon Web Services groundstation — Groundstation business capability. Self-contained, no shared references.
    resources:
    - name: groundstation
      path: /groundstation
      operations:
      - name: amazonwebserviceslistgroundstations
        method: GET
        description: Amazon Web Services Listgroundstations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: groundstation-groundstation-rest
    port: 8080
    description: REST adapter for Amazon Web Services groundstation — Groundstation. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/groundstation
      name: groundstation
      description: REST surface for groundstation.
      operations:
      - method: GET
        name: amazonwebserviceslistgroundstations
        description: Amazon Web Services Listgroundstations
        call: groundstation-groundstation.amazonwebserviceslistgroundstations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: groundstation-groundstation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services groundstation — Groundstation. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-listgroundstations
      description: Amazon Web Services Listgroundstations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: groundstation-groundstation.amazonwebserviceslistgroundstations
      outputParameters:
      - type: object
        mapping: $.
