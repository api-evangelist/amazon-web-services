naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services m2 — Environments
  description: 'Amazon Web Services m2 — Environments. 2 operations. Lead operation: Amazon Web Services Listenvironments.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Environments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: m2-environments
    baseUri: ''
    description: Amazon Web Services m2 — Environments business capability. Self-contained, no shared references.
    resources:
    - name: environments
      path: /environments
      operations:
      - name: amazonwebserviceslistenvironments
        method: GET
        description: Amazon Web Services Listenvironments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: environments-environmentId
      path: /environments/{environmentId}
      operations:
      - name: amazonwebservicesupdateenvironment
        method: PATCH
        description: Amazon Web Services Updateenvironment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: m2-environments-rest
    port: 8080
    description: REST adapter for Amazon Web Services m2 — Environments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/environments
      name: environments
      description: REST surface for environments.
      operations:
      - method: GET
        name: amazonwebserviceslistenvironments
        description: Amazon Web Services Listenvironments
        call: m2-environments.amazonwebserviceslistenvironments
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/environments/{environmentid}
      name: environments-environmentid
      description: REST surface for environments-environmentId.
      operations:
      - method: PATCH
        name: amazonwebservicesupdateenvironment
        description: Amazon Web Services Updateenvironment
        call: m2-environments.amazonwebservicesupdateenvironment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: m2-environments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services m2 — Environments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listenvironments
      description: Amazon Web Services Listenvironments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: m2-environments.amazonwebserviceslistenvironments
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updateenvironment
      description: Amazon Web Services Updateenvironment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: m2-environments.amazonwebservicesupdateenvironment
      outputParameters:
      - type: object
        mapping: $.
