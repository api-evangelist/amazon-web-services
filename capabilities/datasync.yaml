naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services datasync
  description: 'Amazon Web Services datasync. 1 operations. Lead operation: Amazon Web Services Updatetaskexecution. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services datasync
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: datasync
    baseUri: ''
    description: Amazon Web Services datasync business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatetaskexecution
        method: POST
        description: Amazon Web Services Updatetaskexecution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: datasync-rest
    port: 8080
    description: REST adapter for Amazon Web Services datasync. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatetaskexecution
        description: Amazon Web Services Updatetaskexecution
        call: datasync.amazonwebservicesupdatetaskexecution
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datasync-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services datasync. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatetaskexecution
      description: Amazon Web Services Updatetaskexecution
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datasync.amazonwebservicesupdatetaskexecution
      outputParameters:
      - type: object
        mapping: $.
