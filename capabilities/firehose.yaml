naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services firehose
  description: 'Amazon Web Services firehose. 1 operations. Lead operation: Amazon Web Services Updatedestination. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services firehose
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: firehose
    baseUri: ''
    description: Amazon Web Services firehose business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatedestination
        method: POST
        description: Amazon Web Services Updatedestination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: firehose-rest
    port: 8080
    description: REST adapter for Amazon Web Services firehose. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatedestination
        description: Amazon Web Services Updatedestination
        call: firehose.amazonwebservicesupdatedestination
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: firehose-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services firehose. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatedestination
      description: Amazon Web Services Updatedestination
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: firehose.amazonwebservicesupdatedestination
      outputParameters:
      - type: object
        mapping: $.
