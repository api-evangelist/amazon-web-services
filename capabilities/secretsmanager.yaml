naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services secretsmanager
  description: 'Amazon Web Services secretsmanager. 1 operations. Lead operation: Amazon Web Services Validateresourcepolicy.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services secretsmanager
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: secretsmanager
    baseUri: ''
    description: Amazon Web Services secretsmanager business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesvalidateresourcepolicy
        method: POST
        description: Amazon Web Services Validateresourcepolicy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: secretsmanager-rest
    port: 8080
    description: REST adapter for Amazon Web Services secretsmanager. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesvalidateresourcepolicy
        description: Amazon Web Services Validateresourcepolicy
        call: secretsmanager.amazonwebservicesvalidateresourcepolicy
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: secretsmanager-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services secretsmanager. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-validateresourcepolicy
      description: Amazon Web Services Validateresourcepolicy
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: secretsmanager.amazonwebservicesvalidateresourcepolicy
      outputParameters:
      - type: object
        mapping: $.
