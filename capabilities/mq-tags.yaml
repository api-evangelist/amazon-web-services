naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services mq — Tags
  description: 'Amazon Web Services mq — Tags. 1 operations. Lead operation: Amazon Web Services Listtags. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Tags
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: mq-tags
    baseUri: ''
    description: Amazon Web Services mq — Tags business capability. Self-contained, no shared references.
    resources:
    - name: v1-tags-resource-arn
      path: /v1/tags/{resource-arn}
      operations:
      - name: amazonwebserviceslisttags
        method: GET
        description: Amazon Web Services Listtags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mq-tags-rest
    port: 8080
    description: REST adapter for Amazon Web Services mq — Tags. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/tags/{resource-arn}
      name: v1-tags-resource-arn
      description: REST surface for v1-tags-resource-arn.
      operations:
      - method: GET
        name: amazonwebserviceslisttags
        description: Amazon Web Services Listtags
        call: mq-tags.amazonwebserviceslisttags
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mq-tags-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services mq — Tags. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-listtags
      description: Amazon Web Services Listtags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mq-tags.amazonwebserviceslisttags
      outputParameters:
      - type: object
        mapping: $.
