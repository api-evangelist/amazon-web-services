naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services appsync
  description: 'Amazon Web Services appsync. 2 operations. Lead operation: Amazon Web Services Listgraphqlapis. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: appsync-general
    baseUri: ''
    description: Amazon Web Services appsync business capability. Self-contained, no shared references.
    resources:
    - name: v1-apis
      path: /v1/apis
      operations:
      - name: amazonwebserviceslistgraphqlapis
        method: GET
        description: Amazon Web Services Listgraphqlapis
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-apis-apiId
      path: /v1/apis/{apiId}
      operations:
      - name: amazonwebservicesupdategraphqlapi
        method: POST
        description: Amazon Web Services Updategraphqlapi
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: appsync-general-rest
    port: 8080
    description: REST adapter for Amazon Web Services appsync. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/apis
      name: v1-apis
      description: REST surface for v1-apis.
      operations:
      - method: GET
        name: amazonwebserviceslistgraphqlapis
        description: Amazon Web Services Listgraphqlapis
        call: appsync-general.amazonwebserviceslistgraphqlapis
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/apis/{apiid}
      name: v1-apis-apiid
      description: REST surface for v1-apis-apiId.
      operations:
      - method: POST
        name: amazonwebservicesupdategraphqlapi
        description: Amazon Web Services Updategraphqlapi
        call: appsync-general.amazonwebservicesupdategraphqlapi
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appsync-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services appsync. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-listgraphqlapis
      description: Amazon Web Services Listgraphqlapis
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: appsync-general.amazonwebserviceslistgraphqlapis
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updategraphqlapi
      description: Amazon Web Services Updategraphqlapi
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: appsync-general.amazonwebservicesupdategraphqlapi
      outputParameters:
      - type: object
        mapping: $.
