naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services ssm-contacts
  description: 'Amazon Web Services ssm-contacts. 1 operations. Lead operation: Amazon Web Services Updaterotation. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services ssm-contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: ssm-contacts
    baseUri: ''
    description: Amazon Web Services ssm-contacts business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdaterotation
        method: POST
        description: Amazon Web Services Updaterotation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: ssm-contacts-rest
    port: 8080
    description: REST adapter for Amazon Web Services ssm-contacts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdaterotation
        description: Amazon Web Services Updaterotation
        call: ssm-contacts.amazonwebservicesupdaterotation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ssm-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services ssm-contacts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updaterotation
      description: Amazon Web Services Updaterotation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ssm-contacts.amazonwebservicesupdaterotation
      outputParameters:
      - type: object
        mapping: $.
