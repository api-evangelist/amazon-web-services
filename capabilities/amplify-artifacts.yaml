  - type: http
    namespace: amplify-artifacts
    baseUri: ''
    description: Amazon Web Services amplify — Artifacts business capability. Self-contained, no shared references.
    resources:
    - name: artifacts-artifactId
      path: /artifacts/{artifactId}
      operations:
      - name: amazonwebservicesgetartifacturl
        method: GET
        description: Amazon Web Services Getartifacturl
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
