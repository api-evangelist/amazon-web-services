    - path: /v1/artifacts/{artifactid}
      name: artifacts-artifactid
      description: REST surface for artifacts-artifactId.
      operations:
      - method: GET
        name: amazonwebservicesgetartifacturl
        description: Amazon Web Services Getartifacturl
        call: amplify-artifacts.amazonwebservicesgetartifacturl
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
