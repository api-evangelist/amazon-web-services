naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services networkmanager — Resource Policy
  description: 'Amazon Web Services networkmanager — Resource Policy. 1 operations. Lead operation: Amazon Web Services Putresourcepolicy.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Resource Policy
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: networkmanager-resource-policy
    baseUri: ''
    description: Amazon Web Services networkmanager — Resource Policy business capability. Self-contained, no shared references.
    resources:
    - name: resource-policy-resourceArn
      path: /resource-policy/{resourceArn}
      operations:
      - name: amazonwebservicesputresourcepolicy
        method: POST
        description: Amazon Web Services Putresourcepolicy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: networkmanager-resource-policy-rest
    port: 8080
    description: REST adapter for Amazon Web Services networkmanager — Resource Policy. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/resource-policy/{resourcearn}
      name: resource-policy-resourcearn
      description: REST surface for resource-policy-resourceArn.
      operations:
      - method: POST
        name: amazonwebservicesputresourcepolicy
        description: Amazon Web Services Putresourcepolicy
        call: networkmanager-resource-policy.amazonwebservicesputresourcepolicy
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: networkmanager-resource-policy-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services networkmanager — Resource Policy. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: amazon-web-services-putresourcepolicy
      description: Amazon Web Services Putresourcepolicy
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: networkmanager-resource-policy.amazonwebservicesputresourcepolicy
      outputParameters:
      - type: object
        mapping: $.
