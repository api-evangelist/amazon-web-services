naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services codebuild
  description: 'Amazon Web Services codebuild. 1 operations. Lead operation: Amazon Web Services Updatewebhook. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services codebuild
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: codebuild
    baseUri: ''
    description: Amazon Web Services codebuild business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatewebhook
        method: POST
        description: Amazon Web Services Updatewebhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: codebuild-rest
    port: 8080
    description: REST adapter for Amazon Web Services codebuild. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatewebhook
        description: Amazon Web Services Updatewebhook
        call: codebuild.amazonwebservicesupdatewebhook
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: codebuild-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services codebuild. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatewebhook
      description: Amazon Web Services Updatewebhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: codebuild.amazonwebservicesupdatewebhook
      outputParameters:
      - type: object
        mapping: $.
