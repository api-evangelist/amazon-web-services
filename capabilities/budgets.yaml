naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services budgets
  description: 'Amazon Web Services budgets. 1 operations. Lead operation: Amazon Web Services Updatesubscriber. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services budgets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: budgets
    baseUri: ''
    description: Amazon Web Services budgets business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatesubscriber
        method: POST
        description: Amazon Web Services Updatesubscriber
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: budgets-rest
    port: 8080
    description: REST adapter for Amazon Web Services budgets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatesubscriber
        description: Amazon Web Services Updatesubscriber
        call: budgets.amazonwebservicesupdatesubscriber
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: budgets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services budgets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-updatesubscriber
      description: Amazon Web Services Updatesubscriber
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: budgets.amazonwebservicesupdatesubscriber
      outputParameters:
      - type: object
        mapping: $.
