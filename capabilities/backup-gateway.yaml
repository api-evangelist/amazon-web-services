naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services backup-gateway
  description: 'Amazon Web Services backup-gateway. 1 operations. Lead operation: Amazon Web Services Updatehypervisor. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services backup-gateway
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: backup-gateway
    baseUri: ''
    description: Amazon Web Services backup-gateway business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatehypervisor
        method: POST
        description: Amazon Web Services Updatehypervisor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: backup-gateway-rest
    port: 8080
    description: REST adapter for Amazon Web Services backup-gateway. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatehypervisor
        description: Amazon Web Services Updatehypervisor
        call: backup-gateway.amazonwebservicesupdatehypervisor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: backup-gateway-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services backup-gateway. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updatehypervisor
      description: Amazon Web Services Updatehypervisor
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: backup-gateway.amazonwebservicesupdatehypervisor
      outputParameters:
      - type: object
        mapping: $.
