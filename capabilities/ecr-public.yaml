naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services ecr-public
  description: 'Amazon Web Services ecr-public. 1 operations. Lead operation: Amazon Web Services Uploadlayerpart. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services ecr-public
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: ecr-public
    baseUri: ''
    description: Amazon Web Services ecr-public business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesuploadlayerpart
        method: POST
        description: Amazon Web Services Uploadlayerpart
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: ecr-public-rest
    port: 8080
    description: REST adapter for Amazon Web Services ecr-public. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesuploadlayerpart
        description: Amazon Web Services Uploadlayerpart
        call: ecr-public.amazonwebservicesuploadlayerpart
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ecr-public-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services ecr-public. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-uploadlayerpart
      description: Amazon Web Services Uploadlayerpart
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ecr-public.amazonwebservicesuploadlayerpart
      outputParameters:
      - type: object
        mapping: $.
