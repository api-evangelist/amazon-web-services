naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services machinelearning
  description: 'Amazon Web Services machinelearning. 1 operations. Lead operation: Amazon Web Services Updatemlmodel. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services machinelearning
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: machinelearning
    baseUri: ''
    description: Amazon Web Services machinelearning business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatemlmodel
        method: POST
        description: Amazon Web Services Updatemlmodel
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: machinelearning-rest
    port: 8080
    description: REST adapter for Amazon Web Services machinelearning. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatemlmodel
        description: Amazon Web Services Updatemlmodel
        call: machinelearning.amazonwebservicesupdatemlmodel
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: machinelearning-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services machinelearning. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updatemlmodel
      description: Amazon Web Services Updatemlmodel
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: machinelearning.amazonwebservicesupdatemlmodel
      outputParameters:
      - type: object
        mapping: $.
