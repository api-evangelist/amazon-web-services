naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services neptunedata — Sparql
  description: 'Amazon Web Services neptunedata — Sparql. 2 operations. Lead operation: Amazon Web Services Managesparqlstatistics.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Sparql
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: neptunedata-sparql
    baseUri: ''
    description: Amazon Web Services neptunedata — Sparql business capability. Self-contained, no shared references.
    resources:
    - name: sparql-statistics
      path: /sparql/statistics
      operations:
      - name: amazonwebservicesmanagesparqlstatistics
        method: POST
        description: Amazon Web Services Managesparqlstatistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sparql-stream
      path: /sparql/stream
      operations:
      - name: amazonwebservicesgetsparqlstream
        method: GET
        description: Amazon Web Services Getsparqlstream
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: neptunedata-sparql-rest
    port: 8080
    description: REST adapter for Amazon Web Services neptunedata — Sparql. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sparql/statistics
      name: sparql-statistics
      description: REST surface for sparql-statistics.
      operations:
      - method: POST
        name: amazonwebservicesmanagesparqlstatistics
        description: Amazon Web Services Managesparqlstatistics
        call: neptunedata-sparql.amazonwebservicesmanagesparqlstatistics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sparql/stream
      name: sparql-stream
      description: REST surface for sparql-stream.
      operations:
      - method: GET
        name: amazonwebservicesgetsparqlstream
        description: Amazon Web Services Getsparqlstream
        call: neptunedata-sparql.amazonwebservicesgetsparqlstream
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: neptunedata-sparql-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services neptunedata — Sparql. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-managesparqlstatistics
      description: Amazon Web Services Managesparqlstatistics
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: neptunedata-sparql.amazonwebservicesmanagesparqlstatistics
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-getsparqlstream
      description: Amazon Web Services Getsparqlstream
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: neptunedata-sparql.amazonwebservicesgetsparqlstream
      outputParameters:
      - type: object
        mapping: $.
