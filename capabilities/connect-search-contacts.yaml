naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Search Contacts
  description: 'Amazon Web Services connect — Search Contacts. 1 operations. Lead operation: Amazon Web Services Searchcontacts.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Search Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-search-contacts
    baseUri: ''
    description: Amazon Web Services connect — Search Contacts business capability. Self-contained, no shared references.
    resources:
    - name: search-contacts
      path: /search-contacts
      operations:
      - name: amazonwebservicessearchcontacts
        method: POST
        description: Amazon Web Services Searchcontacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-search-contacts-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Search Contacts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/search-contacts
      name: search-contacts
      description: REST surface for search-contacts.
      operations:
      - method: POST
        name: amazonwebservicessearchcontacts
        description: Amazon Web Services Searchcontacts
        call: connect-search-contacts.amazonwebservicessearchcontacts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-search-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Search Contacts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-searchcontacts
      description: Amazon Web Services Searchcontacts
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: connect-search-contacts.amazonwebservicessearchcontacts
      outputParameters:
      - type: object
        mapping: $.
