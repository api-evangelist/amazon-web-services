naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services appflow — Stop Flow
  description: 'Amazon Web Services appflow — Stop Flow. 1 operations. Lead operation: Amazon Web Services Stopflow. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Stop Flow
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: appflow-stop-flow
    baseUri: ''
    description: Amazon Web Services appflow — Stop Flow business capability. Self-contained, no shared references.
    resources:
    - name: stop-flow
      path: /stop-flow
      operations:
      - name: amazonwebservicesstopflow
        method: POST
        description: Amazon Web Services Stopflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: appflow-stop-flow-rest
    port: 8080
    description: REST adapter for Amazon Web Services appflow — Stop Flow. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/stop-flow
      name: stop-flow
      description: REST surface for stop-flow.
      operations:
      - method: POST
        name: amazonwebservicesstopflow
        description: Amazon Web Services Stopflow
        call: appflow-stop-flow.amazonwebservicesstopflow
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appflow-stop-flow-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services appflow — Stop Flow. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-stopflow
      description: Amazon Web Services Stopflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: appflow-stop-flow.amazonwebservicesstopflow
      outputParameters:
      - type: object
        mapping: $.
