naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services mobile — Projects
  description: 'Amazon Web Services mobile — Projects. 2 operations. Lead operation: Amazon Web Services Listprojects. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: mobile-projects
    baseUri: ''
    description: Amazon Web Services mobile — Projects business capability. Self-contained, no shared references.
    resources:
    - name: projects
      path: /projects
      operations:
      - name: amazonwebserviceslistprojects
        method: GET
        description: Amazon Web Services Listprojects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-projectId
      path: /projects/{projectId}
      operations:
      - name: amazonwebservicesdeleteproject
        method: DELETE
        description: Amazon Web Services Deleteproject
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mobile-projects-rest
    port: 8080
    description: REST adapter for Amazon Web Services mobile — Projects. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects
      name: projects
      description: REST surface for projects.
      operations:
      - method: GET
        name: amazonwebserviceslistprojects
        description: Amazon Web Services Listprojects
        call: mobile-projects.amazonwebserviceslistprojects
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}
      name: projects-projectid
      description: REST surface for projects-projectId.
      operations:
      - method: DELETE
        name: amazonwebservicesdeleteproject
        description: Amazon Web Services Deleteproject
        call: mobile-projects.amazonwebservicesdeleteproject
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mobile-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services mobile — Projects. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listprojects
      description: Amazon Web Services Listprojects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mobile-projects.amazonwebserviceslistprojects
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-deleteproject
      description: Amazon Web Services Deleteproject
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: mobile-projects.amazonwebservicesdeleteproject
      outputParameters:
      - type: object
        mapping: $.
