naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services omics — Shares
  description: 'Amazon Web Services omics — Shares. 1 operations. Lead operation: Amazon Web Services Listshares. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Shares
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: omics-shares
    baseUri: ''
    description: Amazon Web Services omics — Shares business capability. Self-contained, no shared references.
    resources:
    - name: shares
      path: /shares
      operations:
      - name: amazonwebserviceslistshares
        method: POST
        description: Amazon Web Services Listshares
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: omics-shares-rest
    port: 8080
    description: REST adapter for Amazon Web Services omics — Shares. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/shares
      name: shares
      description: REST surface for shares.
      operations:
      - method: POST
        name: amazonwebserviceslistshares
        description: Amazon Web Services Listshares
        call: omics-shares.amazonwebserviceslistshares
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: omics-shares-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services omics — Shares. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listshares
      description: Amazon Web Services Listshares
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: omics-shares.amazonwebserviceslistshares
      outputParameters:
      - type: object
        mapping: $.
