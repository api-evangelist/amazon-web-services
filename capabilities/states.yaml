naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services states
  description: 'Amazon Web Services states. 1 operations. Lead operation: Amazon Web Services Updatestatemachinealias. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services states
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: states
    baseUri: ''
    description: Amazon Web Services states business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdatestatemachinealias
        method: POST
        description: Amazon Web Services Updatestatemachinealias
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: states-rest
    port: 8080
    description: REST adapter for Amazon Web Services states. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdatestatemachinealias
        description: Amazon Web Services Updatestatemachinealias
        call: states.amazonwebservicesupdatestatemachinealias
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: states-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services states. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-web-services-updatestatemachinealias
      description: Amazon Web Services Updatestatemachinealias
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: states.amazonwebservicesupdatestatemachinealias
      outputParameters:
      - type: object
        mapping: $.
