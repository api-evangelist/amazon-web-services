naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services groundstation — Config
  description: 'Amazon Web Services groundstation — Config. 2 operations. Lead operation: Amazon Web Services Listconfigs.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Config
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: groundstation-config
    baseUri: ''
    description: Amazon Web Services groundstation — Config business capability. Self-contained, no shared references.
    resources:
    - name: config
      path: /config
      operations:
      - name: amazonwebserviceslistconfigs
        method: GET
        description: Amazon Web Services Listconfigs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: config-configType-configId
      path: /config/{configType}/{configId}
      operations:
      - name: amazonwebservicesupdateconfig
        method: PUT
        description: Amazon Web Services Updateconfig
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: groundstation-config-rest
    port: 8080
    description: REST adapter for Amazon Web Services groundstation — Config. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/config
      name: config
      description: REST surface for config.
      operations:
      - method: GET
        name: amazonwebserviceslistconfigs
        description: Amazon Web Services Listconfigs
        call: groundstation-config.amazonwebserviceslistconfigs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/config/{configtype}/{configid}
      name: config-configtype-configid
      description: REST surface for config-configType-configId.
      operations:
      - method: PUT
        name: amazonwebservicesupdateconfig
        description: Amazon Web Services Updateconfig
        call: groundstation-config.amazonwebservicesupdateconfig
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: groundstation-config-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services groundstation — Config. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-listconfigs
      description: Amazon Web Services Listconfigs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: groundstation-config.amazonwebserviceslistconfigs
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updateconfig
      description: Amazon Web Services Updateconfig
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: groundstation-config.amazonwebservicesupdateconfig
      outputParameters:
      - type: object
        mapping: $.
