    description: REST adapter for Amazon Web Services xray — UpdateGroup. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/updategroup
      name: updategroup
      description: REST surface for UpdateGroup.
      operations:
