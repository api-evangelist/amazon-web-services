  - type: http
    namespace: xray-updategroup
    baseUri: ''
    description: Amazon Web Services xray — UpdateGroup business capability. Self-contained, no shared references.
    resources:
    - name: UpdateGroup
      path: /UpdateGroup
      operations:
      - name: amazonwebservicesupdategroup
        method: POST
        description: Amazon Web Services Updategroup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
