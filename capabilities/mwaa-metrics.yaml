naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services mwaa — Metrics
  description: 'Amazon Web Services mwaa — Metrics. 1 operations. Lead operation: Amazon Web Services Publishmetrics. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: mwaa-metrics
    baseUri: ''
    description: Amazon Web Services mwaa — Metrics business capability. Self-contained, no shared references.
    resources:
    - name: metrics-environments-EnvironmentName
      path: /metrics/environments/{EnvironmentName}
      operations:
      - name: amazonwebservicespublishmetrics
        method: POST
        description: Amazon Web Services Publishmetrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mwaa-metrics-rest
    port: 8080
    description: REST adapter for Amazon Web Services mwaa — Metrics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/metrics/environments/{environmentname}
      name: metrics-environments-environmentname
      description: REST surface for metrics-environments-EnvironmentName.
      operations:
      - method: POST
        name: amazonwebservicespublishmetrics
        description: Amazon Web Services Publishmetrics
        call: mwaa-metrics.amazonwebservicespublishmetrics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mwaa-metrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services mwaa — Metrics. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-publishmetrics
      description: Amazon Web Services Publishmetrics
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mwaa-metrics.amazonwebservicespublishmetrics
      outputParameters:
      - type: object
        mapping: $.
