naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services qldb-session
  description: 'Amazon Web Services qldb-session. 1 operations. Lead operation: Amazon Web Services Sendcommand. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services qldb-session
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: qldb-session
    baseUri: ''
    description: Amazon Web Services qldb-session business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicessendcommand
        method: POST
        description: Amazon Web Services Sendcommand
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: qldb-session-rest
    port: 8080
    description: REST adapter for Amazon Web Services qldb-session. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicessendcommand
        description: Amazon Web Services Sendcommand
        call: qldb-session.amazonwebservicessendcommand
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: qldb-session-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services qldb-session. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-sendcommand
      description: Amazon Web Services Sendcommand
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qldb-session.amazonwebservicessendcommand
      outputParameters:
      - type: object
        mapping: $.
