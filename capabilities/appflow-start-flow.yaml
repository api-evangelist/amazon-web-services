naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services appflow — Start Flow
  description: 'Amazon Web Services appflow — Start Flow. 1 operations. Lead operation: Amazon Web Services Startflow. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Start Flow
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: appflow-start-flow
    baseUri: ''
    description: Amazon Web Services appflow — Start Flow business capability. Self-contained, no shared references.
    resources:
    - name: start-flow
      path: /start-flow
      operations:
      - name: amazonwebservicesstartflow
        method: POST
        description: Amazon Web Services Startflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: appflow-start-flow-rest
    port: 8080
    description: REST adapter for Amazon Web Services appflow — Start Flow. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/start-flow
      name: start-flow
      description: REST surface for start-flow.
      operations:
      - method: POST
        name: amazonwebservicesstartflow
        description: Amazon Web Services Startflow
        call: appflow-start-flow.amazonwebservicesstartflow
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appflow-start-flow-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services appflow — Start Flow. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-startflow
      description: Amazon Web Services Startflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: appflow-start-flow.amazonwebservicesstartflow
      outputParameters:
      - type: object
        mapping: $.
