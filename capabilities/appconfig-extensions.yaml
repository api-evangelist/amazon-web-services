naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services appconfig — Extensions
  description: 'Amazon Web Services appconfig — Extensions. 2 operations. Lead operation: Amazon Web Services Listextensions.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Extensions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: appconfig-extensions
    baseUri: ''
    description: Amazon Web Services appconfig — Extensions business capability. Self-contained, no shared references.
    resources:
    - name: extensions
      path: /extensions
      operations:
      - name: amazonwebserviceslistextensions
        method: GET
        description: Amazon Web Services Listextensions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: extensions-ExtensionIdentifier
      path: /extensions/{ExtensionIdentifier}
      operations:
      - name: amazonwebservicesupdateextension
        method: PATCH
        description: Amazon Web Services Updateextension
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: appconfig-extensions-rest
    port: 8080
    description: REST adapter for Amazon Web Services appconfig — Extensions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/extensions
      name: extensions
      description: REST surface for extensions.
      operations:
      - method: GET
        name: amazonwebserviceslistextensions
        description: Amazon Web Services Listextensions
        call: appconfig-extensions.amazonwebserviceslistextensions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/extensions/{extensionidentifier}
      name: extensions-extensionidentifier
      description: REST surface for extensions-ExtensionIdentifier.
      operations:
      - method: PATCH
        name: amazonwebservicesupdateextension
        description: Amazon Web Services Updateextension
        call: appconfig-extensions.amazonwebservicesupdateextension
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appconfig-extensions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services appconfig — Extensions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-listextensions
      description: Amazon Web Services Listextensions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: appconfig-extensions.amazonwebserviceslistextensions
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-updateextension
      description: Amazon Web Services Updateextension
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: appconfig-extensions.amazonwebservicesupdateextension
      outputParameters:
      - type: object
        mapping: $.
