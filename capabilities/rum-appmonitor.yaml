    description: Amazon Web Services rum — Appmonitor business capability. Self-contained, no shared references.
    resources:
    - name: appmonitor
      path: /appmonitor
      operations:
      - name: amazonwebservicescreateappmonitor
        method: POST
        description: Amazon Web Services Createappmonitor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
