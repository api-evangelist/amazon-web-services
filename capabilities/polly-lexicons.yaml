naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services polly — Lexicons
  description: 'Amazon Web Services polly — Lexicons. 2 operations. Lead operation: Amazon Web Services Listlexicons. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Lexicons
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: polly-lexicons
    baseUri: ''
    description: Amazon Web Services polly — Lexicons business capability. Self-contained, no shared references.
    resources:
    - name: v1-lexicons
      path: /v1/lexicons
      operations:
      - name: amazonwebserviceslistlexicons
        method: GET
        description: Amazon Web Services Listlexicons
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-lexicons-LexiconName
      path: /v1/lexicons/{LexiconName}
      operations:
      - name: amazonwebservicesputlexicon
        method: PUT
        description: Amazon Web Services Putlexicon
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: polly-lexicons-rest
    port: 8080
    description: REST adapter for Amazon Web Services polly — Lexicons. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/lexicons
      name: v1-lexicons
      description: REST surface for v1-lexicons.
      operations:
      - method: GET
        name: amazonwebserviceslistlexicons
        description: Amazon Web Services Listlexicons
        call: polly-lexicons.amazonwebserviceslistlexicons
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/lexicons/{lexiconname}
      name: v1-lexicons-lexiconname
      description: REST surface for v1-lexicons-LexiconName.
      operations:
      - method: PUT
        name: amazonwebservicesputlexicon
        description: Amazon Web Services Putlexicon
        call: polly-lexicons.amazonwebservicesputlexicon
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: polly-lexicons-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services polly — Lexicons. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listlexicons
      description: Amazon Web Services Listlexicons
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: polly-lexicons.amazonwebserviceslistlexicons
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-web-services-putlexicon
      description: Amazon Web Services Putlexicon
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: polly-lexicons.amazonwebservicesputlexicon
      outputParameters:
      - type: object
        mapping: $.
