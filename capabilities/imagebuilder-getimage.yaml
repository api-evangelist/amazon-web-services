naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services imagebuilder — GetImage
  description: 'Amazon Web Services imagebuilder — GetImage. 1 operations. Lead operation: Amazon Web Services Getimage. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - GetImage
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: imagebuilder-getimage
    baseUri: ''
    description: Amazon Web Services imagebuilder — GetImage business capability. Self-contained, no shared references.
    resources:
    - name: GetImage
      path: /GetImage
      operations:
      - name: amazonwebservicesgetimage
        method: GET
        description: Amazon Web Services Getimage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: imagebuilder-getimage-rest
    port: 8080
    description: REST adapter for Amazon Web Services imagebuilder — GetImage. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/getimage
      name: getimage
      description: REST surface for GetImage.
      operations:
      - method: GET
        name: amazonwebservicesgetimage
        description: Amazon Web Services Getimage
        call: imagebuilder-getimage.amazonwebservicesgetimage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: imagebuilder-getimage-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services imagebuilder — GetImage. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-getimage
      description: Amazon Web Services Getimage
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: imagebuilder-getimage.amazonwebservicesgetimage
      outputParameters:
      - type: object
        mapping: $.
