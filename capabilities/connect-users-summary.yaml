naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services connect — Users Summary
  description: 'Amazon Web Services connect — Users Summary. 1 operations. Lead operation: Amazon Web Services Listusers.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Users Summary
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-users-summary
    baseUri: ''
    description: Amazon Web Services connect — Users Summary business capability. Self-contained, no shared references.
    resources:
    - name: users-summary-InstanceId
      path: /users-summary/{InstanceId}
      operations:
      - name: amazonwebserviceslistusers
        method: GET
        description: Amazon Web Services Listusers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connect-users-summary-rest
    port: 8080
    description: REST adapter for Amazon Web Services connect — Users Summary. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/users-summary/{instanceid}
      name: users-summary-instanceid
      description: REST surface for users-summary-InstanceId.
      operations:
      - method: GET
        name: amazonwebserviceslistusers
        description: Amazon Web Services Listusers
        call: connect-users-summary.amazonwebserviceslistusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-users-summary-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services connect — Users Summary. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-listusers
      description: Amazon Web Services Listusers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-users-summary.amazonwebserviceslistusers
      outputParameters:
      - type: object
        mapping: $.
