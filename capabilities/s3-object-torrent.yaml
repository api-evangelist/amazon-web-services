naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Object Torrent
  description: 'Amazon Web Services AWS S3 — Object Torrent. 1 operations. Lead operation: Amazon Web Services Get Object
    Torrent. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Object Torrent
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-object-torrent
    baseUri: ''
    description: Amazon Web Services AWS S3 — Object Torrent business capability. Self-contained, no shared references.
    resources:
    - name: Bucket-Key+}?torrent
      path: /{Bucket}/{Key+}?torrent
      operations:
      - name: getobjecttorrent
        method: GET
        description: Amazon Web Services Get Object Torrent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-object-torrent-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Object Torrent. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/{bucket}/key-torrent
      name: bucket-key-torrent
      description: REST surface for Bucket-Key+}?torrent.
      operations:
      - method: GET
        name: getobjecttorrent
        description: Amazon Web Services Get Object Torrent
        call: s3-object-torrent.getobjecttorrent
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-object-torrent-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Object Torrent. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-get-object
      description: Amazon Web Services Get Object Torrent
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: s3-object-torrent.getobjecttorrent
      outputParameters:
      - type: object
        mapping: $.
