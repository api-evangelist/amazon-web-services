naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services elasticache
  description: 'Amazon Web Services elasticache. 1 operations. Lead operation: Amazon Web Services Testmigration. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services elasticache
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: elasticache
    baseUri: ''
    description: Amazon Web Services elasticache business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicestestmigration
        method: POST
        description: Amazon Web Services Testmigration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: elasticache-rest
    port: 8080
    description: REST adapter for Amazon Web Services elasticache. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicestestmigration
        description: Amazon Web Services Testmigration
        call: elasticache.amazonwebservicestestmigration
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: elasticache-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services elasticache. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-web-services-testmigration
      description: Amazon Web Services Testmigration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: elasticache.amazonwebservicestestmigration
      outputParameters:
      - type: object
        mapping: $.
