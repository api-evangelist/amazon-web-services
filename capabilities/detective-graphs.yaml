naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services detective — Graphs
  description: 'Amazon Web Services detective — Graphs. 1 operations. Lead operation: Amazon Web Services Listgraphs. Self-contained
    Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Graphs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: detective-graphs
    baseUri: ''
    description: Amazon Web Services detective — Graphs business capability. Self-contained, no shared references.
    resources:
    - name: graphs-list
      path: /graphs/list
      operations:
      - name: amazonwebserviceslistgraphs
        method: POST
        description: Amazon Web Services Listgraphs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: detective-graphs-rest
    port: 8080
    description: REST adapter for Amazon Web Services detective — Graphs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/graphs/list
      name: graphs-list
      description: REST surface for graphs-list.
      operations:
      - method: POST
        name: amazonwebserviceslistgraphs
        description: Amazon Web Services Listgraphs
        call: detective-graphs.amazonwebserviceslistgraphs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: detective-graphs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services detective — Graphs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-listgraphs
      description: Amazon Web Services Listgraphs
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: detective-graphs.amazonwebserviceslistgraphs
      outputParameters:
      - type: object
        mapping: $.
