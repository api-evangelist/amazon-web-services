naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services AWS S3 — Multipart Uploads
  description: 'Amazon Web Services AWS S3 — Multipart Uploads. 1 operations. Lead operation: Amazon Web Services List Multipart
    Uploads. Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Multipart Uploads
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: s3-multipart-uploads
    baseUri: ''
    description: Amazon Web Services AWS S3 — Multipart Uploads business capability. Self-contained, no shared references.
    resources:
    - name: Bucket}?uploads
      path: /{Bucket}?uploads
      operations:
      - name: listmultipartuploads
        method: GET
        description: Amazon Web Services List Multipart Uploads
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: s3-multipart-uploads-rest
    port: 8080
    description: REST adapter for Amazon Web Services AWS S3 — Multipart Uploads. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/bucket-uploads
      name: bucket-uploads
      description: REST surface for Bucket}?uploads.
      operations:
      - method: GET
        name: listmultipartuploads
        description: Amazon Web Services List Multipart Uploads
        call: s3-multipart-uploads.listmultipartuploads
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: s3-multipart-uploads-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services AWS S3 — Multipart Uploads. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-list-multipart
      description: Amazon Web Services List Multipart Uploads
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: s3-multipart-uploads.listmultipartuploads
      outputParameters:
      - type: object
        mapping: $.
