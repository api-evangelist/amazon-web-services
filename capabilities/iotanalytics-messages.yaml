naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services iotanalytics — Messages
  description: 'Amazon Web Services iotanalytics — Messages. 1 operations. Lead operation: Amazon Web Services Batchputmessage.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: iotanalytics-messages
    baseUri: ''
    description: Amazon Web Services iotanalytics — Messages business capability. Self-contained, no shared references.
    resources:
    - name: messages-batch
      path: /messages/batch
      operations:
      - name: amazonwebservicesbatchputmessage
        method: POST
        description: Amazon Web Services Batchputmessage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: iotanalytics-messages-rest
    port: 8080
    description: REST adapter for Amazon Web Services iotanalytics — Messages. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/messages/batch
      name: messages-batch
      description: REST surface for messages-batch.
      operations:
      - method: POST
        name: amazonwebservicesbatchputmessage
        description: Amazon Web Services Batchputmessage
        call: iotanalytics-messages.amazonwebservicesbatchputmessage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iotanalytics-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services iotanalytics — Messages. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-web-services-batchputmessage
      description: Amazon Web Services Batchputmessage
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iotanalytics-messages.amazonwebservicesbatchputmessage
      outputParameters:
      - type: object
        mapping: $.
