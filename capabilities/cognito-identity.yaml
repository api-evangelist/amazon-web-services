naftiko: 1.0.0-alpha2
info:
  label: Amazon Web Services cognito-identity
  description: 'Amazon Web Services cognito-identity. 1 operations. Lead operation: Amazon Web Services Updateidentitypool.
    Self-contained Naftiko capability covering one Amazon Web Services business surface.'
  tags:
  - Amazon Web Services
  - Amazon Web Services cognito-identity
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_WEB_SERVICES_API_KEY: AMAZON_WEB_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: cognito-identity
    baseUri: ''
    description: Amazon Web Services cognito-identity business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: amazonwebservicesupdateidentitypool
        method: POST
        description: Amazon Web Services Updateidentitypool
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: cognito-identity-rest
    port: 8080
    description: REST adapter for Amazon Web Services cognito-identity. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: amazonwebservicesupdateidentitypool
        description: Amazon Web Services Updateidentitypool
        call: cognito-identity.amazonwebservicesupdateidentitypool
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cognito-identity-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Web Services cognito-identity. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-web-services-updateidentitypool
      description: Amazon Web Services Updateidentitypool
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cognito-identity.amazonwebservicesupdateidentitypool
      outputParameters:
      - type: object
        mapping: $.
