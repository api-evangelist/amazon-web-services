openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Signing Profiles API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Signing Profiles
paths:
  /signing-profiles/{profileName}/permissions:
    GET:
      summary: Amazon Web Services Listprofilepermissions
      description: Lists the cross-account permissions associated with a signing profile.
      operationId: amazonWebServicesListProfilePermissions
      tags:
      - Signing Profiles
  /signing-profiles/{profileName}:
    PUT:
      summary: Amazon Web Services Putsigningprofile
      description: 'Creates a signing profile. A signing profile is a code-signing template that can be used to carry out a pre-defined signing job. '
      operationId: amazonWebServicesPutSigningProfile
      tags:
      - Signing Profiles
  /signing-profiles:
    GET:
      summary: Amazon Web Services Listsigningprofiles
      description: Lists all available signing profiles in your AWS account. Returns only profiles with an ACTIVE status unless the includeCanceled request field is set to true. If additional jobs remain to be listed, AWS Signer returns a nextToken value. Use this value in subsequent calls to ListSigningJobs to fetch the remaining values. You can continue calling ListSigningJobs with your maxResults parameter and with new values that Signer returns in the nextToken parameter until all of your signing jobs have been returned.
      operationId: amazonWebServicesListSigningProfiles
      tags:
      - Signing Profiles
  /signing-profiles/{profileName}/permissions/{statementId}:
    DELETE:
      summary: Amazon Web Services Removeprofilepermission
      description: Removes cross-account permissions from a signing profile.
      operationId: amazonWebServicesRemoveProfilePermission
      tags:
      - Signing Profiles
  /signing-profiles/{profileName}/revoke:
    PUT:
      summary: Amazon Web Services Revokesigningprofile
      description: Changes the state of a signing profile to REVOKED. This indicates that signatures generated using the signing profile after an effective start date are no longer valid.
      operationId: amazonWebServicesRevokeSigningProfile
      tags:
      - Signing Profiles
