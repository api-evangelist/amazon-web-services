openapi: 3.1.0
info:
  title: Amazon Web Services iot-roborunner
  description: >-
    <p>An example service, deployed with the Octane Service creator, which will
    echo the string</p>
paths:
  /createDestination:
    POST:
      summary: Amazon Web Services Createdestination
      description: Grants permission to create a destination
      operationId: amazonWebServicesCreateDestination
      tags:
        - createDestination
  /createSite:
    POST:
      summary: Amazon Web Services Createsite
      description: Grants permission to create a site
      operationId: amazonWebServicesCreateSite
      tags:
        - createSite
  /createWorker:
    POST:
      summary: Amazon Web Services Createworker
      description: Grants permission to create a worker
      operationId: amazonWebServicesCreateWorker
      tags:
        - createWorker
  /createWorkerFleet:
    POST:
      summary: Amazon Web Services Createworkerfleet
      description: Grants permission to create a worker fleet
      operationId: amazonWebServicesCreateWorkerFleet
      tags:
        - createWorkerFleet
  /deleteDestination:
    POST:
      summary: Amazon Web Services Deletedestination
      description: Grants permission to delete a destination
      operationId: amazonWebServicesDeleteDestination
      tags:
        - deleteDestination
  /deleteSite:
    POST:
      summary: Amazon Web Services Deletesite
      description: Grants permission to delete a site
      operationId: amazonWebServicesDeleteSite
      tags:
        - deleteSite
  /deleteWorker:
    POST:
      summary: Amazon Web Services Deleteworker
      description: Grants permission to delete a worker
      operationId: amazonWebServicesDeleteWorker
      tags:
        - deleteWorker
  /deleteWorkerFleet:
    POST:
      summary: Amazon Web Services Deleteworkerfleet
      description: Grants permission to delete a worker fleet
      operationId: amazonWebServicesDeleteWorkerFleet
      tags:
        - deleteWorkerFleet
  /getDestination:
    GET:
      summary: Amazon Web Services Getdestination
      description: Grants permission to get a destination
      operationId: amazonWebServicesGetDestination
      tags:
        - getDestination
  /getSite:
    GET:
      summary: Amazon Web Services Getsite
      description: Grants permission to get a site
      operationId: amazonWebServicesGetSite
      tags:
        - getSite
  /getWorker:
    GET:
      summary: Amazon Web Services Getworker
      description: Grants permission to get a worker
      operationId: amazonWebServicesGetWorker
      tags:
        - getWorker
  /getWorkerFleet:
    GET:
      summary: Amazon Web Services Getworkerfleet
      description: Grants permission to get a worker fleet
      operationId: amazonWebServicesGetWorkerFleet
      tags:
        - getWorkerFleet
  /listDestinations:
    GET:
      summary: Amazon Web Services Listdestinations
      description: Grants permission to list destinations
      operationId: amazonWebServicesListDestinations
      tags:
        - listDestinations
  /listSites:
    GET:
      summary: Amazon Web Services Listsites
      description: Grants permission to list sites
      operationId: amazonWebServicesListSites
      tags:
        - listSites
  /listWorkerFleets:
    GET:
      summary: Amazon Web Services Listworkerfleets
      description: Grants permission to list worker fleets
      operationId: amazonWebServicesListWorkerFleets
      tags:
        - listWorkerFleets
  /listWorkers:
    GET:
      summary: Amazon Web Services Listworkers
      description: Grants permission to list workers
      operationId: amazonWebServicesListWorkers
      tags:
        - listWorkers
  /updateDestination:
    POST:
      summary: Amazon Web Services Updatedestination
      description: Grants permission to update a destination
      operationId: amazonWebServicesUpdateDestination
      tags:
        - updateDestination
  /updateSite:
    POST:
      summary: Amazon Web Services Updatesite
      description: Grants permission to update a site
      operationId: amazonWebServicesUpdateSite
      tags:
        - updateSite
  /updateWorker:
    POST:
      summary: Amazon Web Services Updateworker
      description: Grants permission to update a worker
      operationId: amazonWebServicesUpdateWorker
      tags:
        - updateWorker
  /updateWorkerFleet:
    POST:
      summary: Amazon Web Services Updateworkerfleet
      description: Grants permission to update a worker fleet
      operationId: amazonWebServicesUpdateWorkerFleet
      tags:
        - updateWorkerFleet
tags:
  - name: createDestination
  - name: createSite
  - name: createWorker
  - name: createWorkerFleet
  - name: deleteDestination
  - name: deleteSite
  - name: deleteWorker
  - name: deleteWorkerFleet
  - name: getDestination
  - name: getSite
  - name: getWorker
  - name: getWorkerFleet
  - name: listDestinations
  - name: listSites
  - name: listWorkerFleets
  - name: listWorkers
  - name: updateDestination
  - name: updateSite
  - name: updateWorker
  - name: updateWorkerFleet
