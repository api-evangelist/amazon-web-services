openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Networks API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Networks
paths:
  /networks/{networkId}/members:
    GET:
      summary: Amazon Web Services Listmembers
      description: Returns a list of the members in a network and properties of their configurations. Applies only to Hyperledger Fabric.
      operationId: amazonWebServicesListMembers
      tags:
      - Networks
  /networks:
    GET:
      summary: Amazon Web Services Listnetworks
      description: Returns information about the networks in which the current Amazon Web Services account participates. Applies to Hyperledger Fabric and Ethereum.
      operationId: amazonWebServicesListNetworks
      tags:
      - Networks
  /networks/{networkId}/nodes:
    GET:
      summary: Amazon Web Services Listnodes
      description: Returns information about the nodes within a network. Applies to Hyperledger Fabric and Ethereum.
      operationId: amazonWebServicesListNodes
      tags:
      - Networks
  /networks/{networkId}/proposals:
    GET:
      summary: Amazon Web Services Listproposals
      description: Returns a list of proposals for the network. Applies only to Hyperledger Fabric.
      operationId: amazonWebServicesListProposals
      tags:
      - Networks
  /networks/{networkId}/members/{memberId}:
    PATCH:
      summary: Amazon Web Services Updatemember
      description: Updates a member configuration with new parameters. Applies only to Hyperledger Fabric.
      operationId: amazonWebServicesUpdateMember
      tags:
      - Networks
  /networks/{networkId}/nodes/{nodeId}:
    PATCH:
      summary: Amazon Web Services Updatenode
      description: Updates a node configuration with new parameters. Applies only to Hyperledger Fabric.
      operationId: amazonWebServicesUpdateNode
      tags:
      - Networks
  /networks/{networkId}:
    GET:
      summary: Amazon Web Services Getnetwork
      description: Returns detailed information about a network. Applies to Hyperledger Fabric and Ethereum.
      operationId: amazonWebServicesGetNetwork
      tags:
      - Networks
  /networks/{networkId}/proposals/{proposalId}:
    GET:
      summary: Amazon Web Services Getproposal
      description: Returns detailed information about a proposal. Applies only to Hyperledger Fabric.
      operationId: amazonWebServicesGetProposal
      tags:
      - Networks
  /networks/{networkId}/proposals/{proposalId}/votes:
    POST:
      summary: Amazon Web Services Voteonproposal
      description: Casts a vote for a specified ProposalId on behalf of a member. The member to vote as, specified by VoterMemberId, must be in the same Amazon Web Services account as the principal that calls the action. Applies only to Hyperledger Fabric.
      operationId: amazonWebServicesVoteOnProposal
      tags:
      - Networks
  /v1/networks:
    POST:
      summary: Amazon Web Services Createnetwork
      description: Creates a network.
      operationId: amazonWebServicesCreateNetwork
      tags:
      - Networks
  /v1/networks/{networkArn}:
    GET:
      summary: Amazon Web Services Getnetwork
      description: Gets the specified network.
      operationId: amazonWebServicesGetNetwork
      tags:
      - Networks
  /v1/networks/list:
    POST:
      summary: Amazon Web Services Listnetworks
      description: Lists networks. Add filters to your request to return a more specific list of results. Use filters to match the status of the network.
      operationId: amazonWebServicesListNetworks
      tags:
      - Networks
