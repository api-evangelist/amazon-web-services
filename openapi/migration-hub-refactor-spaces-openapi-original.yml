openapi: 3.1.0
info:
  title: Amazon Web Services migration-hub-refactor-spaces
  description: >-
    <p><fullname>Amazon Web Services Migration Hub Refactor Spaces</fullname>
    <p>This API reference provides descriptions, syntax, and other details about
    each of the actions and data types for Amazon Web Services Migration Hub
    Refactor Spaces (Refactor Spaces). The topic for each action shows the API
    request parameters and the response. Alternatively, you can use one of the
    Amazon Web Services SDKs to access an API that is tailored to the
    programming language or platform that you're using. For more information,
    see <a href="https://aws.amazon.com/tools/#SDKs">Amazon Web Services
    SDKs</a>.</p> <p>To share Refactor Spaces environments with other Amazon Web
    Services accounts or with Organizations and their OUs, use Resource Access
    Manager's <code>CreateResourceShare</code> API. See <a
    href="https://docs.aws.amazon.com/ram/latest/APIReference/API_CreateResourceShare.html">CreateResourceShare</a>
    in the <i>Amazon Web Services RAM API Reference</i>.</p></p>
paths:
  /environments/{EnvironmentIdentifier}/applications:
    GET:
      summary: Amazon Web Services Listapplications
      description: >-
        Lists all the Amazon Web Services Migration Hub Refactor Spaces
        applications within an environment. 
      operationId: amazonWebServicesListApplications
      tags:
        - Environments
  /environments:
    GET:
      summary: Amazon Web Services Listenvironments
      description: >-
        Lists Amazon Web Services Migration Hub Refactor Spaces environments
        owned by a caller account or shared with the caller account. 
      operationId: amazonWebServicesListEnvironments
      tags:
        - Environments
  /environments/{EnvironmentIdentifier}/applications/{ApplicationIdentifier}/routes:
    GET:
      summary: Amazon Web Services Listroutes
      description: >-
        Lists all the Amazon Web Services Migration Hub Refactor Spaces routes
        within an application. 
      operationId: amazonWebServicesListRoutes
      tags:
        - Environments
  /environments/{EnvironmentIdentifier}/applications/{ApplicationIdentifier}/services:
    GET:
      summary: Amazon Web Services Listservices
      description: >-
        Lists all the Amazon Web Services Migration Hub Refactor Spaces services
        within an application. 
      operationId: amazonWebServicesListServices
      tags:
        - Environments
  /environments/{EnvironmentIdentifier}/applications/{ApplicationIdentifier}:
    GET:
      summary: Amazon Web Services Getapplication
      description: Gets an Amazon Web Services Migration Hub Refactor Spaces application.
      operationId: amazonWebServicesGetApplication
      tags:
        - Environments
  /environments/{EnvironmentIdentifier}:
    GET:
      summary: Amazon Web Services Getenvironment
      description: Gets an Amazon Web Services Migration Hub Refactor Spaces environment.
      operationId: amazonWebServicesGetEnvironment
      tags:
        - Environments
  /resourcepolicy/{Identifier}:
    GET:
      summary: Amazon Web Services Getresourcepolicy
      description: >-
        Gets the resource-based permission policy that is set for the given
        environment. 
      operationId: amazonWebServicesGetResourcePolicy
      tags:
        - Resourcepolicy
  /environments/{EnvironmentIdentifier}/applications/{ApplicationIdentifier}/routes/{RouteIdentifier}:
    PATCH:
      summary: Amazon Web Services Updateroute
      description: ' Updates an Amazon Web Services Migration Hub Refactor Spaces route. '
      operationId: amazonWebServicesUpdateRoute
      tags:
        - Environments
  /environments/{EnvironmentIdentifier}/applications/{ApplicationIdentifier}/services/{ServiceIdentifier}:
    GET:
      summary: Amazon Web Services Getservice
      description: 'Gets an Amazon Web Services Migration Hub Refactor Spaces service. '
      operationId: amazonWebServicesGetService
      tags:
        - Environments
  /environments/{EnvironmentIdentifier}/vpcs:
    GET:
      summary: Amazon Web Services Listenvironmentvpcs
      description: >-
        Lists all Amazon Web Services Migration Hub Refactor Spaces service
        virtual private clouds (VPCs) that are part of the environment. 
      operationId: amazonWebServicesListEnvironmentVpcs
      tags:
        - Environments
  /tags/{ResourceArn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: >-
        Adds to or modifies the tags of the given resource. Tags are metadata
        which can be used to manage a resource. To untag a resource, the caller
        account must be the same as the resource’s OwnerAccountId. Untagging
        resources across accounts is not supported. 
      operationId: amazonWebServicesUntagResource
      tags:
        - Tags
  /resourcepolicy:
    PUT:
      summary: Amazon Web Services Putresourcepolicy
      description: >-
        Attaches a resource-based permission policy to the Amazon Web Services
        Migration Hub Refactor Spaces environment. The policy must contain the
        same actions and condition statements as the
        arn:aws:ram::aws:permission/AWSRAMDefaultPermissionRefactorSpacesEnvironment
        permission in Resource Access Manager. The policy must not contain new
        lines or blank lines. 
      operationId: amazonWebServicesPutResourcePolicy
      tags:
        - Resourcepolicy
tags:
  - name: Environments
  - name: Resourcepolicy
  - name: Tags
