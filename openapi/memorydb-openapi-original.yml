info:
  title: Amazon Web Services memorydb
  description: >-
    <p>MemoryDB for Redis is a fully managed, Redis-compatible, in-memory
    database that delivers ultra-fast performance and Multi-AZ durability for
    modern applications built using microservices architectures. MemoryDB stores
    the entire database in-memory, enabling low latency and high throughput data
    access. It is compatible with Redis, a popular open source data store,
    enabling you to leverage Redis’ flexible and friendly data structures, APIs,
    and commands.</p>
