openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Invitations API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Invitations
paths:
  /invitations/list:
    POST:
      summary: Amazon Web Services Listinvitations
      description: Retrieves the list of open and accepted behavior graph invitations for the member account. This operation can only be called by an invited member account. Open invitations are invitations that the member account has not responded to. The results do not include behavior graphs for which the member account declined the invitation. The results also do not include behavior graphs that the member account resigned from or was removed from.
      operationId: amazonWebServicesListInvitations
      tags:
      - Invitations
  /invitations/accept:
    POST:
      summary: Amazon Web Services Acceptinvitation
      description: Accepts an Amazon Macie membership invitation that was received from a specific account.
      operationId: amazonWebServicesAcceptInvitation
      tags:
      - Invitations
  /invitations:
    GET:
      summary: Amazon Web Services Listinvitations
      description: Retrieves information about the Amazon Macie membership invitations that were received by an account.
      operationId: amazonWebServicesListInvitations
      tags:
      - Invitations
  /invitations/decline:
    POST:
      summary: Amazon Web Services Declineinvitations
      description: Declines Amazon Macie membership invitations that were received from specific accounts.
      operationId: amazonWebServicesDeclineInvitations
      tags:
      - Invitations
  /invitations/delete:
    POST:
      summary: Amazon Web Services Deleteinvitations
      description: Deletes Amazon Macie membership invitations that were received from specific accounts.
      operationId: amazonWebServicesDeleteInvitations
      tags:
      - Invitations
  /invitations/count:
    GET:
      summary: Amazon Web Services Getinvitationscount
      description: Retrieves the count of Amazon Macie membership invitations that were received by an account.
      operationId: amazonWebServicesGetInvitationsCount
      tags:
      - Invitations
  /invitations/{invitationId}:
    DELETE:
      summary: Amazon Web Services Rejectinvitation
      description: Rejects an invitation to join a network. This action can be called by a principal in an Amazon Web Services account that has received an invitation to create a member and join a network. Applies only to Hyperledger Fabric.
      operationId: amazonWebServicesRejectInvitation
      tags:
      - Invitations
