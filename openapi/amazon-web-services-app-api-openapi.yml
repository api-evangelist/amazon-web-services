openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 App API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: App
paths:
  /app/{appId}/environment/{environmentName}/components:
    GET:
      summary: Amazon Web Services Listcomponents
      description: Retrieves a list of components for a specified Amplify app and backend environment.
      operationId: amazonWebServicesListComponents
      tags:
      - App
  /app/{appId}/environment/{environmentName}/forms:
    GET:
      summary: Amazon Web Services Listforms
      description: Retrieves a list of forms for a specified Amplify app and backend environment.
      operationId: amazonWebServicesListForms
      tags:
      - App
  /app/{appId}/environment/{environmentName}/themes:
    GET:
      summary: Amazon Web Services Listthemes
      description: Retrieves a list of themes for a specified Amplify app and backend environment.
      operationId: amazonWebServicesListThemes
      tags:
      - App
  /app/{appId}/environment/{environmentName}/components/{id}:
    PATCH:
      summary: Amazon Web Services Updatecomponent
      description: Updates an existing component.
      operationId: amazonWebServicesUpdateComponent
      tags:
      - App
  /app/{appId}/environment/{environmentName}/forms/{id}:
    PATCH:
      summary: Amazon Web Services Updateform
      description: Updates an existing form.
      operationId: amazonWebServicesUpdateForm
      tags:
      - App
  /app/{appId}/environment/{environmentName}/themes/{id}:
    PATCH:
      summary: Amazon Web Services Updatetheme
      description: Updates an existing theme.
      operationId: amazonWebServicesUpdateTheme
      tags:
      - App
  /app/{appId}/environment/{environmentName}/codegen-jobs/{id}:
    GET:
      summary: Amazon Web Services Getcodegenjob
      description: Returns an existing code generation job.
      operationId: amazonWebServicesGetCodegenJob
      tags:
      - App
  /app/{appId}/environment/{environmentName}/metadata:
    GET:
      summary: Amazon Web Services Getmetadata
      description: Returns existing metadata for an Amplify app.
      operationId: amazonWebServicesGetMetadata
      tags:
      - App
  /app/{appId}/environment/{environmentName}/codegen-jobs:
    POST:
      summary: Amazon Web Services Startcodegenjob
      description: Starts a code generation job for a specified Amplify app and backend environment.
      operationId: amazonWebServicesStartCodegenJob
      tags:
      - App
  /app/{appId}/environment/{environmentName}/metadata/features/{featureName}:
    PUT:
      summary: Amazon Web Services Putmetadataflag
      description: Stores the metadata information about a feature on a form.
      operationId: amazonWebServicesPutMetadataFlag
      tags:
      - App
