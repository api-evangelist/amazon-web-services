openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Campaigns API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Campaigns
paths:
  /campaigns:
    PUT:
      summary: Amazon Web Services Createcampaign
      description: Creates a campaign for the specified Amazon Connect account. This API is idempotent.
      operationId: amazonWebServicesCreateCampaign
      tags:
      - Campaigns
  /campaigns/{id}:
    GET:
      summary: Amazon Web Services Describecampaign
      description: Describes the specific campaign.
      operationId: amazonWebServicesDescribeCampaign
      tags:
      - Campaigns
  /campaigns/{id}/state:
    GET:
      summary: Amazon Web Services Getcampaignstate
      description: Get state of a campaign for the specified Amazon Connect account.
      operationId: amazonWebServicesGetCampaignState
      tags:
      - Campaigns
  /campaigns/{id}/pause:
    POST:
      summary: Amazon Web Services Pausecampaign
      description: Pauses a campaign for the specified Amazon Connect account.
      operationId: amazonWebServicesPauseCampaign
      tags:
      - Campaigns
  /campaigns/{id}/dial-requests:
    PUT:
      summary: Amazon Web Services Putdialrequestbatch
      description: Creates dials requests for the specified campaign Amazon Connect account. This API is idempotent.
      operationId: amazonWebServicesPutDialRequestBatch
      tags:
      - Campaigns
  /campaigns/{id}/resume:
    POST:
      summary: Amazon Web Services Resumecampaign
      description: Stops a campaign for the specified Amazon Connect account.
      operationId: amazonWebServicesResumeCampaign
      tags:
      - Campaigns
  /campaigns/{id}/start:
    POST:
      summary: Amazon Web Services Startcampaign
      description: Starts a campaign for the specified Amazon Connect account.
      operationId: amazonWebServicesStartCampaign
      tags:
      - Campaigns
  /campaigns/{id}/stop:
    POST:
      summary: Amazon Web Services Stopcampaign
      description: Stops a campaign for the specified Amazon Connect account.
      operationId: amazonWebServicesStopCampaign
      tags:
      - Campaigns
  /campaigns/{id}/dialer-config:
    POST:
      summary: Amazon Web Services Updatecampaigndialerconfig
      description: Updates the dialer config of a campaign. This API is idempotent.
      operationId: amazonWebServicesUpdateCampaignDialerConfig
      tags:
      - Campaigns
  /campaigns/{id}/name:
    POST:
      summary: Amazon Web Services Updatecampaignname
      description: Updates the name of a campaign. This API is idempotent.
      operationId: amazonWebServicesUpdateCampaignName
      tags:
      - Campaigns
  /campaigns/{id}/outbound-call-config:
    POST:
      summary: Amazon Web Services Updatecampaignoutboundcallconfig
      description: Updates the outbound call config of a campaign. This API is idempotent.
      operationId: amazonWebServicesUpdateCampaignOutboundCallConfig
      tags:
      - Campaigns
