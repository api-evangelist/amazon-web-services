openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Lenses API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Lenses
paths:
  /lenses/{LensAlias}/shares:
    GET:
      summary: Amazon Web Services Listlensshares
      description: List the lens shares associated with the lens.
      operationId: amazonWebServicesListLensShares
      tags:
      - Lenses
  /lenses/{LensAlias}/versions:
    POST:
      summary: Amazon Web Services Createlensversion
      description: 'Create a new lens version. A lens can have up to 100 versions. Use this operation to publish a new lens version after you have imported a lens. The LensAlias is used to identify the lens to be published. The owner of a lens can share the lens with other Amazon Web Services accounts and users in the same Amazon Web Services Region. Only the owner of a lens can delete it. '
      operationId: amazonWebServicesCreateLensVersion
      tags:
      - Lenses
  /lenses/{LensAlias}:
    GET:
      summary: Amazon Web Services Getlens
      description: Get an existing lens.
      operationId: amazonWebServicesGetLens
      tags:
      - Lenses
  /lenses/{LensAlias}/shares/{ShareId}:
    DELETE:
      summary: Amazon Web Services Deletelensshare
      description: 'Delete a lens share. After the lens share is deleted, Amazon Web Services accounts, users, organizations, and organizational units (OUs) that you shared the lens with can continue to use it, but they will no longer be able to apply it to new workloads.   Disclaimer  By sharing your custom lenses with other Amazon Web Services accounts, you acknowledge that Amazon Web Services will make your custom lenses available to those other accounts. Those other accounts may continue to access and use your shared custom lenses even if you delete the custom lenses from your own Amazon Web Services account or terminate your Amazon Web Services account. '
      operationId: amazonWebServicesDeleteLensShare
      tags:
      - Lenses
  /lenses/{LensAlias}/export:
    GET:
      summary: Amazon Web Services Exportlens
      description: 'Export an existing lens. Only the owner of a lens can export it. Lenses provided by Amazon Web Services (Amazon Web Services Official Content) cannot be exported. Lenses are defined in JSON. For more information, see JSON format specification in the Well-Architected Tool User Guide.   Disclaimer  Do not include or gather personal identifiable information (PII) of end users or other identifiable individuals in or via your custom lenses. If your custom lens or those shared with you and used in your account do include or collect PII you are responsible for: ensuring that the included PII is processed in accordance with applicable law, providing adequate privacy notices, and obtaining necessary consents for processing such data. '
      operationId: amazonWebServicesExportLens
      tags:
      - Lenses
  /lenses/{LensAlias}/versionDifference:
    GET:
      summary: Amazon Web Services Getlensversiondifference
      description: Get lens version differences.
      operationId: amazonWebServicesGetLensVersionDifference
      tags:
      - Lenses
  /lenses:
    GET:
      summary: Amazon Web Services Listlenses
      description: List the available lenses.
      operationId: amazonWebServicesListLenses
      tags:
      - Lenses
