openapi: 3.1.0
info:
  title: Amazon Web Services launch-wizard
  description: >-
    <p>Launch Wizard offers a guided way of sizing, configuring, and deploying
    Amazon Web Services resources for third party applications, such as
    Microsoft SQL Server Always On and HANA based SAP systems, without the need
    to manually identify and provision individual Amazon Web Services
    resources.</p>
paths:
  /createDeployment:
    POST:
      summary: Amazon Web Services Createdeployment
      description: >-
        Creates a deployment for the given workload. Deployments created by this
        operation are not available in the Launch Wizard console to use the
        Clone deployment action on.
      operationId: amazonWebServicesCreateDeployment
      tags:
        - createDeployment
  /deleteDeployment:
    POST:
      summary: Amazon Web Services Deletedeployment
      description: Deletes a deployment.
      operationId: amazonWebServicesDeleteDeployment
      tags:
        - deleteDeployment
  /getDeployment:
    POST:
      summary: Amazon Web Services Getdeployment
      description: Returns information about the deployment.
      operationId: amazonWebServicesGetDeployment
      tags:
        - getDeployment
  /getWorkload:
    POST:
      summary: Amazon Web Services Getworkload
      description: Returns information about a workload.
      operationId: amazonWebServicesGetWorkload
      tags:
        - getWorkload
  /listDeploymentEvents:
    POST:
      summary: Amazon Web Services Listdeploymentevents
      description: Lists the events of a deployment.
      operationId: amazonWebServicesListDeploymentEvents
      tags:
        - listDeploymentEvents
  /listDeployments:
    POST:
      summary: Amazon Web Services Listdeployments
      description: Lists the deployments that have been created.
      operationId: amazonWebServicesListDeployments
      tags:
        - listDeployments
  /listWorkloadDeploymentPatterns:
    POST:
      summary: Amazon Web Services Listworkloaddeploymentpatterns
      description: Lists the workload deployment patterns.
      operationId: amazonWebServicesListWorkloadDeploymentPatterns
      tags:
        - listWorkloadDeploymentPatterns
  /listWorkloads:
    POST:
      summary: Amazon Web Services Listworkloads
      description: Lists the workloads.
      operationId: amazonWebServicesListWorkloads
      tags:
        - listWorkloads
tags:
  - name: createDeployment
  - name: deleteDeployment
  - name: getDeployment
  - name: getWorkload
  - name: listDeploymentEvents
  - name: listDeployments
  - name: listWorkloadDeploymentPatterns
  - name: listWorkloads
