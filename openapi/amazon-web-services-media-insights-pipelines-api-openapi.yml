openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Media Insights Pipelines API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Media Insights Pipelines
paths:
  /media-insights-pipelines:
    POST:
      summary: Amazon Web Services Createmediainsightspipeline
      description: Creates a media insights pipeline.
      operationId: amazonWebServicesCreateMediaInsightsPipeline
      tags:
      - Media Insights Pipelines
  /media-insights-pipelines/{identifier}/speaker-search-tasks/{speakerSearchTaskId}:
    GET:
      summary: Amazon Web Services Getspeakersearchtask
      description: Retrieves the details of the specified speaker search task.
      operationId: amazonWebServicesGetSpeakerSearchTask
      tags:
      - Media Insights Pipelines
  /media-insights-pipelines/{identifier}/voice-tone-analysis-tasks/{voiceToneAnalysisTaskId}:
    GET:
      summary: Amazon Web Services Getvoicetoneanalysistask
      description: Retrieves the details of a voice tone analysis task.
      operationId: amazonWebServicesGetVoiceToneAnalysisTask
      tags:
      - Media Insights Pipelines
  /media-insights-pipelines/{identifier}/speaker-search-tasks?operation=start:
    POST:
      summary: Amazon Web Services Startspeakersearchtask
      description: 'Starts a speaker search task.  Before starting any speaker search tasks, you must provide all notices and obtain all consents from the speaker as required under applicable privacy and biometrics laws, and as required under the AWS service terms for the Amazon Chime SDK. '
      operationId: amazonWebServicesStartSpeakerSearchTask
      tags:
      - Media Insights Pipelines
  /media-insights-pipelines/{identifier}/voice-tone-analysis-tasks?operation=start:
    POST:
      summary: Amazon Web Services Startvoicetoneanalysistask
      description: 'Starts a voice tone analysis task. For more information about voice tone analysis, see Using Amazon Chime SDK voice analytics in the Amazon Chime SDK Developer Guide.  Before starting any voice tone analysis tasks, you must provide all notices and obtain all consents from the speaker as required under applicable privacy and biometrics laws, and as required under the AWS service terms for the Amazon Chime SDK. '
      operationId: amazonWebServicesStartVoiceToneAnalysisTask
      tags:
      - Media Insights Pipelines
  /media-insights-pipelines/{identifier}/speaker-search-tasks/{speakerSearchTaskId}?operation=stop:
    POST:
      summary: Amazon Web Services Stopspeakersearchtask
      description: Stops a speaker search task.
      operationId: amazonWebServicesStopSpeakerSearchTask
      tags:
      - Media Insights Pipelines
  /media-insights-pipelines/{identifier}/voice-tone-analysis-tasks/{voiceToneAnalysisTaskId}?operation=stop:
    POST:
      summary: Amazon Web Services Stopvoicetoneanalysistask
      description: Stops a voice tone analysis task.
      operationId: amazonWebServicesStopVoiceToneAnalysisTask
      tags:
      - Media Insights Pipelines
