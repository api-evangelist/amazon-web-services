openapi: 3.1.0
info:
  title: Amazon Web Services drs
  description: <p>AWS Elastic Disaster Recovery Service.</p>
paths:
  /AssociateSourceNetworkStack:
    POST:
      summary: Amazon Web Services Associatesourcenetworkstack
      description: >-
        Associate a Source Network to an existing CloudFormation Stack and
        modify launch templates to use this network. Can be used for reverting
        to previously deployed CloudFormation stacks.
      operationId: amazonWebServicesAssociateSourceNetworkStack
  /CreateExtendedSourceServer:
    POST:
      summary: Amazon Web Services Createextendedsourceserver
      description: >-
        Create an extended source server in the target Account based on the
        source server in staging account.
      operationId: amazonWebServicesCreateExtendedSourceServer
  /CreateLaunchConfigurationTemplate:
    POST:
      summary: Amazon Web Services Createlaunchconfigurationtemplate
      description: Creates a new Launch Configuration Template.
      operationId: amazonWebServicesCreateLaunchConfigurationTemplate
  /CreateReplicationConfigurationTemplate:
    POST:
      summary: Amazon Web Services Createreplicationconfigurationtemplate
      description: Creates a new ReplicationConfigurationTemplate.
      operationId: amazonWebServicesCreateReplicationConfigurationTemplate
  /CreateSourceNetwork:
    POST:
      summary: Amazon Web Services Createsourcenetwork
      description: Create a new Source Network resource for a provided VPC ID.
      operationId: amazonWebServicesCreateSourceNetwork
  /DeleteJob:
    POST:
      summary: Amazon Web Services Deletejob
      description: Deletes a single Job by ID.
      operationId: amazonWebServicesDeleteJob
  /DeleteLaunchAction:
    POST:
      summary: Amazon Web Services Deletelaunchaction
      description: Deletes a resource launch action.
      operationId: amazonWebServicesDeleteLaunchAction
  /DeleteLaunchConfigurationTemplate:
    POST:
      summary: Amazon Web Services Deletelaunchconfigurationtemplate
      description: Deletes a single Launch Configuration Template by ID.
      operationId: amazonWebServicesDeleteLaunchConfigurationTemplate
  /DeleteRecoveryInstance:
    POST:
      summary: Amazon Web Services Deleterecoveryinstance
      description: >-
        Deletes a single Recovery Instance by ID. This deletes the Recovery
        Instance resource from Elastic Disaster Recovery. The Recovery Instance
        must be disconnected first in order to delete it.
      operationId: amazonWebServicesDeleteRecoveryInstance
  /DeleteReplicationConfigurationTemplate:
    POST:
      summary: Amazon Web Services Deletereplicationconfigurationtemplate
      description: Deletes a single Replication Configuration Template by ID
      operationId: amazonWebServicesDeleteReplicationConfigurationTemplate
  /DeleteSourceNetwork:
    POST:
      summary: Amazon Web Services Deletesourcenetwork
      description: Delete Source Network resource.
      operationId: amazonWebServicesDeleteSourceNetwork
  /DeleteSourceServer:
    POST:
      summary: Amazon Web Services Deletesourceserver
      description: >-
        Deletes a single Source Server by ID. The Source Server must be
        disconnected first.
      operationId: amazonWebServicesDeleteSourceServer
  /DescribeJobLogItems:
    POST:
      summary: Amazon Web Services Describejoblogitems
      description: Retrieves a detailed Job log with pagination.
      operationId: amazonWebServicesDescribeJobLogItems
  /DescribeJobs:
    POST:
      summary: Amazon Web Services Describejobs
      description: >-
        Returns a list of Jobs. Use the JobsID and fromDate and toDate filters
        to limit which jobs are returned. The response is sorted by
        creationDataTime - latest date first. Jobs are created by the
        StartRecovery, TerminateRecoveryInstances and StartFailbackLaunch APIs.
        Jobs are also created by DiagnosticLaunch and
        TerminateDiagnosticInstances, which are APIs available only to *Support*
        and only used in response to relevant support tickets.
      operationId: amazonWebServicesDescribeJobs
  /DescribeLaunchConfigurationTemplates:
    POST:
      summary: Amazon Web Services Describelaunchconfigurationtemplates
      description: >-
        Lists all Launch Configuration Templates, filtered by Launch
        Configuration Template IDs
      operationId: amazonWebServicesDescribeLaunchConfigurationTemplates
  /DescribeRecoveryInstances:
    POST:
      summary: Amazon Web Services Describerecoveryinstances
      description: Lists all Recovery Instances or multiple Recovery Instances by ID.
      operationId: amazonWebServicesDescribeRecoveryInstances
  /DescribeRecoverySnapshots:
    POST:
      summary: Amazon Web Services Describerecoverysnapshots
      description: Lists all Recovery Snapshots for a single Source Server.
      operationId: amazonWebServicesDescribeRecoverySnapshots
  /DescribeReplicationConfigurationTemplates:
    POST:
      summary: Amazon Web Services Describereplicationconfigurationtemplates
      description: >-
        Lists all ReplicationConfigurationTemplates, filtered by Source Server
        IDs.
      operationId: amazonWebServicesDescribeReplicationConfigurationTemplates
  /DescribeSourceNetworks:
    POST:
      summary: Amazon Web Services Describesourcenetworks
      description: Lists all Source Networks or multiple Source Networks filtered by ID.
      operationId: amazonWebServicesDescribeSourceNetworks
  /DescribeSourceServers:
    POST:
      summary: Amazon Web Services Describesourceservers
      description: Lists all Source Servers or multiple Source Servers filtered by ID.
      operationId: amazonWebServicesDescribeSourceServers
  /DisconnectRecoveryInstance:
    POST:
      summary: Amazon Web Services Disconnectrecoveryinstance
      description: >-
        Disconnect a Recovery Instance from Elastic Disaster Recovery. Data
        replication is stopped immediately. All AWS resources created by Elastic
        Disaster Recovery for enabling the replication of the Recovery Instance
        will be terminated / deleted within 90 minutes. If the agent on the
        Recovery Instance has not been prevented from communicating with the
        Elastic Disaster Recovery service, then it will receive a command to
        uninstall itself (within approximately 10 minutes). The following
        properties of the Recovery Instance will be changed immediately:
        dataReplicationInfo.dataReplicationState will be set to DISCONNECTED;
        The totalStorageBytes property for each of
        dataReplicationInfo.replicatedDisks will be set to zero;
        dataReplicationInfo.lagDuration and dataReplicationInfo.lagDuration will
        be nullified.
      operationId: amazonWebServicesDisconnectRecoveryInstance
  /DisconnectSourceServer:
    POST:
      summary: Amazon Web Services Disconnectsourceserver
      description: >-
        Disconnects a specific Source Server from Elastic Disaster Recovery.
        Data replication is stopped immediately. All AWS resources created by
        Elastic Disaster Recovery for enabling the replication of the Source
        Server will be terminated / deleted within 90 minutes. You cannot
        disconnect a Source Server if it has a Recovery Instance. If the agent
        on the Source Server has not been prevented from communicating with the
        Elastic Disaster Recovery service, then it will receive a command to
        uninstall itself (within approximately 10 minutes). The following
        properties of the SourceServer will be changed immediately:
        dataReplicationInfo.dataReplicationState will be set to DISCONNECTED;
        The totalStorageBytes property for each of
        dataReplicationInfo.replicatedDisks will be set to zero;
        dataReplicationInfo.lagDuration and dataReplicationInfo.lagDuration will
        be nullified.
      operationId: amazonWebServicesDisconnectSourceServer
  /ExportSourceNetworkCfnTemplate:
    POST:
      summary: Amazon Web Services Exportsourcenetworkcfntemplate
      description: Export the Source Network CloudFormation template to an S3 bucket.
      operationId: amazonWebServicesExportSourceNetworkCfnTemplate
  /GetFailbackReplicationConfiguration:
    POST:
      summary: Amazon Web Services Getfailbackreplicationconfiguration
      description: >-
        Lists all Failback ReplicationConfigurations, filtered by Recovery
        Instance ID.
      operationId: amazonWebServicesGetFailbackReplicationConfiguration
  /GetLaunchConfiguration:
    POST:
      summary: Amazon Web Services Getlaunchconfiguration
      description: Gets a LaunchConfiguration, filtered by Source Server IDs.
      operationId: amazonWebServicesGetLaunchConfiguration
  /GetReplicationConfiguration:
    POST:
      summary: Amazon Web Services Getreplicationconfiguration
      description: Gets a ReplicationConfiguration, filtered by Source Server ID.
      operationId: amazonWebServicesGetReplicationConfiguration
  /InitializeService:
    POST:
      summary: Amazon Web Services Initializeservice
      description: Initialize Elastic Disaster Recovery.
      operationId: amazonWebServicesInitializeService
  /ListExtensibleSourceServers:
    POST:
      summary: Amazon Web Services Listextensiblesourceservers
      description: >-
        Returns a list of source servers on a staging account that are
        extensible, which means that: a. The source server is not already
        extended into this Account. b. The source server on the Account we’re
        reading from is not an extension of another source server. 
      operationId: amazonWebServicesListExtensibleSourceServers
  /ListLaunchActions:
    POST:
      summary: Amazon Web Services Listlaunchactions
      description: Lists resource launch actions.
      operationId: amazonWebServicesListLaunchActions
  /ListStagingAccounts:
    GET:
      summary: Amazon Web Services Liststagingaccounts
      description: >-
        Returns an array of staging accounts for existing extended source
        servers.
      operationId: amazonWebServicesListStagingAccounts
  /tags/{resourceArn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: >-
        Deletes the specified set of tags from the specified set of Elastic
        Disaster Recovery resources.
      operationId: amazonWebServicesUntagResource
  /PutLaunchAction:
    POST:
      summary: Amazon Web Services Putlaunchaction
      description: Puts a resource launch action.
      operationId: amazonWebServicesPutLaunchAction
  /RetryDataReplication:
    POST:
      summary: Amazon Web Services Retrydatareplication
      description: >-
        WARNING: RetryDataReplication is deprecated. Causes the data replication
        initiation sequence to begin immediately upon next Handshake for the
        specified Source Server ID, regardless of when the previous initiation
        started. This command will work only if the Source Server is stalled or
        is in a DISCONNECTED or STOPPED state. 
      operationId: amazonWebServicesRetryDataReplication
  /ReverseReplication:
    POST:
      summary: Amazon Web Services Reversereplication
      description: >-
        Start replication to origin / target region - applies only to protected
        instances that originated in EC2. For recovery instances on target
        region - starts replication back to origin region. For failback
        instances on origin region - starts replication to target region to
        re-protect them. 
      operationId: amazonWebServicesReverseReplication
  /StartFailbackLaunch:
    POST:
      summary: Amazon Web Services Startfailbacklaunch
      description: >-
        Initiates a Job for launching the machine that is being failed back to
        from the specified Recovery Instance. This will run conversion on the
        failback client and will reboot your machine, thus completing the
        failback process.
      operationId: amazonWebServicesStartFailbackLaunch
  /StartRecovery:
    POST:
      summary: Amazon Web Services Startrecovery
      description: >-
        Launches Recovery Instances for the specified Source Servers. For each
        Source Server you may choose a point in time snapshot to launch from, or
        use an on demand snapshot.
      operationId: amazonWebServicesStartRecovery
  /StartReplication:
    POST:
      summary: Amazon Web Services Startreplication
      description: >-
        Starts replication for a stopped Source Server. This action would make
        the Source Server protected again and restart billing for it.
      operationId: amazonWebServicesStartReplication
  /StartSourceNetworkRecovery:
    POST:
      summary: Amazon Web Services Startsourcenetworkrecovery
      description: >-
        Deploy VPC for the specified Source Network and modify launch templates
        to use this network. The VPC will be deployed using a dedicated
        CloudFormation stack.
      operationId: amazonWebServicesStartSourceNetworkRecovery
  /StartSourceNetworkReplication:
    POST:
      summary: Amazon Web Services Startsourcenetworkreplication
      description: >-
        Starts replication for a Source Network. This action would make the
        Source Network protected.
      operationId: amazonWebServicesStartSourceNetworkReplication
  /StopFailback:
    POST:
      summary: Amazon Web Services Stopfailback
      description: >-
        Stops the failback process for a specified Recovery Instance. This
        changes the Failback State of the Recovery Instance back to
        FAILBACK_NOT_STARTED.
      operationId: amazonWebServicesStopFailback
  /StopReplication:
    POST:
      summary: Amazon Web Services Stopreplication
      description: >-
        Stops replication for a Source Server. This action would make the Source
        Server unprotected, delete its existing snapshots and stop billing for
        it.
      operationId: amazonWebServicesStopReplication
  /StopSourceNetworkReplication:
    POST:
      summary: Amazon Web Services Stopsourcenetworkreplication
      description: >-
        Stops replication for a Source Network. This action would make the
        Source Network unprotected.
      operationId: amazonWebServicesStopSourceNetworkReplication
  /TerminateRecoveryInstances:
    POST:
      summary: Amazon Web Services Terminaterecoveryinstances
      description: >-
        Initiates a Job for terminating the EC2 resources associated with the
        specified Recovery Instances, and then will delete the Recovery
        Instances from the Elastic Disaster Recovery service.
      operationId: amazonWebServicesTerminateRecoveryInstances
  /UpdateFailbackReplicationConfiguration:
    POST:
      summary: Amazon Web Services Updatefailbackreplicationconfiguration
      description: >-
        Allows you to update the failback replication configuration of a
        Recovery Instance by ID.
      operationId: amazonWebServicesUpdateFailbackReplicationConfiguration
  /UpdateLaunchConfiguration:
    POST:
      summary: Amazon Web Services Updatelaunchconfiguration
      description: Updates a LaunchConfiguration by Source Server ID.
      operationId: amazonWebServicesUpdateLaunchConfiguration
  /UpdateLaunchConfigurationTemplate:
    POST:
      summary: Amazon Web Services Updatelaunchconfigurationtemplate
      description: Updates an existing Launch Configuration Template by ID.
      operationId: amazonWebServicesUpdateLaunchConfigurationTemplate
  /UpdateReplicationConfiguration:
    POST:
      summary: Amazon Web Services Updatereplicationconfiguration
      description: Allows you to update a ReplicationConfiguration by Source Server ID.
      operationId: amazonWebServicesUpdateReplicationConfiguration
  /UpdateReplicationConfigurationTemplate:
    POST:
      summary: Amazon Web Services Updatereplicationconfigurationtemplate
      description: Updates a ReplicationConfigurationTemplate by ID.
      operationId: amazonWebServicesUpdateReplicationConfigurationTemplate
tags: []
