      - Accounts
  /accounts/{AwsAccountId}/ip-restriction:
    POST:
      summary: Amazon Web Services Updateiprestriction
      description: Updates the content and status of IP rules. To use this operation, you must provide the entire map of rules. You can use the DescribeIpRestriction operation to get the current rule map.
      operationId: amazonWebServicesUpdateIpRestriction
      tags:
      - Accounts
  /accounts/{AwsAccountId}/templates/{TemplateId}/definition:
    GET:
      summary: Amazon Web Services Describetemplatedefinition
      description: 'Provides a detailed description of the definition of a template.  If you do not need to know details about the content of a template, for instance if you are trying to check the status of a recently created or updated template, use the  DescribeTemplate  instead.  '
      operationId: amazonWebServicesDescribeTemplateDefinition
      tags:
