openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Agents API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Agents
paths:
  /agents/{agentId}/agentversions/{agentVersion}/knowledgebases/:
    POST:
      summary: Amazon Web Services Listagentknowledgebases
      description: List of Knowledge Bases associated to an existing Amazon Bedrock Agent Version
      operationId: amazonWebServicesListAgentKnowledgeBases
      tags:
      - Agents
  /agents/:
    POST:
      summary: Amazon Web Services Listagents
      description: Lists Agents
      operationId: amazonWebServicesListAgents
      tags:
      - Agents
  /agents/{agentId}/agentversions/{agentVersion}/actiongroups/:
    POST:
      summary: Amazon Web Services Listagentactiongroups
      description: Lists an Action Group for existing Amazon Bedrock Agent Version
      operationId: amazonWebServicesListAgentActionGroups
      tags:
      - Agents
  /agents/{agentId}/agentaliases/:
    POST:
      summary: Amazon Web Services Listagentaliases
      description: Lists all the Aliases for an Amazon Bedrock Agent
      operationId: amazonWebServicesListAgentAliases
      tags:
      - Agents
  /agents/{agentId}/:
    PUT:
      summary: Amazon Web Services Updateagent
      description: Updates an existing Amazon Bedrock Agent
      operationId: amazonWebServicesUpdateAgent
      tags:
      - Agents
  /agents/{agentId}/agentversions/{agentVersion}/actiongroups/{actionGroupId}/:
    PUT:
      summary: Amazon Web Services Updateagentactiongroup
      description: Updates an existing Action Group for Amazon Bedrock Agent
      operationId: amazonWebServicesUpdateAgentActionGroup
      tags:
      - Agents
  /agents/{agentId}/agentaliases/{agentAliasId}/:
    PUT:
      summary: Amazon Web Services Updateagentalias
      description: Updates an existing Alias for an Amazon Bedrock Agent
      operationId: amazonWebServicesUpdateAgentAlias
      tags:
      - Agents
  /agents/{agentId}/agentversions/{agentVersion}/:
    GET:
      summary: Amazon Web Services Getagentversion
      description: Gets an Agent version for existing Amazon Bedrock Agent
      operationId: amazonWebServicesGetAgentVersion
      tags:
      - Agents
  /agents/{agentId}/agentversions/{agentVersion}/knowledgebases/{knowledgeBaseId}/:
    PUT:
      summary: Amazon Web Services Updateagentknowledgebase
      description: Updates an existing Knowledge Base associated to an Amazon Bedrock Agent
      operationId: amazonWebServicesUpdateAgentKnowledgeBase
      tags:
      - Agents
  /agents/{agentId}/agentversions/:
    POST:
      summary: Amazon Web Services Listagentversions
      description: Lists Agent Versions
      operationId: amazonWebServicesListAgentVersions
      tags:
      - Agents
  /agents/{agentId}/agentAliases/{agentAliasId}/sessions/{sessionId}/text:
    POST:
      summary: Amazon Web Services Invokeagent
      description: Invokes the specified Bedrock model to run inference using the input provided in the request body.
      operationId: amazonWebServicesInvokeAgent
      tags:
      - Agents
