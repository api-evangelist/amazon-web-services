openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Sip Media Applications API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Sip Media Applications
paths:
  /sip-media-applications:
    GET:
      summary: Amazon Web Services Listsipmediaapplications
      description: 'Lists the SIP media applications under the administrator''s AWS account.   This API is is no longer supported and will not be updated. We recommend using the latest version, ListSipMediaApplications, in the Amazon Chime SDK. Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesListSipMediaApplications
      tags:
      - Sip Media Applications
  /sip-media-applications/{sipMediaApplicationId}/calls:
    POST:
      summary: Amazon Web Services Createsipmediaapplicationcall
      description: 'Creates an outbound call to a phone number from the phone number specified in the request, and it invokes the endpoint of the specified sipMediaApplicationId.   This API is is no longer supported and will not be updated. We recommend using the latest version, CreateSipMediaApplicationCall, in the Amazon Chime SDK. Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesCreateSipMediaApplicationCall
      tags:
      - Sip Media Applications
  /sip-media-applications/{sipMediaApplicationId}:
    PUT:
      summary: Amazon Web Services Updatesipmediaapplication
      description: 'Updates the details of the specified SIP media application.   This API is is no longer supported and will not be updated. We recommend using the latest version, UpdateSipMediaApplication, in the Amazon Chime SDK. Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesUpdateSipMediaApplication
      tags:
      - Sip Media Applications
  /sip-media-applications/{sipMediaApplicationId}/logging-configuration:
    PUT:
      summary: Amazon Web Services Putsipmediaapplicationloggingconfiguration
      description: 'Updates the logging configuration for the specified SIP media application.   This API is is no longer supported and will not be updated. We recommend using the latest version, PutSipMediaApplicationLoggingConfiguration, in the Amazon Chime SDK. Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesPutSipMediaApplicationLoggingConfiguration
      tags:
      - Sip Media Applications
  /sip-media-applications/{sipMediaApplicationId}/calls/{transactionId}:
    POST:
      summary: Amazon Web Services Updatesipmediaapplicationcall
      description: 'Invokes the AWS Lambda function associated with the SIP media application and transaction ID in an update request. The Lambda function can then return a new set of actions.   This API is is no longer supported and will not be updated. We recommend using the latest version, UpdateSipMediaApplicationCall, in the Amazon Chime SDK. Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesUpdateSipMediaApplicationCall
      tags:
      - Sip Media Applications
  /sip-media-applications/{sipMediaApplicationId}/alexa-skill-configuration:
    PUT:
      summary: Amazon Web Services Putsipmediaapplicationalexaskillconfiguration
      description: Updates the Alexa Skill configuration for the SIP media application.
      operationId: amazonWebServicesPutSipMediaApplicationAlexaSkillConfiguration
      tags:
      - Sip Media Applications
