openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Appbundles API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Appbundles
paths:
  /appbundles/{appBundleIdentifier}/appauthorizations/{appAuthorizationIdentifier}/connect:
    POST:
      summary: Amazon Web Services Connectappauthorization
      description: Establishes a connection between Amazon Web Services AppFabric and an application, which allows AppFabric to call the APIs of the application.
      operationId: amazonWebServicesConnectAppAuthorization
      tags:
      - Appbundles
  /appbundles/{appBundleIdentifier}/appauthorizations:
    GET:
      summary: Amazon Web Services Listappauthorizations
      description: Returns a list of all app authorizations configured for an app bundle.
      operationId: amazonWebServicesListAppAuthorizations
      tags:
      - Appbundles
  /appbundles:
    GET:
      summary: Amazon Web Services Listappbundles
      description: Returns a list of app bundles.
      operationId: amazonWebServicesListAppBundles
      tags:
      - Appbundles
  /appbundles/{appBundleIdentifier}/ingestions:
    GET:
      summary: Amazon Web Services Listingestions
      description: Returns a list of all ingestions configured for an app bundle.
      operationId: amazonWebServicesListIngestions
      tags:
      - Appbundles
  /appbundles/{appBundleIdentifier}/ingestions/{ingestionIdentifier}/ingestiondestinations:
    GET:
      summary: Amazon Web Services Listingestiondestinations
      description: Returns a list of all ingestion destinations configured for an ingestion.
      operationId: amazonWebServicesListIngestionDestinations
      tags:
      - Appbundles
  /appbundles/{appBundleIdentifier}/appauthorizations/{appAuthorizationIdentifier}:
    PATCH:
      summary: Amazon Web Services Updateappauthorization
      description: Updates an app authorization within an app bundle, which allows AppFabric to connect to an application. If the app authorization was in a connected state, updating the app authorization will set it back to a PendingConnect state.
      operationId: amazonWebServicesUpdateAppAuthorization
      tags:
      - Appbundles
  /appbundles/{appBundleIdentifier}:
    GET:
      summary: Amazon Web Services Getappbundle
      description: Returns information about an app bundle.
      operationId: amazonWebServicesGetAppBundle
      tags:
      - Appbundles
  /appbundles/{appBundleIdentifier}/ingestions/{ingestionIdentifier}:
    GET:
      summary: Amazon Web Services Getingestion
      description: Returns information about an ingestion.
      operationId: amazonWebServicesGetIngestion
      tags:
      - Appbundles
  /appbundles/{appBundleIdentifier}/ingestions/{ingestionIdentifier}/ingestiondestinations/{ingestionDestinationIdentifier}:
    PATCH:
      summary: Amazon Web Services Updateingestiondestination
      description: Updates an ingestion destination, which specifies how an application's ingested data is processed by Amazon Web Services AppFabric and where it's delivered.
      operationId: amazonWebServicesUpdateIngestionDestination
      tags:
      - Appbundles
  /appbundles/{appBundleIdentifier}/ingestions/{ingestionIdentifier}/start:
    POST:
      summary: Amazon Web Services Startingestion
      description: Starts (enables) an ingestion, which collects data from an application.
      operationId: amazonWebServicesStartIngestion
      tags:
      - Appbundles
  /appbundles/{appBundleIdentifier}/ingestions/{ingestionIdentifier}/stop:
    POST:
      summary: Amazon Web Services Stopingestion
      description: Stops (disables) an ingestion.
      operationId: amazonWebServicesStopIngestion
      tags:
      - Appbundles
