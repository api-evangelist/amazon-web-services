openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Restore Testing API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Restore Testing
paths:
  /restore-testing/plans:
    GET:
      summary: Amazon Web Services Listrestoretestingplans
      description: Returns a list of restore testing plans.
      operationId: amazonWebServicesListRestoreTestingPlans
      tags:
      - Restore Testing
  /restore-testing/plans/{RestoreTestingPlanName}/selections:
    GET:
      summary: Amazon Web Services Listrestoretestingselections
      description: Returns a list of restore testing selections. Can be filtered by MaxResults and RestoreTestingPlanName.
      operationId: amazonWebServicesListRestoreTestingSelections
      tags:
      - Restore Testing
  /restore-testing/plans/{RestoreTestingPlanName}:
    PUT:
      summary: Amazon Web Services Updaterestoretestingplan
      description: 'This request will send changes to your specified restore testing plan. RestoreTestingPlanName cannot be updated after it is created.  RecoveryPointSelection can contain:    Algorithm     ExcludeVaults     IncludeVaults     RecoveryPointTypes     SelectionWindowDays   '
      operationId: amazonWebServicesUpdateRestoreTestingPlan
      tags:
      - Restore Testing
  /restore-testing/plans/{RestoreTestingPlanName}/selections/{RestoreTestingSelectionName}:
    PUT:
      summary: Amazon Web Services Updaterestoretestingselection
      description: Most elements except the RestoreTestingSelectionName can be updated with this request.  RestoreTestingSelection can use either protected resource ARNs or conditions, but not both. That is, if your selection has ProtectedResourceArns, requesting an update with the parameter ProtectedResourceConditions will be unsuccessful.
      operationId: amazonWebServicesUpdateRestoreTestingSelection
      tags:
      - Restore Testing
  /restore-testing/inferred-metadata:
    GET:
      summary: Amazon Web Services Getrestoretestinginferredmetadata
      description: This request returns the minimal required set of metadata needed to start a restore job with secure default settings. BackupVaultName and RecoveryPointArn are required parameters. BackupVaultAccountId is an optional parameter.
      operationId: amazonWebServicesGetRestoreTestingInferredMetadata
      tags:
      - Restore Testing
