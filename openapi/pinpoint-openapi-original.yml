openapi: 3.1.0
info:
  title: Amazon Web Services pinpoint
  description: <p>Doc Engage API - Amazon Pinpoint API</p>
paths:
  /v1/apps:
    GET:
      summary: Amazon Web Services Getapps
      description: >-
        Retrieves information about all the applications that are associated
        with your Amazon Pinpoint account.
      operationId: amazonWebServicesGetApps
      tags:
        - Apps
  /v1/apps/{application-id}/campaigns:
    GET:
      summary: Amazon Web Services Getcampaigns
      description: >-
        Retrieves information about the status, configuration, and other
        settings for all the campaigns that are associated with an application.
      operationId: amazonWebServicesGetCampaigns
      tags:
        - Apps
  /v1/templates/{template-name}/email:
    PUT:
      summary: Amazon Web Services Updateemailtemplate
      description: >-
        Updates an existing message template for messages that are sent through
        the email channel.
      operationId: amazonWebServicesUpdateEmailTemplate
      tags:
        - Templates
  /v1/apps/{application-id}/jobs/export:
    GET:
      summary: Amazon Web Services Getexportjobs
      description: >-
        Retrieves information about the status and settings of all the export
        jobs for an application.
      operationId: amazonWebServicesGetExportJobs
      tags:
        - Apps
  /v1/apps/{application-id}/jobs/import:
    GET:
      summary: Amazon Web Services Getimportjobs
      description: >-
        Retrieves information about the status and settings of all the import
        jobs for an application.
      operationId: amazonWebServicesGetImportJobs
      tags:
        - Apps
  /v1/templates/{template-name}/inapp:
    PUT:
      summary: Amazon Web Services Updateinapptemplate
      description: >-
        Updates an existing message template for messages sent through the
        in-app message channel.
      operationId: amazonWebServicesUpdateInAppTemplate
      tags:
        - Templates
  /v1/apps/{application-id}/journeys:
    GET:
      summary: Amazon Web Services Listjourneys
      description: >-
        Retrieves information about the status, configuration, and other
        settings for all the journeys that are associated with an application.
      operationId: amazonWebServicesListJourneys
      tags:
        - Apps
  /v1/templates/{template-name}/push:
    PUT:
      summary: Amazon Web Services Updatepushtemplate
      description: >-
        Updates an existing message template for messages that are sent through
        a push notification channel.
      operationId: amazonWebServicesUpdatePushTemplate
      tags:
        - Templates
  /v1/recommenders:
    GET:
      summary: Amazon Web Services Getrecommenderconfigurations
      description: >-
        Retrieves information about all the recommender model configurations
        that are associated with your Amazon Pinpoint account.
      operationId: amazonWebServicesGetRecommenderConfigurations
      tags:
        - Recommenders
  /v1/apps/{application-id}/segments:
    GET:
      summary: Amazon Web Services Getsegments
      description: >-
        Retrieves information about the configuration, dimension, and other
        settings for all the segments that are associated with an application.
      operationId: amazonWebServicesGetSegments
      tags:
        - Apps
  /v1/templates/{template-name}/sms:
    PUT:
      summary: Amazon Web Services Updatesmstemplate
      description: >-
        Updates an existing message template for messages that are sent through
        the SMS channel.
      operationId: amazonWebServicesUpdateSmsTemplate
      tags:
        - Templates
  /v1/templates/{template-name}/voice:
    PUT:
      summary: Amazon Web Services Updatevoicetemplate
      description: >-
        Updates an existing message template for messages that are sent through
        the voice channel.
      operationId: amazonWebServicesUpdateVoiceTemplate
      tags:
        - Templates
  /v1/apps/{application-id}/channels/adm:
    PUT:
      summary: Amazon Web Services Updateadmchannel
      description: >-
        Enables the ADM channel for an application or updates the status and
        settings of the ADM channel for an application.
      operationId: amazonWebServicesUpdateAdmChannel
      tags:
        - Apps
  /v1/apps/{application-id}/channels/apns:
    PUT:
      summary: Amazon Web Services Updateapnschannel
      description: >-
        Enables the APNs channel for an application or updates the status and
        settings of the APNs channel for an application.
      operationId: amazonWebServicesUpdateApnsChannel
      tags:
        - Apps
  /v1/apps/{application-id}/channels/apns_sandbox:
    PUT:
      summary: Amazon Web Services Updateapnssandboxchannel
      description: >-
        Enables the APNs sandbox channel for an application or updates the
        status and settings of the APNs sandbox channel for an application.
      operationId: amazonWebServicesUpdateApnsSandboxChannel
      tags:
        - Apps
  /v1/apps/{application-id}/channels/apns_voip:
    PUT:
      summary: Amazon Web Services Updateapnsvoipchannel
      description: >-
        Enables the APNs VoIP channel for an application or updates the status
        and settings of the APNs VoIP channel for an application.
      operationId: amazonWebServicesUpdateApnsVoipChannel
      tags:
        - Apps
  /v1/apps/{application-id}/channels/apns_voip_sandbox:
    PUT:
      summary: Amazon Web Services Updateapnsvoipsandboxchannel
      description: >-
        Enables the APNs VoIP sandbox channel for an application or updates the
        status and settings of the APNs VoIP sandbox channel for an application.
      operationId: amazonWebServicesUpdateApnsVoipSandboxChannel
      tags:
        - Apps
  /v1/apps/{application-id}:
    GET:
      summary: Amazon Web Services Getapp
      description: Retrieves information about an application.
      operationId: amazonWebServicesGetApp
      tags:
        - Apps
  /v1/apps/{application-id}/channels/baidu:
    PUT:
      summary: Amazon Web Services Updatebaiduchannel
      description: >-
        Enables the Baidu channel for an application or updates the status and
        settings of the Baidu channel for an application.
      operationId: amazonWebServicesUpdateBaiduChannel
      tags:
        - Apps
  /v1/apps/{application-id}/campaigns/{campaign-id}:
    PUT:
      summary: Amazon Web Services Updatecampaign
      description: Updates the configuration and other settings for a campaign.
      operationId: amazonWebServicesUpdateCampaign
      tags:
        - Apps
  /v1/apps/{application-id}/channels/email:
    PUT:
      summary: Amazon Web Services Updateemailchannel
      description: >-
        Enables the email channel for an application or updates the status and
        settings of the email channel for an application.
      operationId: amazonWebServicesUpdateEmailChannel
      tags:
        - Apps
  /v1/apps/{application-id}/endpoints/{endpoint-id}:
    PUT:
      summary: Amazon Web Services Updateendpoint
      description: >-
        Creates a new endpoint for an application or updates the settings and
        attributes of an existing endpoint for an application. You can also use
        this operation to define custom attributes for an endpoint. If an update
        includes one or more values for a custom attribute, Amazon Pinpoint
        replaces (overwrites) any existing values with the new values.
      operationId: amazonWebServicesUpdateEndpoint
      tags:
        - Apps
  /v1/apps/{application-id}/eventstream:
    POST:
      summary: Amazon Web Services Puteventstream
      description: >-
        Creates a new event stream for an application or updates the settings of
        an existing event stream for an application.
      operationId: amazonWebServicesPutEventStream
      tags:
        - Apps
  /v1/apps/{application-id}/channels/gcm:
    PUT:
      summary: Amazon Web Services Updategcmchannel
      description: >-
        Enables the GCM channel for an application or updates the status and
        settings of the GCM channel for an application.
      operationId: amazonWebServicesUpdateGcmChannel
      tags:
        - Apps
  /v1/apps/{application-id}/journeys/{journey-id}:
    PUT:
      summary: Amazon Web Services Updatejourney
      description: Updates the configuration and other settings for a journey.
      operationId: amazonWebServicesUpdateJourney
      tags:
        - Apps
  /v1/recommenders/{recommender-id}:
    PUT:
      summary: Amazon Web Services Updaterecommenderconfiguration
      description: Updates an Amazon Pinpoint configuration for a recommender model.
      operationId: amazonWebServicesUpdateRecommenderConfiguration
      tags:
        - Recommenders
  /v1/apps/{application-id}/segments/{segment-id}:
    PUT:
      summary: Amazon Web Services Updatesegment
      description: >-
        Creates a new segment for an application or updates the configuration,
        dimension, and other settings for an existing segment that's associated
        with an application.
      operationId: amazonWebServicesUpdateSegment
      tags:
        - Apps
  /v1/apps/{application-id}/channels/sms:
    PUT:
      summary: Amazon Web Services Updatesmschannel
      description: >-
        Enables the SMS channel for an application or updates the status and
        settings of the SMS channel for an application.
      operationId: amazonWebServicesUpdateSmsChannel
      tags:
        - Apps
  /v1/apps/{application-id}/users/{user-id}:
    GET:
      summary: Amazon Web Services Getuserendpoints
      description: >-
        Retrieves information about all the endpoints that are associated with a
        specific user ID.
      operationId: amazonWebServicesGetUserEndpoints
      tags:
        - Apps
  /v1/apps/{application-id}/channels/voice:
    PUT:
      summary: Amazon Web Services Updatevoicechannel
      description: >-
        Enables the voice channel for an application or updates the status and
        settings of the voice channel for an application.
      operationId: amazonWebServicesUpdateVoiceChannel
      tags:
        - Apps
  /v1/apps/{application-id}/kpis/daterange/{kpi-name}:
    GET:
      summary: Amazon Web Services Getapplicationdaterangekpi
      description: >-
        Retrieves (queries) pre-aggregated data for a standard metric that
        applies to an application.
      operationId: amazonWebServicesGetApplicationDateRangeKpi
      tags:
        - Apps
  /v1/apps/{application-id}/settings:
    PUT:
      summary: Amazon Web Services Updateapplicationsettings
      description: Updates the settings for an application.
      operationId: amazonWebServicesUpdateApplicationSettings
      tags:
        - Apps
  /v1/apps/{application-id}/campaigns/{campaign-id}/activities:
    GET:
      summary: Amazon Web Services Getcampaignactivities
      description: Retrieves information about all the activities for a campaign.
      operationId: amazonWebServicesGetCampaignActivities
      tags:
        - Apps
  /v1/apps/{application-id}/campaigns/{campaign-id}/kpis/daterange/{kpi-name}:
    GET:
      summary: Amazon Web Services Getcampaigndaterangekpi
      description: >-
        Retrieves (queries) pre-aggregated data for a standard metric that
        applies to a campaign.
      operationId: amazonWebServicesGetCampaignDateRangeKpi
      tags:
        - Apps
  /v1/apps/{application-id}/campaigns/{campaign-id}/versions/{version}:
    GET:
      summary: Amazon Web Services Getcampaignversion
      description: >-
        Retrieves information about the status, configuration, and other
        settings for a specific version of a campaign.
      operationId: amazonWebServicesGetCampaignVersion
      tags:
        - Apps
  /v1/apps/{application-id}/campaigns/{campaign-id}/versions:
    GET:
      summary: Amazon Web Services Getcampaignversions
      description: >-
        Retrieves information about the status, configuration, and other
        settings for all versions of a campaign.
      operationId: amazonWebServicesGetCampaignVersions
      tags:
        - Apps
  /v1/apps/{application-id}/channels:
    GET:
      summary: Amazon Web Services Getchannels
      description: >-
        Retrieves information about the history and status of each channel for
        an application.
      operationId: amazonWebServicesGetChannels
      tags:
        - Apps
  /v1/apps/{application-id}/jobs/export/{job-id}:
    GET:
      summary: Amazon Web Services Getexportjob
      description: >-
        Retrieves information about the status and settings of a specific export
        job for an application.
      operationId: amazonWebServicesGetExportJob
      tags:
        - Apps
  /v1/apps/{application-id}/jobs/import/{job-id}:
    GET:
      summary: Amazon Web Services Getimportjob
      description: >-
        Retrieves information about the status and settings of a specific import
        job for an application.
      operationId: amazonWebServicesGetImportJob
      tags:
        - Apps
  /v1/apps/{application-id}/endpoints/{endpoint-id}/inappmessages:
    GET:
      summary: Amazon Web Services Getinappmessages
      description: Retrieves the in-app messages targeted for the provided endpoint ID.
      operationId: amazonWebServicesGetInAppMessages
      tags:
        - Apps
  /v1/apps/{application-id}/journeys/{journey-id}/kpis/daterange/{kpi-name}:
    GET:
      summary: Amazon Web Services Getjourneydaterangekpi
      description: >-
        Retrieves (queries) pre-aggregated data for a standard engagement metric
        that applies to a journey.
      operationId: amazonWebServicesGetJourneyDateRangeKpi
      tags:
        - Apps
  /v1/apps/{application-id}/journeys/{journey-id}/activities/{journey-activity-id}/execution-metrics:
    GET:
      summary: Amazon Web Services Getjourneyexecutionactivitymetrics
      description: >-
        Retrieves (queries) pre-aggregated data for a standard execution metric
        that applies to a journey activity.
      operationId: amazonWebServicesGetJourneyExecutionActivityMetrics
      tags:
        - Apps
  /v1/apps/{application-id}/journeys/{journey-id}/execution-metrics:
    GET:
      summary: Amazon Web Services Getjourneyexecutionmetrics
      description: >-
        Retrieves (queries) pre-aggregated data for a standard execution metric
        that applies to a journey.
      operationId: amazonWebServicesGetJourneyExecutionMetrics
      tags:
        - Apps
  /v1/apps/{application-id}/journeys/{journey-id}/runs/{run-id}/activities/{journey-activity-id}/execution-metrics:
    GET:
      summary: Amazon Web Services Getjourneyrunexecutionactivitymetrics
      description: >-
        Retrieves (queries) pre-aggregated data for a standard run execution
        metric that applies to a journey activity.
      operationId: amazonWebServicesGetJourneyRunExecutionActivityMetrics
      tags:
        - Apps
  /v1/apps/{application-id}/journeys/{journey-id}/runs/{run-id}/execution-metrics:
    GET:
      summary: Amazon Web Services Getjourneyrunexecutionmetrics
      description: >-
        Retrieves (queries) pre-aggregated data for a standard run execution
        metric that applies to a journey.
      operationId: amazonWebServicesGetJourneyRunExecutionMetrics
      tags:
        - Apps
  /v1/apps/{application-id}/journeys/{journey-id}/runs:
    GET:
      summary: Amazon Web Services Getjourneyruns
      description: Provides information about the runs of a journey.
      operationId: amazonWebServicesGetJourneyRuns
      tags:
        - Apps
  /v1/apps/{application-id}/segments/{segment-id}/jobs/export:
    GET:
      summary: Amazon Web Services Getsegmentexportjobs
      description: >-
        Retrieves information about the status and settings of the export jobs
        for a segment.
      operationId: amazonWebServicesGetSegmentExportJobs
      tags:
        - Apps
  /v1/apps/{application-id}/segments/{segment-id}/jobs/import:
    GET:
      summary: Amazon Web Services Getsegmentimportjobs
      description: >-
        Retrieves information about the status and settings of the import jobs
        for a segment.
      operationId: amazonWebServicesGetSegmentImportJobs
      tags:
        - Apps
  /v1/apps/{application-id}/segments/{segment-id}/versions/{version}:
    GET:
      summary: Amazon Web Services Getsegmentversion
      description: >-
        Retrieves information about the configuration, dimension, and other
        settings for a specific version of a segment that's associated with an
        application.
      operationId: amazonWebServicesGetSegmentVersion
      tags:
        - Apps
  /v1/apps/{application-id}/segments/{segment-id}/versions:
    GET:
      summary: Amazon Web Services Getsegmentversions
      description: >-
        Retrieves information about the configuration, dimension, and other
        settings for all the versions of a specific segment that's associated
        with an application.
      operationId: amazonWebServicesGetSegmentVersions
      tags:
        - Apps
  /v1/tags/{resource-arn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: >-
        Removes one or more tags (keys and values) from an application,
        campaign, message template, or segment.
      operationId: amazonWebServicesUntagResource
      tags:
        - Tags
  /v1/templates/{template-name}/{template-type}/versions:
    GET:
      summary: Amazon Web Services Listtemplateversions
      description: >-
        Retrieves information about all the versions of a specific message
        template.
      operationId: amazonWebServicesListTemplateVersions
      tags:
        - Templates
  /v1/templates:
    GET:
      summary: Amazon Web Services Listtemplates
      description: >-
        Retrieves information about all the message templates that are
        associated with your Amazon Pinpoint account.
      operationId: amazonWebServicesListTemplates
      tags:
        - Templates
  /v1/phone/number/validate:
    POST:
      summary: Amazon Web Services Phonenumbervalidate
      description: Retrieves information about a phone number.
      operationId: amazonWebServicesPhoneNumberValidate
      tags:
        - Phone
  /v1/apps/{application-id}/events:
    POST:
      summary: Amazon Web Services Putevents
      description: >-
        Creates a new event to record for endpoints, or creates or updates
        endpoint data that existing events are associated with.
      operationId: amazonWebServicesPutEvents
      tags:
        - Apps
  /v1/apps/{application-id}/attributes/{attribute-type}:
    PUT:
      summary: Amazon Web Services Removeattributes
      description: >-
        Removes one or more custom attributes, of the same attribute type, from
        the application. Existing endpoints still have the attributes but Amazon
        Pinpoint will stop capturing new or changed values for these attributes.
      operationId: amazonWebServicesRemoveAttributes
      tags:
        - Apps
  /v1/apps/{application-id}/messages:
    POST:
      summary: Amazon Web Services Sendmessages
      description: Creates and sends a direct message.
      operationId: amazonWebServicesSendMessages
      tags:
        - Apps
  /v1/apps/{application-id}/otp:
    POST:
      summary: Amazon Web Services Sendotpmessage
      description: Send an OTP message
      operationId: amazonWebServicesSendOTPMessage
      tags:
        - Apps
  /v1/apps/{application-id}/users-messages:
    POST:
      summary: Amazon Web Services Sendusersmessages
      description: Creates and sends a message to a list of users.
      operationId: amazonWebServicesSendUsersMessages
      tags:
        - Apps
  /v1/apps/{application-id}/endpoints:
    PUT:
      summary: Amazon Web Services Updateendpointsbatch
      description: >-
        Creates a new batch of endpoints for an application or updates the
        settings and attributes of a batch of existing endpoints for an
        application. You can also use this operation to define custom attributes
        for a batch of endpoints. If an update includes one or more values for a
        custom attribute, Amazon Pinpoint replaces (overwrites) any existing
        values with the new values.
      operationId: amazonWebServicesUpdateEndpointsBatch
      tags:
        - Apps
  /v1/apps/{application-id}/journeys/{journey-id}/state:
    PUT:
      summary: Amazon Web Services Updatejourneystate
      description: Pause, resume or cancels (stops) a journey.
      operationId: amazonWebServicesUpdateJourneyState
      tags:
        - Apps
  /v1/templates/{template-name}/{template-type}/active-version:
    PUT:
      summary: Amazon Web Services Updatetemplateactiveversion
      description: >-
        Changes the status of a specific version of a message template to
        active.
      operationId: amazonWebServicesUpdateTemplateActiveVersion
      tags:
        - Templates
  /v1/apps/{application-id}/verify-otp:
    POST:
      summary: Amazon Web Services Verifyotpmessage
      description: Verify an OTP
      operationId: amazonWebServicesVerifyOTPMessage
      tags:
        - Apps
tags:
  - name: Apps
  - name: Phone
  - name: Recommenders
  - name: Tags
  - name: Templates
