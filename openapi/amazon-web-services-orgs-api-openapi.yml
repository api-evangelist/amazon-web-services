openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Orgs API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Orgs
paths:
  /orgs/describeOrganizationConfiguration:
    POST:
      summary: Amazon Web Services Describeorganizationconfiguration
      description: 'Returns information about the configuration for the organization behavior graph. Currently indicates whether to automatically enable new organization accounts as member accounts. Can only be called by the Detective administrator account for the organization. '
      operationId: amazonWebServicesDescribeOrganizationConfiguration
      tags:
      - Orgs
  /orgs/disableAdminAccount:
    POST:
      summary: Amazon Web Services Disableorganizationadminaccount
      description: Removes the Detective administrator account in the current Region. Deletes the organization behavior graph. Can only be called by the organization management account. Removing the Detective administrator account does not affect the delegated administrator account for Detective in Organizations. To remove the delegated administrator account in Organizations, use the Organizations API. Removing the delegated administrator account also removes the Detective administrator account in all Regions, except for Regions where the Detective administrator account is the organization management account.
      operationId: amazonWebServicesDisableOrganizationAdminAccount
      tags:
      - Orgs
  /orgs/enableAdminAccount:
    POST:
      summary: Amazon Web Services Enableorganizationadminaccount
      description: Designates the Detective administrator account for the organization in the current Region. If the account does not have Detective enabled, then enables Detective for that account and creates a new behavior graph. Can only be called by the organization management account. If the organization has a delegated administrator account in Organizations, then the Detective administrator account must be either the delegated administrator account or the organization management account. If the organization does not have a delegated administrator account in Organizations, then you can choose any account in the organization. If you choose an account other than the organization management account, Detective calls Organizations to make that account the delegated administrator account for Detective. The organization management account cannot be the delegated administrator account.
      operationId: amazonWebServicesEnableOrganizationAdminAccount
      tags:
      - Orgs
  /orgs/adminAccountslist:
    POST:
      summary: Amazon Web Services Listorganizationadminaccounts
      description: Returns information about the Detective administrator account for an organization. Can only be called by the organization management account.
      operationId: amazonWebServicesListOrganizationAdminAccounts
      tags:
      - Orgs
  /orgs/updateOrganizationConfiguration:
    POST:
      summary: Amazon Web Services Updateorganizationconfiguration
      description: Updates the configuration for the Organizations integration in the current Region. Can only be called by the Detective administrator account for the organization.
      operationId: amazonWebServicesUpdateOrganizationConfiguration
      tags:
      - Orgs
