  /accounts/{AwsAccountId}/search/analyses:
    POST:
      summary: Amazon Web Services Searchanalyses
      description: >-
        Searches for analyses that belong to the user specified in the filter.  This operation is eventually consistent. The results are best effort and
        may not reflect very recent updates and changes. 
      operationId: amazonWebServicesSearchAnalyses
      tags:
        - Accounts
  /accounts/{AwsAccountId}/search/dashboards:
    POST:
      summary: Amazon Web Services Searchdashboards
      description: >-
        Searches for dashboards that belong to a user.   This operation is
