  /accounts/{AwsAccountId}/templates/{TemplateId}/versions:
    GET:
      summary: Amazon Web Services Listtemplateversions
      description: >-
        Lists all the versions of the templates in the current Amazon QuickSight
        account.
      operationId: amazonWebServicesListTemplateVersions
      tags:
        - Accounts
  /accounts/{AwsAccountId}/templates:
    GET:
      summary: Amazon Web Services Listtemplates
      description: Lists all the templates in the current Amazon QuickSight account.
      operationId: amazonWebServicesListTemplates
      tags:
        - Accounts
  /accounts/{AwsAccountId}/themes/{ThemeId}/aliases:
    GET:
      summary: Amazon Web Services Listthemealiases
      description: Lists all the aliases of a theme.
