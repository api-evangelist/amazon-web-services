openapi: 3.1.0
info:
  title: Amazon Web Services quicksight
  description: >-
    <fullname>Amazon QuickSight API Reference</fullname> <p>Amazon QuickSight is
    a fully managed, serverless business intelligence service for the Amazon Web
    Services Cloud that makes it easy to extend data and insights to every user
    in your organization. This API reference contains documentation for a
    programming interface that you can use to manage Amazon QuickSight. </p>
paths:
  /accounts/{AwsAccountId}/data-sets/{DataSetId}/ingestions/{IngestionId}:
    GET:
      summary: Amazon Web Services Describeingestion
      description: Describes a SPICE ingestion.
      operationId: amazonWebServicesDescribeIngestion
      tags:
        - Accounts
  /accounts/{AwsAccountId}/customizations:
    PUT:
      summary: Amazon Web Services Updateaccountcustomization
      description: >-
        Updates Amazon QuickSight customizations for the current Amazon Web
        Services Region. Currently, the only customization that you can use is a
        theme. You can use customizations for your Amazon Web Services account
        or, if you specify a namespace, for a Amazon QuickSight namespace
        instead. Customizations that apply to a namespace override
        customizations that apply to an Amazon Web Services account. To find out
        which customizations apply, use the DescribeAccountCustomization API
        operation. 
      operationId: amazonWebServicesUpdateAccountCustomization
      tags:
        - Accounts
  /account/{AwsAccountId}:
    GET:
      summary: Amazon Web Services Describeaccountsubscription
      description: >-
        Use the DescribeAccountSubscription operation to receive a description
        of an Amazon QuickSight account's subscription. A successful API call
        returns an AccountInfo object that includes an account's name,
        subscription status, authentication type, edition, and notification
        email address.
      operationId: amazonWebServicesDescribeAccountSubscription
      tags:
        - Account
  /accounts/{AwsAccountId}/analyses/{AnalysisId}:
    PUT:
      summary: Amazon Web Services Updateanalysis
      description: Updates an analysis in Amazon QuickSight
      operationId: amazonWebServicesUpdateAnalysis
      tags:
        - Accounts
  /accounts/{AwsAccountId}/dashboards/{DashboardId}:
    PUT:
      summary: Amazon Web Services Updatedashboard
      description: >-
        Updates a dashboard in an Amazon Web Services account.  Updating a
        Dashboard creates a new dashboard version but does not immediately
        publish the new version. You can update the published version of a
        dashboard by using the  UpdateDashboardPublishedVersion  API operation. 
      operationId: amazonWebServicesUpdateDashboard
      tags:
        - Accounts
  /accounts/{AwsAccountId}/data-sets:
    GET:
      summary: Amazon Web Services Listdatasets
      description: >-
        Lists all of the datasets belonging to the current Amazon Web Services
        account in an Amazon Web Services Region. The permissions resource is
        arn:aws:quicksight:region:aws-account-id:dataset/*.
      operationId: amazonWebServicesListDataSets
      tags:
        - Accounts
  /accounts/{AwsAccountId}/data-sources:
    GET:
      summary: Amazon Web Services Listdatasources
      description: >-
        Lists data sources in current Amazon Web Services Region that belong to
        this Amazon Web Services account.
      operationId: amazonWebServicesListDataSources
      tags:
        - Accounts
  /accounts/{AwsAccountId}/folders/{FolderId}:
    PUT:
      summary: Amazon Web Services Updatefolder
      description: Updates the name of a folder.
      operationId: amazonWebServicesUpdateFolder
      tags:
        - Accounts
  /accounts/{AwsAccountId}/folders/{FolderId}/members/{MemberType}/{MemberId}:
    DELETE:
      summary: Amazon Web Services Deletefoldermembership
      description: >-
        Removes an asset, such as a dashboard, analysis, or dataset, from a
        folder.
      operationId: amazonWebServicesDeleteFolderMembership
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}/groups:
    GET:
      summary: Amazon Web Services Listgroups
      description: 'Lists all user groups in Amazon QuickSight. '
      operationId: amazonWebServicesListGroups
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}/groups/{GroupName}/members/{MemberName}:
    GET:
      summary: Amazon Web Services Describegroupmembership
      description: >-
        Use the DescribeGroupMembership operation to determine if a user is a
        member of the specified group. If the user exists and is a member of the
        specified group, an associated GroupMember object is returned.
      operationId: amazonWebServicesDescribeGroupMembership
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}/iam-policy-assignments/:
    POST:
      summary: Amazon Web Services Createiampolicyassignment
      description: >-
        Creates an assignment with one specified IAM policy, identified by its
        Amazon Resource Name (ARN). This policy assignment is attached to the
        specified groups or users of Amazon QuickSight. Assignment names are
        unique per Amazon Web Services account. To avoid overwriting rules in
        other namespaces, use assignment names that are unique.
      operationId: amazonWebServicesCreateIAMPolicyAssignment
      tags:
        - Accounts
  /accounts/{AwsAccountId}:
    POST:
      summary: Amazon Web Services Createnamespace
      description: >-
        (Enterprise edition only) Creates a new namespace for you to use with
        Amazon QuickSight. A namespace allows you to isolate the Amazon
        QuickSight users and groups that are registered for that namespace.
        Users that access the namespace can share assets only with other users
        or groups in the same namespace. They can't see users and groups in
        other namespaces. You can create a namespace after your Amazon Web
        Services account is subscribed to Amazon QuickSight. The namespace must
        be unique within the Amazon Web Services account. By default, there is a
        limit of 100 namespaces per Amazon Web Services account. To increase
        your limit, create a ticket with Amazon Web Services Support. 
      operationId: amazonWebServicesCreateNamespace
      tags:
        - Accounts
  /accounts/{AwsAccountId}/data-sets/{DataSetId}/refresh-schedules:
    PUT:
      summary: Amazon Web Services Updaterefreshschedule
      description: Updates a refresh schedule for a dataset.
      operationId: amazonWebServicesUpdateRefreshSchedule
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}/roles/{Role}/members/{MemberName}:
    DELETE:
      summary: Amazon Web Services Deleterolemembership
      description: Removes a group from a role.
      operationId: amazonWebServicesDeleteRoleMembership
      tags:
        - Accounts
  /accounts/{AwsAccountId}/templates/{TemplateId}:
    PUT:
      summary: Amazon Web Services Updatetemplate
      description: >-
        Updates a template from an existing Amazon QuickSight analysis or
        another template.
      operationId: amazonWebServicesUpdateTemplate
      tags:
        - Accounts
  /accounts/{AwsAccountId}/templates/{TemplateId}/aliases/{AliasName}:
    PUT:
      summary: Amazon Web Services Updatetemplatealias
      description: Updates the template alias of a template.
      operationId: amazonWebServicesUpdateTemplateAlias
      tags:
        - Accounts
  /accounts/{AwsAccountId}/themes/{ThemeId}:
    PUT:
      summary: Amazon Web Services Updatetheme
      description: Updates a theme.
      operationId: amazonWebServicesUpdateTheme
      tags:
        - Accounts
  /accounts/{AwsAccountId}/themes/{ThemeId}/aliases/{AliasName}:
    PUT:
      summary: Amazon Web Services Updatethemealias
      description: Updates an alias of a theme.
      operationId: amazonWebServicesUpdateThemeAlias
      tags:
        - Accounts
  /accounts/{AwsAccountId}/topics:
    GET:
      summary: Amazon Web Services Listtopics
      description: Lists all of the topics within an account.
      operationId: amazonWebServicesListTopics
      tags:
        - Accounts
  /accounts/{AwsAccountId}/topics/{TopicId}/schedules:
    GET:
      summary: Amazon Web Services Listtopicrefreshschedules
      description: Lists all of the refresh schedules for a topic.
      operationId: amazonWebServicesListTopicRefreshSchedules
      tags:
        - Accounts
  /accounts/{AwsAccountId}/vpc-connections:
    GET:
      summary: Amazon Web Services Listvpcconnections
      description: >-
        Lists all of the VPC connections in the current set Amazon Web Services
        Region of an Amazon Web Services account.
      operationId: amazonWebServicesListVPCConnections
      tags:
        - Accounts
  /accounts/{AwsAccountId}/data-sets/{DataSetId}:
    PUT:
      summary: Amazon Web Services Updatedataset
      description: >-
        Updates a dataset. This operation doesn't support datasets that include
        uploaded files as a source. Partial updates are not supported by this
        operation.
      operationId: amazonWebServicesUpdateDataSet
      tags:
        - Accounts
  /accounts/{AwsAccountId}/data-sets/{DataSetId}/refresh-properties:
    PUT:
      summary: Amazon Web Services Putdatasetrefreshproperties
      description: Creates or updates the dataset refresh properties for the dataset.
      operationId: amazonWebServicesPutDataSetRefreshProperties
      tags:
        - Accounts
  /accounts/{AwsAccountId}/data-sources/{DataSourceId}:
    PUT:
      summary: Amazon Web Services Updatedatasource
      description: Updates a data source.
      operationId: amazonWebServicesUpdateDataSource
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}/groups/{GroupName}:
    PUT:
      summary: Amazon Web Services Updategroup
      description: 'Changes a group description. '
      operationId: amazonWebServicesUpdateGroup
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespace/{Namespace}/iam-policy-assignments/{AssignmentName}:
    DELETE:
      summary: Amazon Web Services Deleteiampolicyassignment
      description: Deletes an existing IAM policy assignment.
      operationId: amazonWebServicesDeleteIAMPolicyAssignment
      tags:
        - Accounts
  /accounts/{AwsAccountId}/identity-propagation-config/{Service}:
    POST:
      summary: Amazon Web Services Updateidentitypropagationconfig
      description: >-
        Adds or updates services and authorized targets to configure what the
        Amazon QuickSight IAM Identity Center application can access. This
        operation is only supported for Amazon QuickSight accounts using IAM
        Identity Center
      operationId: amazonWebServicesUpdateIdentityPropagationConfig
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}:
    GET:
      summary: Amazon Web Services Describenamespace
      description: Describes the current namespace.
      operationId: amazonWebServicesDescribeNamespace
      tags:
        - Accounts
  /accounts/{AwsAccountId}/data-sets/{DataSetId}/refresh-schedules/{ScheduleId}:
    GET:
      summary: Amazon Web Services Describerefreshschedule
      description: Provides a summary of a refresh schedule.
      operationId: amazonWebServicesDescribeRefreshSchedule
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}/roles/{Role}/custom-permission:
    PUT:
      summary: Amazon Web Services Updaterolecustompermission
      description: Updates the custom permissions that are associated with a role.
      operationId: amazonWebServicesUpdateRoleCustomPermission
      tags:
        - Accounts
  /accounts/{AwsAccountId}/topics/{TopicId}:
    PUT:
      summary: Amazon Web Services Updatetopic
      description: Updates a topic.
      operationId: amazonWebServicesUpdateTopic
      tags:
        - Accounts
  /accounts/{AwsAccountId}/topics/{TopicId}/schedules/{DatasetId}:
    PUT:
      summary: Amazon Web Services Updatetopicrefreshschedule
      description: Updates a topic refresh schedule.
      operationId: amazonWebServicesUpdateTopicRefreshSchedule
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}/users/{UserName}:
    PUT:
      summary: Amazon Web Services Updateuser
      description: Updates an Amazon QuickSight user.
      operationId: amazonWebServicesUpdateUser
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}/user-principals/{PrincipalId}:
    DELETE:
      summary: Amazon Web Services Deleteuserbyprincipalid
      description: 'Deletes a user identified by its principal ID. '
      operationId: amazonWebServicesDeleteUserByPrincipalId
      tags:
        - Accounts
  /accounts/{AwsAccountId}/vpc-connections/{VPCConnectionId}:
    PUT:
      summary: Amazon Web Services Updatevpcconnection
      description: Updates a VPC connection.
      operationId: amazonWebServicesUpdateVPCConnection
      tags:
        - Accounts
  /accounts/{AwsAccountId}/settings:
    PUT:
      summary: Amazon Web Services Updateaccountsettings
      description: >-
        Updates the Amazon QuickSight settings in your Amazon Web Services
        account.
      operationId: amazonWebServicesUpdateAccountSettings
      tags:
        - Accounts
  /accounts/{AwsAccountId}/analyses/{AnalysisId}/definition:
    GET:
      summary: Amazon Web Services Describeanalysisdefinition
      description: >-
        Provides a detailed description of the definition of an analysis.  If
        you do not need to know details about the content of an Analysis, for
        instance if you are trying to check the status of a recently created or
        updated Analysis, use the  DescribeAnalysis  instead.  
      operationId: amazonWebServicesDescribeAnalysisDefinition
      tags:
        - Accounts
  /accounts/{AwsAccountId}/analyses/{AnalysisId}/permissions:
    PUT:
      summary: Amazon Web Services Updateanalysispermissions
      description: Updates the read and write permissions for an analysis.
      operationId: amazonWebServicesUpdateAnalysisPermissions
      tags:
        - Accounts
  /accounts/{AwsAccountId}/asset-bundle-export-jobs/{AssetBundleExportJobId}:
    GET:
      summary: Amazon Web Services Describeassetbundleexportjob
      description: >-
        Describes an existing export job. Poll job descriptions after a job
        starts to know the status of the job. When a job succeeds, a URL is
        provided to download the exported assets' data from. Download URLs are
        valid for five minutes after they are generated. You can call the
        DescribeAssetBundleExportJob API for a new download URL as needed. Job
        descriptions are available for 14 days after the job starts.
      operationId: amazonWebServicesDescribeAssetBundleExportJob
      tags:
        - Accounts
  /accounts/{AwsAccountId}/asset-bundle-import-jobs/{AssetBundleImportJobId}:
    GET:
      summary: Amazon Web Services Describeassetbundleimportjob
      description: >-
        Describes an existing import job. Poll job descriptions after starting a
        job to know when it has succeeded or failed. Job descriptions are
        available for 14 days after job starts.
      operationId: amazonWebServicesDescribeAssetBundleImportJob
      tags:
        - Accounts
  /accounts/{AwsAccountId}/dashboards/{DashboardId}/definition:
    GET:
      summary: Amazon Web Services Describedashboarddefinition
      description: >-
        Provides a detailed description of the definition of a dashboard.  If
        you do not need to know details about the content of a dashboard, for
        instance if you are trying to check the status of a recently created or
        updated dashboard, use the  DescribeDashboard  instead.  
      operationId: amazonWebServicesDescribeDashboardDefinition
      tags:
        - Accounts
  /accounts/{AwsAccountId}/dashboards/{DashboardId}/permissions:
    PUT:
      summary: Amazon Web Services Updatedashboardpermissions
      description: Updates read and write permissions on a dashboard.
      operationId: amazonWebServicesUpdateDashboardPermissions
      tags:
        - Accounts
  /accounts/{AwsAccountId}/dashboards/{DashboardId}/snapshot-jobs/{SnapshotJobId}:
    GET:
      summary: Amazon Web Services Describedashboardsnapshotjob
      description: >-
        Describes an existing snapshot job. Poll job descriptions after a job
        starts to know the status of the job. For information on available
        status codes, see JobStatus.
      operationId: amazonWebServicesDescribeDashboardSnapshotJob
      tags:
        - Accounts
  /accounts/{AwsAccountId}/dashboards/{DashboardId}/snapshot-jobs/{SnapshotJobId}/result:
    GET:
      summary: Amazon Web Services Describedashboardsnapshotjobresult
      description: >-
        Describes the result of an existing snapshot job that has finished
        running. A finished snapshot job will return a COMPLETED or FAILED
        status when you poll the job with a DescribeDashboardSnapshotJob API
        call. If the job has not finished running, this operation returns a
        message that says Dashboard Snapshot Job with id &lt;SnapshotjobId&gt;
        has not reached a terminal state..
      operationId: amazonWebServicesDescribeDashboardSnapshotJobResult
      tags:
        - Accounts
  /accounts/{AwsAccountId}/data-sets/{DataSetId}/permissions:
    POST:
      summary: Amazon Web Services Updatedatasetpermissions
      description: >-
        Updates the permissions on a dataset. The permissions resource is
        arn:aws:quicksight:region:aws-account-id:dataset/data-set-id.
      operationId: amazonWebServicesUpdateDataSetPermissions
      tags:
        - Accounts
  /accounts/{AwsAccountId}/data-sources/{DataSourceId}/permissions:
    POST:
      summary: Amazon Web Services Updatedatasourcepermissions
      description: Updates the permissions to a data source.
      operationId: amazonWebServicesUpdateDataSourcePermissions
      tags:
        - Accounts
  /accounts/{AwsAccountId}/folders/{FolderId}/permissions:
    PUT:
      summary: Amazon Web Services Updatefolderpermissions
      description: Updates permissions of a folder.
      operationId: amazonWebServicesUpdateFolderPermissions
      tags:
        - Accounts
  /accounts/{AwsAccountId}/folders/{FolderId}/resolved-permissions:
    GET:
      summary: Amazon Web Services Describefolderresolvedpermissions
      description: >-
        Describes the folder resolved permissions. Permissions consists of both
        folder direct permissions and the inherited permissions from the
        ancestor folders.
      operationId: amazonWebServicesDescribeFolderResolvedPermissions
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}/iam-policy-assignments/{AssignmentName}:
    PUT:
      summary: Amazon Web Services Updateiampolicyassignment
      description: >-
        Updates an existing IAM policy assignment. This operation updates only
        the optional parameter or parameters that are specified in the request.
        This overwrites all of the users included in Identities. 
      operationId: amazonWebServicesUpdateIAMPolicyAssignment
      tags:
        - Accounts
  /accounts/{AwsAccountId}/ip-restriction:
    POST:
      summary: Amazon Web Services Updateiprestriction
      description: >-
        Updates the content and status of IP rules. To use this operation, you
        must provide the entire map of rules. You can use the
        DescribeIpRestriction operation to get the current rule map.
      operationId: amazonWebServicesUpdateIpRestriction
      tags:
        - Accounts
  /accounts/{AwsAccountId}/templates/{TemplateId}/definition:
    GET:
      summary: Amazon Web Services Describetemplatedefinition
      description: >-
        Provides a detailed description of the definition of a template.  If you
        do not need to know details about the content of a template, for
        instance if you are trying to check the status of a recently created or
        updated template, use the  DescribeTemplate  instead.  
      operationId: amazonWebServicesDescribeTemplateDefinition
      tags:
        - Accounts
  /accounts/{AwsAccountId}/templates/{TemplateId}/permissions:
    PUT:
      summary: Amazon Web Services Updatetemplatepermissions
      description: Updates the resource permissions for a template.
      operationId: amazonWebServicesUpdateTemplatePermissions
      tags:
        - Accounts
  /accounts/{AwsAccountId}/themes/{ThemeId}/permissions:
    PUT:
      summary: Amazon Web Services Updatethemepermissions
      description: >-
        Updates the resource permissions for a theme. Permissions apply to the
        action to grant or revoke permissions on, for example
        "quicksight:DescribeTheme". Theme permissions apply in groupings. Valid
        groupings include the following for the three levels of permissions,
        which are user, owner, or no permissions:    User    "quicksight:DescribeTheme"     "quicksight:DescribeThemeAlias"     "quicksight:ListThemeAliases"     "quicksight:ListThemeVersions"      Owner    "quicksight:DescribeTheme"     "quicksight:DescribeThemeAlias"     "quicksight:ListThemeAliases"     "quicksight:ListThemeVersions"     "quicksight:DeleteTheme"     "quicksight:UpdateTheme"     "quicksight:CreateThemeAlias"     "quicksight:DeleteThemeAlias"     "quicksight:UpdateThemeAlias"     "quicksight:UpdateThemePermissions"     "quicksight:DescribeThemePermissions"      To specify no permissions,
        omit the permissions list.  
      operationId: amazonWebServicesUpdateThemePermissions
      tags:
        - Accounts
  /accounts/{AwsAccountId}/topics/{TopicId}/permissions:
    PUT:
      summary: Amazon Web Services Updatetopicpermissions
      description: Updates the permissions of a topic.
      operationId: amazonWebServicesUpdateTopicPermissions
      tags:
        - Accounts
  /accounts/{AwsAccountId}/topics/{TopicId}/refresh/{RefreshId}:
    GET:
      summary: Amazon Web Services Describetopicrefresh
      description: Describes the status of a topic refresh.
      operationId: amazonWebServicesDescribeTopicRefresh
      tags:
        - Accounts
  /accounts/{AwsAccountId}/embed-url/anonymous-user:
    POST:
      summary: Amazon Web Services Generateembedurlforanonymoususer
      description: >-
        Generates an embed URL that you can use to embed an Amazon QuickSight
        dashboard or visual in your website, without having to register any
        reader users. Before you use this action, make sure that you have
        configured the dashboards and permissions. The following rules apply to
        the generated URL:   It contains a temporary bearer token. It is valid
        for 5 minutes after it is generated. Once redeemed within this period,
        it cannot be re-used again.   The URL validity period should not be
        confused with the actual session lifetime that can be customized using
        the  SessionLifetimeInMinutes  parameter. The resulting user session is
        valid for 15 minutes (minimum) to 10 hours (maximum). The default
        session duration is 10 hours.   You are charged only when the URL is
        used or there is interaction with Amazon QuickSight.   For more
        information, see Embedded Analytics in the Amazon QuickSight User Guide.
        For more information about the high-level steps for embedding and for an
        interactive demo of the ways you can customize embedding, visit the
        Amazon QuickSight Developer Portal.
      operationId: amazonWebServicesGenerateEmbedUrlForAnonymousUser
      tags:
        - Accounts
  /accounts/{AwsAccountId}/embed-url/registered-user:
    POST:
      summary: Amazon Web Services Generateembedurlforregistereduser
      description: >-
        Generates an embed URL that you can use to embed an Amazon QuickSight
        experience in your website. This action can be used for any type of user
        registered in an Amazon QuickSight account. Before you use this action,
        make sure that you have configured the relevant Amazon QuickSight
        resource and permissions. The following rules apply to the generated
        URL:   It contains a temporary bearer token. It is valid for 5 minutes
        after it is generated. Once redeemed within this period, it cannot be
        re-used again.   The URL validity period should not be confused with the
        actual session lifetime that can be customized using the  SessionLifetimeInMinutes  parameter. The resulting user session is valid
        for 15 minutes (minimum) to 10 hours (maximum). The default session
        duration is 10 hours.   You are charged only when the URL is used or
        there is interaction with Amazon QuickSight.   For more information, see
        Embedded Analytics in the Amazon QuickSight User Guide. For more
        information about the high-level steps for embedding and for an
        interactive demo of the ways you can customize embedding, visit the
        Amazon QuickSight Developer Portal.
      operationId: amazonWebServicesGenerateEmbedUrlForRegisteredUser
      tags:
        - Accounts
  /accounts/{AwsAccountId}/dashboards/{DashboardId}/embed-url:
    GET:
      summary: Amazon Web Services Getdashboardembedurl
      description: >-
        Generates a temporary session URL and authorization code(bearer token)
        that you can use to embed an Amazon QuickSight read-only dashboard in
        your website or application. Before you use this command, make sure that
        you have configured the dashboards and permissions.  Currently, you can
        use GetDashboardEmbedURL only from the server, not from the user's
        browser. The following rules apply to the generated URL:   They must be
        used together.   They can be used one time only.   They are valid for 5
        minutes after you run this command.   You are charged only when the URL
        is used or there is interaction with Amazon QuickSight.   The resulting
        user session is valid for 15 minutes (default) up to 10 hours (maximum).
        You can use the optional SessionLifetimeInMinutes parameter to customize
        session duration.   For more information, see Embedding Analytics Using
        GetDashboardEmbedUrl in the Amazon QuickSight User Guide. For more
        information about the high-level steps for embedding and for an
        interactive demo of the ways you can customize embedding, visit the
        Amazon QuickSight Developer Portal.
      operationId: amazonWebServicesGetDashboardEmbedUrl
      tags:
        - Accounts
  /accounts/{AwsAccountId}/session-embed-url:
    GET:
      summary: Amazon Web Services Getsessionembedurl
      description: >-
        Generates a session URL and authorization code that you can use to embed
        the Amazon Amazon QuickSight console in your web server code. Use
        GetSessionEmbedUrl where you want to provide an authoring portal that
        allows users to create data sources, datasets, analyses, and dashboards.
        The users who access an embedded Amazon QuickSight console need belong
        to the author or admin security cohort. If you want to restrict
        permissions to some of these features, add a custom permissions profile
        to the user with the  UpdateUser  API operation. Use  RegisterUser  API
        operation to add a new user with a custom permission profile attached.
        For more information, see the following sections in the Amazon
        QuickSight User Guide:    Embedding Analytics     Customizing Access to
        the Amazon QuickSight Console   
      operationId: amazonWebServicesGetSessionEmbedUrl
      tags:
        - Accounts
  /accounts/{AwsAccountId}/analyses:
    GET:
      summary: Amazon Web Services Listanalyses
      description: >-
        Lists Amazon QuickSight analyses that exist in the specified Amazon Web
        Services account.
      operationId: amazonWebServicesListAnalyses
      tags:
        - Accounts
  /accounts/{AwsAccountId}/asset-bundle-export-jobs:
    GET:
      summary: Amazon Web Services Listassetbundleexportjobs
      description: >-
        Lists all asset bundle export jobs that have been taken place in the
        last 14 days. Jobs created more than 14 days ago are deleted forever and
        are not returned. If you are using the same job ID for multiple jobs,
        ListAssetBundleExportJobs only returns the most recent job that uses the
        repeated job ID.
      operationId: amazonWebServicesListAssetBundleExportJobs
      tags:
        - Accounts
  /accounts/{AwsAccountId}/asset-bundle-import-jobs:
    GET:
      summary: Amazon Web Services Listassetbundleimportjobs
      description: >-
        Lists all asset bundle import jobs that have taken place in the last 14
        days. Jobs created more than 14 days ago are deleted forever and are not
        returned. If you are using the same job ID for multiple jobs,
        ListAssetBundleImportJobs only returns the most recent job that uses the
        repeated job ID.
      operationId: amazonWebServicesListAssetBundleImportJobs
      tags:
        - Accounts
  /accounts/{AwsAccountId}/dashboards/{DashboardId}/versions:
    GET:
      summary: Amazon Web Services Listdashboardversions
      description: >-
        Lists all the versions of the dashboards in the Amazon QuickSight
        subscription.
      operationId: amazonWebServicesListDashboardVersions
      tags:
        - Accounts
  /accounts/{AwsAccountId}/dashboards:
    GET:
      summary: Amazon Web Services Listdashboards
      description: Lists dashboards in an Amazon Web Services account.
      operationId: amazonWebServicesListDashboards
      tags:
        - Accounts
  /accounts/{AwsAccountId}/folders/{FolderId}/members:
    GET:
      summary: Amazon Web Services Listfoldermembers
      description: 'List all assets (DASHBOARD, ANALYSIS, and DATASET) in a folder. '
      operationId: amazonWebServicesListFolderMembers
      tags:
        - Accounts
  /accounts/{AwsAccountId}/folders:
    GET:
      summary: Amazon Web Services Listfolders
      description: Lists all folders in an account.
      operationId: amazonWebServicesListFolders
      tags:
        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}/groups/{GroupName}/members:
    GET:
      summary: Amazon Web Services Listgroupmemberships
      description: Lists member users in a group.
      operationId: amazonWebServicesListGroupMemberships
      tags:
        - Accounts
