        - Accounts
  /accounts/{AwsAccountId}/namespaces/{Namespace}/groups-search:
    POST:
      summary: Amazon Web Services Searchgroups
      description: >-
        Use the SearchGroups operation to search groups in a specified Amazon
        QuickSight namespace using the supplied filters.
      operationId: amazonWebServicesSearchGroups
      tags:
        - Accounts
  /accounts/{AwsAccountId}/asset-bundle-export-jobs/export:
    POST:
      summary: Amazon Web Services Startassetbundleexportjob
      description: >-
        Starts an Asset Bundle export job. An Asset Bundle export job exports
        specified Amazon QuickSight assets. You can also choose to export any
        asset dependencies in the same job. Export jobs run asynchronously and
        can be polled with a DescribeAssetBundleExportJob API call. When a job
        is successfully completed, a download URL that contains the exported
        assets is returned. The URL is valid for 5 minutes and can be refreshed
        with a DescribeAssetBundleExportJob API call. Each Amazon QuickSight
        account can run up to 5 export jobs concurrently. The API caller must
        have the necessary permissions in their IAM role to access each resource
        before the resources can be exported.
      operationId: amazonWebServicesStartAssetBundleExportJob
      tags:
        - Accounts
  /accounts/{AwsAccountId}/asset-bundle-import-jobs/import:
    POST:
      summary: Amazon Web Services Startassetbundleimportjob
      description: >-
        Starts an Asset Bundle import job. An Asset Bundle import job imports
        specified Amazon QuickSight assets into an Amazon QuickSight account.
        You can also choose to import a naming prefix and specified
        configuration overrides. The assets that are contained in the bundle
        file that you provide are used to create or update a new or existing
        asset in your Amazon QuickSight account. Each Amazon QuickSight account
        can run up to 5 import jobs concurrently. The API caller must have the
        necessary "create", "describe", and "update" permissions in their IAM
        role to access each resource type that is contained in the bundle file
        before the resources can be imported.
      operationId: amazonWebServicesStartAssetBundleImportJob
      tags:
        - Accounts
  /accounts/{AwsAccountId}/dashboards/{DashboardId}/snapshot-jobs:
    POST:
      summary: Amazon Web Services Startdashboardsnapshotjob
      description: >-
        Starts an asynchronous job that generates a dashboard snapshot. You can
        request one of the following format configurations per API call.   1
        paginated PDF   1 Excel workbook   5 CSVs   Poll job descriptions with a
        DescribeDashboardSnapshotJob API call. Once the job succeeds, use the
        DescribeDashboardSnapshotJobResult API to obtain the download URIs that
        the job generates.
      operationId: amazonWebServicesStartDashboardSnapshotJob
      tags:
        - Accounts
  /accounts/{AwsAccountId}/dashboards/{DashboardId}/linked-entities:
    PUT:
      summary: Amazon Web Services Updatedashboardlinks
      description: Updates the linked analyses on a dashboard.
      operationId: amazonWebServicesUpdateDashboardLinks
      tags:
        - Accounts
  /accounts/{AwsAccountId}/dashboards/{DashboardId}/versions/{VersionNumber}:
    PUT:
      summary: Amazon Web Services Updatedashboardpublishedversion
      description: Updates the published version of a dashboard.
      operationId: amazonWebServicesUpdateDashboardPublishedVersion
      tags:
        - Accounts
  /accounts/{AwsAccountId}/public-sharing-settings:
    PUT:
      summary: Amazon Web Services Updatepublicsharingsettings
      description: >-
        Use the UpdatePublicSharingSettings operation to turn on or turn off the
        public sharing settings of an Amazon QuickSight dashboard. To use this
        operation, turn on session capacity pricing for your Amazon QuickSight
        account. Before you can turn on public sharing on your account, make
        sure to give public sharing permissions to an administrative user in the
        Identity and Access Management (IAM) console. For more information on
        using IAM with Amazon QuickSight, see Using Amazon QuickSight with IAM
        in the Amazon QuickSight User Guide.
      operationId: amazonWebServicesUpdatePublicSharingSettings
      tags:
        - Accounts
