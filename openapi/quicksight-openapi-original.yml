      operationId: amazonWebServicesSearchDashboards
      tags:
        - Accounts
  /accounts/{AwsAccountId}/search/data-sets:
    POST:
      summary: Amazon Web Services Searchdatasets
      description: >-
        Use the SearchDataSets operation to search for datasets that belong to
        an account.
      operationId: amazonWebServicesSearchDataSets
      tags:
        - Accounts
  /accounts/{AwsAccountId}/search/data-sources:
    POST:
      summary: Amazon Web Services Searchdatasources
      description: >-
        Use the SearchDataSources operation to search for data sources that
        belong to an account.
      operationId: amazonWebServicesSearchDataSources
