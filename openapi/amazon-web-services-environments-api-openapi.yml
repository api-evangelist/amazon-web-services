openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Environments API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Environments
paths:
  /environments:
    GET:
      summary: Amazon Web Services Listenvironments
      description: Lists the runtime environments.
      operationId: amazonWebServicesListEnvironments
      tags:
      - Environments
  /environments/{environmentId}:
    PATCH:
      summary: Amazon Web Services Updateenvironment
      description: Updates the configuration details for a specific runtime environment.
      operationId: amazonWebServicesUpdateEnvironment
      tags:
      - Environments
  /environments/{EnvironmentIdentifier}/applications:
    GET:
      summary: Amazon Web Services Listapplications
      description: 'Lists all the Amazon Web Services Migration Hub Refactor Spaces applications within an environment. '
      operationId: amazonWebServicesListApplications
      tags:
      - Environments
  /environments/{EnvironmentIdentifier}/applications/{ApplicationIdentifier}/routes:
    GET:
      summary: Amazon Web Services Listroutes
      description: 'Lists all the Amazon Web Services Migration Hub Refactor Spaces routes within an application. '
      operationId: amazonWebServicesListRoutes
      tags:
      - Environments
  /environments/{EnvironmentIdentifier}/applications/{ApplicationIdentifier}/services:
    GET:
      summary: Amazon Web Services Listservices
      description: 'Lists all the Amazon Web Services Migration Hub Refactor Spaces services within an application. '
      operationId: amazonWebServicesListServices
      tags:
      - Environments
  /environments/{EnvironmentIdentifier}/applications/{ApplicationIdentifier}:
    GET:
      summary: Amazon Web Services Getapplication
      description: Gets an Amazon Web Services Migration Hub Refactor Spaces application.
      operationId: amazonWebServicesGetApplication
      tags:
      - Environments
  /environments/{EnvironmentIdentifier}:
    GET:
      summary: Amazon Web Services Getenvironment
      description: Gets an Amazon Web Services Migration Hub Refactor Spaces environment.
      operationId: amazonWebServicesGetEnvironment
      tags:
      - Environments
  /environments/{EnvironmentIdentifier}/applications/{ApplicationIdentifier}/routes/{RouteIdentifier}:
    PATCH:
      summary: Amazon Web Services Updateroute
      description: ' Updates an Amazon Web Services Migration Hub Refactor Spaces route. '
      operationId: amazonWebServicesUpdateRoute
      tags:
      - Environments
  /environments/{EnvironmentIdentifier}/applications/{ApplicationIdentifier}/services/{ServiceIdentifier}:
    GET:
      summary: Amazon Web Services Getservice
      description: 'Gets an Amazon Web Services Migration Hub Refactor Spaces service. '
      operationId: amazonWebServicesGetService
      tags:
      - Environments
  /environments/{EnvironmentIdentifier}/vpcs:
    GET:
      summary: Amazon Web Services Listenvironmentvpcs
      description: 'Lists all Amazon Web Services Migration Hub Refactor Spaces service virtual private clouds (VPCs) that are part of the environment. '
      operationId: amazonWebServicesListEnvironmentVpcs
      tags:
      - Environments
  /environments/{Name}:
    PATCH:
      summary: Amazon Web Services Updateenvironment
      description: Updates an Amazon Managed Workflows for Apache Airflow (MWAA) environment.
      operationId: amazonWebServicesUpdateEnvironment
      tags:
      - Environments
  /environments/{id}:
    PATCH:
      summary: Amazon Web Services Updateenvironment
      description: Updates an environment.
      operationId: amazonWebServicesUpdateEnvironment
      tags:
      - Environments
