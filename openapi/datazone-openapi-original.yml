openapi: 3.1.0
info:
  title: Amazon Web Services datazone
  description: >-
    <p>Amazon DataZone is a data management service that enables you to catalog,
    discover, govern, share, and analyze your data. With Amazon DataZone, you
    can share and access your data across accounts and supported regions. Amazon
    DataZone simplifies your experience across Amazon Web Services services,
    including, but not limited to, Amazon Redshift, Amazon Athena, Amazon Web
    Services Glue, and Amazon Web Services Lake Formation.</p>
paths:
  /v2/domains/{domainIdentifier}/assets/{identifier}/accept-predictions:
    PUT:
      summary: Amazon Web Services Acceptpredictions
      description: >-
        Accepts automatically generated business-friendly metadata for your
        Amazon DataZone assets.
      operationId: amazonWebServicesAcceptPredictions
      tags:
        - Domains
  /v2/domains/{domainIdentifier}/subscription-requests/{identifier}/accept:
