openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Tags API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Tags
paths:
  /tags/{resourceArn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Removes a tag from the specified resource.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
    POST:
      summary: Amazon Web Services Tagresource
      description: Assigns a set of key-value pairs to a recovery point, backup plan, or backup vault identified by an Amazon Resource Name (ARN).
      operationId: amazonWebServicesTagResource
      tags:
      - Tags
  /tags/{resource_arn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Removes a tag from a given resource.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /v2/tags/{resource-arn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Deletes a Tag.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /tags/{ResourceArn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Deletes a tag key and value from an AppConfig resource.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /v20190125/tags:
    GET:
      summary: Amazon Web Services Listtagsforresource
      description: List the tags for an App Mesh resource.
      operationId: amazonWebServicesListTagsForResource
      tags:
      - Tags
  /v1/tags/{resourceArn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Untags a resource.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /tags/{resourceArn}/:
    GET:
      summary: Amazon Web Services Listtags
      description: Returns a list of key-value pairs assigned to a target recovery point, backup plan, or backup vault.  ListTags only works for resource types that support full Backup management of their backups. Those resource types are listed in the "Full Backup management" section of the  Feature availability by resource table.
      operationId: amazonWebServicesListTags
      tags:
      - Tags
  /tags:
    GET:
      summary: Amazon Web Services Listtagsforresource
      description: 'Lists the tags applied to an Amazon Chime SDK meeting and messaging resources.   This API is is no longer supported and will not be updated. We recommend using the applicable latest version in the Amazon Chime SDK.   For meetings: ListTagsForResource.   For messaging: ListTagsForResource.   Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesListTagsForResource
      tags:
      - Tags
    POST:
      summary: Amazon Web Services Tagresource
      description: Adds to or modifies the tags of the given resource. Tags are metadata which can be used to manage a resource. Requires permission to access the TagResource action.
      operationId: amazonWebServicesTagResource
      tags:
      - Tags
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Removes the given tags (metadata) from the resource.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /v1/tags:
    POST:
      summary: Amazon Web Services Listtagsforresource
      description: Gets information about Amazon Web Services tags for a specified Amazon Resource Name (ARN) in CodeArtifact.
      operationId: amazonWebServicesListTagsForResource
      tags:
      - Tags
  /tags/{arn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Untag a resource.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /tags/{resource-arn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Remove resource tags from a Greengrass Resource.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /tags/{resourceARN}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Removes tags from a bot, bot alias, or bot channel.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /v1/tags/{resource-arn}:
    GET:
      summary: Amazon Web Services Listtags
      description: Lists tags for a resource.
      operationId: amazonWebServicesListTags
      tags:
      - Tags
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Removes one or more tags (keys and values) from an application, campaign, message template, or segment.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /v1/tags/{resourceARN}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Removes a tag from an Amazon Q application or a data source.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /v20180820/tags/{resourceArn+}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: ' This operation removes the specified Amazon Web Services resource tags from an S3 resource. Each tag is a label consisting of a user-defined key and value. Tags can help you manage, identify, organize, search for, and filter resources.   This operation is only supported for S3 Storage Lens groups and for S3 Access Grants. The tagged resource can be an S3 Storage Lens group or S3 Access Grants instance, registered location, or grant.    Permissions  You must have the s3:UntagResource permission to use this operation.    For more information about the required Storage Lens Groups permissions, see Setting account permissions to use S3 Storage Lens groups. For information about S3 Tagging errors, see List of Amazon S3 Tagging error codes.'
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /tags/{WorkloadArn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: 'Deletes specified tags from a resource.  The WorkloadArn parameter can be a workload ARN, a custom lens ARN, a profile ARN, or review template ARN.  To specify multiple tags, use separate tagKeys parameters, for example:  DELETE /tags/WorkloadArn?tagKeys=key1&amp;tagKeys=key2 '
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
  /tags/{resourceArn+}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Removes one or more tags from the specified resource.
      operationId: amazonWebServicesUntagResource
      tags:
      - Tags
