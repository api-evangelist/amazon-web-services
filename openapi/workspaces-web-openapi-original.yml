openapi: 3.1.0
info:
  title: Amazon Web Services workspaces-web
  description: >-
    <p>WorkSpaces Web is a low cost, fully managed WorkSpace built specifically
    to facilitate secure, web-based workloads. WorkSpaces Web makes it easy for
    customers to safely provide their employees with access to internal websites
    and SaaS web applications without the administrative burden of appliances or
    specialized client software. WorkSpaces Web provides simple policy tools
    tailored for user interactions, while offloading common tasks like capacity
    management, scaling, and maintaining browser images.</p>
paths:
  /portals/{portalArn+}/browserSettings:
    DELETE:
      summary: Amazon Web Services Disassociatebrowsersettings
      description: Disassociates browser settings from a web portal.
      operationId: amazonWebServicesDisassociateBrowserSettings
  /portals/{portalArn+}/ipAccessSettings:
    DELETE:
      summary: Amazon Web Services Disassociateipaccesssettings
      description: Disassociates IP access settings from a web portal.
      operationId: amazonWebServicesDisassociateIpAccessSettings
  /portals/{portalArn+}/networkSettings:
