openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Voice Connector Groups API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Voice Connector Groups
paths:
  /voice-connector-groups/{voiceConnectorGroupId}?operation=associate-phone-numbers:
    POST:
      summary: Amazon Web Services Associatephonenumberswithvoiceconnectorgroup
      description: 'Associates phone numbers with the specified Amazon Chime Voice Connector group.   This API is is no longer supported and will not be updated. We recommend using the latest version, AssociatePhoneNumbersWithVoiceConnectorGroup, in the Amazon Chime SDK. Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesAssociatePhoneNumbersWithVoiceConnectorGroup
      tags:
      - Voice Connector Groups
  /voice-connector-groups:
    GET:
      summary: Amazon Web Services Listvoiceconnectorgroups
      description: 'Lists the Amazon Chime Voice Connector groups for the administrator''s AWS account.   This API is is no longer supported and will not be updated. We recommend using the latest version, ListVoiceConnectorGroups, in the Amazon Chime SDK. Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesListVoiceConnectorGroups
      tags:
      - Voice Connector Groups
  /voice-connector-groups/{voiceConnectorGroupId}:
    PUT:
      summary: Amazon Web Services Updatevoiceconnectorgroup
      description: 'Updates details of the specified Amazon Chime Voice Connector group, such as the name and Amazon Chime Voice Connector priority ranking.   This API is is no longer supported and will not be updated. We recommend using the latest version, UpdateVoiceConnectorGroup, in the Amazon Chime SDK. Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesUpdateVoiceConnectorGroup
      tags:
      - Voice Connector Groups
  /voice-connector-groups/{voiceConnectorGroupId}?operation=disassociate-phone-numbers:
    POST:
      summary: Amazon Web Services Disassociatephonenumbersfromvoiceconnectorgroup
      description: 'Disassociates the specified phone numbers from the specified Amazon Chime Voice Connector group.   This API is is no longer supported and will not be updated. We recommend using the latest version, DisassociatePhoneNumbersFromVoiceConnectorGroup, in the Amazon Chime SDK. Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesDisassociatePhoneNumbersFromVoiceConnectorGroup
      tags:
      - Voice Connector Groups
