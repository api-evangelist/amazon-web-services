openapi: 3.1.0
info:
  title: Amazon Web Services apigateway
  description: >-
    <fullname>Amazon API Gateway</fullname> <p>Amazon API Gateway helps
    developers deliver robust, secure, and scalable mobile and web application
    back ends. API Gateway allows developers to securely connect mobile and web
    applications to APIs that run on Lambda, Amazon EC2, or other publicly
    addressable web services that are hosted outside of AWS.</p>
paths:
  /apikeys:
    GET:
      summary: Amazon Web Services Getapikeys
      description: Gets information about the current ApiKeys resource.
      operationId: amazonWebServicesGetApiKeys
      tags:
        - Apikeys
  /restapis/{restapi_id}/authorizers:
    GET:
      summary: Amazon Web Services Getauthorizers
      description: Describe an existing Authorizers resource.
      operationId: amazonWebServicesGetAuthorizers
      tags:
        - Restapis
  /domainnames/{domain_name}/basepathmappings:
    GET:
      summary: Amazon Web Services Getbasepathmappings
      description: Represents a collection of BasePathMapping resources.
      operationId: amazonWebServicesGetBasePathMappings
      tags:
        - Domainnames
  /restapis/{restapi_id}/deployments:
    GET:
      summary: Amazon Web Services Getdeployments
      description: Gets information about a Deployments collection.
      operationId: amazonWebServicesGetDeployments
      tags:
        - Restapis
  /restapis/{restapi_id}/documentation/parts:
    PUT:
      summary: Amazon Web Services Importdocumentationparts
      description: Imports documentation parts
      operationId: amazonWebServicesImportDocumentationParts
      tags:
        - Restapis
  /restapis/{restapi_id}/documentation/versions:
    GET:
      summary: Amazon Web Services Getdocumentationversions
      description: Gets documentation versions.
      operationId: amazonWebServicesGetDocumentationVersions
      tags:
        - Restapis
  /domainnames:
    GET:
      summary: Amazon Web Services Getdomainnames
      description: Represents a collection of DomainName resources.
      operationId: amazonWebServicesGetDomainNames
      tags:
        - Domainnames
  /restapis/{restapi_id}/models:
    GET:
      summary: Amazon Web Services Getmodels
      description: Describes existing Models defined for a RestApi resource.
      operationId: amazonWebServicesGetModels
      tags:
        - Restapis
  /restapis/{restapi_id}/requestvalidators:
    GET:
      summary: Amazon Web Services Getrequestvalidators
      description: Gets the RequestValidators collection of a given RestApi.
      operationId: amazonWebServicesGetRequestValidators
      tags:
        - Restapis
  /restapis/{restapi_id}/resources/{parent_id}:
    POST:
      summary: Amazon Web Services Createresource
      description: Creates a Resource resource.
      operationId: amazonWebServicesCreateResource
      tags:
        - Restapis
  /restapis:
    GET:
      summary: Amazon Web Services Getrestapis
      description: Lists the RestApis resources for your collection.
      operationId: amazonWebServicesGetRestApis
      tags:
        - Restapis
  /restapis/{restapi_id}/stages:
    GET:
      summary: Amazon Web Services Getstages
      description: Gets information about one or more Stage resources.
      operationId: amazonWebServicesGetStages
      tags:
        - Restapis
  /usageplans:
    GET:
      summary: Amazon Web Services Getusageplans
      description: Gets all the usage plans of the caller's account.
      operationId: amazonWebServicesGetUsagePlans
      tags:
        - Usageplans
  /usageplans/{usageplanId}/keys:
    GET:
      summary: Amazon Web Services Getusageplankeys
      description: >-
        Gets all the usage plan keys representing the API keys added to a
        specified usage plan.
      operationId: amazonWebServicesGetUsagePlanKeys
      tags:
        - Usageplans
  /vpclinks:
    GET:
      summary: Amazon Web Services Getvpclinks
      description: >-
        Gets the VpcLinks collection under the caller's account in a selected
        region.
      operationId: amazonWebServicesGetVpcLinks
      tags:
        - Vpclinks
  /apikeys/{api_Key}:
    PATCH:
      summary: Amazon Web Services Updateapikey
      description: Changes information about an ApiKey resource.
      operationId: amazonWebServicesUpdateApiKey
      tags:
        - Apikeys
  /restapis/{restapi_id}/authorizers/{authorizer_id}:
    PATCH:
      summary: Amazon Web Services Updateauthorizer
      description: Updates an existing Authorizer resource.
      operationId: amazonWebServicesUpdateAuthorizer
      tags:
        - Restapis
  /domainnames/{domain_name}/basepathmappings/{base_path}:
    PATCH:
      summary: Amazon Web Services Updatebasepathmapping
      description: Changes information about the BasePathMapping resource.
      operationId: amazonWebServicesUpdateBasePathMapping
      tags:
        - Domainnames
  /clientcertificates/{clientcertificate_id}:
    PATCH:
      summary: Amazon Web Services Updateclientcertificate
      description: Changes information about an ClientCertificate resource.
      operationId: amazonWebServicesUpdateClientCertificate
      tags:
        - Clientcertificates
  /restapis/{restapi_id}/deployments/{deployment_id}:
    PATCH:
      summary: Amazon Web Services Updatedeployment
      description: Changes information about a Deployment resource.
      operationId: amazonWebServicesUpdateDeployment
      tags:
        - Restapis
  /restapis/{restapi_id}/documentation/parts/{part_id}:
    PATCH:
      summary: Amazon Web Services Updatedocumentationpart
      description: Updates a documentation part.
      operationId: amazonWebServicesUpdateDocumentationPart
      tags:
        - Restapis
  /restapis/{restapi_id}/documentation/versions/{doc_version}:
    PATCH:
      summary: Amazon Web Services Updatedocumentationversion
      description: Updates a documentation version.
      operationId: amazonWebServicesUpdateDocumentationVersion
      tags:
        - Restapis
  /domainnames/{domain_name}:
    PATCH:
      summary: Amazon Web Services Updatedomainname
      description: Changes information about the DomainName resource.
      operationId: amazonWebServicesUpdateDomainName
      tags:
        - Domainnames
  /restapis/{restapi_id}/gatewayresponses/{response_type}:
    PATCH:
      summary: Amazon Web Services Updategatewayresponse
      description: >-
        Updates a GatewayResponse of a specified response type on the given
        RestApi.
      operationId: amazonWebServicesUpdateGatewayResponse
      tags:
        - Restapis
  /restapis/{restapi_id}/resources/{resource_id}/methods/{http_method}/integration:
    PATCH:
      summary: Amazon Web Services Updateintegration
      description: Represents an update integration.
      operationId: amazonWebServicesUpdateIntegration
      tags:
        - Restapis
  /restapis/{restapi_id}/resources/{resource_id}/methods/{http_method}/integration/responses/{status_code}:
    PATCH:
      summary: Amazon Web Services Updateintegrationresponse
      description: Represents an update integration response.
      operationId: amazonWebServicesUpdateIntegrationResponse
      tags:
        - Restapis
  /restapis/{restapi_id}/resources/{resource_id}/methods/{http_method}:
    PATCH:
      summary: Amazon Web Services Updatemethod
      description: Updates an existing Method resource.
      operationId: amazonWebServicesUpdateMethod
      tags:
        - Restapis
  /restapis/{restapi_id}/resources/{resource_id}/methods/{http_method}/responses/{status_code}:
    PATCH:
      summary: Amazon Web Services Updatemethodresponse
      description: Updates an existing MethodResponse resource.
      operationId: amazonWebServicesUpdateMethodResponse
      tags:
        - Restapis
  /restapis/{restapi_id}/models/{model_name}:
    PATCH:
      summary: Amazon Web Services Updatemodel
      description: Changes information about a model.
      operationId: amazonWebServicesUpdateModel
      tags:
        - Restapis
  /restapis/{restapi_id}/requestvalidators/{requestvalidator_id}:
    PATCH:
      summary: Amazon Web Services Updaterequestvalidator
      description: Updates a RequestValidator of a given RestApi.
      operationId: amazonWebServicesUpdateRequestValidator
      tags:
        - Restapis
  /restapis/{restapi_id}/resources/{resource_id}:
    PATCH:
      summary: Amazon Web Services Updateresource
      description: Changes information about a Resource resource.
      operationId: amazonWebServicesUpdateResource
      tags:
        - Restapis
  /restapis/{restapi_id}:
    PATCH:
      summary: Amazon Web Services Updaterestapi
      description: Changes information about the specified API.
      operationId: amazonWebServicesUpdateRestApi
      tags:
        - Restapis
  /restapis/{restapi_id}/stages/{stage_name}:
    PATCH:
      summary: Amazon Web Services Updatestage
      description: Changes information about a Stage resource.
      operationId: amazonWebServicesUpdateStage
      tags:
        - Restapis
  /usageplans/{usageplanId}:
    PATCH:
      summary: Amazon Web Services Updateusageplan
      description: Updates a usage plan of a given plan Id.
      operationId: amazonWebServicesUpdateUsagePlan
      tags:
        - Usageplans
  /usageplans/{usageplanId}/keys/{keyId}:
    GET:
      summary: Amazon Web Services Getusageplankey
      description: Gets a usage plan key of a given key identifier.
      operationId: amazonWebServicesGetUsagePlanKey
      tags:
        - Usageplans
  /vpclinks/{vpclink_id}:
    PATCH:
      summary: Amazon Web Services Updatevpclink
      description: Updates an existing VpcLink of a specified identifier.
      operationId: amazonWebServicesUpdateVpcLink
      tags:
        - Vpclinks
  /restapis/{restapi_id}/stages/{stage_name}/cache/authorizers:
    DELETE:
      summary: Amazon Web Services Flushstageauthorizerscache
      description: Flushes all authorizer cache entries on a stage.
      operationId: amazonWebServicesFlushStageAuthorizersCache
      tags:
        - Restapis
  /restapis/{restapi_id}/stages/{stage_name}/cache/data:
    DELETE:
      summary: Amazon Web Services Flushstagecache
      description: Flushes a stage's cache.
      operationId: amazonWebServicesFlushStageCache
      tags:
        - Restapis
  /clientcertificates:
    GET:
      summary: Amazon Web Services Getclientcertificates
      description: Gets a collection of ClientCertificate resources.
      operationId: amazonWebServicesGetClientCertificates
      tags:
        - Clientcertificates
  /account:
    PATCH:
      summary: Amazon Web Services Updateaccount
      description: Changes information about the current Account resource.
      operationId: amazonWebServicesUpdateAccount
      tags:
        - Account
  /restapis/{restapi_id}/stages/{stage_name}/exports/{export_type}:
    GET:
      summary: Amazon Web Services Getexport
      description: Exports a deployed version of a RestApi in a specified format.
      operationId: amazonWebServicesGetExport
      tags:
        - Restapis
  /restapis/{restapi_id}/gatewayresponses:
    GET:
      summary: Amazon Web Services Getgatewayresponses
      description: >-
        Gets the GatewayResponses collection on the given RestApi. If an API
        developer has not added any definitions for gateway responses, the
        result will be the API Gateway-generated default GatewayResponses
        collection for the supported response types.
      operationId: amazonWebServicesGetGatewayResponses
      tags:
        - Restapis
  /restapis/{restapi_id}/models/{model_name}/default_template:
    GET:
      summary: Amazon Web Services Getmodeltemplate
      description: >-
        Generates a sample mapping template that can be used to transform a
        payload into the structure of a model.
      operationId: amazonWebServicesGetModelTemplate
      tags:
        - Restapis
  /restapis/{restapi_id}/resources:
    GET:
      summary: Amazon Web Services Getresources
      description: Lists information about a collection of Resource resources.
      operationId: amazonWebServicesGetResources
      tags:
        - Restapis
  /restapis/{restapi_id}/stages/{stage_name}/sdks/{sdk_type}:
    GET:
      summary: Amazon Web Services Getsdk
      description: Generates a client SDK for a RestApi and Stage.
      operationId: amazonWebServicesGetSdk
      tags:
        - Restapis
  /sdktypes/{sdktype_id}:
    GET:
      summary: Amazon Web Services Getsdktype
      description: Gets an SDK type.
      operationId: amazonWebServicesGetSdkType
      tags:
        - Sdktypes
  /sdktypes:
    GET:
      summary: Amazon Web Services Getsdktypes
      description: Gets SDK types
      operationId: amazonWebServicesGetSdkTypes
      tags:
        - Sdktypes
  /tags/{resource_arn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: Removes a tag from a given resource.
      operationId: amazonWebServicesUntagResource
      tags:
        - Tags
  /usageplans/{usageplanId}/usage:
    GET:
      summary: Amazon Web Services Getusage
      description: Gets the usage data of a usage plan in a specified time interval.
      operationId: amazonWebServicesGetUsage
      tags:
        - Usageplans
  /apikeys?mode=import:
    POST:
      summary: Amazon Web Services Importapikeys
      description: Import API keys from an external source, such as a CSV-formatted file.
      operationId: amazonWebServicesImportApiKeys
      tags:
        - Apikeys?mode=import
  /restapis?mode=import:
    POST:
      summary: Amazon Web Services Importrestapi
      description: >-
        A feature of the API Gateway control service for creating a new API from
        an external API definition file.
      operationId: amazonWebServicesImportRestApi
      tags:
        - Restapis?mode=import
  /usageplans/{usageplanId}/keys/{keyId}/usage:
    PATCH:
      summary: Amazon Web Services Updateusage
      description: >-
        Grants a temporary extension to the remaining quota of a usage plan
        associated with a specified API key.
      operationId: amazonWebServicesUpdateUsage
      tags:
        - Usageplans
tags:
  - name: Account
  - name: Apikeys
  - name: Apikeys?mode=import
  - name: Clientcertificates
  - name: Domainnames
  - name: Restapis
  - name: Restapis?mode=import
  - name: Sdktypes
  - name: Tags
  - name: Usageplans
  - name: Vpclinks
