openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Ml API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Ml
paths:
  /ml/dataprocessing/{id}:
    GET:
      summary: Amazon Web Services Getmldataprocessingjob
      description: Retrieves information about a specified data processing job. See The dataprocessing command. When invoking this operation in a Neptune cluster that has IAM authentication enabled, the IAM user or role making the request must have a policy attached that allows the neptune-db:neptune-db:GetMLDataProcessingJobStatus IAM action in that cluster.
      operationId: amazonWebServicesGetMLDataProcessingJob
      tags:
      - Ml
  /ml/modeltraining/{id}:
    GET:
      summary: Amazon Web Services Getmlmodeltrainingjob
      description: Retrieves information about a Neptune ML model training job. See Model training using the modeltraining command. When invoking this operation in a Neptune cluster that has IAM authentication enabled, the IAM user or role making the request must have a policy attached that allows the neptune-db:GetMLModelTrainingJobStatus IAM action in that cluster.
      operationId: amazonWebServicesGetMLModelTrainingJob
      tags:
      - Ml
  /ml/modeltransform/{id}:
    GET:
      summary: Amazon Web Services Getmlmodeltransformjob
      description: Gets information about a specified model transform job. See Use a trained model to generate new model artifacts. When invoking this operation in a Neptune cluster that has IAM authentication enabled, the IAM user or role making the request must have a policy attached that allows the neptune-db:GetMLModelTransformJobStatus IAM action in that cluster.
      operationId: amazonWebServicesGetMLModelTransformJob
      tags:
      - Ml
  /ml/endpoints:
    GET:
      summary: Amazon Web Services Listmlendpoints
      description: Lists existing inference endpoints. See Managing inference endpoints using the endpoints command. When invoking this operation in a Neptune cluster that has IAM authentication enabled, the IAM user or role making the request must have a policy attached that allows the neptune-db:ListMLEndpoints IAM action in that cluster.
      operationId: amazonWebServicesListMLEndpoints
      tags:
      - Ml
  /ml/endpoints/{id}:
    GET:
      summary: Amazon Web Services Getmlendpoint
      description: Retrieves details about an inference endpoint. See Managing inference endpoints using the endpoints command. When invoking this operation in a Neptune cluster that has IAM authentication enabled, the IAM user or role making the request must have a policy attached that allows the neptune-db:GetMLEndpointStatus IAM action in that cluster.
      operationId: amazonWebServicesGetMLEndpoint
      tags:
      - Ml
  /ml/dataprocessing:
    POST:
      summary: Amazon Web Services Startmldataprocessingjob
      description: Creates a new Neptune ML data processing job for processing the graph data exported from Neptune for training. See The dataprocessing command. When invoking this operation in a Neptune cluster that has IAM authentication enabled, the IAM user or role making the request must have a policy attached that allows the neptune-db:StartMLModelDataProcessingJob IAM action in that cluster.
      operationId: amazonWebServicesStartMLDataProcessingJob
      tags:
      - Ml
  /ml/modeltraining:
    POST:
      summary: Amazon Web Services Startmlmodeltrainingjob
      description: Creates a new Neptune ML model training job. See Model training using the modeltraining command. When invoking this operation in a Neptune cluster that has IAM authentication enabled, the IAM user or role making the request must have a policy attached that allows the neptune-db:StartMLModelTrainingJob IAM action in that cluster.
      operationId: amazonWebServicesStartMLModelTrainingJob
      tags:
      - Ml
  /ml/modeltransform:
    POST:
      summary: Amazon Web Services Startmlmodeltransformjob
      description: Creates a new model transform job. See Use a trained model to generate new model artifacts. When invoking this operation in a Neptune cluster that has IAM authentication enabled, the IAM user or role making the request must have a policy attached that allows the neptune-db:StartMLModelTransformJob IAM action in that cluster.
      operationId: amazonWebServicesStartMLModelTransformJob
      tags:
      - Ml
