openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Accesspointforobjectlambda API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Accesspointforobjectlambda
paths:
  /v20180820/accesspointforobjectlambda/{name}:
    GET:
      summary: Amazon Web Services Getaccesspointforobjectlambda
      description: ' This operation is not supported by directory buckets.  Returns configuration information about the specified Object Lambda Access Point The following actions are related to GetAccessPointForObjectLambda:    CreateAccessPointForObjectLambda     DeleteAccessPointForObjectLambda     ListAccessPointsForObjectLambda   '
      operationId: amazonWebServicesGetAccessPointForObjectLambda
      tags:
      - Accesspointforobjectlambda
  /v20180820/accesspointforobjectlambda/{name}/policy:
    PUT:
      summary: Amazon Web Services Putaccesspointpolicyforobjectlambda
      description: ' This operation is not supported by directory buckets.  Creates or replaces resource policy for an Object Lambda Access Point. For an example policy, see Creating Object Lambda Access Points in the Amazon S3 User Guide. The following actions are related to PutAccessPointPolicyForObjectLambda:    DeleteAccessPointPolicyForObjectLambda     GetAccessPointPolicyForObjectLambda   '
      operationId: amazonWebServicesPutAccessPointPolicyForObjectLambda
      tags:
      - Accesspointforobjectlambda
  /v20180820/accesspointforobjectlambda/{name}/configuration:
    PUT:
      summary: Amazon Web Services Putaccesspointconfigurationforobjectlambda
      description: ' This operation is not supported by directory buckets.  Replaces configuration for an Object Lambda Access Point. The following actions are related to PutAccessPointConfigurationForObjectLambda:    GetAccessPointConfigurationForObjectLambda   '
      operationId: amazonWebServicesPutAccessPointConfigurationForObjectLambda
      tags:
      - Accesspointforobjectlambda
  /v20180820/accesspointforobjectlambda/{name}/policyStatus:
    GET:
      summary: Amazon Web Services Getaccesspointpolicystatusforobjectlambda
      description: ' This operation is not supported by directory buckets.  Returns the status of the resource policy associated with an Object Lambda Access Point.'
      operationId: amazonWebServicesGetAccessPointPolicyStatusForObjectLambda
      tags:
      - Accesspointforobjectlambda
  /v20180820/accesspointforobjectlambda:
    GET:
      summary: Amazon Web Services Listaccesspointsforobjectlambda
      description: ' This operation is not supported by directory buckets.  Returns some or all (up to 1,000) access points associated with the Object Lambda Access Point per call. If there are more access points than what can be returned in one call, the response will include a continuation token that you can use to list the additional access points. The following actions are related to ListAccessPointsForObjectLambda:    CreateAccessPointForObjectLambda     DeleteAccessPointForObjectLambda     GetAccessPointForObjectLambda   '
      operationId: amazonWebServicesListAccessPointsForObjectLambda
      tags:
      - Accesspointforobjectlambda
