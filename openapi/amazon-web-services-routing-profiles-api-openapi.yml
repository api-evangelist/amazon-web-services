openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Routing Profiles API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Routing Profiles
paths:
  /routing-profiles/{InstanceId}/{RoutingProfileId}/associate-queues:
    POST:
      summary: Amazon Web Services Associateroutingprofilequeues
      description: Associates a set of queues with a routing profile.
      operationId: amazonWebServicesAssociateRoutingProfileQueues
      tags:
      - Routing Profiles
  /routing-profiles/{InstanceId}:
    PUT:
      summary: Amazon Web Services Createroutingprofile
      description: Creates a new routing profile.
      operationId: amazonWebServicesCreateRoutingProfile
      tags:
      - Routing Profiles
  /routing-profiles/{InstanceId}/{RoutingProfileId}:
    GET:
      summary: Amazon Web Services Describeroutingprofile
      description: Describes the specified routing profile.
      operationId: amazonWebServicesDescribeRoutingProfile
      tags:
      - Routing Profiles
  /routing-profiles/{InstanceId}/{RoutingProfileId}/disassociate-queues:
    POST:
      summary: Amazon Web Services Disassociateroutingprofilequeues
      description: Disassociates a set of queues from a routing profile.
      operationId: amazonWebServicesDisassociateRoutingProfileQueues
      tags:
      - Routing Profiles
  /routing-profiles/{InstanceId}/{RoutingProfileId}/queues:
    POST:
      summary: Amazon Web Services Updateroutingprofilequeues
      description: Updates the properties associated with a set of queues for a routing profile.
      operationId: amazonWebServicesUpdateRoutingProfileQueues
      tags:
      - Routing Profiles
  /routing-profiles/{InstanceId}/{RoutingProfileId}/agent-availability-timer:
    POST:
      summary: Amazon Web Services Updateroutingprofileagentavailabilitytimer
      description: 'Whether agents with this routing profile will have their routing order calculated based on time since their last inbound contact or longest idle time. '
      operationId: amazonWebServicesUpdateRoutingProfileAgentAvailabilityTimer
      tags:
      - Routing Profiles
  /routing-profiles/{InstanceId}/{RoutingProfileId}/concurrency:
    POST:
      summary: Amazon Web Services Updateroutingprofileconcurrency
      description: Updates the channels that agents can handle in the Contact Control Panel (CCP) for a routing profile.
      operationId: amazonWebServicesUpdateRoutingProfileConcurrency
      tags:
      - Routing Profiles
  /routing-profiles/{InstanceId}/{RoutingProfileId}/default-outbound-queue:
    POST:
      summary: Amazon Web Services Updateroutingprofiledefaultoutboundqueue
      description: Updates the default outbound queue of a routing profile.
      operationId: amazonWebServicesUpdateRoutingProfileDefaultOutboundQueue
      tags:
      - Routing Profiles
  /routing-profiles/{InstanceId}/{RoutingProfileId}/name:
    POST:
      summary: Amazon Web Services Updateroutingprofilename
      description: Updates the name and description of a routing profile. The request accepts the following data in JSON format. At least Name or Description must be provided.
      operationId: amazonWebServicesUpdateRoutingProfileName
      tags:
      - Routing Profiles
