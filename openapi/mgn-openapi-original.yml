openapi: 3.1.0
info:
  title: Amazon Web Services mgn
  description: <p>The Application Migration Service service.</p>
paths:
  /ArchiveApplication:
    POST:
      summary: Amazon Web Services Archiveapplication
      description: Archive application.
      operationId: amazonWebServicesArchiveApplication
      tags:
        - ArchiveApplication
  /ArchiveWave:
    POST:
      summary: Amazon Web Services Archivewave
      description: Archive wave.
      operationId: amazonWebServicesArchiveWave
      tags:
        - ArchiveWave
  /AssociateApplications:
    POST:
      summary: Amazon Web Services Associateapplications
      description: Associate applications to wave.
      operationId: amazonWebServicesAssociateApplications
      tags:
        - AssociateApplications
  /AssociateSourceServers:
    POST:
      summary: Amazon Web Services Associatesourceservers
      description: Associate source servers to application.
      operationId: amazonWebServicesAssociateSourceServers
      tags:
        - AssociateSourceServers
  /ChangeServerLifeCycleState:
    POST:
      summary: Amazon Web Services Changeserverlifecyclestate
      description: >-
        Allows the user to set the SourceServer.LifeCycle.state property for
        specific Source Server IDs to one of the following: READY_FOR_TEST or
        READY_FOR_CUTOVER. This command only works if the Source Server is
        already launchable (dataReplicationInfo.lagDuration is not null.)
      operationId: amazonWebServicesChangeServerLifeCycleState
      tags:
        - ChangeServerLifeCycleState
  /CreateApplication:
    POST:
      summary: Amazon Web Services Createapplication
      description: Create application.
      operationId: amazonWebServicesCreateApplication
      tags:
        - CreateApplication
  /CreateConnector:
    POST:
      summary: Amazon Web Services Createconnector
      description: Create Connector.
      operationId: amazonWebServicesCreateConnector
      tags:
        - CreateConnector
  /CreateLaunchConfigurationTemplate:
    POST:
      summary: Amazon Web Services Createlaunchconfigurationtemplate
      description: Creates a new Launch Configuration Template.
      operationId: amazonWebServicesCreateLaunchConfigurationTemplate
      tags:
        - CreateLaunchConfigurationTemplate
  /CreateReplicationConfigurationTemplate:
    POST:
      summary: Amazon Web Services Createreplicationconfigurationtemplate
      description: Creates a new ReplicationConfigurationTemplate.
      operationId: amazonWebServicesCreateReplicationConfigurationTemplate
      tags:
        - CreateReplicationConfigurationTemplate
  /CreateWave:
    POST:
      summary: Amazon Web Services Createwave
      description: Create wave.
      operationId: amazonWebServicesCreateWave
      tags:
        - CreateWave
  /DeleteApplication:
    POST:
      summary: Amazon Web Services Deleteapplication
      description: Delete application.
      operationId: amazonWebServicesDeleteApplication
      tags:
        - DeleteApplication
  /DeleteConnector:
    POST:
      summary: Amazon Web Services Deleteconnector
      description: Delete Connector.
      operationId: amazonWebServicesDeleteConnector
      tags:
        - DeleteConnector
  /DeleteJob:
    POST:
      summary: Amazon Web Services Deletejob
      description: Deletes a single Job by ID.
      operationId: amazonWebServicesDeleteJob
      tags:
        - DeleteJob
  /DeleteLaunchConfigurationTemplate:
    POST:
      summary: Amazon Web Services Deletelaunchconfigurationtemplate
      description: Deletes a single Launch Configuration Template by ID.
      operationId: amazonWebServicesDeleteLaunchConfigurationTemplate
      tags:
        - DeleteLaunchConfigurationTemplate
  /DeleteReplicationConfigurationTemplate:
    POST:
      summary: Amazon Web Services Deletereplicationconfigurationtemplate
      description: Deletes a single Replication Configuration Template by ID
      operationId: amazonWebServicesDeleteReplicationConfigurationTemplate
      tags:
        - DeleteReplicationConfigurationTemplate
  /DeleteSourceServer:
    POST:
      summary: Amazon Web Services Deletesourceserver
      description: Deletes a single source server by ID.
      operationId: amazonWebServicesDeleteSourceServer
      tags:
        - DeleteSourceServer
  /DeleteVcenterClient:
    POST:
      summary: Amazon Web Services Deletevcenterclient
      description: Deletes a given vCenter client by ID.
      operationId: amazonWebServicesDeleteVcenterClient
      tags:
        - DeleteVcenterClient
  /DeleteWave:
    POST:
      summary: Amazon Web Services Deletewave
      description: Delete wave.
      operationId: amazonWebServicesDeleteWave
      tags:
        - DeleteWave
  /DescribeJobLogItems:
    POST:
      summary: Amazon Web Services Describejoblogitems
      description: Retrieves detailed job log items with paging.
      operationId: amazonWebServicesDescribeJobLogItems
      tags:
        - DescribeJobLogItems
  /DescribeJobs:
    POST:
      summary: Amazon Web Services Describejobs
      description: >-
        Returns a list of Jobs. Use the JobsID and fromDate and toData filters
        to limit which jobs are returned. The response is sorted by
        creationDataTime - latest date first. Jobs are normally created by the
        StartTest, StartCutover, and TerminateTargetInstances APIs. Jobs are
        also created by DiagnosticLaunch and TerminateDiagnosticInstances, which
        are APIs available only to *Support* and only used in response to
        relevant support tickets.
      operationId: amazonWebServicesDescribeJobs
      tags:
        - DescribeJobs
  /DescribeLaunchConfigurationTemplates:
    POST:
      summary: Amazon Web Services Describelaunchconfigurationtemplates
      description: >-
        Lists all Launch Configuration Templates, filtered by Launch
        Configuration Template IDs
      operationId: amazonWebServicesDescribeLaunchConfigurationTemplates
      tags:
        - DescribeLaunchConfigurationTemplates
  /DescribeReplicationConfigurationTemplates:
    POST:
      summary: Amazon Web Services Describereplicationconfigurationtemplates
      description: >-
        Lists all ReplicationConfigurationTemplates, filtered by Source Server
        IDs.
      operationId: amazonWebServicesDescribeReplicationConfigurationTemplates
      tags:
        - DescribeReplicationConfigurationTemplates
  /DescribeSourceServers:
    POST:
      summary: Amazon Web Services Describesourceservers
      description: Retrieves all SourceServers or multiple SourceServers by ID.
      operationId: amazonWebServicesDescribeSourceServers
      tags:
        - DescribeSourceServers
  /DescribeVcenterClients:
    GET:
      summary: Amazon Web Services Describevcenterclients
      description: Returns a list of the installed vCenter clients.
      operationId: amazonWebServicesDescribeVcenterClients
      tags:
        - DescribeVcenterClients
  /DisassociateApplications:
    POST:
      summary: Amazon Web Services Disassociateapplications
      description: Disassociate applications from wave.
      operationId: amazonWebServicesDisassociateApplications
      tags:
        - DisassociateApplications
  /DisassociateSourceServers:
    POST:
      summary: Amazon Web Services Disassociatesourceservers
      description: Disassociate source servers from application.
      operationId: amazonWebServicesDisassociateSourceServers
      tags:
        - DisassociateSourceServers
  /DisconnectFromService:
    POST:
      summary: Amazon Web Services Disconnectfromservice
      description: >-
        Disconnects specific Source Servers from Application Migration Service.
        Data replication is stopped immediately. All AWS resources created by
        Application Migration Service for enabling the replication of these
        source servers will be terminated / deleted within 90 minutes. Launched
        Test or Cutover instances will NOT be terminated. If the agent on the
        source server has not been prevented from communicating with the
        Application Migration Service service, then it will receive a command to
        uninstall itself (within approximately 10 minutes). The following
        properties of the SourceServer will be changed immediately:
        dataReplicationInfo.dataReplicationState will be set to DISCONNECTED;
        The totalStorageBytes property for each of
        dataReplicationInfo.replicatedDisks will be set to zero;
        dataReplicationInfo.lagDuration and dataReplicationInfo.lagDuration will
        be nullified.
      operationId: amazonWebServicesDisconnectFromService
      tags:
        - DisconnectFromService
  /FinalizeCutover:
    POST:
      summary: Amazon Web Services Finalizecutover
      description: >-
        Finalizes the cutover immediately for specific Source Servers. All AWS
        resources created by Application Migration Service for enabling the
        replication of these source servers will be terminated / deleted within
        90 minutes. Launched Test or Cutover instances will NOT be terminated.
        The AWS Replication Agent will receive a command to uninstall itself
        (within 10 minutes). The following properties of the SourceServer will
        be changed immediately: dataReplicationInfo.dataReplicationState will be
        changed to DISCONNECTED; The SourceServer.lifeCycle.state will be
        changed to CUTOVER; The totalStorageBytes property fo each of
        dataReplicationInfo.replicatedDisks will be set to zero;
        dataReplicationInfo.lagDuration and dataReplicationInfo.lagDuration will
        be nullified.
      operationId: amazonWebServicesFinalizeCutover
      tags:
        - FinalizeCutover
  /GetLaunchConfiguration:
    POST:
      summary: Amazon Web Services Getlaunchconfiguration
      description: Lists all LaunchConfigurations available, filtered by Source Server IDs.
      operationId: amazonWebServicesGetLaunchConfiguration
      tags:
        - GetLaunchConfiguration
  /GetReplicationConfiguration:
    POST:
      summary: Amazon Web Services Getreplicationconfiguration
      description: Lists all ReplicationConfigurations, filtered by Source Server ID.
      operationId: amazonWebServicesGetReplicationConfiguration
      tags:
        - GetReplicationConfiguration
  /InitializeService:
    POST:
      summary: Amazon Web Services Initializeservice
      description: Initialize Application Migration Service.
      operationId: amazonWebServicesInitializeService
      tags:
        - InitializeService
  /ListApplications:
    POST:
      summary: Amazon Web Services Listapplications
      description: Retrieves all applications or multiple applications by ID.
      operationId: amazonWebServicesListApplications
      tags:
        - ListApplications
  /ListConnectors:
    POST:
      summary: Amazon Web Services Listconnectors
      description: List Connectors.
      operationId: amazonWebServicesListConnectors
      tags:
        - ListConnectors
  /ListExportErrors:
    POST:
      summary: Amazon Web Services Listexporterrors
      description: List export errors.
      operationId: amazonWebServicesListExportErrors
      tags:
        - ListExportErrors
  /ListExports:
    POST:
      summary: Amazon Web Services Listexports
      description: List exports.
      operationId: amazonWebServicesListExports
      tags:
        - ListExports
  /ListImportErrors:
    POST:
      summary: Amazon Web Services Listimporterrors
      description: List import errors.
      operationId: amazonWebServicesListImportErrors
      tags:
        - ListImportErrors
  /ListImports:
    POST:
      summary: Amazon Web Services Listimports
      description: List imports.
      operationId: amazonWebServicesListImports
      tags:
        - ListImports
  /ListManagedAccounts:
    POST:
      summary: Amazon Web Services Listmanagedaccounts
      description: List Managed Accounts.
      operationId: amazonWebServicesListManagedAccounts
      tags:
        - ListManagedAccounts
  /ListSourceServerActions:
    POST:
      summary: Amazon Web Services Listsourceserveractions
      description: List source server post migration custom actions.
      operationId: amazonWebServicesListSourceServerActions
      tags:
        - ListSourceServerActions
  /tags/{resourceArn}:
    DELETE:
      summary: Amazon Web Services Untagresource
      description: >-
        Deletes the specified set of tags from the specified set of Application
        Migration Service resources.
      operationId: amazonWebServicesUntagResource
      tags:
        - Tags
  /ListTemplateActions:
    POST:
      summary: Amazon Web Services Listtemplateactions
      description: List template post migration custom actions.
      operationId: amazonWebServicesListTemplateActions
      tags:
        - ListTemplateActions
  /ListWaves:
    POST:
      summary: Amazon Web Services Listwaves
      description: Retrieves all waves or multiple waves by ID.
      operationId: amazonWebServicesListWaves
      tags:
        - ListWaves
  /MarkAsArchived:
    POST:
      summary: Amazon Web Services Markasarchived
      description: >-
        Archives specific Source Servers by setting the SourceServer.isArchived
        property to true for specified SourceServers by ID. This command only
        works for SourceServers with a lifecycle. state which equals
        DISCONNECTED or CUTOVER.
      operationId: amazonWebServicesMarkAsArchived
      tags:
        - MarkAsArchived
  /PauseReplication:
    POST:
      summary: Amazon Web Services Pausereplication
      description: Pause Replication.
      operationId: amazonWebServicesPauseReplication
      tags:
        - PauseReplication
  /PutSourceServerAction:
    POST:
      summary: Amazon Web Services Putsourceserveraction
      description: Put source server post migration custom action.
      operationId: amazonWebServicesPutSourceServerAction
      tags:
        - PutSourceServerAction
  /PutTemplateAction:
    POST:
      summary: Amazon Web Services Puttemplateaction
      description: Put template post migration custom action.
      operationId: amazonWebServicesPutTemplateAction
      tags:
        - PutTemplateAction
  /RemoveSourceServerAction:
    POST:
      summary: Amazon Web Services Removesourceserveraction
      description: Remove source server post migration custom action.
      operationId: amazonWebServicesRemoveSourceServerAction
      tags:
        - RemoveSourceServerAction
  /RemoveTemplateAction:
    POST:
      summary: Amazon Web Services Removetemplateaction
      description: Remove template post migration custom action.
      operationId: amazonWebServicesRemoveTemplateAction
      tags:
        - RemoveTemplateAction
  /ResumeReplication:
    POST:
      summary: Amazon Web Services Resumereplication
      description: Resume Replication.
      operationId: amazonWebServicesResumeReplication
      tags:
        - ResumeReplication
  /RetryDataReplication:
    POST:
      summary: Amazon Web Services Retrydatareplication
      description: >-
        Causes the data replication initiation sequence to begin immediately
        upon next Handshake for specified SourceServer IDs, regardless of when
        the previous initiation started. This command will not work if the
        SourceServer is not stalled or is in a DISCONNECTED or STOPPED state.
      operationId: amazonWebServicesRetryDataReplication
      tags:
        - RetryDataReplication
  /StartCutover:
    POST:
      summary: Amazon Web Services Startcutover
      description: >-
        Launches a Cutover Instance for specific Source Servers. This command
        starts a LAUNCH job whose initiatedBy property is StartCutover and
        changes the SourceServer.lifeCycle.state property to CUTTING_OVER.
      operationId: amazonWebServicesStartCutover
      tags:
        - StartCutover
  /StartExport:
    POST:
      summary: Amazon Web Services Startexport
      description: Start export.
      operationId: amazonWebServicesStartExport
      tags:
        - StartExport
  /StartImport:
    POST:
      summary: Amazon Web Services Startimport
      description: Start import.
      operationId: amazonWebServicesStartImport
      tags:
        - StartImport
  /StartReplication:
    POST:
      summary: Amazon Web Services Startreplication
      description: Starts replication for SNAPSHOT_SHIPPING agents.
      operationId: amazonWebServicesStartReplication
      tags:
        - StartReplication
  /StartTest:
    POST:
      summary: Amazon Web Services Starttest
      description: >-
        Launches a Test Instance for specific Source Servers. This command
        starts a LAUNCH job whose initiatedBy property is StartTest and changes
        the SourceServer.lifeCycle.state property to TESTING.
      operationId: amazonWebServicesStartTest
      tags:
        - StartTest
  /StopReplication:
    POST:
      summary: Amazon Web Services Stopreplication
      description: Stop Replication.
      operationId: amazonWebServicesStopReplication
      tags:
        - StopReplication
  /TerminateTargetInstances:
    POST:
      summary: Amazon Web Services Terminatetargetinstances
      description: >-
        Starts a job that terminates specific launched EC2 Test and Cutover
        instances. This command will not work for any Source Server with a
        lifecycle.state of TESTING, CUTTING_OVER, or CUTOVER.
      operationId: amazonWebServicesTerminateTargetInstances
      tags:
        - TerminateTargetInstances
  /UnarchiveApplication:
    POST:
      summary: Amazon Web Services Unarchiveapplication
      description: Unarchive application.
      operationId: amazonWebServicesUnarchiveApplication
      tags:
        - UnarchiveApplication
  /UnarchiveWave:
    POST:
      summary: Amazon Web Services Unarchivewave
      description: Unarchive wave.
      operationId: amazonWebServicesUnarchiveWave
      tags:
        - UnarchiveWave
  /UpdateApplication:
    POST:
      summary: Amazon Web Services Updateapplication
      description: Update application.
      operationId: amazonWebServicesUpdateApplication
      tags:
        - UpdateApplication
  /UpdateConnector:
    POST:
      summary: Amazon Web Services Updateconnector
      description: Update Connector.
      operationId: amazonWebServicesUpdateConnector
      tags:
        - UpdateConnector
  /UpdateLaunchConfiguration:
    POST:
      summary: Amazon Web Services Updatelaunchconfiguration
      description: Updates multiple LaunchConfigurations by Source Server ID.
      operationId: amazonWebServicesUpdateLaunchConfiguration
      tags:
        - UpdateLaunchConfiguration
  /UpdateLaunchConfigurationTemplate:
    POST:
      summary: Amazon Web Services Updatelaunchconfigurationtemplate
      description: Updates an existing Launch Configuration Template by ID.
      operationId: amazonWebServicesUpdateLaunchConfigurationTemplate
      tags:
        - UpdateLaunchConfigurationTemplate
  /UpdateReplicationConfiguration:
    POST:
      summary: Amazon Web Services Updatereplicationconfiguration
      description: >-
        Allows you to update multiple ReplicationConfigurations by Source Server
        ID.
      operationId: amazonWebServicesUpdateReplicationConfiguration
      tags:
        - UpdateReplicationConfiguration
  /UpdateReplicationConfigurationTemplate:
    POST:
      summary: Amazon Web Services Updatereplicationconfigurationtemplate
      description: Updates multiple ReplicationConfigurationTemplates by ID.
      operationId: amazonWebServicesUpdateReplicationConfigurationTemplate
      tags:
        - UpdateReplicationConfigurationTemplate
  /UpdateSourceServer:
    POST:
      summary: Amazon Web Services Updatesourceserver
      description: Update Source Server.
      operationId: amazonWebServicesUpdateSourceServer
      tags:
        - UpdateSourceServer
  /UpdateSourceServerReplicationType:
    POST:
      summary: Amazon Web Services Updatesourceserverreplicationtype
      description: >-
        Allows you to change between the AGENT_BASED replication type and the
        SNAPSHOT_SHIPPING replication type.
      operationId: amazonWebServicesUpdateSourceServerReplicationType
      tags:
        - UpdateSourceServerReplicationType
  /UpdateWave:
    POST:
      summary: Amazon Web Services Updatewave
      description: Update wave.
      operationId: amazonWebServicesUpdateWave
      tags:
        - UpdateWave
tags:
  - name: ArchiveApplication
  - name: ArchiveWave
  - name: AssociateApplications
  - name: AssociateSourceServers
  - name: ChangeServerLifeCycleState
  - name: CreateApplication
  - name: CreateConnector
  - name: CreateLaunchConfigurationTemplate
  - name: CreateReplicationConfigurationTemplate
  - name: CreateWave
  - name: DeleteApplication
  - name: DeleteConnector
  - name: DeleteJob
  - name: DeleteLaunchConfigurationTemplate
  - name: DeleteReplicationConfigurationTemplate
  - name: DeleteSourceServer
  - name: DeleteVcenterClient
  - name: DeleteWave
  - name: DescribeJobLogItems
  - name: DescribeJobs
  - name: DescribeLaunchConfigurationTemplates
  - name: DescribeReplicationConfigurationTemplates
  - name: DescribeSourceServers
  - name: DescribeVcenterClients
  - name: DisassociateApplications
  - name: DisassociateSourceServers
  - name: DisconnectFromService
  - name: FinalizeCutover
  - name: GetLaunchConfiguration
  - name: GetReplicationConfiguration
  - name: InitializeService
  - name: ListApplications
  - name: ListConnectors
  - name: ListExportErrors
  - name: ListExports
  - name: ListImportErrors
  - name: ListImports
  - name: ListManagedAccounts
  - name: ListSourceServerActions
  - name: ListTemplateActions
  - name: ListWaves
  - name: MarkAsArchived
  - name: PauseReplication
  - name: PutSourceServerAction
  - name: PutTemplateAction
  - name: RemoveSourceServerAction
  - name: RemoveTemplateAction
  - name: ResumeReplication
  - name: RetryDataReplication
  - name: StartCutover
  - name: StartExport
  - name: StartImport
  - name: StartReplication
  - name: StartTest
  - name: StopReplication
  - name: Tags
  - name: TerminateTargetInstances
  - name: UnarchiveApplication
  - name: UnarchiveWave
  - name: UpdateApplication
  - name: UpdateConnector
  - name: UpdateLaunchConfiguration
  - name: UpdateLaunchConfigurationTemplate
  - name: UpdateReplicationConfiguration
  - name: UpdateReplicationConfigurationTemplate
