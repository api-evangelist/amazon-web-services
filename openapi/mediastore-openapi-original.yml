openapi: 3.1.0
info:
  title: Amazon Web Services mediastore
  description: >-
    <p>An AWS Elemental MediaStore container is a namespace that holds folders
    and objects. You use a container endpoint to create, read, and delete
    objects. </p>
paths:
  /:
    POST:
      summary: Amazon Web Services Untagresource
      description: >-
        Removes tags from the specified container. You can specify one or more
        tags to remove. 
      operationId: amazonWebServicesUntagResource
tags: []
