openapi: 3.1.0
info:
  title: Amazon Web Services migrationhubstrategy
  description: >-
    <p><fullname>Migration Hub Strategy Recommendations</fullname> <p>This API
    reference provides descriptions, syntax, and other details about each of the
    actions and data types for Migration Hub Strategy Recommendations (Strategy
    Recommendations). The topic for each action shows the API request parameters
    and the response. Alternatively, you can use one of the AWS SDKs to access
    an API that is tailored to the programming language or platform that you're
    using. For more information, see <a
    href="http://aws.amazon.com/tools/#SDKs">AWS SDKs</a>.</p></p>
paths:
  /get-applicationcomponent-details/{applicationComponentId}:
    GET:
      summary: Amazon Web Services Getapplicationcomponentdetails
      description: ' Retrieves details about an application component. '
      operationId: amazonWebServicesGetApplicationComponentDetails
      tags:
        - Get Applicationcomponent Details
  /get-applicationcomponent-strategies/{applicationComponentId}:
    GET:
      summary: Amazon Web Services Getapplicationcomponentstrategies
      description: ' Retrieves a list of all the recommended strategies and tools for an application component running on a server. '
      operationId: amazonWebServicesGetApplicationComponentStrategies
      tags:
        - Get Applicationcomponent Strategies
  /get-assessment/{id}:
    GET:
      summary: Amazon Web Services Getassessment
      description: ' Retrieves the status of an on-going assessment. '
      operationId: amazonWebServicesGetAssessment
      tags:
        - Get Assessment
  /get-import-file-task/{id}:
    GET:
      summary: Amazon Web Services Getimportfiletask
      description: ' Retrieves the details about a specific import task. '
      operationId: amazonWebServicesGetImportFileTask
      tags:
        - Get Import File Task
  /get-latest-assessment-id:
    GET:
      summary: Amazon Web Services Getlatestassessmentid
      description: Retrieve the latest ID of a specific assessment task.
      operationId: amazonWebServicesGetLatestAssessmentId
      tags:
        - Get Latest Assessment Id
  /get-portfolio-preferences:
    GET:
      summary: Amazon Web Services Getportfoliopreferences
      description: ' Retrieves your migration and modernization preferences. '
      operationId: amazonWebServicesGetPortfolioPreferences
      tags:
        - Get Portfolio Preferences
  /get-portfolio-summary:
    GET:
      summary: Amazon Web Services Getportfoliosummary
      description: ' Retrieves overall summary including the number of servers to rehost and the overall number of anti-patterns. '
      operationId: amazonWebServicesGetPortfolioSummary
      tags:
        - Get Portfolio Summary
  /get-recommendation-report-details/{id}:
    GET:
      summary: Amazon Web Services Getrecommendationreportdetails
      description: ' Retrieves detailed information about the specified recommendation report. '
      operationId: amazonWebServicesGetRecommendationReportDetails
      tags:
        - Get Recommendation Report Details
  /get-server-details/{serverId}:
    GET:
      summary: Amazon Web Services Getserverdetails
      description: ' Retrieves detailed information about a specified server. '
      operationId: amazonWebServicesGetServerDetails
      tags:
        - Get Server Details
  /get-server-strategies/{serverId}:
    GET:
      summary: Amazon Web Services Getserverstrategies
      description: ' Retrieves recommended strategies and tools for the specified server. '
      operationId: amazonWebServicesGetServerStrategies
      tags:
        - Get Server Strategies
  /list-analyzable-servers:
    POST:
      summary: Amazon Web Services Listanalyzableservers
      description: >-
        Retrieves a list of all the servers fetched from customer vCenter using
        Strategy Recommendation Collector.
      operationId: amazonWebServicesListAnalyzableServers
      tags:
        - List Analyzable Servers
  /list-applicationcomponents:
    POST:
      summary: Amazon Web Services Listapplicationcomponents
      description: ' Retrieves a list of all the application components (processes). '
      operationId: amazonWebServicesListApplicationComponents
      tags:
        - List Applicationcomponents
  /list-collectors:
    GET:
      summary: Amazon Web Services Listcollectors
      description: ' Retrieves a list of all the installed collectors. '
      operationId: amazonWebServicesListCollectors
      tags:
        - List Collectors
  /list-import-file-task:
    GET:
      summary: Amazon Web Services Listimportfiletask
      description: ' Retrieves a list of all the imports performed. '
      operationId: amazonWebServicesListImportFileTask
      tags:
        - List Import File Task
  /list-servers:
    POST:
      summary: Amazon Web Services Listservers
      description: ' Returns a list of all the servers. '
      operationId: amazonWebServicesListServers
      tags:
        - List Servers
  /put-portfolio-preferences:
    POST:
      summary: Amazon Web Services Putportfoliopreferences
      description: ' Saves the specified migration and modernization preferences. '
      operationId: amazonWebServicesPutPortfolioPreferences
      tags:
        - Put Portfolio Preferences
  /start-assessment:
    POST:
      summary: Amazon Web Services Startassessment
      description: ' Starts the assessment of an on-premises environment. '
      operationId: amazonWebServicesStartAssessment
      tags:
        - Start Assessment
  /start-import-file-task:
    POST:
      summary: Amazon Web Services Startimportfiletask
      description: ' Starts a file import. '
      operationId: amazonWebServicesStartImportFileTask
      tags:
        - Start Import File Task
  /start-recommendation-report-generation:
    POST:
      summary: Amazon Web Services Startrecommendationreportgeneration
      description: ' Starts generating a recommendation report. '
      operationId: amazonWebServicesStartRecommendationReportGeneration
      tags:
        - Start Recommendation Report Generation
  /stop-assessment:
    POST:
      summary: Amazon Web Services Stopassessment
      description: ' Stops the assessment of an on-premises environment. '
      operationId: amazonWebServicesStopAssessment
      tags:
        - Stop Assessment
  /update-applicationcomponent-config/:
    POST:
      summary: Amazon Web Services Updateapplicationcomponentconfig
      description: ' Updates the configuration of an application component. '
      operationId: amazonWebServicesUpdateApplicationComponentConfig
      tags:
        - Update Applicationcomponent Config
  /update-server-config/:
    POST:
      summary: Amazon Web Services Updateserverconfig
      description: ' Updates the configuration of the specified server. '
      operationId: amazonWebServicesUpdateServerConfig
      tags:
        - Update Server Config
tags:
  - name: Get Applicationcomponent Details
  - name: Get Applicationcomponent Strategies
  - name: Get Assessment
  - name: Get Import File Task
  - name: Get Latest Assessment Id
  - name: Get Portfolio Preferences
  - name: Get Portfolio Summary
  - name: Get Recommendation Report Details
  - name: Get Server Details
  - name: Get Server Strategies
  - name: List Analyzable Servers
  - name: List Applicationcomponents
  - name: List Collectors
  - name: List Import File Task
  - name: List Servers
  - name: Put Portfolio Preferences
  - name: Start Assessment
  - name: Start Import File Task
  - name: Start Recommendation Report Generation
  - name: Stop Assessment
  - name: Update Applicationcomponent Config
  - name: Update Server Config
