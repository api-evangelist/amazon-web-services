openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 channelGroup API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: channelGroup
paths:
  /channelGroup/{ChannelGroupName}/channel:
    GET:
      summary: Amazon Web Services Listchannels
      description: Retrieves all channels in a specific channel group that are configured in AWS Elemental MediaPackage, including the origin endpoints that are associated with it.
      operationId: amazonWebServicesListChannels
      tags:
      - channelGroup
  /channelGroup:
    GET:
      summary: Amazon Web Services Listchannelgroups
      description: Retrieves all channel groups that are configured in AWS Elemental MediaPackage, including the channels and origin endpoints that are associated with it.
      operationId: amazonWebServicesListChannelGroups
      tags:
      - channelGroup
  /channelGroup/{ChannelGroupName}/channel/{ChannelName}/originEndpoint:
    GET:
      summary: Amazon Web Services Listoriginendpoints
      description: Retrieves all origin endpoints in a specific channel that are configured in AWS Elemental MediaPackage.
      operationId: amazonWebServicesListOriginEndpoints
      tags:
      - channelGroup
  /channelGroup/{ChannelGroupName}/channel/{ChannelName}/:
    PUT:
      summary: Amazon Web Services Updatechannel
      description: Update the specified channel. You can edit if MediaPackage sends ingest or egress access logs to the CloudWatch log group, if content will be encrypted, the description on a channel, and your channel's policy settings. You can't edit the name of the channel or CloudFront distribution details. Any edits you make that impact the video output may not be reflected for a few minutes.
      operationId: amazonWebServicesUpdateChannel
      tags:
      - channelGroup
  /channelGroup/{ChannelGroupName}:
    PUT:
      summary: Amazon Web Services Updatechannelgroup
      description: Update the specified channel group. You can edit the description on a channel group for easier identification later from the AWS Elemental MediaPackage console. You can't edit the name of the channel group. Any edits you make that impact the video output may not be reflected for a few minutes.
      operationId: amazonWebServicesUpdateChannelGroup
      tags:
      - channelGroup
  /channelGroup/{ChannelGroupName}/channel/{ChannelName}/policy:
    PUT:
      summary: Amazon Web Services Putchannelpolicy
      description: Attaches an IAM policy to the specified channel. With policies, you can specify who has access to AWS resources and what actions they can perform on those resources. You can attach only one policy with each request.
      operationId: amazonWebServicesPutChannelPolicy
      tags:
      - channelGroup
  /channelGroup/{ChannelGroupName}/channel/{ChannelName}/originEndpoint/{OriginEndpointName}:
    PUT:
      summary: Amazon Web Services Updateoriginendpoint
      description: Update the specified origin endpoint. Edit the packaging preferences on an endpoint to optimize the viewing experience. You can't edit the name of the endpoint. Any edits you make that impact the video output may not be reflected for a few minutes.
      operationId: amazonWebServicesUpdateOriginEndpoint
      tags:
      - channelGroup
  /channelGroup/{ChannelGroupName}/channel/{ChannelName}/originEndpoint/{OriginEndpointName}/policy:
    POST:
      summary: Amazon Web Services Putoriginendpointpolicy
      description: Attaches an IAM policy to the specified origin endpoint. You can attach only one policy with each request.
      operationId: amazonWebServicesPutOriginEndpointPolicy
      tags:
      - channelGroup
