openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 App Instance Users API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: App Instance Users
paths:
  /app-instance-users:
    GET:
      summary: Amazon Web Services Listappinstanceusers
      description: 'List all AppInstanceUsers created under a single AppInstance.    This API is is no longer supported and will not be updated. We recommend using the latest version, ListAppInstanceUsers, in the Amazon Chime SDK. Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesListAppInstanceUsers
      tags:
      - App Instance Users
  /app-instance-users/{appInstanceUserArn}:
    PUT:
      summary: Amazon Web Services Updateappinstanceuser
      description: 'Updates the details of an AppInstanceUser. You can update names and metadata.   This API is is no longer supported and will not be updated. We recommend using the latest version, UpdateAppInstanceUser, in the Amazon Chime SDK. Using the latest version requires migrating to a dedicated namespace. For more information, refer to Migrating from the Amazon Chime namespace in the Amazon Chime SDK Developer Guide. '
      operationId: amazonWebServicesUpdateAppInstanceUser
      tags:
      - App Instance Users
  /app-instance-users/{appInstanceUserArn}/endpoints/{endpointId}:
    PUT:
      summary: Amazon Web Services Updateappinstanceuserendpoint
      description: Updates the details of an AppInstanceUserEndpoint. You can update the name and AllowMessage values.
      operationId: amazonWebServicesUpdateAppInstanceUserEndpoint
      tags:
      - App Instance Users
  /app-instance-users/{appInstanceUserArn}/endpoints:
    POST:
      summary: Amazon Web Services Registerappinstanceuserendpoint
      description: Registers an endpoint under an Amazon Chime AppInstanceUser. The endpoint receives messages for a user. For push notifications, the endpoint is a mobile device used to receive mobile push notifications for a user.
      operationId: amazonWebServicesRegisterAppInstanceUserEndpoint
      tags:
      - App Instance Users
  /app-instance-users/{appInstanceUserArn}/expiration-settings:
    PUT:
      summary: Amazon Web Services Putappinstanceuserexpirationsettings
      description: 'Sets the number of days before the AppInstanceUser is automatically deleted.  A background process deletes expired AppInstanceUsers within 6 hours of expiration. Actual deletion times may vary. Expired AppInstanceUsers that have not yet been deleted appear as active, and you can update their expiration settings. The system honors the new settings. '
      operationId: amazonWebServicesPutAppInstanceUserExpirationSettings
      tags:
      - App Instance Users
