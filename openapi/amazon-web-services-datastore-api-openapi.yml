openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Datastore API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Datastore
paths:
  /datastore/{datastoreId}/imageSet/{sourceImageSetId}/copyImageSet:
    POST:
      summary: Amazon Web Services Copyimageset
      description: Copy an image set.
      operationId: amazonWebServicesCopyImageSet
      tags:
      - Datastore
  /datastore:
    GET:
      summary: Amazon Web Services Listdatastores
      description: List data stores.
      operationId: amazonWebServicesListDatastores
      tags:
      - Datastore
  /datastore/{datastoreId}:
    GET:
      summary: Amazon Web Services Getdatastore
      description: Get data store properties.
      operationId: amazonWebServicesGetDatastore
      tags:
      - Datastore
  /datastore/{datastoreId}/imageSet/{imageSetId}/deleteImageSet:
    POST:
      summary: Amazon Web Services Deleteimageset
      description: Delete an image set.
      operationId: amazonWebServicesDeleteImageSet
      tags:
      - Datastore
  /datastore/{datastoreId}/imageSet/{imageSetId}/getImageFrame:
    POST:
      summary: Amazon Web Services Getimageframe
      description: Get an image frame (pixel data) for an image set.
      operationId: amazonWebServicesGetImageFrame
      tags:
      - Datastore
  /datastore/{datastoreId}/imageSet/{imageSetId}/getImageSet:
    POST:
      summary: Amazon Web Services Getimageset
      description: Get image set properties.
      operationId: amazonWebServicesGetImageSet
      tags:
      - Datastore
  /datastore/{datastoreId}/imageSet/{imageSetId}/getImageSetMetadata:
    POST:
      summary: Amazon Web Services Getimagesetmetadata
      description: Get metadata attributes for an image set.
      operationId: amazonWebServicesGetImageSetMetadata
      tags:
      - Datastore
  /datastore/{datastoreId}/imageSet/{imageSetId}/listImageSetVersions:
    POST:
      summary: Amazon Web Services Listimagesetversions
      description: List image set versions.
      operationId: amazonWebServicesListImageSetVersions
      tags:
      - Datastore
  /datastore/{datastoreId}/searchImageSets:
    POST:
      summary: Amazon Web Services Searchimagesets
      description: 'Search image sets based on defined input attributes.   SearchImageSets accepts a single search query parameter and returns a paginated response of all image sets that have the matching criteria. All range queries must be input as (lowerBound, upperBound).  SearchImageSets uses the updatedAt field for sorting in decreasing order from latest to oldest. '
      operationId: amazonWebServicesSearchImageSets
      tags:
      - Datastore
  /datastore/{datastoreId}/imageSet/{imageSetId}/updateImageSetMetadata:
    POST:
      summary: Amazon Web Services Updateimagesetmetadata
      description: Update image set metadata attributes.
      operationId: amazonWebServicesUpdateImageSetMetadata
      tags:
      - Datastore
