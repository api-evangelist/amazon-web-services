openapi: 3.1.0
info:
  title: Amazon Web Services accessanalyzer 2012 09 25 Timeseries API
  description: <p>Identity and Access Management Access Analyzer helps you to set, verify, and refine your IAM policies by providing a suite of capabilities. Its features include findings for external and unused access, basic and custom policy checks for validating policies, and policy generation to generate fine-grained policies. To start using IAM Access Analyzer to identify external or unused access, you first need to create an analyzer.</p> <p> <b>External access analyzers</b> help identify potential risks of accessing resources by enabling you to identify any resource policies that grant access to an external principal. It does this by using logic-based reasoning to analyze resource-based policies in your Amazon Web Services environment. An external principal can be another Amazon Web Services account, a root user, an IAM user or role, a federated user, an Amazon Web Services service, or an anonymous user. You can also use IAM Access Analyzer to preview public and cross-account access to your resources before deploying permissions changes.</p> <p> <b>Unused access analyzers</b> help identify potential identity access risks by enabling you to identify unused IAM roles, unused access keys, unused console passwords, and IAM principals with unused service and action-level permissions.</p> <p>Beyond findings, IAM Access Analyzer provides basic and custom policy checks to validate IAM policies before deploying permissions changes. You can use policy generation to refine permissions by attaching a policy generated using access activity logged in CloudTrail logs. </p> <p>This guide describes the IAM Access Analyzer operations that you can call programmatically. For general information about IAM Access Analyzer, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html">Identity and Access Management Access Analyzer</a> in the <b>IAM User Guide</b>.</p>
tags:
- name: Timeseries
paths:
  /timeseries/associate/:
    POST:
      summary: Amazon Web Services Associatetimeseriestoassetproperty
      description: Associates a time series (data stream) with an asset property.
      operationId: amazonWebServicesAssociateTimeSeriesToAssetProperty
      tags:
      - Timeseries
  /timeseries/delete/:
    POST:
      summary: Amazon Web Services Deletetimeseries
      description: 'Deletes a time series (data stream). If you delete a time series that''s associated with an asset property, the asset property still exists, but the time series will no longer be associated with this asset property. To identify a time series, do one of the following:   If the time series isn''t associated with an asset property, specify the alias of the time series.   If the time series is associated with an asset property, specify one of the following:    The alias of the time series.   The assetId and propertyId that identifies the asset property.    '
      operationId: amazonWebServicesDeleteTimeSeries
      tags:
      - Timeseries
  /timeseries/describe/:
    GET:
      summary: Amazon Web Services Describetimeseries
      description: 'Retrieves information about a time series (data stream). To identify a time series, do one of the following:   If the time series isn''t associated with an asset property, specify the alias of the time series.   If the time series is associated with an asset property, specify one of the following:    The alias of the time series.   The assetId and propertyId that identifies the asset property.    '
      operationId: amazonWebServicesDescribeTimeSeries
      tags:
      - Timeseries
  /timeseries/disassociate/:
    POST:
      summary: Amazon Web Services Disassociatetimeseriesfromassetproperty
      description: Disassociates a time series (data stream) from an asset property.
      operationId: amazonWebServicesDisassociateTimeSeriesFromAssetProperty
      tags:
      - Timeseries
  /timeseries/:
    GET:
      summary: Amazon Web Services Listtimeseries
      description: Retrieves a paginated list of time series (data streams).
      operationId: amazonWebServicesListTimeSeries
      tags:
      - Timeseries
